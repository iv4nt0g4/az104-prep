{id:402,cat:"Compute",q:"You have two subscriptions named Subscription1 and Subscription2. Each subscription is associated to a different Azure AD tenant.<br>Subscription1 contains a virtual network named VNet1. VNet1 contains an Azure virtual machine named VM1 and has an IP address space of 10.0.0.0/16.<br>Subscription2 contains a virtual network named VNet2. VNet2 contains an Azure virtual machine named VM2 and has an IP address space of 10.10.0.0/24.<br>You need to connect VNet1 to VNet2.<br>What should you do first?<br>",ans:3,opts:["Move VM1 to Subscription2.", "Move VNet1 to Subscription2.", "Modify the IP address space of VNet2.", "Provision virtual network gateways."],exp:"For Windows Server, the temporary disk is mounted as \u201cD:\\\u201d.\nFor Linux based VM\u2019s the temporary disk is mounted as \u201c/dev/sdb1\u201d."},
{id:403,cat:"Compute",q:"You plan to create an Azure virtual machine named VM1 that will be configured as shown in the following exhibit.<br><img src=\"imgs/0039100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The planned disk configurations for VM1 are shown in the following exhibit.<br><img src=\"imgs/0039200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to ensure that VM1 can be created in an Availability Zone.<br>Which two settings should you modify? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[0, 2],opts:["Use managed disks", "OS disk type", "Availability options", "Size", "Image"],exp:"From the exhibit we see that the disk is in the VHDX format.\nBefore you upload a Windows virtual machine (VM) from on-premises to Microsoft Azure, you\nmust prepare the virtual hard disk (VHD or VHDX). Azure supports only generation 1 VMs that\nare in the VHD file format and have a fixed sized disk. The maximum size allowed for the VHD is\n1,023 GB. You can convert a generation 1 VM from the VHDX file system to VHD and from a\ndynamically expanding disk to fixed-sized."},
{id:404,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0039500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VMSS1 is set to VM (virtual machines) orchestration mode.<br>You need to deploy a new Azure virtual machine named VM1, and then add VM1 to VMSS1.<br>Which resource group and location should you use to deploy VM1? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0039500002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Resource group",options:["RG1 only","RG2 only","G1 or RG2 only","RG1, RG2, or RG"]},{label:"Location",options:["West US only","Central US only","Central US or West US only","East US, Central US, or West US"]}],ans_img:"imgs/0039600001.png",exp:"Correct answer is:\nVNET1 will only have Department: D1 tag & VNET 2 will only have Label : Value1 tag upvoted 374 times Mucker973 3\u00a0years, 4\u00a0months ago nope, your answer is incorrect and the answers given are correct. You are assuming that Dept: D1 overwrites label:value (well I assume you did based on your answer), but resources can have any amount of tags applied. PLUS I have confirmed this in a lab upvoted 6 times amiban 2\u00a0years, 11\u00a0months ago but can't be applied by policy, we need to be compliant while creating the resources wrt the tags. upvoted 1 times ... cnduknthm 3\u00a0years ago Its not about OVERWRITTING... Its about the assignment of policy. The policy applies to resources that are created only after policy was applied but VNET1 is created before assigning the policy to Resource Group and for that reason VNET1 has only one tag which is Department : D1 upvoted 12 times ... ... Dennis_SOn 3\u00a0years, 3\u00a0months ago what is the answer? your answer seems not in the options? upvoted 2 times Dennis_SOn 3\u00a0years, 3\u00a0months ago are you referring to this answer?\ntag. vnet1 : departement D1 tag only.\nVNET1 - Department: D1 only VNET2 - Label: Value1 only upvoted 6 times Dennis_SOn 3\u00a0years, 3\u00a0months ago tag. vnet1 --- Department: D1 only.\nVNET1 - Department: D1 only VNET2 --- Label: Value1 only upvoted 2 times ... ... ... awssecuritynewbie 3\u00a0years, 1\u00a0month ago this is wrong people do not like it! upvoted 7 times ... marioZuo 2\u00a0years, 3\u00a0months ago Per tested, you are right! upvoted 4 ti"},
{id:405,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have an Azure subscription that contains three virtual networks named VNET1, VNET2, and VNET3.<br>Peering for VNET1 is configured as shown in the following exhibit.<br><img src=\"imgs/0039700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Peering for VNET2 is configured as shown in the following exhibit.<br><img src=\"imgs/0039700002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Peering for VNET3 is configured as shown in the following exhibit.<br><img src=\"imgs/0039800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>How can packets be routed between the virtual networks? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0039800002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Packets from VNET1 can be routed to",options:["VNET2 only","VNETS only","VNET2 and VNET3"]},{label:"Packets from VNET2 can be routed to",options:[")VNET1 only","}VNETS only","\\VNET1 and VNET3"]}],ans_img:"imgs/0039900001.png",exp:"Box 1. VNET2 and VNET3 -\nBox 2: VNET1 -\nGateway transit is disabled.\nReference:\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview"},
{id:406,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have a computer named Computer1 that has a point-to-site VPN connection to an Azure virtual network named VNet1. The point-to-site connection uses a self-signed certificate.<br>From Azure, you download and install the VPN client configuration package on a computer named Computer2.<br>You need to ensure that you can establish a point-to-site VPN connection to VNet1 from Computer2.<br>Solution: You modify the Azure Active Directory (Azure AD) authentication policies.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:407,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have a computer named Computer1 that has a point-to-site VPN connection to an Azure virtual network named VNet1. The point-to-site connection uses a self-signed certificate.<br>From Azure, you download and install the VPN client configuration package on a computer named Computer2.<br>You need to ensure that you can establish a point-to-site VPN connection to VNet1 from Computer2.<br>Solution: You join Computer2 to Azure Active Directory (Azure AD).<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:408,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains 10 virtual networks. The virtual networks are hosted in separate resource groups.<br>Another administrator plans to create several network security groups (NSGs) in the subscription.<br>You need to ensure that when an NSG is created, it automatically blocks TCP port 8080 between the virtual networks.<br>Solution: You create a resource lock, and then you assign the lock to the subscription.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Microsoft updates, which Microsoft refers to as planned maintenance events, sometimes require\nthat VMs be rebooted to complete the update. To reduce the impact on VMs, the Azure fabric is\ndivided into update domains to ensure that not all VMs are rebooted at the same time.\nIncorrect Answers:\nA: An update domain is a group of VMs and underlying physical hardware that can be rebooted at\nthe same time.\nB, C: A fault domain shares common storage as well as a common power source and network\nswitch. It is used to protect against unplanned system failure.\nReferences:\nhttps://petri.com/understanding-azure-availability-sets\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/tutorial-availability-sets"},
{id:409,cat:"Compute",q:"You have an Azure subscription named Subscription1. Subscription1 contains a virtual machine named VM1.<br>You have a computer named Computer1 that runs Windows 10. Computer1 is connected to the Internet.<br>You add a network interface named vm1173 to VM1 as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0040200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>From Computer1, you attempt to connect to VM1 by using Remote Desktop, but the connection fails.<br>You need to establish a Remote Desktop connection to VM1.<br>What should you do first?<br>",ans:3,opts:["Change the priority of the RDP rule", "Attach a network interface", "Delete the DenyAllInBound rule", "Start VM1"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:410,cat:"Compute",q:"You have the Azure virtual machines shown in the following table.<br><img src=\"imgs/0040300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>A DNS service is installed on VM1.<br>You configure the DNS servers settings for each virtual network as shown in the following exhibit.<br><img src=\"imgs/0040400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to ensure that all the virtual machines can resolve DNS names by using the DNS service on VM1.<br>What should you do?<br>",ans:3,opts:["Configure a conditional forwarder on VM1", "Add service endpoints on VNET1", "Add service endpoints on VNET2 and VNET3", "Configure peering between VNET1, VNET2, and VNET3"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:411,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the Azure virtual machines shown in the following table.<br><img src=\"imgs/0040500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You add inbound security rules to a network security group (NSG) named NSG1 as shown in the following table.<br><img src=\"imgs/0040500002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You run Azure Network Watcher as shown in the following exhibit.<br><img src=\"imgs/0040600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You run Network Watcher again as shown in the following exhibit.<br><img src=\"imgs/0040800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0040900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["NSG1 limits VMI trafic le", "NSG1 applies to VM2 ol", "\\VW11 and VM2 connect to the same virtual network [OQ"],ans:["No", "Yes", "No"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:412,cat:"Compute",q:"You have the Azure virtual network named VNet1 that contains a subnet named Subnet1. Subnet1 contains three Azure virtual machines. Each virtual machine has a public IP address.<br>The virtual machines host several applications that are accessible over port 443 to users on the Internet.<br>Your on-premises network has a site-to-site VPN connection to VNet1.<br>You discover that the virtual machines can be accessed by using the Remote Desktop Protocol (RDP) from the Internet and from the on-premises network.<br>You need to prevent RDP access to the virtual machines from the Internet, unless the RDP connection is established from the on-premises network. The solution must ensure that all the applications can still be accessed by the Internet users.<br>What should you do?<br>",ans:1,opts:["Modify the address space of the local network gateway", "Create a deny rule in a network security group (NSG) that is linked to Subnet1", "Remove the public IP addresses from the virtual machines", "Modify the address space of Subnet1"],exp:"Correct Answer: B You can use a site-to-site VPN to connect your on-premises network to an Azure virtual network. Users on your on-premises network connect by using the RDP or SSH protocol over the site-to-site VPN connection. You have to deny direct RDP or SSH access over the internet through an NSG. Reference: https://docs.microsoft.com/en-us/azure/security/fundamentals/network-best-practices"},
{id:413,cat:"Networking",q:"You have an Azure subscription that contains the resources in the following table.<br><img src=\"imgs/0041100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Subnet1 is associated to VNet1. NIC1 attaches VM1 to Subnet1.<br>You need to apply ASG1 to VM1.<br>What should you do?<br>",ans:0,opts:["Associate NIC1 to ASG1", "Modify the properties of ASG1", "Modify the properties of NSG1"],exp:"Box 1: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 2: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 3: Yes\nUser3 can review the access guest users of Group1 which also includes Group2. UserB is the\nguest of Group2 and hence User3 can review the access of UserB."},
{id:414,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains an Azure virtual network named VNet1. VNet1 connects to your on-premises network by using<br>Azure ExpressRoute.<br>You plan to prepare the environment for automatic failover in case of ExpressRoute failure.<br>You need to connect VNet1 to the on-premises network by using a site-to-site VPN. The solution must minimize cost.<br>Which three actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[0, 1, 2],opts:["Create a connection", "Create a local site VPN gateway", "Create a VPN gateway that uses the VpnGw1 SKU", "Create a gateway subnet", "Create a VPN gateway that uses the Basic SKU"],exp:"Box 1: No\nSubscription1 is a member of ManagementGroup21, ManagementGroup21 is a member of\nManagementGroup11, ManagementGroup11 is a member of the Tenant Root Group, The Tenant\nRoot group has \u2018Not allowed resource types for virtual network\u2019.\n\nBox 2: No:\nYou cannot create a VM, because based on the Policy you can only create VNETs in\nSybscription2 (ManagementGroup12).\n\nBox 3: No\nYou cannot ADD Subscription1 to ManagementGroup11, but you can MOVE Subscription1 from\nManagementGroup21 to ManagmentGroup11. Subscriptions can only be a member of ONE\nManagementGroup at a time.\n\nAllowed Resource Type (Deny): Defines the resource types that you can deploy. Its effect is to\ndeny all resources that aren't part of this defined list.\nNot allowed resource types (Deny): Prevents a list of resource types from being deployed.\nBased on the Policies, VNETs are not allowed in the Tenant Root Group scope, so you cannot\ndeploy VNETs. Also, VNETs only allowed in ManagementGroup12 scope, but you cannot deploy\nany other resource."},
{id:415,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have peering configured as shown in the following exhibit.<br><img src=\"imgs/0041300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0041300002.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Hosts on vNET6 can communicate with hosts on [answer choice]",options:["vNET6 and vNET1 only","VNET6, VNET1, and vNET2 only","all the virtual networks in the subscription"]},{label:"To change the status of the peering connection to VNET1 to Connected, you must first [answer choice]",options:["add a service endpoint","add a subnet","delete peering1","modify the address space"]}],ans_img:"imgs/0041400001.jpg",exp:"Box 1: vNET6 only -\nPeering status to both VNet1 and Vnet2 are disconnected.\nBox 2: delete peering1 -\nPeering to Vnet1 is Enabled but disconnected. We need to update or re-create the remote peering to get it back to Initiated state.\nReference:\nhttps://blog.kloud.com.au/2018/10/19/address-space-maintenance-with-vnet-peering/"},
{id:416,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the resources in the following table.<br><img src=\"imgs/0041500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You install the Web Server server role (IIS) on VM1 and VM2, and then add VM1 and VM2 to LB1.<br>LB1 is configured as shown in the LB1 exhibit. (Click the LB1 tab.)<br><img src=\"imgs/0041500002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Rule1 is configured as shown in the Rule1 exhibit. (Click the Rule1 tab.)<br><img src=\"imgs/0041600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0041700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["M1 is in the same availability set as VM2.", "If Probe1.htm is present on VM1 and VM2, LB1 will balance TCP", "port 80 between VM1 and VM2.", "If you delete Rule1, LB1 will balance all the requests between VM1", "and VM2 for all the ports."],ans:["Yes", "Yes", "No", "Yes", "Yes"],exp:"Box 1: will have no access\nThe IP 193.77.134.1 does not have access on the SAS, because it is not matching the SAS\nrequirements. IP is out of range.\n\nBox 2: will have no access\nThe SAS token is not supported in mounting Azure File share currently, it just supports the Azure\nstorage account key.\nSince it is using \"net use\" where it uses SMB, the SMB (Server Message Broker) protocol does\nnot support SAS. it still asks for username/password. Accordingly, it will give error wrong\nusername/pass and will not provide access."},
{id:417,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure virtual machine named VM1 that connects to a virtual network named VNet1. VM1 has the following configurations:<br>\u2711 Subnet: 10.0.0.0/24<br>\u2711 Availability set: AVSet<br>\u2711 Network security group (NSG): None<br>\u2711 Private IP address: 10.0.0.4 (dynamic)<br>\u2711 Public IP address: 40.90.219.6 (dynamic)<br>You deploy a standard, Internet-facing load balancer named slb1.<br>You need to configure slb1 to allow connectivity to VM1.<br>Which changes should you apply to VM1 as you configure slb1? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0041900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Before you create a backend pool on LB1, you must",options:["Create and assign an NSG to VM1","Remove the public IP address from VM1","Change the private IP address of VM1 to static"]},{label:"Before you can connect to VM1 from LB1, you must",options:["Create and configure an NSG","Remove the public IP address from VM1","Change the private IP address of VM1 to static"]}],ans_img:"imgs/0041900002.jpg",exp:"Change the private IP address of VM1 to static\nBox 1: Remove the public IP address from VM1\nNote: A public load balancer can provide outbound connections for virtual machines (VMs) inside your virtual network. These connections are accomplished by translating their private IP addresses to public IP addresses. Public Load Balancers are used to load balance internet traffic to your VMs.\nBox 2: Create and configure an NSG\nNSGs are used to explicitly permit allowed traffic. If you do not have an NSG on a subnet or NIC of your virtual machine resource, traffic is not allowed to reach this resource.\nReference:\nhttps://docs.microsoft.com/en-us/azure/load-balancer/load-balancer-overview"},
{id:418,cat:"Governance",q:"You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0042000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to create a network interface named NIC1.<br>In which location can you create NIC1?<br>",ans:1,opts:["East US and North Europe only", "East US only", "East US, West Europe, and North Europe", "East US and West Europe only"],exp:"Box 1: contosostorage\nThe name of account\n\nBox 2: file.core.windows.net\n\nBox 3: data\nThe name of the file share is data.\n\nExample:"},
{id:419,cat:"Compute",q:"You have Azure virtual machines that run Windows Server 2019 and are configured as shown in the following table.<br><img src=\"imgs/0042100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create a public Azure DNS zone named adatum.com and a private Azure DNS zone named contoso.com.<br>For controso.com, you create a virtual network link named link1 as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0042200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You discover that VM1 can resolve names in contoso.com but cannot resolve names in adatum.com. VM1 can resolve other hosts on the Internet.<br>You need to ensure that VM1 can resolve host names in adatum.com.<br>What should you do?<br>",ans:1,opts:["Update the DNS suffix on VM1 to be adatum.com", "Configure the name servers for adatum.com at the domain registrar", "Create an SRV record in the contoso.com zone", "Modify the Access control (IAM) settings for link1"],exp:"Step 1: Install the Azure File Sync agent on Server1\nThe Azure File Sync agent is a downloadable package that enables Windows Server to be\nsynced with an Azure file share\n\nStep 2: Register Server1.\nRegister Windows Server with Storage Sync Service\nRegistering your Windows Server with a Storage Sync Service establishes a trust relationship\nbetween your server (or cluster) and the Storage Sync Service.\n\nStep 3: Add a server endpoint\nCreate a sync group and a cloud endpoint.\nA sync group defines the sync topology for a set of files. Endpoints within a sync group are kept\nin sync with each other. A sync group must contain one cloud endpoint, which represents an\n\n\fAzure file share and one or more server endpoints. A server endpoint represents a path on\nregistered server."},
{id:420,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You plan to use Azure Network Watcher to perform the following tasks:<br>\u2711 Task1: Identify a security rule that prevents a network packet from reaching an Azure virtual machine.<br>\u2711 Task2: Validate outbound connectivity from an Azure virtual machine to an external host.<br>Which feature should you use for each task? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0042400001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Task2",options:["Connection troubleshoot","IP flow verify","Next hop","INSG flow logs","Traffic Analytics"]}],ans_img:"imgs/0042500001.jpg",exp:"Box 1: IP flow verify -\nAt some point, a VM may become unable to communicate with other resources, because of a security rule. The IP flow verify capability enables you to specify a source and destination IPv4 address, port, protocol (TCP or UDP), and traffic direction (inbound or outbound). IP flow verify then tests the communication and informs you if the connection succeeds or fails. If the connection fails, IP flow verify tells you which.\nBox 2: Connection troubleshoot -\nDiagnose outbound connections from a VM: The connection troubleshoot capability enables you to test a connection between a VM and another VM, an FQDN, a\nURI, or an IPv4 address. The test returns similar information returned when using the connection monitor capability, but tests the connection at a point in time, rather than monitoring it over time, as connection monitor does. Learn more about how to troubleshoot connections using connection-troubleshoot.\nReference:\nhttps://docs.microsoft.com/en-us/azure/network-watcher/network-watcher-monitoring-overview"},
{id:421,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the Azure virtual machines shown in the following table.<br><img src=\"imgs/0042600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You configure the network interfaces of the virtual machines to use the settings shown in the following table.<br><img src=\"imgs/0042600002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>From the settings of VNET1 you configure the DNS servers shown in the following exhibit.<br><img src=\"imgs/0042700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The virtual machines can successfully connect to the DNS server that has an IP address of 192.168.10.15 and the DNS server that has an IP address of<br>193.77.134.10.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0042700002.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["M1 connects to 193.77.134.10 for DNS queries.", "VM2 connects to 193.77.134.10 for DNS queries.", "M3 connects to 192.168.10.15 for DNS queries. fo}"],ans:["No", "No", "No"],exp:"You can provide authorization credentials by using Azure Active Directory (AD), or by using a\nShared Access Signature (SAS) token.\n\nBox 1:\nBoth Azure Active Directory (AD) and Shared Access Signature (SAS) token are supported for\nBlob storage.\n\nBox 2:\nOnly Shared Access Signature (SAS) token is supported for File storage."},
{id:422,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the virtual machines shown in the following table.<br><img src=\"imgs/0043200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You deploy a load balancer that has the following configurations:<br>\u2711 Name: LB1<br>\u2711 Type: Internal<br>\u2711 SKU: Standard<br>\u2711 Virtual network: VNET1<br>You need to ensure that you can add VM1 and VM2 to the backend pool of LB1.<br>Solution: You create a Basic SKU public IP address, associate the address to the network interface of VM1, and then start VM1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"If you look at the default policy which is in place for enforcing tags, you can see that the effect\nshould be Deny:\n\n\fSince this option is clearly mentioned in the Azure in-built policy, all other options are incorrect.\nhttps://docs.microsoft.com/en-us/azure/governance/policy/overview"},
{id:423,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the virtual machines shown in the following table.<br><img src=\"imgs/0043300002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You deploy a load balancer that has the following configurations:<br>\u2711 Name: LB1<br>\u2711 Type: Internal<br>\u2711 SKU: Standard<br>\u2711 Virtual network: VNET1<br>You need to ensure that you can add VM1 and VM2 to the backend pool of LB1.<br>Solution: You create a Standard SKU public IP address, associate the address to the network interface of VM1, and then stop VM2.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Box 1: 4\nIf you resize the Scale Set all the VMs get resized at once, thus 4 is the correct answer.\n\nBox 2: 1\nAutomatic OS updates update 20% of the VMs at once, with a minimum of 1 VM instance at a\ntime. Also 20% of 4 = 0.8."},
{id:424,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the virtual machines shown in the following table.<br><img src=\"imgs/0043400002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You deploy a load balancer that has the following configurations:<br>\u2711 Name: LB1<br>\u2711 Type: Internal<br>\u2711 SKU: Standard<br>\u2711 Virtual network: VNET1<br>You need to ensure that you can add VM1 and VM2 to the backend pool of LB1.<br>Solution: You create two Standard SKU public IP addresses and associate a Standard SKU public IP address to the network interface of each virtual machine.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Box 1: No\nAzure DNS provides automatic registration of virtual machines from a single virtual network that's\nlinked to a private zone as a registration virtual network. VM5 does not belong to the registration\nvirtual network though.\n\nBox 2: No\nForward DNS resolution is supported across virtual networks that are linked to the private zone\nas resolution virtual networks. VM5 does belong to a resolution virtual network.\n\nBox 3: Yes\nVM6 belongs to registration virtual network, and an A (Host) record exists for VM9 in the DNS\nzone. By default, registration virtual networks also act as resolution virtual networks, in the sense\nthat DNS resolution against the zone works from any of the virtual machines within the\nregistration virtual network."},
{id:425,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have a computer named Computer1 that has a point-to-site VPN connection to an Azure virtual network named VNet1. The point-to-site connection uses a self-signed certificate.<br>From Azure, you download and install the VPN client configuration package on a computer named Computer2.<br>You need to ensure that you can establish a point-to-site VPN connection to VNet1 from Computer2.<br>Solution: You export the client certificate from Computer1 and install the certificate on Computer2.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Box 1: 10.0.0.0/16\nAddress prefix\ndestination-> Vnet 1 (Address space of Vnet1)\n\nBox 2: Virtual appliance\nNext hop type\nVM1 ->Virtual Appliance. You can specify IP address of VM 1 when configuring next hop as\nVirtual appliance.\n\nBox 3: Gateway Subnet\nAssigned to\nThis route is to be followed by Gateway Subnet for the incoming traffic. You can associate routing\ntable to the Subnet from Rout Table -> subnet ->Associate."},
{id:426,cat:"Compute",q:"You have an Azure virtual machine named VM1.<br>The network interface for VM1 is configured as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0043700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You deploy a web server on VM1, and then create a secure website that is accessible by using the HTTPS protocol. VM1 is used as a web server only.<br>You need to ensure that users can connect to the website from the Internet.<br>What should you do?<br>",ans:2,opts:["Modify the protocol of Rule4", "Delete Rule1", "For Rule5, change the Action to Allow and change the priority to 401", "Create a new inbound rule that allows TCP protocol 443 and configure the rule to have a priority of 501."],exp:"Box 1: No\nNSG1 has default rules, which denies any port open for inbound rules\n\nBox 2: Yes\nNSG2 has custom Rule1, allowing RDP port 3389 with TCP.\n\nBox 3: Yes\nVM1 and VM2 are in the same Vnet. By default, communication is allowed."},
{id:427,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains 10 virtual networks. The virtual networks are hosted in separate resource groups.<br>Another administrator plans to create several network security groups (NSGs) in the subscription.<br>You need to ensure that when an NSG is created, it automatically blocks TCP port 8080 between the virtual networks.<br>Solution: From the Resource providers blade, you unregister the Microsoft.ClassicNetwork provider.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Box 1: No\nVM1 has the NSG1 on Subnet1, which allows traffic over port 1433 between Subnet2 and\nSubnet1. BUT NSG2 also applied on NIC level for VM1 that blocks the traffic on port 1433. Hence\nNo traffic allowed.\n\nBox 2: Yes\nNo rule explicitly blocks communication from VM1. The default rules, which allow communication,\nare thus applied.\n\nBox 3: Yes\nNo rule explicitly blocks communication between VM2 and VM3 which are both on Subnet2. The\ndefault rules, which allow communication, are thus applied."},
{id:428,type:"hs",cat:"Networking",q:"HOTSPOT -<br>You manage two Azure subscriptions named Subscription1 and Subscription2.<br>Subscription1 has following virtual networks:<br><img src=\"imgs/0043900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The virtual networks contain the following subnets:<br><img src=\"imgs/0044000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Subscription2 contains the following virtual network:<br>\u2711 Name: VNETA<br>\u2711 Address space: 10.10.128.0/17<br>\u2711 Location: Canada Central<br>VNETA contains the following subnets:<br><img src=\"imgs/0044000005.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0044100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["A Site-to-Site connection can be established", "between VNET1 and VNET2", "\\VNET1 and VNET2 can be peered. [f", "VNET1 and VNETA can be peered. {"],ans:["No", "Yes", "Yes", "Yes"],exp:"IP forwarding enables the virtual machine a network interface is attached to:\nReceive network traffic not destined for one of the IP addresses assigned to any of the IP\nconfigurations assigned to the network interface.\nSend network traffic with a different source IP address than the one assigned to one of a network\ninterface's IP configurations.\n\nThe setting must be enabled for every network interface that is attached to the virtual machine\nthat receives traffic that the virtual machine needs to forward. A virtual machine can forward traffic\nwhether it has multiple network interfaces or a single network interface attached to it.\n\nBox 1: Yes\nThe routing table allows connections from VM3 to VM1 and VM2. And as IP forwarding is enabled\non VM3, VM3 can connect to VM1.\n\nBox 2: No\nVM3, which has IP forwarding, must be turned on, in order for VM2 to connect to VM1.\n\nBox 3: Yes\nThe routing table allows connections from VM1 and VM2 to VM3. IP forwarding on VM3 allows\nVM1 to connect to VM2 via VM3."},
{id:429,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an app named App1 that is installed on two Azure virtual machines named VM1 and VM2. Connections to App1 are managed by using an Azure Load<br>Balancer.<br>The effective network security configurations for VM2 are shown in the following exhibit.<br><img src=\"imgs/0044300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You discover that connections to App1 from 131.107.100.50 over TCP port 443 fail.<br>You verify that the Load Balancer rules are configured correctly.<br>You need to ensure that connections to App1 can be established successfully from 131.107.100.50 over TCP port 443.<br>Solution: You create an inbound security rule that denies all traffic from the 131.107.100.50 source and has a cost of 64999.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Box 1: 10 years\nThe yearly backup point occurs to 1 March and its retention period is 10 years.\n\nBox 2: 36 months\nThe monthly backup point occurs on the 1\nof every month and its retention period is 36 months.\n\nNote: Azure retention policy takes the longest period of retention for each backup. In case of\nconflict between 2 different policies."},
{id:430,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an app named App1 that is installed on two Azure virtual machines named VM1 and VM2. Connections to App1 are managed by using an Azure Load<br>Balancer.<br>The effective network security configurations for VM2 are shown in the following exhibit.<br><img src=\"imgs/0044400001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You discover that connections to App1 from 131.107.100.50 over TCP port 443 fail.<br>You verify that the Load Balancer rules are configured correctly.<br>You need to ensure that connections to App1 can be established successfully from 131.107.100.50 over TCP port 443.<br>Solution: You delete the BlockAllOther443 inbound security rule.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Correct Answer: B - No Allow_131.107.100.50 rule has a higher priority (100) than BlockAllOther441 (200) and it allows inbound traffic over TCP 443 from source 131.107.100.50. App1 (VM1 and VM2) is in a VNet, so this rule applies. Unfortunately, we still cannot access App1, so the issue is somewhere else, maybe the VMs are off, or the firewall is blocking it."},
{id:431,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an app named App1 that is installed on two Azure virtual machines named VM1 and VM2. Connections to App1 are managed by using an Azure Load<br>Balancer.<br>The effective network security configurations for VM2 are shown in the following exhibit.<br><img src=\"imgs/0044500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You discover that connections to App1 from 131.107.100.50 over TCP port 443 fail.<br>You verify that the Load Balancer rules are configured correctly.<br>You need to ensure that connections to App1 can be established successfully from 131.107.100.50 over TCP port 443.<br>Solution: You modify the priority of the Allow_131.107.100.50 inbound security rule.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"In Azure, you can move resources between resource groups as long as the resource type is\nsupported for move operations. Virtual Networks (VNETs) are supported for move operations, so\nyou can move the \"VNET1 - Virtual Network\" resource to RG2.\nThe other resources, such as \"W10_OsDisk\" (Managed Disk), \"W10\" (Virtual Machine), and\n\"VNET3 - Virtual Network\" (Classic Virtual Network), may have limitations or dependencies that\n\n\fprevent them from being moved. Classic resources, like the Classic Virtual Network, have more\nrestrictions on moving compared to Azure Resource Manager (ARM) resources."},
{id:432,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains 10 virtual networks. The virtual networks are hosted in separate resource groups.<br>Another administrator plans to create several network security groups (NSGs) in the subscription.<br>You need to ensure that when an NSG is created, it automatically blocks TCP port 8080 between the virtual networks.<br>Solution: You assign a built-in policy definition to the subscription.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"https://docs.microsoft.com/en-us/azure/role-based-access-control/elevate-access-global-\nadmin#azure-portal"},
{id:433,cat:"Governance",q:"You have an Azure subscription.<br>You plan to deploy an Azure Kubernetes Service (AKS) cluster to support an app named App1. On-premises clients connect to App1 by using the IP address of the pod.<br>For the AKS cluster, you need to choose a network type that will support App1.<br>What should you choose?<br>",ans:1,opts:["kubenet", "Azure Container Networking Interface (CNI)", "Hybrid Connection endpoints", "Azure Private Link"],exp:"With the Shared service plan, you are only allowed to run an App for 240 minutes a day. So, this\nwill not resolve the issue.\n\nhttps://azure.microsoft.com/en-us/pricing/details/app-service/plans/"},

{id:435,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains 10 virtual networks. The virtual networks are hosted in separate resource groups.<br>Another administrator plans to create several network security groups (NSGs) in the subscription.<br>You need to ensure that when an NSG is created, it automatically blocks TCP port 8080 between the virtual networks.<br>Solution: You configure a custom policy definition, and then you assign the policy to the subscription.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"The cloud tiering feature is used to ensure volumes have a percentage of free space when you\nuse the Azure File Sync service. The ideal solution to use here is the Content Delivery service\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-sync-cloud-tiering"},
{id:436,cat:"Compute",q:"You have two Azure virtual networks named VNet1 and VNet2. VNet1 contains an Azure virtual machine named VM1. VNet2 contains an Azure virtual machine named VM2.<br>VM1 hosts a frontend application that connects to VM2 to retrieve data.<br>Users report that the frontend application is slower than usual.<br>You need to view the average round-trip time (RTT) of the packets from VM1 to VM2.<br>Which Azure Network Watcher feature should you use?<br>",ans:2,opts:["IP flow verify", "Connection troubleshoot", "Connection monitor", "NSG flow logs"],exp:"User1: Read and Data Access\nUser2: Owner\n\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#reader-and-data-\naccess\nLets you view everything but will not let you delete or create a storage account or contained\nresource. It will also allow read/write access to all data contained in a storage account via access\nto storage account keys.\n\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#owner\nGrants full access to manage all resources, including the ability to assign roles in Azure RBAC."},
{id:437,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the public load balancers shown in the following table.<br><img src=\"imgs/0045000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to create six virtual machines and to load balance requests to the virtual machines. Each load balancer will load balance three virtual machines.<br>You need to create the virtual machines for the planned solution.<br>How should you create the virtual machines? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0045100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"The virtual machines that will be load balanced",options:["bytes LE) met lbe connected to the same virtual network","lbe created in the same resource group","be created in the same availability set or virtual machine scale setj","run the same operating system"]},{label:"The virtual machines that will be load balanced",options:["by baing La cat lbe connected to the same virtual network","be created in the same resource group","lbe created in the same availability set or virtual machine scale set]","Irun the same operating system"]}],ans_img:"imgs/0045100002.jpg",exp:"Box 1: be created in the same availability set or virtual machine scale set.\nThe Basic tier is quite restrictive. A load balancer is restricted to a single availability set, virtual machine scale set, or a single machine.\nBox 2: be connected to the same virtual network\nThe Standard tier can span any virtual machine in a single virtual network, including blends of scale sets, availability sets, and machines.\nReference:\nhttps://www.petri.com/comparing-basic-standard-azure-load-balancers"},
{id:438,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have an on-premises data center and an Azure subscription. The data center contains two VPN devices. The subscription contains an Azure virtual network named VNet1. VNet1 contains a gateway subnet.<br>You need to create a site-to-site VPN. The solution must ensure that if a single instance of an Azure VPN gateway fails, or a single on-premises VPN device fails, the failure will not cause an interruption that is longer than two minutes.<br>What is the minimum number of public IP addresses, virtual network gateways, and local network gateways required in Azure? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0045300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Virtual network gateways: i",options:["2","3","4"]},{label:"Local network gateways",options:["2","3","4"]}],ans_img:"imgs/image930.png",exp:"Correct Answer:\n\nThe questions asks how many are required in Azure, so the on-premise ones should not be counted.\n\nBox 1: 2\n2 public IP addresses in the on-premises data center, and 2 public IP addresses in the VNET for the active-active. The most reliable option is to combine the active-active gateways on both your network and Azure, as shown in the diagram below.\n\nBox 2: 1\nEvery Azure VPN gateway consists of two instances in an active-standby configuration. For any planned maintenance or unplanned disruption that happens to the active instance, the standby instance would take over (failover) automatically, and resume the S2S VPN or VNet-to-VNet connections.\n\nBox 3: 1\nDual-redundancy: active-active VPN gateways for both Azure and on-premises networks upvoted 134 times yangxs 3\u00a0years, 9\u00a0months ago I totally agree with you that \"The questions asks how many are required in Azure, so the on-premise ones should not be counted.\"\nBase on this box 3 should be 0 since it is not in Azure, but there is no such choice.\nThey should make the question/answer more clear. upvoted 1 times Ashfaque_9x 2\u00a0years, 10\u00a0months ago Local Network Gateway in S2S VPN is created at the Azure end. upvoted 5 times ... ... Harshul 4\u00a0years, 4\u00a0months ago It Should be 4-2-1 upvoted 1 times Harshul 4\u00a0years, 4\u00a0months ago Sorry, It Should be 4-1-2 upvoted 7 times alex_p 4\u00a0years, 1\u00a0month ago Agree with you.  \nFOR IP Addresses: 2 for the VPN gateways and 2 for the local network gateways which are also configured in "},
{id:439,cat:"Compute",q:"You have an Azure subscription that contains two virtual machines as shown in the following table.<br><img src=\"imgs/0045500002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You perform a reverse DNS lookup for 10.0.0.4 from VM2.<br>Which FQDN will be returned?<br>",ans:3,opts:["vm1.core.windows.net", "vm1.azure.com", "vm1.westeurope.cloudapp.azure.com", "vm1.internal.cloudapp.net"],exp:"You can't delete a Recovery Services vault if it is registered to a server and holds backup data. If\nyou try to delete a vault, but can't, the vault is still configured to receive backup data.\nRemove vault dependencies and delete vault\nIn the vault dashboard menu, scroll down to the Protected Items section, and click Backup Items.\nIn this menu, you can stop and delete Azure File Servers, SQL Servers in Azure VM, and Azure\nvirtual machines.\n\nReferences: https://docs.microsoft.com/en-us/azure/backup/backup-azure-delete-vault\nYou can't delete a Recovery Services vault if it is registered to a server and holds backup data. If\nyou try to delete a vault, but can't, the vault is still configured to receive backup data.\nRemove vault dependencies and delete vault\nIn the vault dashboard menu, scroll down to the Protected Items section, and click Backup Items.\nIn this menu, you can stop and delete Azure File Servers, SQL Servers in Azure VM, and Azure\nvirtual machines."},
{id:440,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an app named App1 that is installed on two Azure virtual machines named VM1 and VM2. Connections to App1 are managed by using an Azure Load<br>Balancer.<br>The effective network security configurations for VM2 are shown in the following exhibit.<br><img src=\"imgs/0045600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You discover that connections to App1 from 131.107.100.50 over TCP port 443 fail.<br>You verify that the Load Balancer rules are configured correctly.<br>You need to ensure that connections to App1 can be established successfully from 131.107.100.50 over TCP port 443.<br>Solution: You create an inbound security rule that allows any traffic from the AzureLoadBalancer source and has a cost of 150.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"https://docs.microsoft.com/en-us/azure/virtual-machines/windows/find-unattached-disks\n\n\fQUESTION 69\nYou have an Azure subscription named Subscription1.\nYou deploy a Linux virtual machine named VM1 to Subscription1.\nYou need to monitor the metrics and the logs of VM1.\nWhat should you use?\n\nA.   Linux Diagnostic Extension (LAD) 3.0\nB.   Azure Analysis Services\nC.   The AzurePerformanceDiagnostics extension\nD.   Azure HDInsight\n\nAnswer: A\nExplanation:\nThe Linux Diagnostic Extension should be used which downloads the Diagnostic Extension (LAD)\nagent on Linux server."},

{id:442,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the resources in the following table:<br><img src=\"imgs/0045800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>In Azure, you create a private DNS zone named adatum.com. You set the registration virtual network to VNet2. The adatum.com zone is configured as shown in the following exhibit:<br><img src=\"imgs/0045900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0046000001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["The A record for VMS5 will be registered automatically in the", "adatum.com zone.", "VMS can resolve VM9.adatum.com. a) [e}", "M6 can resolve VM9.adatum.com. [e}"],ans:["No", "No", "Yes", "Yes"],exp:"Incorrect Answers:\nB: The network interface has already been added to VM.\nC: The Outbound rules are fine.\nD: The inbound rules are fine. Port 3389 is used for Remote Desktop. Note: Rules are processed\nin priority order, with lower numbers processed before higher numbers, because lower numbers\nhave higher priority. Once traffic matches a rule, processing stops. As a result, any rules that\n\n\fexist with lower priorities (higher numbers) that have the same attributes as rules with higher\npriorities are not processed.\nReferences: https://docs.microsoft.com/en-us/azure/virtual-network/security-overview"},

typo - other vm is also NOT virtually integrated. upvoted 1 times ... ... SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isolated apps does not need vnet intergation feature bcoz it is a Network-isolated application hosting , meaning the app is deployed into a subnet, which is inside vnet in this question. Since there is peering between vnet1 and vnet2, the app can communicate with a VM in the other vnet. upvoted 8 times SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isol"},

{id:448,type:"dd",cat:"Governance",q:"DRAG DROP -<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0046800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to load balance HTTPS connections to vm1 and vm2 by using lb1.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0046900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Add VM1 and VM2 to a backend pool", "Create a health probe", "Create a load-balancing rule for port 443"],ans:["Add VM1 and VM2 to a backend pool", "Create a health probe", "Create a load-balancing rule for port 443"],exp:"The virtual networks can be in the same or different regions, and from the same or different\nsubscriptions. When connecting VNets from different subscriptions, the subscriptions do not need\nto be associated with the same Active Directory tenant.\nConfiguring a VNet-to-VNet connection is a good way to easily connect VNets. Connecting a\nvirtual network to another virtual network using the VNet-to-VNet connection type (VNet2VNet) is\nsimilar to creating a Site-to-Site IPsec connection to an on-premises location. Both connectivity\ntypes use a VPN gateway to provide a secure tunnel using IPsec/IKE, and both function the same\nway when communicating.\nThe local network gateway for each VNet treats the other VNet as a local site. This lets you\nspecify additional address space for the local network gateway in order to route traffic.\nReferences: https://docs.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-howto-vnet-vnet-\nresource-manager-portal"},
{id:449,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You manage a virtual network named VNet1 that is hosted in the West US Azure region.<br>VNet1 hosts two virtual machines named VM1 and VM2 that run Windows Server.<br>You need to inspect all the network traffic from VM1 to VM2 for a period of three hours.<br>Solution: From Azure Monitor, you create a metric on Network In and Network Out.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Azure DNS supports importing and exporting zone files by using the Azure command-line\ninterface (CLI). Zone file import is not currently supported via Azure PowerShell or the Azure\nportal. References: https://docs.microsoft.com/en-us/azure/dns/dns-import-export"},
{id:450,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an app named App1 that is installed on two Azure virtual machines named VM1 and VM2. Connections to App1 are managed by using an Azure Load<br>Balancer.<br>The effective network security configurations for VM2 are shown in the following exhibit.<br><img src=\"imgs/0047200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You discover that connections to App1 from 131.107.100.50 over TCP port 443 fail.<br>You verify that the Load Balancer rules are configured correctly.<br>You need to ensure that connections to App1 can be established successfully from 131.107.100.50 over TCP port 443.<br>Solution: You create an inbound security rule that denies all traffic from the 131.107.100.50 source and has a priority of 64999.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"https://docs.microsoft.com/en-us/azure/virtual-machine-scale-sets/virtual-machine-scale-sets-\nmanage-cli"},

{id:453,cat:"Networking",q:"You have a virtual network named VNet1 as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0047600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>No devices are connected to VNet1.<br>You plan to peer VNet1 to another virtual network named VNet2. VNet2 has an address space of 10.2.0.0/16.<br>You need to create the peering.<br>What should you do first?<br>",ans:0,opts:["Modify the address space of VNet1.", "Add a gateway subnet to VNet1.", "Create a subnet on VNet1 and VNet2.", "Configure a service endpoint on VNet2."],exp:"To verify your custom domain name (example)\n1. Sign in to the Azure portal using a Global administrator account for the directory.\n2. Select Azure Active Directory, and then select Custom domain names.\n3. On the Fabrikam - Custom domain names page, select the custom domain name, Contoso.\n4. On the Contoso page, select Verify to make sure your custom domain is properly registered\nand is valid for Azure AD. Use either the TXT or the MX record type.\n\nNote:\n\n\fThere are several versions of this question in the exam. The question can have two correct\nanswers:\n1. MX\n2. TXT\nThe question can also have other incorrect answer options, including the following:\n1. SRV\n2. NSEC3"},
{id:454,cat:"Compute",q:"You have the Azure virtual machines shown in the following table.<br><img src=\"imgs/0047700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VNET1 is linked to a private DNS zone named contoso.com that contains the records shown in the following table.<br><img src=\"imgs/0047700002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to ping VM2 from VM1.<br>Which DNS names can you use to ping VM2?<br>",ans:2,opts:["comp2.contoso.com and comp4.contoso.com only", "comp1.contoso.com, comp2.contoso.com, comp3.contoso.com, and comp4.contoso.com", "comp2.contoso.com only", "comp1.contoso.com and comp2.contoso.com only", "comp1.contoso.com, comp2.contoso.com, and comp4.contoso.com only"],exp:"No, the right solution is to modify the name server at the domain register.\nhttps://docs.microsoft.com/en-us/azure/active-directory/fundamentals/add-custom-domain"},
{id:455,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have a network security group (NSG) named NSG1 that has the rules defined in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0047900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>NSG1 is associated to a subnet named Subnet1. Subnet1 contains the virtual machines shown in the following table.<br><img src=\"imgs/0047900002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to add a rule to NSG1 to ensure that VM1 can ping VM2. The solution must use the principle of least privilege.<br>How should you configure the rule? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0048000001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Destination",options:["Any","10.1.0.10","10.1.0.11","10.1.0.10; 10.1.0.11","10.1.0.0/28"]},{label:"Priority",options:["111","112"]}],ans_img:"imgs/image933.png",exp:"Answer is wrong. We need to undo the DENY_PING rule with the principle of least privilege.\n\nDirection: Outbound\nSource 10.1.0.10 (VM1)\nDestination: 10.1.0.11 (VM2)\nPriority: 110 upvoted 443 times theOldOne 4\u00a0years, 1\u00a0month ago What about inbound? Keep the rest the same. upvoted 2 times nsknexus478 4\u00a0years, 1\u00a0month ago Both the VMs are from the same Vnet. So inbound is allow by default within the n/w. upvoted 12 times awssecuritynewbie 3\u00a0years, 1\u00a0month ago that is exactly what i wanted to say! it is kept the same! upvoted 3 times ... ... dc2k79 3\u00a0years ago its stateful, if allowed an outbound connection, the response traffic is automatically allowed. upvoted 6 times ... SilverFox22 4\u00a0years, 1\u00a0month ago The inbound/outbound threw me a bit as well. \"rules in inbound direction affect traffic that is being initiated from external sources, such as the Internet or another VM, to a virtual machine. Outbound security rules affect traffic sent from a VM.\" The ICMP traffic is being sent from VM1, so outbound. upvoted 13 times ... ... nsknexus478 4\u00a0years, 1\u00a0month ago I was thinking the same. The given answer threw the least privilege out of window. upvoted 7 times ... mdwSysOps 2\u00a0years, 8\u00a0months ago this is the correct answer upvoted 3 times ... Takloy 3\u00a0years, 11\u00a0months ago This is what I had in mind. I thought I'm going nuts when I saw the answer. Admin should change it. upvoted 31 times ... Load full discussion..."},
{id:456,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have a computer named Computer1 that has a point-to-site VPN connection to an Azure virtual network named VNet1. The point-to-site connection uses a self-signed certificate.<br>From Azure, you download and install the VPN client configuration package on a computer named Computer2.<br>You need to ensure that you can establish a point-to-site VPN connection to VNet1 from Computer2.<br>Solution: On Computer2, you set the Startup type for the IPSec Policy Agent service to Automatic.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"How can I freeze or lock my production/critical Azure resources from accidental deletion? There\nis way to do this with both ASM and ARM resources using Azure resource lock.\nReferences: https://blogs.msdn.microsoft.com/azureedu/2016/04/27/using-azure-resource-\nmanager-policy-and-azure-lock-to-control-your-azure-resources/"},
{id:457,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br>You need to ensure that visitors are serviced by the same web server for each request.<br>What should you configure?<br>",ans:0,opts:["Session persistence to Client IP and protocol", "Protocol to UDP", "Session persistence to None", "Floating IP (direct server return) to Enabled"],exp:"So, when you attach or have a network interface for a Virtual Machine, that network interface can\n\n\fhave both a private and public IP address.\n\nSo, by this measure, we only need to define 5 network interface cards, one for each virtual\nmachine.\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-network-network-interface"},
{id:458,cat:"Networking",q:"You have an Azure subscription that uses the public IP addresses shown in the following table.<br><img src=\"imgs/0048300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to create a public Azure Standard Load Balancer.<br>Which public IP addresses can you use?<br>",ans:2,opts:["IP1, IP2, and IP3", "IP2 only", "IP3 only", "IP1 and IP3 only"],exp:"Staging mode must be disabled. If the Azure AD Connect server is in staging mode, password\nhash synchronization is temporarily disabled.\nReferences: https://docs.microsoft.com/en-us/azure/active-directory/connect/active-directory-\naadconnectsync-troubleshoot-password-hash-synchronization#no-passwords-are-synchronized-\ntroubleshoot-by-using-the-troubleshooting-task"},
{id:459,cat:"Identity",q:"You have an Azure subscription.<br>You are deploying an Azure Kubernetes Service (AKS) cluster that will contain multiple pods. The pods will use kubernet networking.<br>You need to restrict network traffic between the pods.<br>What should you configure on the AKS cluster?<br>",ans:1,opts:["the Azure network policy", "the Calico network policy", "pod security policies", "an application security group"],exp:"https://docs.microsoft.com/en-us/azure/active-directory/managed-identities-azure-resources/qs-\nconfigure-portal-windows-vm"},
{id:460,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have an Azure subscription that contains a virtual network named VNet1. VNet1 uses an IP address space of 10.0.0.0/16 and contains the VPN Gateway and subnets in the following table:<br><img src=\"imgs/0048500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Subnet1 contains a virtual appliance named VM1 that operates as a router.<br>You create a routing table named RT1.<br>You need to route all inbound traffic from the VPN gateway to VNet1 through VM1.<br>How should you configure RT1? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0048600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Address prefix",options:["10.0.0.0/16","10.0.1.0/24","10.0.254.0/24"]},{label:"Next hop type .",options:["Virtual appliance","Virtual network","Virtual network gateway"]},{label:"Assigned to",options:["GatewaySubnet","SubnetO","Subnet1 and Subnet2"]}],ans_img:"imgs/0048700001.jpg",exp:"Box 1: Yes -\nBox 2: Yes -\nVM1 is in Zone1, while VM2 is on Zone2.\nBox 3: No -\nReference:\nhttps://docs.microsoft.com/en-us/azure/architecture/resiliency/recovery-loss-azure-region"},
{id:461,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br>You need to ensure that visitors are serviced by the same web server for each request.<br>What should you configure?<br>",ans:3,opts:["Floating IP (direct server return) to Enabled", "Floating IP (direct server return) to Disabled", "a health probe", "Session persistence to Client IP and Protocol"],exp:"https://docs.microsoft.com/en-us/azure/dns/dns-delegate-domain-azure-dns\nDelegate the domain\nNow that the DNS zone is created and you have the name servers, you need to update the\nparent domain with the Azure DNS name servers. Each registrar has its own DNS management\ntools to change the name server records for a domain."},
{id:462,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the virtual machines shown in the following table:<br><img src=\"imgs/0048900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 and VM2 use public IP addresses. From Windows Server 2019 on VM1 and VM2, you allow inbound Remote Desktop connections.<br>Subnet1 and Subnet2 are in a virtual network named VNET1.<br>The subscription contains two network security groups (NSGs) named NSG1 and NSG2. NSG1 uses only the default rules.<br>NSG2 uses the default rules and the following custom incoming rule:<br>\u2711 Priority: 100<br>\u2711 Name: Rule1<br>\u2711 Port: 3389<br>\u2711 Protocol: TCP<br>\u2711 Source: Any<br>\u2711 Destination: Any<br>\u2711 Action: Allow<br>NSG1 is associated to Subnet1. NSG2 is associated to the network interface of VM2.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0049000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["From the Internet, you can connect to VM1 by using", "Remote Desktop.", "From the Internet, you can connect to VM2 by using", "Remote Desktop.", "From VM1, you can connect to VM2 by using Remote"],ans:["No", "Yes", "Yes", "Yes", "Yes"],exp:"Default NS records are created automatically and shouldn't be messed with in this case."},
{id:463,cat:"Compute",q:"You have an Azure subscription that contains two virtual machines named VM1 and VM2.<br>You create an Azure load balancer.<br>You plan to create a load balancing rule that will load balance HTTPS traffic between VM1 and VM2.<br>Which two additional load balancer resources should you create before you can create the load balancing rule? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[3, 4],opts:["a frontend IP address", "an inbound NAT rule", "a virtual network", "a backend pool", "a health probe"],exp:"Modify the NS record, not the SOA record.\nNote: The SOA record stores information about the name of the server that supplied the data for\nthe zone; the administrator of the zone; the current version of the data file; the number of seconds\na secondary name server should wait before checking for updates; the number of seconds a\nsecondary name server should wait before retrying a failed zone transfer; the maximum number\nof seconds that a secondary name server can use data before it must either be refreshed or\nexpire; and a default number of seconds for the time-to-live file on resource records.\nReferences: https://searchnetworking.techtarget.com/definition/start-of-authority-record"},
{id:464,cat:"Compute",q:"You have an on-premises network that contains a database server named dbserver1.<br>You have an Azure subscription.<br>You plan to deploy three Azure virtual machines. Each virtual machine will be deployed to a separate availability zone.<br>You need to configure an Azure VPN gateway for a site-to-site VPN. The solution must ensure that the virtual machines can connect to dbserver1.<br>Which type of public IP address SKU and assignment should you use for the gateway?<br>",ans:1,opts:["a basic SKU and a static IP address assignment", "a standard SKU and a static IP address assignment", "a basic SKU and a dynamic IP address assignment"],exp:"The address space needs to be that of the Address range of the local network in your on-premise\nenvironment.\n\nhttps://docs.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-howto-site-to-site-resource-\nmanager-portal"},
{id:465,type:"img",cat:"Compute",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image854.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains a storage account named contoso2024 as shown in the following exhibit.<br><br><img src=\"imgs/image855.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br><img src=\"imgs/image856.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image934.png",exp:"So many people here are making assumptions without actually testing or validating them.\n\nThe answer is YYY - Tested in Lab.  Neither the region, vCPU count, nor the VM generation had any impact on my ability to select a particular VM OS disk as a source for an image version. upvoted 59 times LovelyGroovey 1\u00a0year, 8\u00a0months ago So, what is the logic here?  Can you explain to us? upvoted 2 times ... profesorklaus 2\u00a0years ago I agree with you. I did the same and confirm. upvoted 5 times ... d6f865d 11\u00a0months, 1\u00a0week ago Correct. You can convert from gen2 to gen1. You can not convert from gen1 to gen2 upvoted 2 times ... Alandt 1\u00a0year, 10\u00a0months ago Thanks for testing guys. Appreciate it. I hope your test is a fair representation of the question though. upvoted 1 times ... Load full discussion..."},
