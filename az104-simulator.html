{id:77,type:"hs",cat:"Identity",q:"HOTSPOT -<br>You have an Azure Active Directory (Azure AD) tenant that contains three global administrators named Admin1, Admin2, and Admin3.<br>The tenant is associated to an Azure subscription. Access control for the subscription is configured as shown in the Access control exhibit. (Click the Access<br>Control tab.)<br><img src=\"imgs/0008700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You sign in to the Azure portal as Admin1 and configure the tenant as shown in the Tenant exhibit. (Click the Tenant tab.)<br><img src=\"imgs/0008800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0008900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["Admin\u2019 can add Admin 2 as an owner of the subscription.", "Admin3 can add Admin 2 as an owner of the subscription.", "Admin2 can create a resource group in the subscription."],ans:["Yes", "Yes", "No"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:78,cat:"Compute",q:"You have an Azure subscription named Subscription1 that contains an Azure virtual machine named VM1. VM1 is in a resource group named RG1.<br>VM1 runs services that will be used to deploy resources to RG1.<br>You need to ensure that a service running on VM1 can manage the resources in RG1 by using the identity of VM1.<br>What should you do first?<br>",ans:0,opts:["From the Azure portal, modify the Managed Identity settings of VM1", "From the Azure portal, modify the Access control (IAM) settings of RG1", "From the Azure portal, modify the Access control (IAM) settings of VM1", "From the Azure portal, modify the Policies settings of RG1"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:79,cat:"Networking",q:"You have an Azure subscription that contains a resource group named TestRG.<br>You use TestRG to validate an Azure deployment.<br>TestRG contains the following resources:<br><img src=\"imgs/0009100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to delete TestRG.<br>What should you do first?<br>",ans:1,opts:["Modify the backup configurations of VM1 and modify the resource lock type of VNET1", "Remove the resource lock from VNET1 and delete all data in Vault1", "Turn off VM1 and remove the resource lock from VNET1", "Turn off VM1 and delete all data in Vault1"],exp:"Correct Answer: B When you delete a resource group, all of its resources are also deleted. Deleting a resource group deletes all of its template deployments and currently stored operations. As an administrator, you can lock a subscription, resource group, or resource to prevent other users in your organization from accidentally deleting or modifying critical resources. The lock overrides any permissions the user might have. You can't delete a vault that contains backup data. Once backup data is deleted, it will go into the soft deleted state. So you have to remove the lock on order to delete the VNET and delete the backups in order to delete the vault. Reference: https://docs.microsoft.com/en-us/azure/azure-resource-manager/management/delete-resource-group?tabs=azure-powershell https://docs.microsoft.com/en-us/azure/azure-resource-manager/management/lock-resources https://docs.microsoft.com/en-us/azure/backup/backup-azure-delete-vault#before-you-start"},
{id:80,cat:"Networking",q:"You have an Azure DNS zone named adatum.com.<br>You need to delegate a subdomain named research.adatum.com to a different DNS server in Azure.<br>What should you do?<br>",ans:0,opts:["Create an NS record named research in the adatum.com zone.", "Create a PTR record named research in the adatum.com zone.", "Modify the SOA record of adatum.com.", "Create an A record named *.research in the adatum.com zone."],exp:"Box 1: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 2: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 3: Yes\nUser3 can review the access guest users of Group1 which also includes Group2. UserB is the\nguest of Group2 and hence User3 can review the access of UserB."},
{id:81,type:"dd",cat:"Networking",q:"DRAG DROP -<br>You have an Azure Active Directory (Azure AD) tenant that has the contoso.onmicrosoft.com domain name.<br>You have a domain name of contoso.com registered at a third-party registrar.<br>You need to ensure that you can create Azure AD users that have names containing a suffix of @contoso.com.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0009300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Add the custom domain name to your directory", "Add a DNS entry for the domain name at the domain name registrar", "Verify the custom domain name in Azure AD"],ans:["Add the custom domain name to your directory", "Add a DNS entry for the domain name at the domain name registrar", "Verify the custom domain name in Azure AD"],exp:"Box 1: No\nSubscription1 is a member of ManagementGroup21, ManagementGroup21 is a member of\nManagementGroup11, ManagementGroup11 is a member of the Tenant Root Group, The Tenant\nRoot group has \u2018Not allowed resource types for virtual network\u2019.\n\nBox 2: No:\nYou cannot create a VM, because based on the Policy you can only create VNETs in\nSybscription2 (ManagementGroup12).\n\nBox 3: No\nYou cannot ADD Subscription1 to ManagementGroup11, but you can MOVE Subscription1 from\nManagementGroup21 to ManagmentGroup11. Subscriptions can only be a member of ONE\nManagementGroup at a time.\n\nAllowed Resource Type (Deny): Defines the resource types that you can deploy. Its effect is to\ndeny all resources that aren't part of this defined list.\nNot allowed resource types (Deny): Prevents a list of resource types from being deployed.\nBased on the Policies, VNETs are not allowed in the Tenant Root Group scope, so you cannot\ndeploy VNETs. Also, VNETs only allowed in ManagementGroup12 scope, but you cannot deploy\nany other resource."},
{id:82,cat:"Governance",q:"You have an Azure subscription named Subscription1 that contains an Azure Log Analytics workspace named Workspace1.<br>You need to view the error events from a table named Event.<br>Which query should you run in Workspace1?<br>",ans:1,opts:["Get-Event Event | where {$_.EventType == \"error\"}", "Event | search \"error\"", "select * from Event where EventType == \"error\"", "search in (Event) * | where EventType \u05d2\u20ac\"eq \u05d2\u20acerror\u05d2\u20ac"],exp:"VNET1: Department: D1 only\nResources created before policy creation will not inherit the policy rules.\n\nVNET2: Label:Value1 only\nThe built-in policy definition \"Append a tag and its value to resources\" appends the specified tag\nand value when any resource which is missing this tag is created or updated. Does not modify the\ntags of resources created before this policy was applied until those resources are changed. Does\nnot apply to resource groups."},
{id:83,cat:"Networking",q:"You have a registered DNS domain named contoso.com.<br>You create a public Azure DNS zone named contoso.com.<br>You need to ensure that records created in the contoso.com zone are resolvable from the internet.<br>What should you do?<br>",ans:3,opts:["Create NS records in contoso.com.", "Modify the SOA record in the DNS domain registrar.", "Create the SOA record in contoso.com.", "Modify the NS records in the DNS domain registrar."],exp:"Box 1: will have no access\nThe IP 193.77.134.1 does not have access on the SAS, because it is not matching the SAS\nrequirements. IP is out of range.\n\nBox 2: will have no access\nThe SAS token is not supported in mounting Azure File share currently, it just supports the Azure\nstorage account key.\nSince it is using \"net use\" where it uses SMB, the SMB (Server Message Broker) protocol does\nnot support SAS. it still asks for username/password. Accordingly, it will give error wrong\nusername/pass and will not provide access."},
{id:84,type:"img",cat:"Storage",q:"HOTSPOT -<br>You have an Azure subscription that contains a storage account named storage1. The subscription is linked to an Azure Active Directory (Azure AD) tenant named contoso.com that syncs to an on-premises Active Directory domain.<br>The domain contains the security principals shown in the following table.<br><img src=\"imgs/0009600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>In Azure AD, you create a user named User2.<br>The storage1 account contains a file share named share1 and has the following configurations.<br><img src=\"imgs/0009600002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0009700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0009700002.png",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-identity-ad-ds-assign-permissions?tabs=azure-portal"},
{id:85,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1 that contains a virtual network VNet1.<br>You add the users in the following table.<br><img src=\"imgs/0009700003.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Which user can perform each configuration? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0009800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Add a subnet to VNet1",options:["User1 only","User3 only","User2 and User3 onl","User, User2, and User3"]},{label:"Assign a user the Reader role to VNet1",options:["User2 only","User3 onl","User1 and User2 only","User2 and User3 only","User1, User2, and User3"]}],ans_img:"imgs/0009900001.jpg",exp:"The Network Contributor role lets you manage networks, but not access them.\nReference:\nhttps://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles"},
{id:86,type:"img",cat:"Identity",q:"HOTSPOT -<br>You have the Azure resources shown on the following exhibit.<br><img src=\"imgs/0010000001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to track resource usage and prevent the deletion of resources.<br>To which resources can you apply locks and tags? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0010100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0010200001.png",exp:"Box 1: Sub1, RG1, and VM1 only -\nYou can lock a subscription, resource group, or resource to prevent other users in your organization from accidentally deleting or modifying critical resources.\nBox 2: Sub1, RG1, and VM1 only -\nYou apply tags to your Azure resources, resource groups, and subscriptions.\nReference:\nhttps://docs.microsoft.com/en-us/azure/azure-resource-manager/management/lock-resources?tabs=json https://docs.microsoft.com/en-us/azure/azure-resource-manager/management/tag-resources?tabs=json"},
{id:87,cat:"Identity",q:"You have an Azure Active Directory (Azure AD) tenant.<br>You plan to delete multiple users by using Bulk delete in the Azure Active Directory admin center.<br>You need to create and upload a file for the bulk delete.<br>Which user attributes should you include in the file?<br>",ans:1,opts:["The user principal name and usage location of each user only", "The user principal name of each user only", "The display name of each user only", "The display name and usage location of each user only", "The display name and user principal name of each user only"],exp:"All three VMs are in VNET2. Auto registration is enabled for private Azure DNS zone named\ncontoso.com, which is linked to VNET2. So, VM1, VM2 and VM3 will auto-register their host\nrecords to contoso.com.\nNone of the VM will auto-register to the public Azure DNS zone named adatum.com. You cannot\nregister private IPs on the internet (adatum.com)\n\nBox 1: Yes\nAuto registration is enabled for private Azure DNS zone named contoso.com.\n\nBox 2: Yes\nAuto registration is enabled for private Azure DNS zone named contoso.com.\n\nBox 3: No\nNone of the VM will auto-register to the public Azure DNS zone named adatum.com"},
{id:88,type:"hs",cat:"Networking",q:"HOTSPOT -<br>You have an Azure subscription named Sub1 that contains the Azure resources shown in the following table.<br><img src=\"imgs/0010400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You assign an Azure policy that has the following settings:<br>\u2711 Scope: Sub1<br>\u2711 Exclusions: Sub1/RG1/VNET1<br>\u2711 Policy definition: Append a tag and its value to resources<br>\u2711 Policy enforcement: Enabled<br>\u2711 Tag name: Tag4<br>\u2711 Tag value: value4<br>You assign tags to the resources as shown in the following table.<br><img src=\"imgs/0010400008.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0010500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["RG1 has the Tag2 : IT tag assigned only", "Storage1 has the Tag]: subscription, Tag2:IT, Tag3:valuel,", "and Tag4:value4 tags assigned.", "VNET1 has the Tag2: IT and Tag3:value2 tags assigned only"],ans:["No", "No", "No", "No"],exp:"You can provide authorization credentials by using Azure Active Directory (AD), or by using a\nShared Access Signature (SAS) token.\n\nBox 1:\nBoth Azure Active Directory (AD) and Shared Access Signature (SAS) token are supported for\nBlob storage.\n\nBox 2:\nOnly Shared Access Signature (SAS) token is supported for File storage."},
{id:89,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You need to ensure that an Azure Active Directory (Azure AD) user named Admin1 is assigned the required role to enable Traffic Analytics for an Azure subscription.<br>Solution: You assign the Traffic Manager Contributor role at the subscription level to Admin1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Q.36 Assign Network Contributor role at subscription level to Admin1 \uf0e0 Yes Q.37 Assign Owner role at subscription level to Admin1 \uf0e0 Yes Q.38 Assign Reader role at subscription level to Admin1 \uf0e0 Yes Q.52 Assign Traffic Manager Contributor role at subscription level to Admin1 \uf0e0 No"},
{id:90,cat:"Identity",q:"You have three offices and an Azure subscription that contains an Azure Active Directory (Azure AD) tenant.<br>You need to grant user management permissions to a local administrator in each office.<br>What should you use?<br>",ans:1,opts:["Azure AD roles", "administrative units", "access packages in Azure AD entitlement management", "Azure roles"],exp:"If you look at the default policy which is in place for enforcing tags, you can see that the effect\nshould be Deny:\n\n\fSince this option is clearly mentioned in the Azure in-built policy, all other options are incorrect.\nhttps://docs.microsoft.com/en-us/azure/governance/policy/overview"},
{id:91,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure Directory (Azure AD) tenant named Adatum and an Azure Subscription named Subscription1. Adatum contains a group named Developers.<br>Subscription1 contains a resource group named Dev.<br>You need to provide the Developers group with the ability to create Azure logic apps in the Dev resource group.<br>Solution: On Dev, you assign the Logic App Contributor role to the Developers group.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Box 1: 4\nIf you resize the Scale Set all the VMs get resized at once, thus 4 is the correct answer.\n\nBox 2: 1\nAutomatic OS updates update 20% of the VMs at once, with a minimum of 1 VM instance at a\ntime. Also 20% of 4 = 0.8."},
{id:92,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have an Azure Load Balancer named LB1.<br>You assign a user named User1 the roles shown in the following exhibit.<br><img src=\"imgs/0010800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0010900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"User1 can [answer choice] LB1.",options:["delete","create a NAT rule for","assign access to other users for"]},{label:"User1 can [answer choice] the resource group.",options:["delete a virtual machine from","modify the load balancing rules in","deploy an Azure Kubernetes Service (AKS) cluster to"]}],ans_img:"imgs/0010900002.jpg",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#virtual-machine-contributor https://docs.microsoft.com/en-us/azure/role-based-access-control/rbac-and-directory-admin-roles"},
{id:93,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains a virtual network named VNet1. VNet1 is in a resource group named RG1.<br>Subscription1 has a user named User1. User1 has the following roles:<br>\u2711 Reader<br>\u2711 Security Admin<br>\u2711 Security Reader<br>You need to ensure that User1 can assign the Reader role for VNet1 to other users.<br>What should you do?<br>",ans:1,opts:["Remove User1 from the Security Reader role for Subscription1. Assign User1 the Contributor role for RG1.", "Assign User1 the Owner role for VNet1.", "Assign User1 the Contributor role for VNet1.", "Assign User1 the Network Contributor role for VNet1."],exp:"Box 1: 10.0.0.0/16\nAddress prefix\ndestination-> Vnet 1 (Address space of Vnet1)\n\nBox 2: Virtual appliance\nNext hop type\nVM1 ->Virtual Appliance. You can specify IP address of VM 1 when configuring next hop as\nVirtual appliance.\n\nBox 3: Gateway Subnet\nAssigned to\nThis route is to be followed by Gateway Subnet for the incoming traffic. You can associate routing\ntable to the Subnet from Rout Table -> subnet ->Associate."},
{id:94,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You configure the custom role shown in the following exhibit.<br><img src=\"imgs/0011200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0011300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"To ensure that users can sign into virtual machines that are assigned role1, modify the [answer choice] section",options:["actions","roletype","notActions","dataActions","notDataActions","assignableScopes"]},{label:"To ensure that role1 can be assigned only to a resource group named RG1, modify the [answer choice] section",options:["actions","roletype","notActions","dataActions","notDataActions"]}],ans_img:"imgs/image891.png",exp:"the answer is wrong. you are not defining a policy but a custom role.\nYou need to provide either of the following in DataActions:\n\tMicrosoft.Compute/virtualMachines/login/action\n\tMicrosoft.Compute/virtualMachines/loginAsAdmin/action\n\n\ncorrect answer is dataActions and assignableScopes upvoted 237 times dnt91 11\u00a0months ago First is a dataAction. if you try to clone the built in Virtual Machine User Login role you can see that > Microsoft.Compute/virtualMachines/login/action\nLog in to a virtual machine as a regular user\nDataAction upvoted 1 times ... go4adil 1\u00a0year, 9\u00a0months ago Agreed....Correct Answer is 'dataActions' and 'assignableScopes'\n\nIn custom roles, 'roleType' only indicates whether this is a custom role. \nIt is set to \"true\" or \"CustomRole\" for custom roles and set to \"false\" or \"BuiltInRole\" for built-in roles. So, modifying 'roleType' for this custom role won't grant users access to log in to virtual machines that are assigned role1 upvoted 9 times ... duongduong_me 11\u00a0months, 3\u00a0weeks ago The dataActions field in a custom role is used to specify permissions for operations related to data managed by Azure resources, such as accessing blob storage, queues, or tables in an Azure Storage account. This field is not relevant for managing access to log in to a VM.\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/role-definitions#dataactions upvoted 3 times ..."},
{id:95,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1. The storage1 account contains a file share named share1.<br>The subscription is linked to a hybrid Azure Active Directory (Azure AD) tenant that contains a security group named Group1.<br>You need to grant Group1 the Storage File Data SMB Share Elevated Contributor role for share1.<br>What should you do first?<br>",ans:0,opts:["Enable Active Directory Domain Service (AD DS) authentication for storage1.", "Grant share-level permissions by using File Explorer.", "Mount share1 by using File Explorer.", "Create a private endpoint."],exp:"Box 1: No\nVM1 has the NSG1 on Subnet1, which allows traffic over port 1433 between Subnet2 and\nSubnet1. BUT NSG2 also applied on NIC level for VM1 that blocks the traffic on port 1433. Hence\nNo traffic allowed.\n\nBox 2: Yes\nNo rule explicitly blocks communication from VM1. The default rules, which allow communication,\nare thus applied.\n\nBox 3: Yes\nNo rule explicitly blocks communication between VM2 and VM3 which are both on Subnet2. The\ndefault rules, which allow communication, are thus applied."},
{id:96,cat:"Identity",q:"You have 15 Azure subscriptions.<br>You have an Azure Active Directory (Azure AD) tenant that contains a security group named Group1.<br>You plan to purchase additional Azure subscription.<br>You need to ensure that Group1 can manage role assignments for the existing subscriptions and the planned subscriptions. The solution must meet the following requirements:<br>\u2711 Use the principle of least privilege.<br>\u2711 Minimize administrative effort.<br>What should you do?<br>",ans:1,opts:["Assign Group1 the Owner role for the root management group.", "Assign Group1 the User Access Administrator role for the root management group.", "Create a new management group and assign Group1 the User Access Administrator role for the group.", "Create a new management group and assign Group1 the Owner role for the group."],exp:"IP forwarding enables the virtual machine a network interface is attached to:\nReceive network traffic not destined for one of the IP addresses assigned to any of the IP\nconfigurations assigned to the network interface.\nSend network traffic with a different source IP address than the one assigned to one of a network\ninterface's IP configurations.\n\nThe setting must be enabled for every network interface that is attached to the virtual machine\nthat receives traffic that the virtual machine needs to forward. A virtual machine can forward traffic\nwhether it has multiple network interfaces or a single network interface attached to it.\n\nBox 1: Yes\nThe routing table allows connections from VM3 to VM1 and VM2. And as IP forwarding is enabled\non VM3, VM3 can connect to VM1.\n\nBox 2: No\nVM3, which has IP forwarding, must be turned on, in order for VM2 to connect to VM1.\n\nBox 3: Yes\nThe routing table allows connections from VM1 and VM2 to VM3. IP forwarding on VM3 allows\nVM1 to connect to VM2 via VM3."},
{id:97,type:"drop",cat:"Governance",q:"HOTSPOT -<br>You have an Azure subscription that contains the hierarchy shown in the following exhibit.<br><img src=\"imgs/0011800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create an Azure Policy definition named Policy1.<br>To which Azure resources can you assign Policy1 and which Azure resources can you specify as exclusions from Policy1? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0011900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"You can assign Policy1 to",options:["Subscription1 and RG1 only","ManagementGroup1 and Subscription1 only","Tenant Root Group, ManagementGroup1, and Subscription1 onl","Tenant Root Group, ManagementGroup1, Subscription1, and RG1 onl","Tenant Root Group, ManagementGroup1, Subscription1, RG1, and VM1"]},{label:"You can exclude Policy1 from",options:["M1 only","RG1 and VM1 only","Subscription1, RG1, and VM1 onl","ManagementGroup1, Subscription, RG1, and VM1 onl","Tenant Root Group, ManagementGroup1, Subscription1, RG1, and VM1"]}],ans_img:"imgs/image892.png",exp:"Since the discussion added a lot of confusion cause a lot of people in here just drop random facts without any proof,misleading people, i tested it at an Azure lab.\n\nIn the scope field at the \"Basics\" tab i was able to select \"Tenant Root Group\" or \"Management Group1\" with the optional entries of Subscription and Resource group\n\nSo \"\"you can assign policy to Tenant Root Group,ManagementGroup1,Subscription1 and RG1\"\"\n\nAs for the second answer about the exclusions, i was able to select all the items in the scope EXCEPT the Tenant Root Group\n\nTherefore the correct answer would be \"\"ManagementGroup1,Subscription1,RG11 and VM1\"\"\n\nI hope that helps upvoted 275 times AK4U_111 2\u00a0years, 8\u00a0months ago for the exclusions, the Subscription dropdown menu is grayed out as well as the Resource Group drop down menu. upvoted 1 times ... gpCert 2\u00a0years, 9\u00a0months ago Why you could not assign policy to VM1 (for the first answer?) upvoted 5 times ... Mohd1899 2\u00a0years, 9\u00a0months ago I have tested this and got same , your answer 100% correct.\nthanks upvoted 22 times ... XristophD 2\u00a0years, 11\u00a0months ago Since your answer added a lot of confusion, cause you drop random answers: \n\nThe Azure Portal only allows to select scopes down to Resource Groups. \nThat is correct. \n\nBUT: With Azure CLI or Azure PowerShell, a Policy Assignment can be done at a specific resource. \n\nThe Azure Portal UI is limited in many ways, so always check the possibilities with Azure CLI or PowerShell, before assuming something is "},
{id:98,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following users in an Azure Active Directory tenant named contoso.onmicrosoft.com:<br><img src=\"imgs/0012100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>User1 creates a new Azure Active Directory tenant named external.contoso.onmicrosoft.com.<br>You need to create new user accounts in external.contoso.onmicrosoft.com.<br>Solution: You instruct User2 to create the user accounts.<br>Does that meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Correct, but the explanation is not. User1 is global admin of contoso.onmicrosoft.com. As he created the new tenant called external.contoso.onmicrosoft.com, he will be the OWNER. Check the scope not just the role, tho."},
{id:99,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following users in an Azure Active Directory tenant named contoso.onmicrosoft.com:<br><img src=\"imgs/0012200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>User1 creates a new Azure Active Directory tenant named external.contoso.onmicrosoft.com.<br>You need to create new user accounts in external.contoso.onmicrosoft.com.<br>Solution: You instruct User4 to create the user accounts.<br>Does that meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"In Azure, you can move resources between resource groups as long as the resource type is\nsupported for move operations. Virtual Networks (VNETs) are supported for move operations, so\nyou can move the \"VNET1 - Virtual Network\" resource to RG2.\nThe other resources, such as \"W10_OsDisk\" (Managed Disk), \"W10\" (Virtual Machine), and\n\"VNET3 - Virtual Network\" (Classic Virtual Network), may have limitations or dependencies that\n\n\fprevent them from being moved. Classic resources, like the Classic Virtual Network, have more\nrestrictions on moving compared to Azure Resource Manager (ARM) resources."},
{id:100,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following users in an Azure Active Directory tenant named contoso.onmicrosoft.com:<br><img src=\"imgs/0012300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>User1 creates a new Azure Active Directory tenant named external.contoso.onmicrosoft.com.<br>You need to create new user accounts in external.contoso.onmicrosoft.com.<br>Solution: You instruct User3 to create the user accounts.<br>Does that meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"https://docs.microsoft.com/en-us/azure/role-based-access-control/elevate-access-global-\nadmin#azure-portal"},
{id:101,cat:"Identity",q:"You have two Azure subscriptions named Sub1 and Sub2.<br>An administrator creates a custom role that has an assignable scope to a resource group named RG1 in Sub1.<br>You need to ensure that you can apply the custom role to any resource group in Sub1 and Sub2. The solution must minimize administrative effort.<br>What should you do?<br>",ans:0,opts:["Select the custom role and add Sub1 and Sub2 to the assignable scopes. Remove RG1 from the assignable scopes.", "Create a new custom role for Sub1. Create a new custom role for Sub2. Remove the role from RG1.", "Create a new custom role for Sub1 and add Sub2 to the assignable scopes. Remove the role from RG1.", "Select the custom role and add Sub1 to the assignable scopes. Remove RG1 from the assignable scopes. Create a new custom role for Sub2."],exp:"With the Shared service plan, you are only allowed to run an App for 240 minutes a day. So, this\nwill not resolve the issue.\n\nhttps://azure.microsoft.com/en-us/pricing/details/app-service/plans/"},
{id:102,cat:"Networking",q:"You have an Azure Subscription that contains a storage account named storageacct1234 and two users named User1 and User2.<br>You assign User1 the roles shown in the following exhibit.<br><img src=\"imgs/0012500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Which two actions can User1 perform? Each correct answer presents a complete solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[1, 3],opts:["Assign roles to User2 for storageacct1234.", "Upload blob data to storageacct1234.", "Modify the firewall of storageacct1234.", "View blob data in storageacct1234.", "View file shares in storageacct1234."],exp:"https://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles"},
{id:103,cat:"Governance",q:"You have an Azure subscription named Subscription1 that contains an Azure Log Analytics workspace named Workspace1.<br><br>You need to view the error events from a table named Event.<br><br>Which query should you run in Workspace1?",ans:1,opts:["select * from Event where EventType == \"error\"", "Event | search \"error\"", "Event | where EventType is \"error\"", "Get-Event Event | where {$_.EventType == \"error\"}"],exp:"The cloud tiering feature is used to ensure volumes have a percentage of free space when you\nuse the Azure File Sync service. The ideal solution to use here is the Content Delivery service\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-sync-cloud-tiering"},
{id:104,cat:"Identity",q:"You have an Azure App Services web app named App1.<br><br>You plan to deploy App1 by using Web Deploy.<br><br>You need to ensure that the developers of App1 can use their Azure AD credentials to deploy content to App1. The solution must use the principle of least privilege.<br><br>What should you do?",ans:2,opts:["Assign the Owner role to the developers", "Configure app-level credentials for FTPS", "Assign the Website Contributor role to the developers", "Configure user-level credentials for FTPS"],exp:"User1: Read and Data Access\nUser2: Owner\n\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#reader-and-data-\naccess\nLets you view everything but will not let you delete or create a storage account or contained\nresource. It will also allow read/write access to all data contained in a storage account via access\nto storage account keys.\n\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#owner\nGrants full access to manage all resources, including the ability to assign roles in Azure RBAC."},
{id:105,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure Active Directory (Azure AD) tenant named contoso.com.<br><br>You have a CSV file that contains the names and email addresses of 500 external users.<br><br>You need to create a guest user account in contoso.com for each of the 500 external users.<br><br>Solution: From Azure AD in the Azure portal, you use the Bulk invite users operation.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"Step 1 (E): Install the Azure File Sync agent on Server1 The Azure File Sync agent is a\ndownloadable package that enables Windows Server to be synced with an Azure file share\nStep 2 (D): Register Server1.\nRegister Windows Server with Storage Sync Service\nRegistering your Windows Server with a Storage Sync Service establishes a trust relationship\nbetween your server (or cluster) and the Storage Sync Service. Step 3 (C): Create a sync group\nand a cloud endpoint. A sync group defines the sync topology for a set of files. Endpoints within a\nsync group are kept in sync with each other. A sync group must contain one cloud endpoint,\nwhich represents an Azure file share and one or more server endpoints. A server endpoint\nrepresents a path on registered server.\nReferences: https://docs.microsoft.com/en-us/azure/storage/files/storage-sync-files-deployment-\nguide"},
{id:106,type:"drop",cat:"Identity",q:"HOTSPOT -<br><br>You have an Azure subscription that is linked to an Azure AD tenant. The tenant contains the custom role-based access control (RBAC) roles shown in the following table.<br><br><img src=\"imgs/image567.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>From the Azure portal, you need to create two custom roles named Role3 and Role4. Role3 will be an Azure subscription role. Role4 will be an Azure AD role.<br><br>Which roles can you clone to create the new roles? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image568.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Role3",options:["Role1 only","Built-in Azure subscription roles only","Built-in Azure subscription roles and built-in Azure AD roles only"]},{label:"Role4",options:["Built-in Azure AD roles only","Role2 and built-in Azure AD roles only","Built-in Azure AD roles and built-in Azure subscription roles only"]}],ans_img:"imgs/image893.png",exp:"https://www.examtopics.com/discussions/microsoft/view/57784-exam-az-500-topic-2-question-58-discussion/\ni found similar questions in other page upvoted 31 times jimmyyml 2\u00a0years, 10\u00a0months ago Thanks. Answer should be \nRole3: Role1 and built-in Azure subscription roles only\nRole4: Role2 only\nExplanation: You cannot clone built-in Azure AD role upvoted 169 times Paul_white 2\u00a0years, 8\u00a0months ago This is the best answer here!!!  \nhttps://www.examtopics.com/discussions/microsoft/view/57784-exam-az-500-topic-2-question-58-discussion/ upvoted 4 times ... Kalzonee3611 2\u00a0years ago Good boy upvoted 6 times ... o0o0 2\u00a0years, 2\u00a0months ago just verified it upvoted 2 times ... Load full discussion... ... Panapi 2\u00a0years, 8\u00a0months ago Answer is correcrt Valid! This question was on the exam 22/02/2023. Scored 920. Thanks guys! upvoted 23 times Sandip671 2\u00a0years ago Hiii my exam are in 10 days plz help me to make my concepts clear upvoted 1 times neolisto 2\u00a0years ago Sandip671 how your exam? Did you pass it? upvoted 3 times ... ki01 1\u00a0year, 10\u00a0months ago it's usually a bad idea to book an exam soon when you have very little idea of what you're doing.... upvoted 3 times ... ... ..."},
{id:107,type:"img",cat:"Storage",q:"DRAG DROP<br>-<br><br>You have an Azure subscription named Sub1 that contains two users named User1 and User2.<br><br>You need to assign role-based access control (RBAC) roles to User1 and User2. The users must be able to perform the following tasks in Sub1:<br><br>\u2022 User1 must view the data in any storage account.<br>\u2022 User2 must assign users the Contributor role for storage accounts.<br><br>The solution must use the principle of least privilege.<br><br>Which RBAC role should you assign to each user? To answer, drag the appropriate roles to the correct users. Each role may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image570.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image571.png",exp:"Answer is correct.\n\"Reader and Data Access\":\n\"Lets you view everything but will not let you delete or create a storage account or contained resource. It will also allow read/write access to all data contained in a storage account via access to storage account keys.\"\n\n\"Owner\" is needed to manage permissions, as \"User Access Administrator\" is not offered as an option. upvoted 98 times"},
{id:108,cat:"Compute",q:"You have an Azure subscription that contains 10 virtual machines, a key vault named Vault1, and a network security group (NSG) named NSG1. All the resources are deployed to the East US Azure region.<br><br>The virtual machines are protected by using NSG1. NSG1 is configured to block all outbound traffic to the internet.<br><br>You need to ensure that the virtual machines can access Vault1. The solution must use the principle of least privilege and minimize administrative effort<br><br>What should you configure as the destination of the outbound security rule for NSG1?",ans:1,opts:["an application security group", "a service tag", "an IP address range"],exp:"https://docs.microsoft.com/en-us/azure/virtual-machines/windows/find-unattached-disks\n\n\fQUESTION 69\nYou have an Azure subscription named Subscription1.\nYou deploy a Linux virtual machine named VM1 to Subscription1.\nYou need to monitor the metrics and the logs of VM1.\nWhat should you use?\n\nA.   Linux Diagnostic Extension (LAD) 3.0\nB.   Azure Analysis Services\nC.   The AzurePerformanceDiagnostics extension\nD.   Azure HDInsight\n\nAnswer: A\nExplanation:\nThe Linux Diagnostic Extension should be used which downloads the Diagnostic Extension (LAD)\nagent on Linux server."},
{id:109,cat:"Identity",q:"You have an Azure AD tenant named adatum.com that contains the groups shown in the following table.<br><br><img src=\"imgs/image572.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Adatum.com contains the users shown in the following table.<br><br><img src=\"imgs/image573.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You assign the Azure Active Directory Premium Plan 2 license to Group1 and User4.<br><br>Which users are assigned the Azure Active Directory Premium Plan 2 license?",ans:1,opts:["User4 only", "User1 and User4 only", "User1, User2, and User4 only", "User1, User2, User3, and User4"],exp:"Nevermind, the answer is B https://learn.microsoft.com/en-us/azure/active-directory/enterprise-users/licensing-group-advanced Under Limitations and known issues: \"Group-based licensing currently does not support groups that contain other groups (nested groups). If you apply a license to a nested group, only the immediate first-level user members of the group have the licenses applied.\""},
{id:110,type:"img",cat:"Identity",q:"HOTSPOT -<br><br>You have an Azure AD tenant named contoso.com.<br><br>You have two external partner organizations named fabrikam.com and litwareinc.com. Fabrikam.com is configured as a connected organization.<br><br>You create an access package as shown in the Access package exhibit. (Click the Access package tab.)<br><br><img src=\"imgs/image574.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You configure the external user lifecycle settings as shown in the Lifecycle exhibit. (Click the Lifecycle tab.)<br><br><img src=\"imgs/image575.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image576.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image894.png",exp:"N - Because not Connected\nY - Because when it expires it is removed from the group. Proof to follow\nY - Because..math\nhttps://learn.microsoft.com/en-us/azure/active-directory/governance/entitlement-management-access-package-resources\nWhen a user's access package assignment expires, they are removed from the group or team, unless they currently have an assignment to another access package that includes that same group or team. upvoted 158 times AK4U_111 2\u00a0years, 8\u00a0months ago After reading this article, i would say NYY is correct.\nThank you upvoted 11 times ... areait 8\u00a0months, 2\u00a0weeks ago Tested in the labs\nN because not connected\nN because they will be blocked only as it states in the \"Manage lifecycle of external users\"\nY The only one right bc it's 365 + 30 in order to remove users\n\nif u have any doubt you can check this video : https://www.youtube.com/watch?v=J136cq9r0u8 with the title \"54. MS Azure Administrator Associate AZ 104 - Access Package, Guest Users, Entitlement Management\" upvoted 1 times ... Indy429 1\u00a0year, 10\u00a0months ago But this example states that the users will not immediately be removed after the expiration of their access package. This will happen after 30 days of expiration, which would be after 395 days, not 365 days. In this case if you base it of off the example, the answers should be\nN\nN\nY\n\nComprehensive reading is just as important as technical knowledge guys. upvoted 23 times rnd3131 1\u00a0year, 10\u00a0months ago the group 1 will be removed directly after 36"},
{id:111,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains a virtual network named VNet1. VNet1 is in a resource group named RG1.<br><br>Subscription1 has a user named User1. User1 has the following roles:<br><br>\u2022\tReader<br>\u2022\tSecurity Admin<br>\u2022\tSecurity Reader<br><br>You need to ensure that User1 can assign the Reader role for VNet1 to other users.<br><br>What should you do?",ans:2,opts:["Assign User1 the Network Contributor role for VNet1.", "Remove User1 from the Security Reader role for Subscription1. Assign User1 the Contributor role for RG1.", "Assign User1 the Owner role for VNet1.", "Assign User1 the Network Contributor role for RG1."],exp:"Yes, this will work, since here the Apps will run on Instances associated with the plan.\n\nhttps://azure.microsoft.com/en-us/pricing/details/app-service/plans/"},
{id:112,type:"img",cat:"Identity",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains the users shown in the following table.<br><br><img src=\"imgs/image627.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The groups are configured as shown in the following table.<br><br><img src=\"imgs/image628.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You have a resource group named RG1 as shown in the following exhibit.<br><br><img src=\"imgs/image629.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image630.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image631.png",exp:"Just tested in my Azure test environment.\nAnswer is:\n1. No\n2. No\n3. Yes\n\nDon't know where rpalanivel83 got his answers from upvoted 121 times AndreaStack 2\u00a0years, 9\u00a0months ago me too but... where you found yours instead? upvoted 3 times ... JimmyYop 2\u00a0years, 8\u00a0months ago Nesting is currently not supported for groups that can be assigned to a role. and the screen grab shows that the groups are assigned a role as YES. Answers are correct upvoted 16 times ... o0o0 2\u00a0years, 2\u00a0months ago Just test and did not have your results.\n1- Yes\n2- No \n3- No upvoted 14 times hebbo777 1\u00a0year, 11\u00a0months ago agree, i tested first point is yes, 2&3 Office 365 not supporting membership upvoted 2 times ... tableton 1\u00a0year, 7\u00a0months ago My test had this results too upvoted 1 times ... ... jackill 2\u00a0years, 4\u00a0months ago I agree, here some official documentation references.\nFor the first question:\nhttps://learn.microsoft.com/en-us/azure/active-directory/roles/groups-concept#how-are-role-assignable-groups-protected\n\"Group nesting isn't supported. A group can't be added as a member of a role-assignable group.\"\nFor the second question:\nhttps://learn.microsoft.com/en-us/azure/active-directory/fundamentals/how-to-manage-groups#add-or-remove-a-group-from-another-group\n\"We currently don't support:\n...\nAdding Microsoft 365 groups to Security groups or other Microsoft 365 groups.\n\"\nFor the third question, although it appears truncated in the screenshot (ending with \"for...\") there is a reference about Microsof"},
{id:113,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains a virtual network named VNet1. VNet1 is in a resource group named RG1.<br><br>Subscription1 has a user named User1. User1 has the following roles:<br><br>\u2022\tReader<br>\u2022\tSecurity Admin<br>\u2022\tSecurity Reader<br><br>You need to ensure that User1 can assign the Reader role for VNet1 to other users.<br><br>What should you do?",ans:1,opts:["Remove User1 from the Security Reader role for Subscript on 1. Assign User1 the Contributor role for RG1.", "Assign User1 the Owner role for VNet1.", "Remove User1 from the Security Reader and Reader roles for Subscription1. Assign User1 the Contributor role for Subscription 1.", "Assign User1 the Contributor role for VNet1."],exp:"When you redeploy a VM, it moves the VM to a new node within the Azure infrastructure and then\npowers it back on, retaining all your configuration options and associated resources.\nReferences: https://docs.microsoft.com/en-us/azure/virtual-machines/windows/redeploy-to-new-\nnode"},
{id:114,cat:"Networking",q:"Your on-premises network contains a VPN gateway.<br><br>You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image646.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that all the traffic from VM1 to storage1 travels across the Microsoft backbone network.<br><br>What should you configure?",ans:1,opts:["Azure Application Gateway", "private endpoints", "a network security group (NSG)", "Azure Virtual WAN"],exp:"You should redeploy the VM.\nReferences: https://docs.microsoft.com/en-us/azure/virtual-machines/windows/redeploy-to-new-\nnode"},
{id:115,type:"drop",cat:"Networking",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains a user named User1 and the resources shown in the following table.<br><br><img src=\"imgs/image647.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>NSG1 is associated to networkinterface1.<br><br>User1 has role assignments for NSG1 as shown in the following table.<br><br><img src=\"imgs/image648.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image649.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Select the correct answer",options:["domme town","semens we","Ut an crete trage acount RG ia)","User can moaty te DNS stings of eternal ° Oo","Ue ancene mibodscouty etotaerrtandumtctonenertnenet. GJ 0"]}],ans_img:"imgs/image650.png",exp:"Should the answer be C. Contributor? Answer B, only allows the managing of the VM's and not the Virtual Networks as stated in the question. upvoted 240 times alessioferrario 4\u00a0years, 8\u00a0months ago I agree upvoted 1 times ... Miles19 4\u00a0years, 7\u00a0months ago You are right, definitely, we need to assign a role of contributor, as the virtual machine contributor isn't enough - can't even manage the virtual networks to which the VM is attached to. See details: https://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles upvoted 2 times ... ciscogeek 4\u00a0years, 7\u00a0months ago Whatever Manage means by Microsoft standards, as per the doc they say, VM Contributor can manage. \nVirtual Machine Contributor\tLets you \"manage\" virtual machines, but not access to them, and not the virtual network or storage account they're connected to.\nI would go for B. upvoted 3 times Gadzee 3\u00a0years, 9\u00a0months ago I would go for B taking into account that they say \"least privilege\" upvoted 5 times Broniac 3\u00a0years, 8\u00a0months ago yes but, with B you can only achieve to manage VMs not Vnets which is also mentioned. upvoted 10 times ... ... Deputy7 3\u00a0years, 8\u00a0months ago Bro, It is User1 can deploy virtual machines and manage virtual networks. So, Definitely C. upvoted 2 times ... brico 4\u00a0years, 4\u00a0months ago Can't be B. As you mentioned in your response, \"and not the virtual network...\". C is the correct answer. upvoted 8 times Hari2017 3\u00a0years, 8\u00a0months ago Answer is C because though the question says"},
{id:116,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains a virtual network named VNet1. VNet1 is in a resource group named RG1.<br><br>Subscription1 has a user named User1. User1 has the following roles:<br><br>\u2022\tReader<br>\u2022\tSecurity Admin<br>\u2022\tSecurity Reader<br><br>You need to ensure that User1 can assign the Reader role for VNet1 to other users.<br><br>What should you do?",ans:1,opts:["Remove User1 from the Security Reader role for Subscription1. Assign User1 the Contributor role for RG1.", "Assign User1 the Access Administrator role for VNet1.", "Remove User1 from the Security Reader and Reader roles for Subscription1. Assign User1 the Contributor role for Subscription1.", "Assign User1 the Network Contributor role for RG1."],exp:"The virtual networks can be in the same or different regions, and from the same or different\nsubscriptions. When connecting VNets from different subscriptions, the subscriptions do not need\nto be associated with the same Active Directory tenant.\nConfiguring a VNet-to-VNet connection is a good way to easily connect VNets. Connecting a\nvirtual network to another virtual network using the VNet-to-VNet connection type (VNet2VNet) is\nsimilar to creating a Site-to-Site IPsec connection to an on-premises location. Both connectivity\ntypes use a VPN gateway to provide a secure tunnel using IPsec/IKE, and both function the same\nway when communicating.\nThe local network gateway for each VNet treats the other VNet as a local site. This lets you\nspecify additional address space for the local network gateway in order to route traffic.\nReferences: https://docs.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-howto-vnet-vnet-\nresource-manager-portal"},
{id:117,type:"img",cat:"Compute",q:"HOTSPOT<br>-<br><br>You have three Azure subscriptions named Sub1, Sub2, and Sub3 that are linked to an Azure AD tenant.<br><br>The tenant contains a user named User1, a security group named Group1, and a management group named MG1. User is a member of Group1.<br><br>Sub1 and Sub2 are members of MG1. Sub1 contains a resource group named RG1. RG1 contains five Azure functions.<br><br>You create the following role assignments for MG1:<br><br>\u2022\tGroup1: Reader<br>\u2022\tUser1: User Access Administrator<br><br>You assign User the Virtual Machine Contributor role for Sub1 and Sub2.<br><br><img src=\"imgs/image655.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image656.png",exp:"Personally I think its YYN.\n\n1) GROUP1 Reader access, provides access to view all items, except secrets\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#reader\n2) To Assign OWNER role, you need to either Owner role or User Administrator Access Role\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/role-assignments-portal-subscription-admin#prerequisites\n3) Neither User Access Admin Role nor the Reader Role allows to create new resources.\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/role-assignments-steps upvoted 81 times Slimus 2\u00a0years, 5\u00a0months ago 3rd - Yes. it's says \"You assign User the Virtual Machine Contributor role for Sub1 and Sub2.\" upvoted 5 times [Removed] 2\u00a0years, 1\u00a0month ago No, User1 cannot create a new resource group and deploy a virtual machine to the new group. While User1 has the User Access Administrator role at the management group level (MG1), this role does not grant the user permissions to create resource groups or deploy virtual machines directly. The User Access Administrator role allows User1 to manage access to Azure resources but does not provide the necessary permissions for resource creation or deployment.\n\nTo create a new resource group and deploy a virtual machine, User1 would need appropriate permissions at the subscription or resource group level, such as the Contributor role. In this scenario, User1 has been assigned the Virtual Machine Contributor role for Sub1 and Sub2, "},
