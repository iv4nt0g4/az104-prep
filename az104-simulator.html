{id:134,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure Active Directory (Azure AD) tenant named contoso.com.<br><br>You have a CSV file that contains the names and email addresses of 500 external users.<br><br>You need to create a guest user account in contoso.com for each of the 500 external users.<br><br>Solution: You create a PowerShell script that runs the New-MgUser cmdlet for each user.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"You would need to Redeploy the VM.\nReferences: https://docs.microsoft.com/en-us/azure/virtual-machines/windows/redeploy-to-new-\nnode"},
{id:135,type:"img",cat:"Governance",q:"HOTSPOT -<br><br>You purchase a new Azure subscription.<br><br>You create an Azure Resource Manager (ARM) template named deploy.json as shown in the following exhibit.<br><br><img src=\"imgs/image764.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You connect to the subscription and run the following command.<br><br>New-AzDeployment \u2013Location westus \u2013TemplateFile \u201cdeploy.json\u201d<br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image765.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image897.png",exp:"NNY - I run the ARM template in a lab environment. Before go to the explanation, it's valid to say that there are some errors in the script format and I have to fix it to run successfully.\n\n1- It's N, because it creates 4 Resource Groups and not 3 Resource Groups (RGS0, RGS1, RGroup4 and ResGrp8);\n1.1: The Resource Group named with \"[concat('RGS', copyIndex())]\", creates RGS0 and RGS1;\n1.2: The Resource Group named with \"[concat('ResGrp', '8')]\", creates ResGrp8;\n1.3: The Resource Group named with \"[concat('RGroup', length(parameters('obj1')))]\", creates RGroup4 (As we can see, obj1 parameter has a length of 4  'propA', 'propB', 'propC' and 'propD');\n2 - It's N, because it doesn't create a resourcer group named RGroup5;\n3 - It's Y, because all resource groups were created in the East US Azure Region. upvoted 101 times Archangel0007 2\u00a0years ago for the third one u give the input parameter as westus so it has to be No right ? upvoted 1 times trferreiraBR 2\u00a0years ago No. It's is different! When you specify the location with a template, the location tells Azure Resource Manager where to store the deployment data.\n\n\"For subscription level deployments, you must provide a location for the deployment. The location of the deployment is separate from the location of the resources you deploy. The deployment location specifies where to store deployment data. Management group and tenant deployments also require a location. For resource group deployments, the location of the resource group"},
{id:136,cat:"Networking",q:"Your on-premises network contains a VPN gateway.<br><br>You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image768.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that all the traffic from VM1 to storage1 travels across the Microsoft backbone network.<br><br>What should you configure?",ans:1,opts:["Azure AD Application Proxy", "private endpoints", "a network security group (NSG)", "Azure Peering Service"],exp:"You should configure a SQL Server in Azure VM backup policy from the Recovery Services\nAzure portal blade.\nThe Azure Recovery Services vault has three default policy templates:\nAzure Virtual Machine\nAzure File Share\nSQL Server in Azure VM\nBecause you need to back up both the SQL Server databases as well as transaction logs, you\nshould create a SQL Server in Azure VM backup policy. These policies also enable you to specify\nbackup retention durations at the daily, weekly, monthly, and yearly scopes.\nYou should not configure point-in-time and long-term retention policies from the SQL Servers\nAzure portal blade. These backup and retention policies are available for the Azure SQL\nDatabase platform-as-a-service (PaaS) offering, and not for Azure virtual machines hosting SQL\nServer databases.\nYou should not configure a continuous delivery deployment group from the Virtual Machine Azure\nportal blade. This feature is unrelated to VM backup and recovery, and allows you to integrate a\nVM in a Visual Studio Team Services (VSTS) continuous integration/continuous deployment\n(Cl/CD) workflow.\nYou should not configure a point-in-time snapshot from the Disks Azure portal blade. The\nsnapshot functionality in Azure does not have formal policy associated with it, nor does it back up\n\n\fVM configuration."},
{id:137,cat:"Networking",q:"Your on-premises network contains a VPN gateway.<br><br>You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image768.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that all the traffic from VM1 to storage1 travels across the Microsoft backbone network.<br><br>What should you configure?",ans:1,opts:["Azure AD Application Proxy", "service endpoints", "a network security group (NSG)", "Azure Firewall"],exp:"You should configure the storage account to store its keys in Azure Key Vault. Azure Key Vault\nprovides a mechanism to store secrets, such as storage account keys, user credentials, and\ndigital certificates, securely in the Microsoft Azure cloud. You can access the underlying\nRepresentational State Transfer (REST) application programming interface (API) to rotate or\nretrieve the secrets in your source code.\nYou should not enable SSE on the storage account for two reasons. First, SSE is enabled\nautomatically on all Azure storage accounts and encrypts all storage account data at rest.\nSecond, SSE in its native form uses Microsoft-managed access keys, which violates the scenario\nconstraint for customer-managed keys.\nYou should not require secure transfer for the storage account. Secure transfer forces all REST\nAPI calls to use HTTPS instead of HTTP. This feature has nothing to do with either access keys\nor their management and rotation.\nYou should not create a service endpoint between the storage account and a VNet. A service\nendpoint allows you limit traffic to a storage account from resources residing on an Azure VNet."},
{id:138,cat:"Networking",q:"Your on-premises network contains a VPN gateway.<br><br>You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image768.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that all the traffic from VM1 to storage1 travels across the Microsoft backbone network.<br><br>What should you configure?",ans:1,opts:["Azure Application Gateway", "service endpoints", "a network security group (NSG)", "Azure Peering Service"],exp:"You should configure peering between prod-vnet-west and prod-vnet-west. Peering enables VMs\nlocated on two different Azure VNets to be grouped logically together and thereby connect and\nshare resources. Traditional VNet peering involves two VNets located in the same region.\nHowever, global VNet peering, generally available in summer 2018, supports VNets distributed\nacross any Azure public region.\nYou should not deploy a VNet-to-VNet VPN. First, global VNet peering means that you are no\nlonger required to use a VPN gateway to link VNets located in different Azure regions. Second,\nthe scenario requires that you minimize cost and complexity.\nYou should not create a private zone in Azure DNS. This action would be necessary for\nresources in peered VNets to resolve each other's DNS host names. However, the scenario\nmakes no requirement for private host name resolution.\nYou should not add a service endpoint to each VNet. Service endpoints allow you to limit access\nto certain Azure resources, such as storage accounts and Azure SQL databases, to resources\nlocated on a single VNet. Thus, this feature cannot be used to link two VNets as the scenario\nmandates."},
{id:139,cat:"Identity",q:"You have an Azure subscription named Sub1 that contains the resources shown in the following table.<br><br><img src=\"imgs/image769.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You create a user named Admin1.<br><br>To what can you add Admin1 as a co-administrator?",ans:2,opts:["RG1", "MG1", "Sub1", "VM1"],exp:"You should add a Domain Name System (DNS) verification record at the domain registrar. This\nstep is required to verify to Microsoft that you own the public DNS domain name in question. You\nperform the validation by creating either a text (TXT) or mail exchanger (MX) record in your DNS\nzone file at the registrar's website, using Microsoft-provided values. You can delete the\nverification record after Azure validates the domain for use with Azure AD.\nYou should not remove the companycom.onmicrosoft.com domain name from the Azure AD\ntenant. In fact, you cannot remove this domain name because Azure uses it to identify your\ndirectory uniquely across the entire Microsoft Azure global ecosystem.\nYou should not add a company.com user principal name (UPN) suffix to the AD DS domain. If\nyou use a non-routable DNS domain in AD DS, then you may indeed be required to perform this\naction. However, the scenario does not specify what AD DS domain name is currently defined.\nYou should not run Azure AD Connect from a domain member server and specify the custom\ninstallation option. Configuring the proper public and private DNS domain names is one of the\nprerequisite steps that needs to be completed before you run the Azure AD Connect wizard for\nthe first time."},
{id:140,type:"drop",cat:"Identity",q:"HOTSPOT -<br><br>You have a Microsoft Entra tenant that contains the groups shown in the following table.<br><br><img src=\"imgs/image799.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the users shown in the following table.<br><br><img src=\"imgs/image800.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Which users and groups can you delete? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image801.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Groups",options:["Group2 only","Group2 and Group3 only"]}],ans_img:"imgs/image898.png",exp:"Tested and verified answers are\nUsers = User1, User2, User3, User4 (can delete all users whether a license is assigned directly or via inheritance from a group membership) \nGroups = Group 2 and Group 4 (Groups with active license assignments cannot be deleted. You get an error) upvoted 94 times Giovachia2016 1\u00a0year, 9\u00a0months ago Correct. Tested in Lab too. upvoted 7 times ... Alandt 1\u00a0year, 10\u00a0months ago Please be clear in your answer. What is your answer now? upvoted 2 times rodrod 1\u00a0year ago He gave a very clear answer. It just can't be clearer...  Read again upvoted 4 times ... ... Andreas_Czech 1\u00a0year, 10\u00a0months ago https://learn.microsoft.com/en-us/entra/identity/users/licensing-group-advanced#deleting-a-group-with-an-assigned-license upvoted 2 times ... Bravo_Dravel 9\u00a0months, 1\u00a0week ago Correct tested in the lab\nAll users can be deleted but deleting a group with assigned license getting the error \"Customer ran into error with Failed to delete group. Details: The group has an active license. So it cannot be deleted..\" upvoted 2 times ... Load full discussion..."},
{id:141,cat:"Networking",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image803.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that data transfers between storage1 and VM1 do NOT traverse the internet<br><br>What should you configure for storage1?",ans:1,opts:["data protection", "a private endpoint", "Public network access in the Firewalls and virtual networks settings", "a shared access signature (SAS)"],exp:"An example screenshot is given below on the setting on the Azure Web app which is used to\ndisable anonymous access.\n\n\fSince this is clearly evident from the Azure portal, all other options are invalid.\nhttps://docs.microsoft.com/en-us/azure/app-service/overview-authentication-authorization"},
{id:142,type:"img",cat:"Identity",q:"HOTSPOT<br>-<br><br>You have a Microsoft Entra tenant that is linked to the subscriptions shown in the following table.<br><br><img src=\"imgs/image818.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You have the resource groups shown in the following table.<br><br><img src=\"imgs/image819.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You assign roles to users as shown in the following table.<br><br><img src=\"imgs/image820.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image821.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image822.png",exp:"YNY\n1. User 1 is a contributor of MG2, which cointains sub 3 and VM1.\n2. User 2 is a SA Cont on storage 1 only. Can only modify tht.\n3. User 3 is a UA Admin at tenant group level. Can assign roles to anything below. upvoted 33 times"},
{id:143,cat:"Networking",q:"Your on-premises network contains a VPN gateway.<br><br>You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image823.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that all the traffic from VM1 to storage1 travels across the Microsoft backbone network.<br><br>What should you configure?",ans:1,opts:["a network security group (NSG)", "private endpoints", "Microsoft Entra Application Proxy", "Azure Virtual WAN"],exp:"Box 1: Zone-redundant storage (ZRS)\n\n\fZone-redundant storage (ZRS) replicates your data synchronously across three storage clusters\nin a single region.\nLRS would not remain available if a data center in the region fails GRS and RA GRS use\nasynchronous replication.\n\nBox 2: StorageV2 (general purpose V2)\nZRS only support GPv2.\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy-zrs"},
{id:144,cat:"Identity",q:"You have a Microsoft Entra tenant.<br><br>You plan to perform a bulk import of users.<br><br>You need to ensure that imported user objects are added automatically as the members of a specific group based on each user's department. The solution must minimize administrative effort.<br><br>Which two actions should you perform? Each correct answer presents part of the solution.<br><br>NOTE: Each correct selection is worth one point.",ans:[2, 5],opts:["Create groups that use the Assigned membership type.", "Create an Azure Resource Manager (ARM) template.", "Create groups that use the Dynamic User membership type.", "Write a PowerShell script that parses an import file.", "Create an XML file that contains user information and the appropriate attributes.", "Create a CSV file that contains user information and the appropriate attributes."],exp:"With Application Insights Profiler, you can capture and view performance traces for your\napplication in all these dynamic situations, automatically at-scale, without negatively affecting\nyour end users."},
{id:145,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1.<br><br>You need to ensure that the access keys for storage1 rotate automatically.<br><br>What should you configure?",ans:3,opts:["a backup vault", "redundancy for storage1", "lifecycle management for storage1", "an Azure key vault", "a Recovery Services vault"],exp:"To add a custom domain to your app, you need to verify your ownership of the domain by adding\na verification ID as a TXT record with your domain provider.\nhttps://learn.microsoft.com/en-us/azure/app-service/app-service-web-tutorial-custom-\ndomain?tabs=a%2Cazurecli"},
{id:146,cat:"Identity",q:"You have an Azure subscription that contains the Microsoft Entra identities shown in the following table.<br><br><img src=\"imgs/image835.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to enable self-service password reset (SSPR).<br><br>For which identities can you enable SSPR in the Azure portal?",ans:3,opts:["User1 only", "Group1 only", "User1 and Group1 only", "Group1 and Group2 only", "User1, Group1, and Group2"],exp:"The correct answer is D, you can not assign SSPR to individual users it has to be a group. It can be a Security Group or a M365 Group."},
{id:147,type:"img",cat:"Identity",q:"DRAG DROP -<br><br>You have a Microsoft Entra tenant.<br><br>You need to ensure that when a new Microsoft 365 group is created, the group name is automatically formatted as follows:<br><br><img src=\"imgs/image851.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Which three actions should you perform in sequence in the Microsoft Entra admin center? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br><br><img src=\"imgs/image849.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image850.png",exp:"To ensure that when a new Microsoft 365 group is created, the group name is automatically formatted as <Department><Group name>, you need to configure a group naming policy in Microsoft Entra (formerly Azure AD). This can be achieved by setting a prefix based on the department attribute.\n\n1- Create a group naming policy: This is the first step to establish the framework for naming groups.\n2- Set Add prefix to Attribute: This step specifies that the prefix will be an attribute rather than a static string.\n3- Set Select type to Department: Finally, you specify that the 'Department' attribute will be used as the prefix. upvoted 14 times"},
{id:148,type:"drop",cat:"Identity",q:"HOTSPOT<br>-<br><br>You have a Microsoft Entra tenant that contains the users shown in the following table.<br><br><img src=\"imgs/image858.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image859.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Which users and groups can be deleted? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image860.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Users",options:["lUser4 only","lUser3 and User4 only","se and User4 only"]},{label:"Groups",options:["Groupt only","oup4 ooh","Group and Groups onl","DUST, Groups, Groups, and Group4"]}],ans_img:"imgs/image861.png",exp:"the given answers are correct:\n\n1st box: you can delete all users (user1,2,3&4) whether a license is assigned directly or via inheritance from a group membership\n\n2nd box: Groups with active license assignments cannot be deleted. so only group 1 & 3 can be deleted upvoted 22 times jairoaquinterov 9\u00a0months ago Group 2 is member of Group 3, and this group have active license assignments, then group 3 can not delete. upvoted 1 times ... Armandez 11\u00a0months, 1\u00a0week ago Discrepancy in the Answer:\nThe inclusion of User1 and User3 as deletable users in the given answer directly contradicts the standard rules for users with assigned licenses.\nThe inclusion of Group1 and Group3 aligns with the analysis, so that part is correct upvoted 2 times ... Elsayed2030 10\u00a0months, 4\u00a0weeks ago You can delete all the users - licensed or not\nYou can only delete Group 1. Ideally you could delete Group 3 too but Group 2 is a member of Group 3 and Group 2 cannot be deleted as it is licensed. Group 4 cannot be deleted as it is licensed. upvoted 2 times Jay_D_Lincoln 9\u00a0months, 1\u00a0week ago nested grouping is not supported in entra id when it comes to licensing. so you can delete group3Licenses are assigned at the tenant or user level, not at the group level \u2013 While Group4 has a license assigned, it does not mean that Group3 is bound to it in a way that would prevent deletion.\nNested group membership does not prevent deletion \u2013 Even though Group3 is a member of Group4, this does not restrict its deletion unl"},
{id:149,type:"drop",cat:"Governance",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image862.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to use an Azure key vault to provide a secret to app1.<br><br>What should you create for app1 to access the key vault, and from which key vault can the secret be used? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image863.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Create a",options:["Private endpor","‘Service principal","User account"]},{label:"Use the secret from",options:["Vault only","VVauitt and Vaul2 only","Vautt or vaults"]}],ans_img:"imgs/image899.png",exp:"Correct answer is:\nVNET1 will only have Department: D1 tag & VNET 2 will only have Label : Value1 tag upvoted 374 times Mucker973 3\u00a0years, 4\u00a0months ago nope, your answer is incorrect and the answers given are correct. You are assuming that Dept: D1 overwrites label:value (well I assume you did based on your answer), but resources can have any amount of tags applied. PLUS I have confirmed this in a lab upvoted 6 times amiban 2\u00a0years, 11\u00a0months ago but can't be applied by policy, we need to be compliant while creating the resources wrt the tags. upvoted 1 times ... cnduknthm 3\u00a0years ago Its not about OVERWRITTING... Its about the assignment of policy. The policy applies to resources that are created only after policy was applied but VNET1 is created before assigning the policy to Resource Group and for that reason VNET1 has only one tag which is Department : D1 upvoted 12 times ... ... Dennis_SOn 3\u00a0years, 3\u00a0months ago what is the answer? your answer seems not in the options? upvoted 2 times Dennis_SOn 3\u00a0years, 3\u00a0months ago are you referring to this answer?\ntag. vnet1 : departement D1 tag only.\nVNET1 - Department: D1 only VNET2 - Label: Value1 only upvoted 6 times Dennis_SOn 3\u00a0years, 3\u00a0months ago tag. vnet1 --- Department: D1 only.\nVNET1 - Department: D1 only VNET2 --- Label: Value1 only upvoted 2 times ... ... ... awssecuritynewbie 3\u00a0years, 1\u00a0month ago this is wrong people do not like it! upvoted 7 times ... marioZuo 2\u00a0years, 3\u00a0months ago Per tested, you are right! upvoted 4 ti"},
{id:150,cat:"Identity",q:"You have a Microsoft Entra tenant named contoso.com.<br><br>You collaborate with an external partner named fabrikam.com.<br><br>You plan to invite users in fabrikam.com to the contoso.com tenant.<br><br>You need to ensure that invitations can be sent only to fabrikam.com users.<br><br>What should you do in the Microsoft Entra admin center?",ans:3,opts:["From Cross-tenant access settings, configure the Tenant restrictions settings.", "From Cross-tenant access settings, configure the Microsoft cloud settings.", "From External collaboration settings, configure the Guest user access restrictions settings.", "From External collaboration settings, configure the Collaboration restrictions settings."],exp:"Collaboration restrictions settings in Microsoft Entra (formerly Azure AD) are specifically designed to control which external domains can be invited as guests."},
{id:151,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1. The storage1 account contains blob data.<br><br>You need to assign a role to a user named User1 to ensure that the user can access the blob data in storage1. The role assignment must support conditions.<br><br>Which two roles can you assign to User1? Each correct answer presents a complete solution.<br><br>NOTE: Each correct selection is worth one point.",ans:[3, 4],opts:["Owner", "Storage Account Contributor", "Storage Account Backup Contributor", "Storage Blob Data Contributor", "Storage Blob Data Owner", "Storage Blob Delegator"],exp:"Incorrect. Answer should be DE."},
{id:152,type:"hs",cat:"Compute",q:"HOTSPOT -<br><br><br>Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You need to implement the planned change for Attribute1.<br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image873.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",statements:["Admint can assign Attribute1 to Group", "\u2018Admin2 can assign Attibute1 to Usert", "\u2018Admin3 can assign Attribute1 to Group2 Ga"],ans:["No", "No", "No"],exp:"Box 1: Yes\nTraffic from VM1 and VM2 can reach VM3 thanks to the routing table, and as IP forwarding is\nenabled on VM3, traffic from VM3 can reach VM1.\nBox 2: No\nVM3, which has IP forwarding, must be turned on, in order for traffic from VM2 to reach VM1.\nBox 3: Yes\nThe traffic from VM1 will reach VM3, which thanks to IP forwarding, will send the traffic to VM2.\nReferences: https://www.quor\na.com/What-is-IP-forwarding\n\n\fQUESTION 113\nHotspot Question\n\nYou plan to deploy five virtual machines to a virtual network subnet. Each virtual machine will\nhave a public IP address and a private IP address.\nEach virtual machine requires the same inbound and outbound security rules.\nWhat is the minimum number of network interfaces and network security groups that you require?\nTo answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\n\nAnswer:\n\nExplanation:\nBox 1: 5\nA public and a private IP address can be assigned to a single network interface.\nBy default a NIC is associated to one IP address. Anyway nothing prevents a NIC to have MORE\nTHAN ONE IP address. So to the VM's NIC, you can associate the public and the private IP at\n\n\fthe same time. You are not forced to have one NIC for the public IP and one NIC for the private\nIP.\n\nBox 2: 1\nYou can associate zero, or one, network security group to each virtual network subnet and\nnetwork interface in a virtual machine. The same network security group can be associated to as\nmany subnets and network interfaces as you choose."},
{id:153,cat:"Identity",q:"You have a Microsoft Entra tenant configured as shown in the following exhibit.<br><br><img src=\"imgs/image875.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the identities shown in the following table.<br><br><img src=\"imgs/image876.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You purchase a Microsoft Fabric license.<br><br>To which identities can you assign the license?",ans:0,opts:["User1 only", "User1 and Group1 only", "User1 and Group2 only", "User1, Group1, and Group2"],exp:"Correct Answer is A Only The Entra tenant is in FREE mode, so there is no P1 or P2 assigned. Without this, all licence applying abilities are done by user mode ONLY. When you get a Premium licence then you are allowed to assign by groups. Tested in my lab"},
{id:154,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage. The storage account contains a blob that stores images.<br><br>Client access to storage1 is granted by using a shared access signature (SAS).<br><br>You need to ensure that users receive a warning message when they generate a SAS that exceeds a seven-day time period.<br><br>What should you do for storage?",ans:3,opts:["Enable a read-only lock.", "Configure an alert rule.", "Add a lifecycle management rule.", "Set Allow recommended upper limit for shared access signature (SAS) expiry interval to Enabled."],exp:"Box 1: No\nAzure DNS provides automatic registration of virtual machines from a single virtual network that's\nlinked to a private zone as a registration virtual network. VM5 does not belong to the registration\nvirtual network though.\nBox 2: No\nForward DNS resolution is supported across virtual networks that are linked to the private zone\nas resolution virtual networks. VM5 does belong to a resolution virtual network.\nBox 3: Yes\nVM6 belongs to registration virtual network, and an A (Host) record exists for VM9 in the DNS\nzone. By default, registration virtual networks also act as resolution virtual networks, in the sense\nthat DNS resolution against the zone works from any of the virtual machines within the\nregistration virtual network.\nReferences: https://docs.microsoft.com/en-us/azure/dns/private-dns-overview"},
{id:155,cat:"Storage",q:"You have an Azure subscription named Subscription1 that contains the storage accounts shown in the following table:<br><img src=\"imgs/0014000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to use the Azure Import/Export service to export data from Subscription1.<br>You need to identify which storage account can be used to export the data.<br>What should you identify?<br>",ans:3,opts:["storage1", "storage2", "storage3", "storage4"],exp:"Correct Answer: D Azure Import/Export service supports the following of storage accounts: \u2711 Standard General Purpose v2 storage accounts (recommended for most scenarios) \u2711 Blob Storage accounts \u2711 General Purpose v1 storage accounts (both Classic or Azure Resource Manager deployments), Azure Import/Export service supports the following storage types: \u2711 Import supports Azure Blob storage and Azure File storage \u2711 Export supports Azure Blob storage. Azure Files not supported. Only storage4 can be exported. Reference: https://docs.microsoft.com/en-us/azure/storage/common/storage-import-export-requirements"},
{id:156,type:"drop",cat:"Storage",q:"HOTSPOT -<br>You have Azure Storage accounts as shown in the following exhibit.<br><img src=\"imgs/0014100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0014200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"You can use [answer choice] for Azure Table Storage",options:["storageaccount1 only","storageaccount2 only","storageaccount3 only","storageaccount2 and storageaccount3 only","storageaccount3 only"]},{label:"You can use [answer choice] for Azure Blob storage",options:["storageaccount1 and storageaccount3 only","All the storage accounts"]}],ans_img:"imgs/0014200002.jpg",exp:"Box 1: storageaccount1 and storageaccount2 only\nBox 2: All the storage accounts -\nNote: The three different storage account options are: General-purpose v2 (GPv2) accounts, General-purpose v1 (GPv1) accounts, and Blob storage accounts.\n\u2711 General-purpose v2 (GPv2) accounts are storage accounts that support all of the latest features for blobs, files, queues, and tables.\n\u2711 Blob storage accounts support all the same block blob features as GPv2, but are limited to supporting only block blobs.\n\u2711 General-purpose v1 (GPv1) accounts provide access to all Azure Storage services, but may not have the latest features or the lowest per gigabyte pricing.\nReference:\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-account-options"},
{id:157,cat:"Governance",q:"You have Azure subscription that includes data in following locations:<br><img src=\"imgs/0014300004.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to export data by using Azure import/export job named Export1.<br>You need to identify the data that can be exported by using Export1.<br>Which data should you identify?<br>",ans:1,opts:["DB1", "container1", "share1", "Table1"],exp:"When you deploy a template, you specify a resource group that will contain the resources. Before\nrunning the deployment command, create the resource group or during deployment also we can\ncreate the resource group. If you try to deploy your own template in the portal, there are 3\navailable options - \"Subscription\", \"Resource Group\", \"Location\". Resource group is the only one\nof the three options available in this list of answers.Location\".\nhttps://github.com/Azure/azure-quickstart-templates/blob/master/101-vm-simple-\nwindows/azuredeploy.json"},
{id:158,type:"img",cat:"Storage",q:"HOTSPOT -<br>You have an Azure Storage account named storage1.<br>You have an Azure App Service app named App1 and an app named App2 that runs in an Azure container instance. Each app uses a managed identity.<br>You need to ensure that App1 and App2 can read blobs from storage1. The solution must meet the following requirements:<br>\u2711 Minimize the number of secrets used.<br>\u2711 Ensure that App2 can only read from storage1 for the next 30 days.<br>What should you configure in storage1 for each app? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0014500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image901.png",exp:"Correct Answer:\n\nBox 1: Access Control (IAM)\nSince the App1 uses Managed Identity, App1 can access the Storage Account via IAM. As per requirement, we need to minimize the number of secrets used, so Access keys is not ideal. \n\nBox 2: Shared access signatures (SAS)\nWe need temp access for App2, so we need to use SAS.\n\n\nReference:\n\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-auth upvoted 506 times sreekan 4\u00a0years, 3\u00a0months ago this is absolute!!! upvoted 5 times ... Tayhull2023 2\u00a0years ago I am starting to think mlantonis is a super computer =O upvoted 24 times Mentalfloss 1\u00a0year, 3\u00a0months ago If mlantonis was hired to research and post as he or she does, I approve of how my fees are used. :) upvoted 7 times ... ... nahte 3\u00a0years, 4\u00a0months ago totally agree of using MI+IAM upvoted 3 times ... go4adil 1\u00a0year, 9\u00a0months ago Agreed. \n\nBelow link clearly maps the situation mentioned in the question.\n\nhttps://learn.microsoft.com/en-us/azure/app-service/scenario-secure-app-access-storage?tabs=azure-portal upvoted 2 times ... Load full discussion..."},
{id:159,type:"img",cat:"Storage",q:"HOTSPOT -<br>You need to create an Azure Storage account that meets the following requirements:<br>\u2711 Minimizes costs<br>\u2711 Supports hot, cool, and archive blob tiers<br>\u2711 Provides fault tolerance if a disaster affects the Azure region where the account resides<br>How should you complete the command? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0014700004.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0014800001.jpg",exp:"Box 1: StorageV2 -\nYou may only tier your object storage data to hot, cool, or archive in Blob storage and General Purpose v2 (GPv2) accounts. General Purpose v1 (GPv1) accounts do not support tiering.\nGeneral-purpose v2 accounts deliver the lowest per-gigabyte capacity prices for Azure Storage, as well as industry-competitive transaction prices.\nBox 2: Standard_GRS -\nGeo-redundant storage (GRS): Cross-regional replication to protect against region-wide unavailability.\nIncorrect Answers:\nLocally-redundant storage (LRS): A simple, low-cost replication strategy. Data is replicated within a single storage scale unit.\nRead-access geo-redundant storage (RA-GRS): Cross-regional replication with read access to the replica. RA-GRS provides read-only access to the data in the secondary location, in addition to geo-replication across two regions, but is more expensive compared to GRS.\nReference:\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy-grs https://docs.microsoft.com/en-us/azure/storage/blobs/storage-blob-storage-tiers"},
{id:160,cat:"Storage",q:"You have an Azure subscription that contains the resources in the following table.<br><img src=\"imgs/0014900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Store1 contains a file share named data. Data contains 5,000 files.<br>You need to synchronize the files in the file share named data to an on-premises server named Server1.<br>Which three actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[1, 2, 4],opts:["Create a container instance", "Register Server1", "Install the Azure File Sync agent on Server1", "Download an automation script", "Create a sync group"],exp:"Connection monitor lets you know the round-trip time to make the connection, in milliseconds.\nConnection monitor probes the connection every 60 seconds, so you can monitor latency over\ntime."},
{id:161,type:"img",cat:"Governance",q:"HOTSPOT -<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0015000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The status of VM1 is Running.<br>You assign an Azure policy as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0015100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You assign the policy by using the following parameters:<br>Microsoft.ClassicNetwork/virtualNetworks<br>Microsoft.Network/virtualNetworks<br>Microsoft.Compute/virtualMachines<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0015200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image902.png",exp:"Correct answer is:\nVNET1 will only have Department: D1 tag & VNET 2 will only have Label : Value1 tag upvoted 374 times Mucker973 3\u00a0years, 4\u00a0months ago nope, your answer is incorrect and the answers given are correct. You are assuming that Dept: D1 overwrites label:value (well I assume you did based on your answer), but resources can have any amount of tags applied. PLUS I have confirmed this in a lab upvoted 6 times amiban 2\u00a0years, 11\u00a0months ago but can't be applied by policy, we need to be compliant while creating the resources wrt the tags. upvoted 1 times ... cnduknthm 3\u00a0years ago Its not about OVERWRITTING... Its about the assignment of policy. The policy applies to resources that are created only after policy was applied but VNET1 is created before assigning the policy to Resource Group and for that reason VNET1 has only one tag which is Department : D1 upvoted 12 times ... ... Dennis_SOn 3\u00a0years, 3\u00a0months ago what is the answer? your answer seems not in the options? upvoted 2 times Dennis_SOn 3\u00a0years, 3\u00a0months ago are you referring to this answer?\ntag. vnet1 : departement D1 tag only.\nVNET1 - Department: D1 only VNET2 - Label: Value1 only upvoted 6 times Dennis_SOn 3\u00a0years, 3\u00a0months ago tag. vnet1 --- Department: D1 only.\nVNET1 - Department: D1 only VNET2 --- Label: Value1 only upvoted 2 times ... ... ... awssecuritynewbie 3\u00a0years, 1\u00a0month ago this is wrong people do not like it! upvoted 7 times ... marioZuo 2\u00a0years, 3\u00a0months ago Per tested, you are right! upvoted 4 ti"},
{id:162,type:"dd",cat:"Storage",q:"DRAG DROP -<br>You have an Azure subscription that contains a storage account.<br>You have an on-premises server named Server1 that runs Windows Server 2016. Server1 has 2 TB of data.<br>You need to transfer the data to the storage account by using the Azure Import/Export service.<br>In which order should you perform the actions? To answer, move all actions from the list of actions to the answer area and arrange them in the correct order.<br>NOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.<br>Select and Place:<br><img src=\"imgs/0015300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Prepare the drives", "Create an import job", "Ship the drives to the Azure datacenter"],ans:["Prepare the drives", "Create an import job", "Ship the drives to the Azure datacenter"],exp:"A Recovery Services vault is a storage entity in Azure that houses data. The data is typically\ncopies of data, or configuration information for virtual machines (VMs), workloads, servers, or\nworkstations. You can use Recovery Services vaults to hold backup data for various Azure\nservices."},
{id:163,type:"hs",cat:"Storage",q:"HOTSPOT -<br>You have Azure subscription that includes following Azure file shares:<br><img src=\"imgs/0015500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You have the following on-premises servers:<br><img src=\"imgs/0015500002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create a Storage Sync Service named Sync1 and an Azure File Sync group named Group1. Group1 uses share1 as a cloud endpoint.<br>You register Server1 and Server2 in Sync1. You add D:\\Folder1 on Server1 as a server endpoint of Group1.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0015600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["share2 can be added as a cloud endpoint for Group1 \u00b0 fa", "E:\\Folder2 on Server can be added as a server endpoint", "for Groupt", "D:\\Data on Server2 can be added as a server endpoint for [el"],ans:["No", "Yes", "Yes", "Yes"],exp:"User1 is global admin of contoso.onmicrosoft.com. As he created the new tenant called\nexternal.contoso.onmicrosoft.com, he will be the OWNER. Check the scope not just the role."},
{id:164,type:"dd",cat:"Storage",q:"DRAG DROP -<br>You have an Azure subscription named Subscription1.<br>You create an Azure Storage account named contosostorage, and then you create a file share named data.<br>Which UNC path should you include in a script that references files from the data file share? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once or not at all. You may need to drag the split bar between panes or scroll to view content.<br>NOTE: Each correct selection is worth one point.<br>Select and Place:<br><img src=\"imgs/0015700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["contosostorage", "file.core.windows.net", "data"],ans:["contosostorage", "file.core.windows.net", "data"],exp:"Only a global administrator can add users to this tenant."},
{id:165,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains an Azure Storage account.<br>You plan to copy an on-premises virtual machine image to a container named vmimages.<br>You need to create the container for the planned image.<br>Which command should you run? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0016000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0016100001.png",exp:"Correct Answer:\n\nazcopy make 'https://mystorageaccount.blob.core.windows.net/vmimages'\n\nSimilar to OS Images, a VM Image is a collection of metadata and pointers to a set of VHDs (one VHD per disk) stored as page blobs in Azure Storage.\n\n\nReference:\n\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-ref-azcopy-make upvoted 293 times RougePotatoe 2\u00a0years, 9\u00a0months ago In case yall wanted to know where they got the quote from. You could've just googled it.\n\n\"Similar to OS Images, a VM Image is a collection of metadata and pointers to a set of VHDs (one VHD per disk) stored as page blobs in Azure Storage.\"\n\nhttps://azure.microsoft.com/en-us/blog/vm-image-blog-post/ upvoted 9 times garmatey 2\u00a0years, 6\u00a0months ago \"You could've just googled it.\"\nUm are you getting indignant over some imaginary person asking where some quote is from? upvoted 9 times tigerz 2\u00a0years, 2\u00a0months ago It must be nice being on such a high horse over us peasants. upvoted 2 times ... ... ... Juwizee 2\u00a0years, 1\u00a0month ago Say No More... The man himself got it again. upvoted 11 times ..."},
{id:166,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You have an Azure File sync group that has the endpoints shown in the following table.<br><img src=\"imgs/0016100002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Cloud tiering is enabled for Endpoint3.<br>You add a file named File1 to Endpoint1 and a file named File2 to Endpoint2.<br>On which endpoints will File1 and File2 be available within 24 hours of adding the files? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0016200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Filet",options:["Endpointt only","Endpoint3 only","Endpoint2 and Endpoint3 only","Endpoint1, Endpoint2, and Endpoint3"]},{label:"File2",options:["Endpoint2 only","Endpoint3 only","Endpoint2 and Endpoint3 onl)"]}],ans_img:"imgs/image904.png",exp:"Correct Answer:\n\nFile1: Endpoint1 only\nIt is a cloud endpoint, and it is scanned by the detection job every 24 hours.\n\nFile2: Endpoint1, Endpoint2 and Endpoint3\nWith the on-premises servers the file is scanned and synced automatically after it's being added.\n\nNote: They changed the question in Exam from \"within 24 hours\" to \"after 24 hours\".\nSo, the answer is:\nFile1: Endpoint1, Endpoint2 and Endpoint3\nFile2: Endpoint1, Endpoint2 and Endpoint3\n\nReference:\n\nhttps://docs.microsoft.com/en-us/learn/modules/extend-share-capacity-with-azure-file-sync/2-what-azure-file-sync upvoted 764 times suriyaswamy 4\u00a0years, 3\u00a0months ago Good Info upvoted 3 times ... codeScalable 3\u00a0years ago God bless you @mlantonis. You are a real gem upvoted 20 times ... Harshul 4\u00a0years, 4\u00a0months ago Excellent Explaination! upvoted 4 times juniorccs 4\u00a0years, 3\u00a0months ago Thanks a lot! upvoted 2 times ... ... AubinBakana 4\u00a0years, 2\u00a0months ago Thank you so much. That's something I thought was a little confusing as it would make their revealed answer wrong. upvoted 3 times ... Load full discussion..."},

{id:169,cat:"Storage",q:"You have an Azure subscription that contains the storage accounts shown in the following table.<br><img src=\"imgs/0016900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to identify which storage account can be converted to zone-redundant storage (ZRS) replication by requesting a live migration from Azure support.<br>What should you identify?<br>",ans:1,opts:["storage1", "storage2", "storage3", "storage4"],exp:"You can move a VM and its associated resources to a different subscription by using the Azure\nportal.\nYou can now move an Azure Recovery Service (ASR) Vault to either a new resource group within\nthe current subscription or to a new subscription."},
{id:170,cat:"Compute",q:"You have an Azure subscription that contains a storage account named account1.<br>You plan to upload the disk files of a virtual machine to account1 from your on-premises network. The on-premises network uses a public IP address space of<br>131.107.1.0/24.<br>You plan to use the disk files to provision an Azure virtual machine named VM1. VM1 will be attached to a virtual network named VNet1. VNet1 uses an IP address space of 192.168.0.0/24.<br>You need to configure account1 to meet the following requirements:<br>\u2711 Ensure that you can upload the disk files to account1.<br>\u2711 Ensure that you can attach the disks to VM1.<br>\u2711 Prevent all other access to account1.<br>Which two actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[0, 2],opts:["From the Networking blade of account1, select Selected networks.", "From the Networking blade of account1, select Allow trusted Microsoft services to access this storage account.", "From the Networking blade of account1, add the 131.107.1.0/24 IP address range.", "From the Networking blade of account1, add VNet1.", "From the Service endpoints blade of VNet1, add a service endpoint."],exp:"Set-AzMarketplaceTerms - \"Accept or reject terms for a given publisher id(Publisher), offer\nid(Product) and plan id(Name). Please use Get-AzMarketplaceTerms to get the agreement\nterms.\"\n\nhttps://docs.microsoft.com/en-us/powershell/module/az.marketplaceordering/set-\nazmarketplaceterms?view=azps-8.3.0"},
{id:171,type:"dd",cat:"Storage",q:"DRAG DROP -<br>You have an on-premises file server named Server1 that runs Windows Server 2016.<br>You have an Azure subscription that contains an Azure file share.<br>You deploy an Azure File Sync Storage Sync Service, and you create a sync group.<br>You need to synchronize files from Server1 to Azure.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0017200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Install the Azure File Sync agent on Server1", "Register Server1 with Storage Sync Service", "Add a server endpoint"],ans:["Install the Azure File Sync agent on Server1", "Register Server1 with Storage Sync Service", "Add a server endpoint"],exp:"C: A VPN gateway is used when creating a VPN connection to your on-premises network.\nRoute-based VPN devices use any-to-any (wildcard) traffic selectors, and let routing/forwarding\ntables direct traffic to different IPsec tunnels. It is typically built on router platforms where each\nIPsec tunnel is modeled as a network interface or VTI (virtual tunnel interface).\nE: Policy-based VPN devices use the combinations of prefixes from both networks to define how\ntraffic is encrypted/decrypted through IPsec tunnels. It is typically built on firewall devices that\nperform packet filtering. IPsec tunnel encryption and decryption are added to the packet filtering\nand processing engine.\nIncorrect Answers:\nF: Point-to-Site connections do not require a VPN device or a public-facing IP address."},
{id:172,type:"drop",cat:"Storage",q:"HOTSPOT -<br>You plan to create an Azure Storage account in the Azure region of East US 2.<br>You need to create a storage account that meets the following requirements:<br>\u2711 Replicates synchronously.<br>\u2711 Remains available if a single data center in the region fails.<br>How should you configure the storage account? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0017400003.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Replication",options:["Geo-redundant storage (GRS)","Locally-redundant storage (LRS)","Read-access geo-redundant storage (RA GRS)","Zone-redundant storage (ZRS)"]},{label:"Account type",options:["Blob storage","Storage (general purpose v1)","StorageV2 (general purpose v2)"]}],ans_img:"imgs/0017500001.png",exp:"Box 1: Zone-redundant storage (ZRS)\nZone-redundant storage (ZRS) replicates your data synchronously across three storage clusters in a single region.\nLRS would not remain available if a data center in the region fails\nGRS and RA GRS use asynchronous replication.\nBox 2: StorageV2 (general purpose V2)\nZRS only support GPv2.\nReference:\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy https://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy-zrs"},
{id:173,cat:"Storage",q:"You plan to use the Azure Import/Export service to copy files to a storage account.<br>Which two files should you create before you prepare the drives for the import job? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[1, 4],opts:["an XML manifest file", "a dataset CSV file", "a JSON configuration file", "a PowerShell PS1 file", "a driveset CSV file"],exp:"A Site-to-Site VPN gateway connection can be used to connect your on-premises network to an\nAzure virtual network over an IPsec/IKE (IKEv1 or IKEv2) VPN tunnel.\nThis type of connection requires a VPN device, a VPN gateway, located on-premises that has an\nexternally facing public IP address assigned to it.\nIncorrect Answers:\nB: Application Proxy is a feature of Azure AD that enables users to access on-premises web\napplications from a remote client."},
{id:174,cat:"Compute",q:"You have a Recovery Service vault that you use to test backups. The test backups contain two protected virtual machines.<br>You need to delete the Recovery Services vault.<br>What should you do first?<br>",ans:3,opts:["From the Recovery Service vault, delete the backup data.", "Modify the disaster recovery properties of each virtual machine.", "Modify the locks of each virtual machine.", "From the Recovery Service vault, stop the backup of each backup item."],exp:"Azure virtual machine extensions are small packages that run post-deployment configuration and\nautomation on Azure virtual machines.\nIn the following example, the Azure CLI is used to deploy a custom script extension to an existing\nvirtual machine, which installs a Nginx webserver. az vm extension set \\\n--resource-group myResourceGroup \\\n--vm-name myVM --name customScript \\\n--publisher Microsoft.Azure.Extensions \\\n--settings '{\"commandToExecute\": \"apt-get install -y nginx\"}\n\nNote:\nThere are several versions of this question in the exam. The question has two correct answers:\n1. a Desired State Configuration (DSC) extension\n2. Azure Custom Script Extension\n\nThe question can have other incorrect answer options, including the following:\n- the Publish-AzVMDscConfiguration cmdlet\n- Azure Application Insights"},
{id:175,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1 that contains the resources shown in the following table.<br><img src=\"imgs/0017800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>In storage1, you create a blob container named blob1 and a file share named share1.<br>Which resources can be backed up to Vault1 and Vault2? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0017900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Can use Vault1 for backups",options:["VM1 only","VM1 and share‘ only","M1 and SQL1 only","M1, storage1, and SQL1 only","VM1, blob1, share1, and SQL1"]},{label:"Can use Vault2 for backups",options:["storage’ only","share‘ only","VM1 and share‘ only","blob1 and share‘ only","storage1 and SQL1 only"]}],ans_img:"imgs/0018000001.png",exp:"The Network Contributor role lets you manage networks, but not access them.\nReference:\nhttps://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles"},
{id:176,cat:"Compute",q:"You have an Azure subscription named Subscription1.<br>You have 5 TB of data that you need to transfer to Subscription1.<br>You plan to use an Azure Import/Export job.<br>What can you use as the destination of the imported data?<br>",ans:2,opts:["a virtual machine", "an Azure Cosmos DB database", "Azure File Storage", "the Azure File Sync Storage Sync Service"],exp:"Assign a role to a user\n1. Sign in to the Azure portal with an account that's a global admin or privileged role admin for the\ndirectory.\n2. Select Azure Active Directory, select Users, and then select a specific user from the list.\n3. For the selected user, select Directory role, select Add role, and then pick the appropriate\nadmin roles from the Directory roles list, such as Conditional access administrator.\n4. Press Select to save."},
{id:177,type:"drop",cat:"Storage",q:"HOTSPOT -<br>You have an Azure subscription.<br>You create the Azure Storage account shown in the following exhibit.<br><img src=\"imgs/0018300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0018400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"The minimum number of copies of the storage account will be",options:["answer choice] 1","2","3","4"]},{label:"To reduce the cost of infrequently accessed data in the storage",options:["account, you must modify the [answer choice] setting im y","Performance","Account kind","Replication"]}],ans_img:"imgs/0018400002.png",exp:"Box 1: 3 -\nLocally Redundant Storage (LRS) provides highly durable and available storage within a single location (sub region).  We maintain an equivalent of 3 copies\n(replicas) of your data within the primary location as described in our SOSP paper; this ensures that we can recover from common failures (disk, node, rack) without impacting your storage account's availability and durability.\nBox 2: Access tier -\nChange the access tier from Hot to Cool.\nNote: Azure storage offers different access tiers, which allow you to store blob object data in the most cost-effective manner. The available access tiers include:\nHot - Optimized for storing data that is accessed frequently.\nCool - Optimized for storing data that is infrequently accessed and stored for at least 30 days.\nArchive - Optimized for storing data that is rarely accessed and stored for at least 180 days with flexible latency requirements (on the order of hours).\nReference:\nhttps://azure.microsoft.com/en-us/blog/data-series-introducing-locally-redundant-storage-for-windows-azure-storage/ https://docs.microsoft.com/en-us/azure/storage/blobs/storage-blob-storage-tiers"},
{id:178,cat:"Storage",q:"You have an Azure Storage account named storage1.<br>You plan to use AzCopy to copy data to storage1.<br>You need to identify the storage services in storage1 to which you can copy the data.<br>Which storage services should you identify?<br>",ans:1,opts:["blob, file, table, and queue", "blob and file only", "file and table only", "file only", "blob, table, and queue only"],exp:"Correct Answer B - blob and file only Azure Import job supports: Azure Blob Storage, and Azure Files storage Azure Export job supports: Azure Blob Storage https://docs.microsoft.com/en-us/azure/import-export/storage-import-export-requirements"},
{id:179,type:"drop",cat:"Storage",q:"HOTSPOT -<br>You have an Azure Storage account named storage1 that uses Azure Blob storage and Azure File storage.<br>You need to use AzCopy to copy data to the blob storage and file storage in storage1.<br>Which authentication method should you use for each type of storage? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0018700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Blob storage",options:["Azure Active Directory (Azure AD) only","Shared access signatures (SAS) only","Access keys and shared access signatures (SAS) only","Azure Active Directory (Azure AD) and shared access signatures (SAS) only","Azure Active Directory (Azure AD), access keys, and shared access signatures (SAS)"]},{label:"File storage",options:["‘Azure Active Directory (Azure AD) only","Shared access signatures (SAS) only","Access keys and shared access signatures (SAS) only","Azure Active Directory (Azure AD) and shared access signatures (SAS) only","‘Azure Active Directory (Azure AD), access keys, and shared access signatures (SAS)"]}],ans_img:"imgs/0018700002.png",exp:"First: Azure AD & SAS\nSecond: SAS\n\nSource: https://learn.microsoft.com/en-us/azure/storage/common/storage-use-azcopy-v10#authorize-azcopy upvoted 36 times Sameer9371 2\u00a0years, 2\u00a0months ago you are absolutely right upvoted 3 times ... hank00r 1\u00a0year, 10\u00a0months ago The link you provided states:\n \"You can provide authorization credentials by using Microsoft Entra ID, or by using a Shared Access Signature (SAS) token\". \n\nSo it should be Azure AD & SAS for both Questions. Am I getting it wrong? upvoted 25 times Bravo_Dravel 10\u00a0months ago True, both you can use either SAS (Shared Access Signature) or Azure AD (Azure Active Directory) for authorization upvoted 3 times ... ggogel 1\u00a0year, 9\u00a0months ago Yes, this must have been changed. The following doc clearly states that Entra ID can be used to authorize access to file shares when using azcopy.\nhttps://learn.microsoft.com/en-us/azure/storage/common/storage-use-azcopy-authorize-azure-active-directory upvoted 9 times SDiwan 1\u00a0year, 9\u00a0months ago No, if you are targetting copy to the whole \"file share\" then SAS is the only option. Entra ID can be used , if you are copying a fileor files to a specific folder inside file file share. So, SAS only is correct for 2nd question upvoted 2 times tableton 1\u00a0year, 7\u00a0months ago But I think the whole file share is not mentioned in the question:\n\"You need to use AzCopy to copy data to the blob storage and file storage in storage1.\"\nSo EntraID  could be used to azcopy to file share upvoted 5 times suddi"},
{id:180,cat:"Storage",q:"You have an Azure subscription that contains an Azure Storage account.<br>You plan to create an Azure container instance named container1 that will use a Docker image named Image1. Image1 contains a Microsoft SQL Server instance that requires persistent storage.<br>You need to configure a storage service for Container1.<br>What should you use?<br>",ans:0,opts:["Azure Files", "Azure Blob storage", "Azure Queue storage", "Azure Table storage"],exp:"Azure Import/Export service supports the following of storage accounts:\nStandard General Purpose v2 storage accounts (recommended for most scenarios)\nBlob Storage accounts\nGeneral Purpose v1 storage accounts (both Classic or Azure Resource Manager deployments),\nAzure Import/Export service supports the following storage types:\nImport supports Azure Blob storage and Azure File storage\nExport supports Azure Blob storage"},
{id:181,cat:"Compute",q:"You have an app named App1 that runs on two Azure virtual machines named VM1 and VM2.<br>You plan to implement an Azure Availability Set for App1. The solution must ensure that App1 is available during planned maintenance of the hardware hosting<br>VM1 and VM2.<br>What should you include in the Availability Set?<br>",ans:3,opts:["one update domain", "two fault domains", "one fault domain", "two update domains"],exp:"AzCopy is a command-line utility that you can use to copy blobs or files to or from a storage\naccount.\nIncorrect Answers:\nA, C, E: AzCopy does not support table and queue storage services.\n\n\fD: AzCopy supports file storage services, as well as blob storage services."},
{id:182,cat:"Storage",q:"You have an Azure subscription named Subscription1.<br>You have 5 TB of data that you need to transfer to Subscription1.<br>You plan to use an Azure Import/Export job.<br>What can you use as the destination of the imported data?<br>",ans:1,opts:["an Azure Cosmos DB database", "Azure Blob storage", "Azure Data Lake Store", "the Azure File Sync Storage Sync Service"],exp:"Azure file shares can be used as persistent volumes for stateful containers. Containers deliver\n\"build once, run anywhere\" capabilities that enable developers to accelerate innovation. For the\ncontainers that access raw data at every start, a shared file system is required to allow these\ncontainers to access the file system no matter which instance they run on.\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-introduction"},
{id:183,type:"dd",cat:"Storage",q:"DRAG DROP -<br>You have an Azure subscription that contains an Azure file share.<br>You have an on-premises server named Server1 that runs Windows Server 2016.<br>You plan to set up Azure File Sync between Server1 and the Azure file share.<br>You need to prepare the subscription for the planned Azure File Sync.<br>Which two actions should you perform in the Azure subscription? To answer, drag the appropriate actions to the correct targets. Each action may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.<br>NOTE: Each correct selection is worth one point.<br>Select and Place:<br><img src=\"imgs/0019100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Prepare Windows Server to use with Azure File Sync", "Deploy the Storage Sync Service", "Install the Azure File Sync agent", "Register Windows Server with Storage Sync Service", "Create a sync group and a cloud endpoint", "Create a server endpoint"],ans:["Deploy the Storage Sync Service", "Create a sync group and a cloud endpoint"],exp:"For Windows Server, the temporary disk is mounted as \u201cD:\\\u201d.\nFor Linux based VM\u2019s the temporary disk is mounted as \u201c/dev/sdb1\u201d."},
{id:184,type:"hs",cat:"Storage",q:"HOTSPOT -<br>You have an Azure subscription that contains the file shares shown in the following table.<br><img src=\"imgs/0019200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You have the on-premises file shares shown in the following table.<br><img src=\"imgs/0019200002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create an Azure file sync group named Sync1 and perform the following actions:<br>\u2711 Add share1 as the cloud endpoint for Sync1.<br>\u2711 Add data1 as a server endpoint for Sync1.<br>\u2711 Register Server1 and Server2 to Sync1.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0019300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["You can add share3 as an additional cloud endpoint for Sync1.", "You can add data2 as an additional server endpoint for Sync1.", "You can add data3 as an additional server endpoint for Sync1."],ans:["No", "Yes", "No"],exp:"From the exhibit we see that the disk is in the VHDX format.\nBefore you upload a Windows virtual machine (VM) from on-premises to Microsoft Azure, you\nmust prepare the virtual hard disk (VHD or VHDX). Azure supports only generation 1 VMs that\nare in the VHD file format and have a fixed sized disk. The maximum size allowed for the VHD is\n1,023 GB. You can convert a generation 1 VM from the VHDX file system to VHD and from a\ndynamically expanding disk to fixed-sized."},

{id:188,cat:"Compute",q:"You have two Azure virtual machines named VM1 and VM2. You have two Recovery Services vaults named RSV1 and RSV2.<br>VM2 is backed up to RSV1.<br>You need to back up VM2 to RSV2.<br>What should you do first?<br>",ans:0,opts:["From the RSV1 blade, click Backup items and stop the VM2 backup", "From the RSV2 blade, click Backup. From the Backup blade, select the backup for the virtual machine, and then click Backup", "From the VM2 blade, click Disaster recovery, click Replication settings, and then select RSV2 as the Recovery Services vault", "From the RSV1 blade, click Backup Jobs and export the VM2 job"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:189,cat:"Storage",q:"You have a general-purpose v1 Azure Storage account named storage1 that uses locally-redundant storage (LRS).<br>You need to ensure that the data in the storage account is protected if a zone fails. The solution must minimize costs and administrative effort.<br>What should you do first?<br>",ans:2,opts:["Create a new storage account.", "Configure object replication rules.", "Upgrade the account to general-purpose v2.", "Modify the Replication setting of storage1."],exp:"Microsoft updates, which Microsoft refers to as planned maintenance events, sometimes require\nthat VMs be rebooted to complete the update. To reduce the impact on VMs, the Azure fabric is\ndivided into update domains to ensure that not all VMs are rebooted at the same time.\nIncorrect Answers:\nA: An update domain is a group of VMs and underlying physical hardware that can be rebooted at\nthe same time.\nB, C: A fault domain shares common storage as well as a common power source and network\nswitch. It is used to protect against unplanned system failure.\nReferences:\nhttps://petri.com/understanding-azure-availability-sets\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/tutorial-availability-sets"},
