{id:575,cat:"Governance",q:"You have an Azure subscription that contains an Azure Stream Analytics job named Job1.<br><br>You need to monitor input events for Job1 to identify the number of events that were NOT processed.<br><br>Which metric should you use?",ans:3,opts:["Out-of-Order Events", "Output Events", "Late Input Events", "Backlogged Input Events"],exp:"Box 1: 10.0.0.0/16\nAddress prefix\ndestination-> Vnet 1 (Address space of Vnet1)\n\nBox 2: Virtual appliance\nNext hop type\nVM1 ->Virtual Appliance. You can specify IP address of VM 1 when configuring next hop as\nVirtual appliance.\n\nBox 3: Gateway Subnet\nAssigned to\nThis route is to be followed by Gateway Subnet for the incoming traffic. You can associate routing\ntable to the Subnet from Rout Table -> subnet ->Associate."},
{id:576,cat:"Storage",q:"You have an Azure subscription that contains an Azure SQL database named DB1.<br><br>You plan to use Azure Monitor to monitor the performance of DB1. You must be able to run queries to analyze log data.<br><br>Which destination should you configure in the Diagnostic settings of DB1?",ans:0,opts:["Send to a Log Analytics workspace.", "Archive to a storage account.", "Stream to an Azure event hub."],exp:"Box 1: No\nNSG1 has default rules, which denies any port open for inbound rules\n\nBox 2: Yes\nNSG2 has custom Rule1, allowing RDP port 3389 with TCP.\n\nBox 3: Yes\nVM1 and VM2 are in the same Vnet. By default, communication is allowed."},
{id:577,cat:"Compute",q:"You have an Azure subscription. The subscription contains virtual machines that run Windows Server.<br><br>You have a data collection rule (DCR) named Rule1.<br><br>You plan to use the Azure Monitor Agent to collect events from Windows System event logs.<br><br>You only need to collect system events that have an ID of 1001.<br><br>Which type of query should you use for the data source in Rule1?",ans:1,opts:["SQL", "XPath", "KQL"],exp:"Box 1: No\nVM1 has the NSG1 on Subnet1, which allows traffic over port 1433 between Subnet2 and\nSubnet1. BUT NSG2 also applied on NIC level for VM1 that blocks the traffic on port 1433. Hence\nNo traffic allowed.\n\nBox 2: Yes\nNo rule explicitly blocks communication from VM1. The default rules, which allow communication,\nare thus applied.\n\nBox 3: Yes\nNo rule explicitly blocks communication between VM2 and VM3 which are both on Subnet2. The\ndefault rules, which allow communication, are thus applied."},
{id:578,cat:"Compute",q:"You have an Azure subscription that contains a virtual machine named VM1.<br><br>You have an on-premises datacenter that contains a domain controller named DC1. ExpressRoute is used to connect the on-premises datacenter to Azure.<br><br>You need to use Connection Monitor to identify network latency between VM1 and DC1.<br><br>What should you install on DC1?",ans:3,opts:["the Azure Connected Machine agent for Azure Arc-enabled servers", "the Azure Network Watcher Agent virtual machine extension", "the Log Analytics agent", "an Azure Monitor agent extension"],exp:"IP forwarding enables the virtual machine a network interface is attached to:\nReceive network traffic not destined for one of the IP addresses assigned to any of the IP\nconfigurations assigned to the network interface.\nSend network traffic with a different source IP address than the one assigned to one of a network\ninterface's IP configurations.\n\nThe setting must be enabled for every network interface that is attached to the virtual machine\nthat receives traffic that the virtual machine needs to forward. A virtual machine can forward traffic\nwhether it has multiple network interfaces or a single network interface attached to it.\n\nBox 1: Yes\nThe routing table allows connections from VM3 to VM1 and VM2. And as IP forwarding is enabled\non VM3, VM3 can connect to VM1.\n\nBox 2: No\nVM3, which has IP forwarding, must be turned on, in order for VM2 to connect to VM1.\n\nBox 3: Yes\nThe routing table allows connections from VM1 and VM2 to VM3. IP forwarding on VM3 allows\nVM1 to connect to VM2 via VM3."},
{id:579,cat:"Compute",q:"You have an Azure subscription that has Traffic Analytics configured.<br><br>You deploy a new virtual machine named VM1 that has the following settings:<br><br>\u2022\tRegion: East US<br>\u2022\tVirtual network: VNet1<br>\u2022\tNIC network security group: NSG1<br><br>You need to monitor VM1 traffic by using Traffic Analytics.<br><br>Which settings should you configure?",ans:1,opts:["Diagnostic settings for VM1", "NSG flow logs for NSG1", "Diagnostic settings for NSG1", "Insights for VM1"],exp:"Box 1: 10 years\nThe yearly backup point occurs to 1 March and its retention period is 10 years.\n\nBox 2: 36 months\nThe monthly backup point occurs on the 1\nof every month and its retention period is 36 months.\n\nNote: Azure retention policy takes the longest period of retention for each backup. In case of\nconflict between 2 different policies."},
{id:580,cat:"Compute",q:"You have an Azure subscription. The subscription contains 10 virtual machines that run Windows Server. Each virtual machine hosts a website in IIS and has the Azure Monitor Agent installed.<br><br>You need to collect the IIS logs from each virtual machine and store them in a Log Analytics workspace.<br><br>What should you configure first?",ans:0,opts:["a data collection endpoint", "an Azure Monitor Private Link Scope (AMPLS)", "Diagnostic settings", "VM insights", "a private endpoint"],exp:"I feel like Azure has a lot of services (some of them nested) that do the same thing and cause confusion because they have differing names"},
{id:581,type:"hs",cat:"Compute",q:"HOTSPOT -<br><br>You have an Azure subscription that contains two storage accounts named contoso101 and contoso102.<br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image794.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>VNet1 has service endpoints configured as shown in the Service endpoints exhibit. (Click the Service endpoints tab.)<br><br><img src=\"imgs/image795.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The Microsoft.Storage service endpoint has the service endpoint policy shown in the Microsoft.Storage exhibit. (Click the Microsoft.Storage tab.)<br><br><img src=\"imgs/image796.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image797.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",statements:["M1 can access contoso102.", "VMe2 can access contoso101.", "M2 uses a private IP address to access Azure AD."],ans:["No", "Yes", "Yes"],exp:"In Azure, you can move resources between resource groups as long as the resource type is\nsupported for move operations. Virtual Networks (VNETs) are supported for move operations, so\nyou can move the \"VNET1 - Virtual Network\" resource to RG2.\nThe other resources, such as \"W10_OsDisk\" (Managed Disk), \"W10\" (Virtual Machine), and\n\"VNET3 - Virtual Network\" (Classic Virtual Network), may have limitations or dependencies that\n\n\fprevent them from being moved. Classic resources, like the Classic Virtual Network, have more\nrestrictions on moving compared to Azure Resource Manager (ARM) resources."},
{id:582,type:"drop",cat:"Governance",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains an Azure Backup vault named Backup1, a Recovery Services vault named Recovery1, and the resources shown in the following table.<br><br><img src=\"imgs/image879.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to back up the resources.<br><br>Which resource can be backed up to Backup1, and which resource can be backed up to Recovery1? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image880.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Backup1",options:["DB","Disk1)","om"]},{label:"Recovery1",options:["Appt","DB1","wr)"]}],ans_img:"imgs/image881.png",exp:"Answer is correct.  \n\nBackup1 - Disk1\nRecovery1 - VM1 upvoted 4 times Eslam_Farag 11\u00a0months ago correct answer\n\nbackup vault backs up: Azure disks, blobs, DB for PostgreSQL, K8s services\n\nRecovery services vault backs up: VMs, file shares, SAP ASE\\HANA, SQL server in azure VM (NOT DB) upvoted 7 times ..."},
{id:583,type:"img",cat:"Compute",q:"HOTSPOT -<br><br><br>Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You need to configure Azure Backup to meet the technical requirements for cont1 and share1.<br><br>To what should you set the backup frequency for each resource? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image882.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image952.png",exp:"Box 1: No \nReference: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference#attribute-assignment-administrator (read the note)\n\nBox 2: No\nReference: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference#attribute-definition-administrator (definition admin can not assign roles)\n\nBox 3: No \nReference: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference#attribute-assignment-administrator (Read the Actions column in that link table; It has only users and servicePrincipals; not groups) upvoted 10 times"},
{id:584,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You need to configure the Device settings to meet the technical requirements and the user requirements.<br>Which two settings should you modify? To answer, select the appropriate settings in the answer area.<br>Hot Area:<br><img src=\"imgs/0013000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Select the correct answer",options:["] save X Discard QD Got feedback?","Users may join devices to Azure AD ©","Selected","No member selected","Additional local administrators on Azure AD joined devices ©","Selected | QUID)","No member selected","Users may register their devices with Azure AD ©","Require Multi-Factor Auth to join devices ©","Maximum number of devices per user ()"]}],ans_img:"imgs/0013100001.png",exp:"Box 1: Selected -\nOnly selected users should be able to join devices\nBox 2: Yes -\nEnsure that when users join devices to Azure Active Directory (Azure AD), the users use a mobile phone to verify their identity."},
{id:585,cat:"Identity",q:"You need to meet the user requirement for Admin1.<br>What should you do?<br>",ans:2,opts:["From the Azure Active Directory blade, modify the Groups", "From the Azure Active Directory blade, modify the Properties", "From the Subscriptions blade, select the subscription, and then modify the Access control (IAM) settings", "From the Subscriptions blade, select the subscription, and then modify the Properties"],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:586,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You need to configure Azure Backup to back up the file shares and virtual machines.<br>What is the minimum number of Recovery Services vaults and backup policies you should create? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0059500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Recovery Services vaults",options:["1","2","3","4","7"]},{label:"Backup policies",options:["1","2","3","4","5","6"]}],ans_img:"imgs/0059600001.png",exp:"Box 1: 3 -\nIf you have data sources in multiple regions, create a Recovery Services vault for each region.\nThe File Shares and VMs are located in three Regions: West US, East US, Central US.\nBox 2: 6 -\nA backup policy is scoped to a vault. For each vault we need one backup policy for File Shares and one backup policy for VM.\nNote:\nBack up the Azure file shares and virtual machines by using Azure Backup\nReference:\nhttps://docs.microsoft.com/en-us/azure/backup/backup-create-rs-vault https://docs.microsoft.com/en-us/azure/backup/guidance-best-practices"},
{id:587,type:"dd",cat:"Monitor",q:"DRAG DROP -<br>You need to configure the alerts for VM1 and VM2 to meet the technical requirements.<br>Which three actions should you perform in sequence? To answer, move all actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0059800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Create a Log Analytics workspace", "Collect Windows performance counters from the Log Analytics agents", "Create an alert rule"],ans:["Create a Log Analytics workspace", "Collect Windows performance counters from the Log Analytics agents", "Create an alert rule"],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:588,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You need to ensure that User1 can create initiative definitions, and User4 can assign initiatives to RG2. The solution must meet the technical requirements.<br>Which role should you assign to each user? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0013700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Select the correct answer",options:["User1","Contributor for RG1","Contributor for Sub1","Security Admin for RG1","Resource Policy Contributor for Sub1","Useras [oO","Contributor for RG2","Contributor for Sub1","Security Admin for Sub1","Resource Policy Contributor for RG2"]}],ans_img:"imgs/0013800001.png",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/governance/policy/overview"},
{id:589,cat:"Storage",q:"You need to ensure that you can grant Group4 Azure RBAC read only permissions to all the Azure file shares.<br>What should you do?<br>",ans:0,opts:["On storage2, enable identity-based access for the file shares.", "Recreate storage2 and set Hierarchical namespace to Enabled.", "On storage1 and storage4, change the Account kind type to StorageV2 (general purpose v2).", "Create a shared access signature (SAS) for storage1, storage2, and storage4."],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:590,cat:"Governance",q:"You need to implement a backup solution for App1 after the application is moved.<br>What should you create first?<br>",ans:3,opts:["a recovery plan", "an Azure Backup Server", "a backup policy", "a Recovery Services vault"],exp:"Correct Answer: D As per requirements: - Move all the tiers of App1 to Azure. - There are three application tiers, each with five virtual machines. - Ensure that all the virtual machines for App1 are protected by backups. Before starting the backup process, you must create a Recovery Services Vault as an initial step, as a place for the backups, or restore points, to be stored. Later steps include downloading recovery services agent, installing and registering the agent. A Recovery Services vault is a logical container that stores the backup data for each protected resource, such as Azure VMs. When the backup job for a protected resource runs, it creates a recovery point inside the Recovery Services vault. Reference: https://docs.microsoft.com/en-us/azure/backup/quick-backup-vm-portal https://docs.microsoft.com/en-us/azure/app-service/manage-backup https://docs.microsoft.com/en-us/azure/backup/tutorial-backup-windows-server-to-azure"},

PN connection\nOn premises create a site-to-site connection for the virtual network gateway and the local network gateway.\nScenario: Connect the New York office to VNet1 over the Internet by using an encrypted connection.\nIncorrect Answers:\nAzure ExpressRoute: Established between your network and Azure, through an ExpressRoute partner. This connection is private. Traffic does not go over the internet.\nReference:\nhttps://docs.microsoft.com/en-us/azure/architecture/reference-architectures/hybrid-networking/vpn"},

// HELPERS

function isCorrect(ans,q){
  if(q.type==='img'||q.type==='drop') return ans===1; // self-rated: 1=knew it
  if(q.type==='dd'||q.type==='hs'){
    if(!Array.isArray(ans))return false;
    return q.ans.length===ans.length&&q.ans.every((a,i)=>a===ans[i]);
  }
  if(Array.isArray(q.ans)){
    if(!Array.isArray(ans))return false;
    return q.ans.length===ans.length&&q.ans.every(a=>ans.includes(a));
  }
  return ans===q.ans;
}
function isQAnswered(i){
  const q=ex.qs[i],a=ex.ans[i];
  if(q.type==='dd'||q.type==='hs'||q.type==='img'||q.type==='drop'||Array.isArray(q.ans))return ex.confirmed[i];
  return a!==null;
}

const LS='az104_v8';

let st=JSON.parse(JSON.stringify(DEF_ST));

// exam session
let ex={
  qs:[],cur:0,
  // ans[i] = index chosen, null = unanswered
  ans:[],
  // peeks[i] = true if user peeked answer without answering
  peeks:[],
  flagged:[],

  ti:null,tl:0,

  qTimes:[],qStart:0
};

function loadSt(){try{const s=localStorage.getItem(LS);if(s){const p=JSON.parse(s);st={...DEF_ST,...p};}}catch(e){}}
function saveSt(){try{localStorage.setItem(LS,JSON.stringify(st));}catch(e){}}
function $(i){return document.getElementById(i);}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function fmt(s){const m=Math.floor(s/60);return m+':'+(s%60<10?'0':'')+(s%60);}
function fmtSecs(s){return s>60?Math.floor(s/60)+'m '+(s%60)+'s':s+'s';}
function fmtDate(ts){try{return new Date(ts).toLocaleDateString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}
function showV(id){
  ['h','s','e','r','f','hist'].forEach(v=>$('v'+v).classList.add('hidden'));
  $('v'+id).classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}
function allCats(){return[...new Set(QB.map(q=>q.cat))].sort();}
function catCls(c){
  const m={'Identity & Access':'b-blue','Networking':'b-purple','Compute & Backup':'b-amber',
           'Storage':'b-green','App Services':'b-teal','Governance & Cost':'b-amber',
           'Monitor & Alerts':'b-red','Security & KeyVault':'b-purple','Azure General':'b-green'};
  return m[c]||'b-blue';
}

function toggleTheme(){
  document.body.classList.toggle('light');
  $('theme-btn').textContent=document.body.classList.contains('light')?'🌑':'🌙';
  localStorage.setItem('az104_theme',document.body.classList.contains('light')?'light':'dark');
}
function initTheme(){
  if(localStorage.getItem('az104_theme')==='light'){
    document.body.classList.add('light');
    const b=$('theme-btn');if(b)b.textContent='🌑';
  }
}

// HOME
// ═══════════════════════════════════════════════════════════════
function home(){
  const tot=QB.length,att=st.attempted.length,fail=st.failed.length;
  const r=(st.correct+st.incorrect)>0?Math.round((st.correct/(st.correct+st.incorrect))*100):0;
  let fc_color='#ef4444',hint='Comienza una sesión para calcular tu readiness score.';
  if(r>0&&r<70)hint='Sigue practicando — el umbral de aprobado es ~70%.';
  if(r>=70){fc_color='#f59e0b';hint='Casi — apunta a 80%+ antes del examen real.';}
  if(r>=80){fc_color='#22c55e';hint='Excelente nivel. Revisa los fallos antes del examen.';}
  $('htotal').textContent=tot+' q';

  // Category progress rows
  const catRows=allCats().map(c=>{
    const total=QB.filter(q=>q.cat===c).length;
    const a=QB.filter(q=>q.cat===c&&st.attempted.includes(q.id)).length;
    const pct=total>0?Math.round((a/total)*100):0;
    return `<div class="cat-row">
      <span class="badge ${catCls(c)}" style="font-size:9px;flex-shrink:0">${c}</span>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <div class="cat-bar-out"><div class="cat-bar-in" style="width:${pct}%;background:var(--accent)"></div></div>
        <span style="font-family:var(--mono);color:var(--text-muted);font-size:11px;min-width:48px;text-align:right">${a}/${total}</span>
      </div>
    </div>`;
  }).join('');

  // Recent history (last 5)
  const recentH=(st.history||[]).slice(-5).reverse();
  const histHTML=recentH.length>0?`
    <div class="card">
      <div class="card-title">Últimas sesiones</div>
      ${recentH.map(h=>{
        const col=h.pct>=80?'var(--green)':h.pct>=70?'var(--amber)':'var(--red)';
        const modeLabel={test:'Test',study:'Estudio',review:'Repaso'}[h.mode]||h.mode||'Test';
        return `<div class="hist-row">
          <span style="color:var(--text-dim);min-width:110px;font-size:11px">${fmtDate(h.ts)}</span>
          <span class="badge b-blue" style="font-size:9px">${modeLabel}</span>
          <div class="hist-bar-out"><div class="hist-bar-in" style="width:${h.pct}%;background:${col}"></div></div>
          <span style="font-family:var(--mono);font-size:12px;color:${col};min-width:36px;text-align:right">${h.pct}%</span>
          <span style="font-size:11px;color:var(--text-muted)">${h.correct}/${h.total}</span>
        </div>`;
      }).join('')}
    </div>`:'';

  const streakHTML=st.streak>=3
    ?`<div class="streak-row">🔥 Racha actual: <strong>${st.streak}</strong>${st.maxStreak>st.streak?` · Récord: ${st.maxStreak}`:''}</div>`
    :(st.maxStreak>=3?`<div class="streak-row" style="color:var(--text-muted)">Mejor racha: 🔥${st.maxStreak}</div>`:'');

  $('vh').innerHTML=`
    <div class="line-accent"></div>
    <div class="g3">
      <div class="metric"><div class="metric-label">Intentadas</div><div class="metric-value" style="color:var(--accent)">${att}</div></div>
      <div class="metric"><div class="metric-label">Correctas</div><div class="metric-value" style="color:var(--green)">${st.correct}</div></div>
      <div class="metric"><div class="metric-label">Falladas</div><div class="metric-value" style="color:var(--red)">${st.incorrect}</div></div>
    </div>
    <div class="card">
      <div class="r-header">
        <span style="font-size:10px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em">Readiness score</span>
        <span style="font-size:22px;font-weight:600;font-family:var(--mono);color:${fc_color}">${r}%</span>
      </div>
      <div class="r-bar"><div class="r-fill" style="width:${r}%;background:${fc_color}"></div></div>
      <p class="r-hint">${hint}</p>
      ${streakHTML}
    </div>
    <div class="card"><div class="card-title">Progreso por categoría</div>${catRows}</div>
    ${histHTML}
    <hr class="sep">
    <p class="slabel">Iniciar sesión</p>
    <button class="mode-card" onclick="setup('test')">
      <div class="mode-icon">🎯</div>
      <div><div class="mode-title">Test — corrección al final</div><div class="mode-desc">Responde todas las preguntas y obtén tu nota al finalizar. Puedes ver la solución en cualquier momento si lo necesitas.</div></div>
    </button>
    <button class="mode-card" onclick="setup('study')">
      <div class="mode-icon">📝</div>
      <div><div class="mode-title">Estudio — feedback inmediato</div><div class="mode-desc">Ves si aciertas o fallas tras cada respuesta. Ideal para aprender y repasar explicaciones.</div></div>
    </button>
    <button class="mode-card" onclick="goFlashcards()">
      <div class="mode-icon">🃏</div>
      <div><div class="mode-title">Flashcards</div><div class="mode-desc">Voltea la tarjeta y marca si sabías la respuesta. Repaso mental rápido sin presión.</div></div>
    </button>
    <button class="mode-card ${fail===0?'':'btn-a'}" onclick="setup('review')" ${fail===0?'style="opacity:.4;cursor:not-allowed"':''}>
      <div class="mode-icon">🔁</div>
      <div><div class="mode-title">Repasar fallos ${fail>0?'('+fail+')':''}</div><div class="mode-desc">${fail>0?'Vuelve a las preguntas que fallaste para reforzar los puntos débiles.':'Aún no has fallado ninguna pregunta.'}</div></div>
    </button>
    <hr class="sep">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="goHistory()">📊 Historial</button>
      <button class="btn btn-sm" onclick="askReset()" style="opacity:.45">Resetear progreso</button>
    </div>`;
  showV('h');
}

function setup(mode){
  if(mode==='review'&&st.failed.length===0)return;
  setupCats=[];
  const basePool=mode==='review'?QB.filter(q=>st.failed.includes(q.id)):QB;
  const maxQ=basePool.length;
  const defQ=Math.min(40,maxQ);
  const cats=allCats();

  const catChips=mode==='review'?'':`
    <div style="margin-top:16px">
      <p class="slabel">Filtrar por categoría <span style="font-size:10px;color:var(--text-muted);text-transform:none;letter-spacing:0;font-family:var(--sans)">(vacío = todas)</span></p>
      <div class="cat-chips" id="cat-chips">
        ${cats.map(c=>`<button class="cat-chip" onclick="toggleCat('${c.replace(/'/g,"\\'")}',${maxQ})" id="chip-${c.replace(/[^a-z0-9]/gi,'_')}">${c}</button>`).join('')}
      </div>
    </div>`;

  const timerSection=mode==='test'?`
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <p class="slabel">Temporizador <span style="font-size:10px;color:var(--text-muted);text-transform:none;letter-spacing:0;font-family:var(--sans)">(opcional)</span></p>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--text-dim)">
      <input type="checkbox" id="use-timer" style="width:16px;height:16px;accent-color:var(--accent)">
      Activar temporizador
    </label>
    <div id="timer-custom" class="hidden" style="margin-top:10px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim)">
      Duración:
      <input id="timer-min" type="number" value="180" min="5" max="360"
        style="width:70px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border-md);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:14px;outline:none"> min
      <span style="font-size:11px;color:var(--text-muted)">(examen real Microsoft = 180 min)</span>
    </div>`:'';

  const modeLabel={test:'Test',study:'Estudio',review:'Repasar fallos'}[mode];
  const modeDesc={
    test:'Las respuestas se muestran al finalizar. Puedes ver la solución en cualquier momento pulsando "Ver respuesta".',
    study:'Feedback inmediato tras cada respuesta. Explicaciones visibles al instante.',
    review:`Repaso de tus ${st.failed.length} preguntas falladas con feedback inmediato.`
  }[mode];

  $('vs').innerHTML=`
    <button class="btn btn-sm" onclick="home()" style="margin-bottom:1.25rem">← Volver</button>
    <p class="slabel">${modeLabel}</p>
    <div class="card">
      <div class="alert alert-info" style="margin-bottom:14px">ℹ️ ${modeDesc}</div>
      <p class="slabel">Número de preguntas &nbsp;<span id="pool-info" style="font-size:10px;color:var(--text-muted);text-transform:none;letter-spacing:0;font-family:var(--sans)">(disponibles: ${maxQ})</span></p>
      <div class="num-wrap">
        <button class="num-btn" onclick="chg(-1)">−</button>
        <input class="num-in" type="number" id="qnum" value="${defQ}" min="1" max="${maxQ}" oninput="clamp()">
        <button class="num-btn" onclick="chg(1)">+</button>
      </div>
      <div class="presets">
        ${[10,20,40,60,80].filter(n=>n<maxQ).map(n=>`<button class="pre-btn" onclick="setN(${n})">${n}</button>`).join('')}
        <button class="pre-btn" onclick="setN(${maxQ})">Todas (${maxQ})</button>
      </div>
      ${catChips}
      ${timerSection}
    </div>
    <button class="btn btn-p" onclick="launch('${mode}')">Comenzar →</button>`;
  showV('s');
  if(mode==='test'){
    const cb=$('use-timer');
    if(cb)cb.addEventListener('change',()=>$('timer-custom').classList.toggle('hidden',!cb.checked));
  }
  highlightPre(defQ);
}

function toggleCat(cat,maxFull){
  const idx=setupCats.indexOf(cat);
  if(idx>-1)setupCats.splice(idx,1);else setupCats.push(cat);
  allCats().forEach(c=>{const chip=$('chip-'+c.replace(/[^a-z0-9]/gi,'_'));if(chip)chip.classList.toggle('active',setupCats.includes(c));});
  const avail=setupCats.length>0?QB.filter(q=>setupCats.includes(q.cat)).length:maxFull;
  $('pool-info').textContent=`(disponibles: ${avail})`;
  $('qnum').max=avail;
  if(parseInt($('qnum').value)>avail)$('qnum').value=avail;
  highlightPre(parseInt($('qnum').value));
}
function chg(d){const el=$('qnum'),max=parseInt(el.max);el.value=Math.min(max,Math.max(1,(parseInt(el.value)||1)+d));highlightPre(parseInt(el.value));}
function setN(n){const max=parseInt($('qnum').max);$('qnum').value=Math.min(max,n);highlightPre(Math.min(max,n));}
function clamp(){const el=$('qnum'),max=parseInt(el.max);if(parseInt(el.value)>max)el.value=max;if(parseInt(el.value)<1)el.value=1;highlightPre(parseInt(el.value));}
function highlightPre(n){document.querySelectorAll('.pre-btn').forEach(b=>{const v=parseInt(b.textContent.match(/\d+/)?.[0]);b.classList.toggle('active',v===n);});}

function launch(mode){
  const max=parseInt($('qnum').max)||QB.length;
  const n=Math.min(max,Math.max(1,parseInt($('qnum').value)||40));
  let tl=0;
  if(mode==='test'){const cb=$('use-timer');if(cb&&cb.checked)tl=(parseInt($('timer-min')?.value)||180)*60;}
  startExam(n,mode,tl);
}

// ═══════════════════════════════════════════════════════════════
// EXAM ENGINE
// ═══════════════════════════════════════════════════════════════
function startExam(count,mode,tl=0){
  let pool;
  if(mode==='review')pool=shuffle(QB.filter(q=>st.failed.includes(q.id))).slice(0,count);
  else if(setupCats.length>0)pool=shuffle(QB.filter(q=>setupCats.includes(q.cat))).slice(0,count);
  else pool=shuffle(QB).slice(0,count);

  ex={
    qs:pool,cur:0,
    ans:new Array(pool.length).fill(null),
    confirmed:new Array(pool.length).fill(false),
    peeks:new Array(pool.length).fill(false),
    flagged:new Array(pool.length).fill(false),
    ddState:pool.map(q=>q.type==='dd'?{slots:new Array(q.ans.length).fill(null),sel:null}:null),
    dropSels:pool.map(q=>q.type==='drop'?new Array(q.dropdowns.length).fill(null):null),
    mode,ti:null,tl,
    sc:0,si:0,
    startTime:Date.now(),
    qTimes:new Array(pool.length).fill(0),
    qStart:Date.now()
  };
  showV('e');
  if(tl>0){ex.ti=setInterval(()=>{ex.tl--;updTimer();if(ex.tl<=0){clearInterval(ex.ti);finish(true);}},1000);}
  renderQ();
}

function renderQ(){
  const q=ex.qs[ex.cur];
  if(q.type==='dd')return renderDDQ();
  if(q.type==='hs')return renderHSQ();
  if(q.type==='img')return renderImgQ();
  if(q.type==='drop')return renderDropQ();

  const tot=ex.qs.length,pct=Math.round((ex.cur/tot)*100);
  const L=['A','B','C','D','E'];
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const isMulti=Array.isArray(q.ans);
  const confirmed=ex.confirmed[ex.cur];
  // For multi: answered = confirmed. For single: answered = ans not null.
  const answered=isMulti?confirmed:(ex.ans[ex.cur]!==null);
  const pendingMulti=isMulti&&Array.isArray(ex.ans[ex.cur])?ex.ans[ex.cur]:[];
  const peeked=ex.peeks[ex.cur];
  const done=answered||peeked;

  // top right: timer or mode badge
  const modeTag={test:'<span class="badge b-red">Test</span>',study:'<span class="badge b-blue">Estudio</span>',review:'<span class="badge b-amber">Repaso</span>'}[ex.mode];
  const topRight=ex.tl>0?`<span id="etimer" class="timer">${fmt(ex.tl)}</span>`:modeTag;

  // DOT navigation (scrollable)
  const dots=ex.qs.map((_,i)=>{
    const qi=ex.qs[i];
    const isAnsweredI=isQAnswered(i);
    const isMultiI=Array.isArray(qi.ans);
    const isPartialI=isMultiI&&Array.isArray(ex.ans[i])&&ex.ans[i].length>0&&!ex.confirmed[i];
    let bg='var(--surface3)',w='16px';
    if(isAnsweredI){
      if(isStudy)bg=isCorrect(ex.ans[i],qi)?'var(--green)':'var(--red)';
      else bg='var(--accent-dim)';
    } else if(isPartialI){
      bg='rgba(245,158,11,0.45)';
    } else if(ex.peeks[i]){
      bg='var(--amber)';
    }
    if(ex.flagged[i])bg='var(--amber)';
    if(i===ex.cur){
      bg=isStudy?(answered?(isCorrect(ex.ans[i],qi)?'var(--green)':'var(--red)'):'var(--accent)'):'var(--accent)';
      w='26px';
    }
    return `<button onclick="goQ(${i})" title="Q${i+1}" class="dot-q" style="width:${w};background:${bg}"></button>`;
  }).join('');

  // unanswered count warning in test mode
  const unanswered=ex.qs.filter((_,i)=>!isQAnswered(i)).length;
  const unanswWarn=!isStudy&&unanswered>0&&ex.cur===ex.qs.length-1
    ?`<div class="alert alert-warn" style="margin-bottom:10px">⚠️ Tienes ${unanswered} pregunta${unanswered>1?'s':''} sin responder. Puedes volver atrás antes de finalizar.</div>`:'';

  // Multi-select hint
  const multiHint=isMulti
    ?`<div style="font-size:11px;color:var(--amber);margin-bottom:8px;font-family:var(--mono);padding:6px 10px;background:var(--amber-dim);border:1px solid var(--amber-b);border-radius:6px">▣ SELECCIÓN MÚLTIPLE — Elige ${q.ans.length} opciones</div>`
    :'';

  // Options rendering
  const optHTML=q.opts.map((opt,i)=>{
    let cls='';
    const isDisabled=peeked||(answered&&(isStudy||isMulti));
    if(peeked){
      if(isMulti?q.ans.includes(i):(i===q.ans))cls='reveal-c';
    } else if(answered){
      if(isStudy||isMulti){
        if(isMulti?q.ans.includes(i):(i===q.ans))cls='correct';
        else if(isMulti?pendingMulti.includes(i):(i===ex.ans[ex.cur]))cls='wrong';
      } else {
        // test mode single: show selection, allow change
        if(i===ex.ans[ex.cur])cls='selected-pending';
      }
    } else {
      // not yet answered
      if(isMulti&&pendingMulti.includes(i))cls='selected-pending';
      else if(!isMulti&&i===ex.ans[ex.cur])cls='selected-pending';
    }
    const clickFn=isMulti?`pickMulti(${i})`:`pick(${i})`;
    // checkbox icon for multi, letter for single
    const label=isMulti
      ?`<span class="opt-l" style="${pendingMulti.includes(i)||((answered||peeked)&&(q.ans.includes(i)))?' border-radius:4px;':'border-radius:50%;'}">
          ${(answered&&q.ans.includes(i))||(!answered&&!peeked&&pendingMulti.includes(i))?'✓':L[i]}
        </span>`
      :`<span class="opt-l">${L[i]}</span>`;
    return `<button class="opt ${cls}" onclick="${clickFn}" ${isDisabled?'disabled':''}>
      ${label}<span>${opt}</span>
    </button>`;
  }).join('');

  // Confirm button for multi-select
  let confirmBtn='';
  if(isMulti&&!answered&&!peeked){
    const needed=q.ans.length;
    const sel=pendingMulti.length;
    confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmMulti()" ${sel===0?'disabled':''}>
      Confirmar selección (${sel}/${needed} elegidas)
    </button>`;
  }

  // Explanation
  let expHTML='';
  if(peeked){
    const corrLabel=isMulti?q.ans.map(a=>q.opts[a]).join(' + '):q.opts[q.ans];
    expHTML=`<div class="exp" style="border-left-color:var(--amber)">
      <span class="verd vpeek">👁 RESPUESTA REVELADA — ${corrLabel}</span>
      ${q.exp||'Sin explicación disponible.'}
    </div>`;
  } else if(answered&&isStudy){
    const ok=isCorrect(ex.ans[ex.cur],q);
    const corrLabel=isMulti?q.ans.map(a=>L[a]+'. '+q.opts[a]).join(' + '):(L[q.ans]+'. '+q.opts[q.ans]);
    expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}">
      <span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'} — ${isMulti?'Respuestas correctas':'Respuesta'}: ${corrLabel}</span>
      ${q.exp||'Sin explicación disponible.'}
    </div>`;
  } else if(answered&&!isStudy){
    expHTML=`<div class="exp" style="border-left-color:var(--accent)">
      <span class="verd" style="color:var(--accent)">✓ Respuesta guardada — la corrección se mostrará al finalizar.</span>
    </div>`;
  }

  // Nav buttons
  const isLast=ex.cur===tot-1;
  const prevBtn=ex.cur>0?`<button class="btn btn-sm" onclick="goQ(${ex.cur-1})">← Ant.</button>`:'';

  let navHTML='';
  if(done){
    navHTML=`<div class="nav-row">
      ${prevBtn}
      <button class="btn btn-p" style="flex:1" onclick="${isLast?'askFinish()':'goQ('+(ex.cur+1)+')'}">${isLast?'Finalizar →':'Siguiente →'}</button>
    </div>`;
  } else if(!isStudy){
    navHTML=`<div class="nav-row">
      ${prevBtn}
      ${!isLast?`<button class="btn btn-sm" onclick="goQ(${ex.cur+1})">Omitir →</button>`:''}
      ${isLast?`<button class="btn btn-p" style="flex:1" onclick="askFinish()">Finalizar →</button>`:''}
    </div>`;
  }

  // "Ver respuesta" button
  const revBtn=!answered&&!peeked
    ?`<button class="flag-btn" onclick="peekAnswer()" style="color:var(--amber);border-color:var(--amber-b)">👁 Ver resp.</button>`:'';
  const flagCls=ex.flagged[ex.cur]?'flagged':'';
  const flagBtn=`<button class="flag-btn ${flagCls}" onclick="toggleFlag()">${ex.flagged[ex.cur]?'🚩':'🏳'} Marcar</button>`;
  const bkCls=(st.bookmarks||[]).includes(q.id)?'bookmarked':'';
  const bkBtn=`<button class="bk-btn ${bkCls}" onclick="toggleBk(${q.id})" title="Guardar">🔖</button>`;

  $('ve').innerHTML=`
    <div class="exam-top">
      <button class="btn btn-sm" onclick="askExit()">← Salir</button>
      ${topRight}
      <span class="q-counter">${ex.cur+1}/${tot}</span>
    </div>
    <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
    <div class="dots-wrap"><div class="dots-nav">${dots}</div></div>
    ${unanswWarn}
    <div class="q-meta">
      <span class="badge ${catCls(q.cat)}">${q.cat}</span>
      <div class="ctrl-row">${revBtn}${flagBtn}${bkBtn}</div>
    </div>
    <div class="qcard">${multiHint}${q.q}</div>
    ${optHTML}
    ${confirmBtn}
    <div id="exp-area">${expHTML}</div>
    ${navHTML}`;

  setTimeout(()=>{
    const wrap=$('ve')?.querySelector('.dots-wrap');
    const curDot=wrap?.querySelectorAll('.dot-q')[ex.cur];
    if(curDot&&wrap)curDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

function updTimer(){const el=$('etimer');if(!el)return;el.textContent=fmt(ex.tl);el.className='timer'+(ex.tl<300?' danger':ex.tl<600?' warning':'');}

function pickMulti(i){
  // Toggle selection for multi-select questions (before confirming)
  if(ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  ex.qTimes[ex.cur]=(Date.now()-ex.qStart)/1000;
  ex.qStart=Date.now();
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=[];
  const idx=ex.ans[ex.cur].indexOf(i);
  if(idx>-1)ex.ans[ex.cur].splice(idx,1);
  else ex.ans[ex.cur].push(i);
  renderQ();
}

function confirmMulti(){
  const q=ex.qs[ex.cur];
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=[];
  ex.confirmed[ex.cur]=true;
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const ok=isCorrect(ex.ans[ex.cur],q);
  if(ok){st.streak=(st.streak||0)+1;st.maxStreak=Math.max(st.maxStreak||0,st.streak);}
  else st.streak=0;
  if(!st.attempted.includes(q.id)){
    st.attempted.push(q.id);
    if(ok){st.correct++;ex.sc++;}
    else{st.incorrect++;ex.si++;if(!st.failed.includes(q.id))st.failed.push(q.id);}
  } else {
    if(ok){ex.sc++;const fi=st.failed.indexOf(q.id);if(fi>-1)st.failed.splice(fi,1);}
    else ex.si++;
  }
  saveSt();
  renderQ();
}

// ─── DRAG & DROP ────────────────────────────────────────────────
function renderDDQ(){
  const q=ex.qs[ex.cur],tot=ex.qs.length,pct=Math.round((ex.cur/tot)*100);
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const confirmed=ex.confirmed[ex.cur];
  const peeked=ex.peeks[ex.cur];
  const done=confirmed||peeked;
  const ds=ex.ddState[ex.cur]||(ex.ddState[ex.cur]={slots:new Array(q.ans.length).fill(null),sel:null});

  const modeTag={test:'<span class="badge b-red">Test</span>',study:'<span class="badge b-blue">Estudio</span>',review:'<span class="badge b-amber">Repaso</span>'}[ex.mode];
  const topRight=ex.tl>0?`<span id="etimer" class="timer">${fmt(ex.tl)}</span>`:modeTag;

  const dots=ex.qs.map((_,i)=>{
    const isAnsweredI=isQAnswered(i);
    let bg='var(--surface3)',w='16px';
    if(isAnsweredI){bg=isStudy?isCorrect(ex.ans[i],ex.qs[i])?'var(--green)':'var(--red)':'var(--accent-dim)';}
    else if(ex.peeks[i])bg='var(--amber)';
    if(ex.flagged[i])bg='var(--amber)';
    if(i===ex.cur){bg=isStudy?(done?isCorrect(ex.ans[i],q)?'var(--green)':'var(--red)':'var(--accent)'):'var(--accent)';w='26px';}
    return `<button onclick="goQ(${i})" title="Q${i+1}" class="dot-q" style="width:${w};background:${bg}"></button>`;
  }).join('');

  // pool: all items not yet placed in a slot (or all if peek/confirmed)
  const usedItems=ds.slots.filter(s=>s!==null);
  const poolHTML=q.items.map(item=>{
    const used=!done&&usedItems.includes(item);
    const sel=!done&&ds.sel===item;
    let cls='dd-item'+(used?' used':'')+(sel?' selected':'');
    return `<div class="${cls}" onclick="clickDDItem(${JSON.stringify(item)})">${item}</div>`;
  }).join('');

  // slots
  const slotsHTML=ds.slots.map((val,n)=>{
    let cls='dd-slot'+(val?' filled':'');
    if(done){
      const actual=confirmed?ex.ans[ex.cur][n]:null;
      const correct=peeked?q.ans[n]:actual;
      if(peeked) cls='dd-slot filled';
      else if(actual===q.ans[n])cls='dd-slot correct';
      else cls='dd-slot wrong';
    }
    const display=done?(peeked?q.ans[n]:(ex.ans[ex.cur]?.[n]||'(vacío)')):(val||'');
    const clickAttr=done?'':`onclick="clickDDSlot(${n})"`;
    return `<div class="${cls}" ${clickAttr}>
      <span class="dd-slot-label">Box ${n+1}</span>
      <span class="dd-slot-val">${display||'<span style="color:var(--text-muted);font-style:italic">Toca para colocar aquí</span>'}</span>
      ${done&&!peeked&&(ex.ans[ex.cur]?.[n]!==q.ans[n])?`<span style="font-size:11px;color:var(--green);margin-left:8px">→ ${q.ans[n]}</span>`:''}
    </div>`;
  }).join('');

  const allFilled=ds.slots.every(s=>s!==null);
  let confirmBtn='';
  if(!done){
    confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmDD()" ${allFilled?'':'disabled'}>
      Confirmar orden (${ds.slots.filter(s=>s).length}/${q.ans.length} colocados)
    </button>`;
  }

  let expHTML='';
  if(peeked){
    expHTML=`<div class="exp" style="border-left-color:var(--amber)"><span class="verd vpeek">👁 RESPUESTA REVELADA</span>${q.exp||''}</div>`;
  } else if(confirmed&&isStudy){
    const ok=isCorrect(ex.ans[ex.cur],q);
    expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}">
      <span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'}</span>${q.exp||''}
    </div>`;
  } else if(confirmed&&!isStudy){
    expHTML=`<div class="exp" style="border-left-color:var(--accent)"><span class="verd" style="color:var(--accent)">✓ Orden guardado — la corrección se mostrará al finalizar.</span></div>`;
  }

  const isLast=ex.cur===tot-1;
  const prevBtn=ex.cur>0?`<button class="btn btn-sm" onclick="goQ(${ex.cur-1})">← Ant.</button>`:'';
  let navHTML='';
  if(done){navHTML=`<div class="nav-row">${prevBtn}<button class="btn btn-p" style="flex:1" onclick="${isLast?'askFinish()':'goQ('+(ex.cur+1)+')'}">${isLast?'Finalizar →':'Siguiente →'}</button></div>`;}
  else if(!isStudy){navHTML=`<div class="nav-row">${prevBtn}${!isLast?`<button class="btn btn-sm" onclick="goQ(${ex.cur+1})">Omitir →</button>`:``}${isLast?`<button class="btn btn-p" style="flex:1" onclick="askFinish()">Finalizar →</button>`:''}</div>`;}

  const flagCls=ex.flagged[ex.cur]?'flagged':'';
  const flagBtn=`<button class="flag-btn ${flagCls}" onclick="toggleFlag()">${ex.flagged[ex.cur]?'🚩':'🏳'} Marcar</button>`;
  const bkCls=(st.bookmarks||[]).includes(q.id)?'bookmarked':'';
  const bkBtn=`<button class="bk-btn ${bkCls}" onclick="toggleBk(${q.id})" title="Guardar">🔖</button>`;
  const revBtn=!done?`<button class="flag-btn" onclick="peekAnswer()" style="color:var(--amber);border-color:var(--amber-b)">👁 Ver resp.</button>`:'';

  $('ve').innerHTML=`
    <div class="exam-top"><button class="btn btn-sm" onclick="askExit()">← Salir</button>${topRight}<span class="q-counter">${ex.cur+1}/${tot}</span></div>
    <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
    <div class="dots-wrap"><div class="dots-nav">${dots}</div></div>
    <div class="q-meta"><span class="badge ${catCls(q.cat)}">${q.cat}</span><div class="ctrl-row">${revBtn}${flagBtn}${bkBtn}</div></div>
    <div class="qcard"><div style="font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:8px;padding:5px 10px;background:rgba(99,102,241,.1);border-radius:6px;border:1px solid rgba(99,102,241,.25)">↕ DRAG & DROP — Selecciona un elemento y luego toca el Box donde colocarlo</div>${q.q}</div>
    <div class="dd-hint">Elementos disponibles:</div>
    <div class="dd-pool">${poolHTML}</div>
    <div class="dd-hint">Coloca los elementos en el orden correcto:</div>
    <div class="dd-slots">${slotsHTML}</div>
    ${confirmBtn}
    <div id="exp-area">${expHTML}</div>
    ${navHTML}`;
  setTimeout(()=>{const wrap=$('ve')?.querySelector('.dots-wrap');const curDot=wrap?.querySelectorAll('.dot-q')[ex.cur];if(curDot&&wrap)curDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
}

function clickDDItem(item){
  const ds=ex.ddState[ex.cur];
  if(!ds||ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  // If already placed in a slot, remove it
  const slotIdx=ds.slots.indexOf(item);
  if(slotIdx>-1){ds.slots[slotIdx]=null;ds.sel=item;renderDDQ();return;}
  // Toggle selection
  ds.sel=(ds.sel===item)?null:item;
  renderDDQ();
}

function clickDDSlot(n){
  const ds=ex.ddState[ex.cur];
  if(!ds||ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  if(ds.sel!==null){
    // place selected item; if slot occupied, swap back to pool
    if(ds.slots[n]!==null){const prev=ds.slots[n];ds.slots[n]=ds.sel;ds.sel=prev;}
    else{ds.slots[n]=ds.sel;ds.sel=null;}
  } else if(ds.slots[n]!==null){
    // pick up existing item
    ds.sel=ds.slots[n];ds.slots[n]=null;
  }
  renderDDQ();
}

function confirmDD(){
  const q=ex.qs[ex.cur];
  const ds=ex.ddState[ex.cur];
  if(!ds||!ds.slots.every(s=>s!==null))return;
  ex.ans[ex.cur]=[...ds.slots];
  ex.confirmed[ex.cur]=true;
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const ok=isCorrect(ex.ans[ex.cur],q);
  if(ok){st.streak=(st.streak||0)+1;st.maxStreak=Math.max(st.maxStreak||0,st.streak);}else st.streak=0;
  if(!st.attempted.includes(q.id)){
    st.attempted.push(q.id);
    if(ok){st.correct++;ex.sc++;}else{st.incorrect++;ex.si++;if(!st.failed.includes(q.id))st.failed.push(q.id);}
  } else {
    if(ok){ex.sc++;const fi=st.failed.indexOf(q.id);if(fi>-1)st.failed.splice(fi,1);}else ex.si++;
  }
  saveSt();renderDDQ();
}

// ─── HOTSPOT ────────────────────────────────────────────────────
function renderHSQ(){
  const q=ex.qs[ex.cur],tot=ex.qs.length,pct=Math.round((ex.cur/tot)*100);
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const confirmed=ex.confirmed[ex.cur];
  const peeked=ex.peeks[ex.cur];
  const done=confirmed||peeked;
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=new Array(q.statements.length).fill(null);
  const picks=ex.ans[ex.cur];

  const modeTag={test:'<span class="badge b-red">Test</span>',study:'<span class="badge b-blue">Estudio</span>',review:'<span class="badge b-amber">Repaso</span>'}[ex.mode];
  const topRight=ex.tl>0?`<span id="etimer" class="timer">${fmt(ex.tl)}</span>`:modeTag;
  const dots=ex.qs.map((_,i)=>{
    const isAnsweredI=isQAnswered(i);
    let bg='var(--surface3)',w='16px';
    if(isAnsweredI){bg=isStudy?isCorrect(ex.ans[i],ex.qs[i])?'var(--green)':'var(--red)':'var(--accent-dim)';}
    else if(ex.peeks[i])bg='var(--amber)';
    if(ex.flagged[i])bg='var(--amber)';
    if(i===ex.cur){bg=isStudy?(done?isCorrect(ex.ans[i],q)?'var(--green)':'var(--red)':'var(--accent)'):'var(--accent)';w='26px';}
    return `<button onclick="goQ(${i})" title="Q${i+1}" class="dot-q" style="width:${w};background:${bg}"></button>`;
  }).join('');

  const rows=q.statements.map((stmt,n)=>{
    const cur=picks[n];
    const ans=q.ans[n];
    const mkBtn=(val)=>{
      let cls='hs-btn';
      if(done){
        if(peeked){cls+=(val===ans)?' reveal-correct':'';}
        else{if(val===ans)cls+=' correct';else if(cur===val&&val!==ans)cls+=' wrong';}
      } else if(cur===val)cls+=' sel';
      const dis=done?'disabled':'';
      return `<button class="${cls}" onclick="clickHS(${n},'${val}')" ${dis}>${val}</button>`;
    };
    return `<tr><td>${stmt}</td><td>${mkBtn('Yes')}</td><td>${mkBtn('No')}</td></tr>`;
  }).join('');
  const tableHTML=`<table class="hs-table"><thead><tr><th style="text-align:left">Afirmación</th><th>Yes</th><th>No</th></tr></thead><tbody>${rows}</tbody></table>`;

  const allPicked=picks.every(p=>p!==null);
  let confirmBtn='';
  if(!done)confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmHS()" ${allPicked?'':'disabled'}>Confirmar respuestas (${picks.filter(p=>p).length}/${q.statements.length})</button>`;

  let expHTML='';
  if(peeked){expHTML=`<div class="exp" style="border-left-color:var(--amber)"><span class="verd vpeek">👁 RESPUESTA REVELADA</span>${q.exp||''}</div>`;}
  else if(confirmed&&isStudy){
    const ok=isCorrect(ex.ans[ex.cur],q);
    expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}"><span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'}</span>${q.exp||''}</div>`;
  } else if(confirmed&&!isStudy){
    expHTML=`<div class="exp" style="border-left-color:var(--accent)"><span class="verd" style="color:var(--accent)">✓ Respuestas guardadas.</span></div>`;
  }

  const isLast=ex.cur===tot-1;
  const prevBtn=ex.cur>0?`<button class="btn btn-sm" onclick="goQ(${ex.cur-1})">← Ant.</button>`:'';
  let navHTML='';
  if(done){navHTML=`<div class="nav-row">${prevBtn}<button class="btn btn-p" style="flex:1" onclick="${isLast?'askFinish()':'goQ('+(ex.cur+1)+')'}">${isLast?'Finalizar →':'Siguiente →'}</button></div>`;}
  else if(!isStudy){navHTML=`<div class="nav-row">${prevBtn}${!isLast?`<button class="btn btn-sm" onclick="goQ(${ex.cur+1})">Omitir →</button>`:``}${isLast?`<button class="btn btn-p" style="flex:1" onclick="askFinish()">Finalizar →</button>`:''}</div>`;}

  const flagCls=ex.flagged[ex.cur]?'flagged':'';
  const flagBtn=`<button class="flag-btn ${flagCls}" onclick="toggleFlag()">${ex.flagged[ex.cur]?'🚩':'🏳'} Marcar</button>`;
  const bkCls=(st.bookmarks||[]).includes(q.id)?'bookmarked':'';
  const bkBtn=`<button class="bk-btn ${bkCls}" onclick="toggleBk(${q.id})" title="Guardar">🔖</button>`;
  const revBtn=!done?`<button class="flag-btn" onclick="peekAnswer()" style="color:var(--amber);border-color:var(--amber-b)">👁 Ver resp.</button>`:'';

  $('ve').innerHTML=`
    <div class="exam-top"><button class="btn btn-sm" onclick="askExit()">← Salir</button>${topRight}<span class="q-counter">${ex.cur+1}/${tot}</span></div>
    <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
    <div class="dots-wrap"><div class="dots-nav">${dots}</div></div>
    <div class="q-meta"><span class="badge ${catCls(q.cat)}">${q.cat}</span><div class="ctrl-row">${revBtn}${flagBtn}${bkBtn}</div></div>
    <div class="qcard"><div style="font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:8px;padding:5px 10px;background:rgba(99,102,241,.1);border-radius:6px;border:1px solid rgba(99,102,241,.25)">☑ HOTSPOT — Selecciona Yes o No para cada afirmación</div>${q.q}</div>
    ${tableHTML}
    ${confirmBtn}
    <div id="exp-area">${expHTML}</div>
    ${navHTML}`;
  setTimeout(()=>{const wrap=$('ve')?.querySelector('.dots-wrap');const curDot=wrap?.querySelectorAll('.dot-q')[ex.cur];if(curDot&&wrap)curDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
}

function clickHS(n,val){
  if(ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=new Array(ex.qs[ex.cur].statements.length).fill(null);
  ex.ans[ex.cur][n]=(ex.ans[ex.cur][n]===val)?null:val;
  renderHSQ();
}

function confirmHS(){
  const q=ex.qs[ex.cur];
  if(!Array.isArray(ex.ans[ex.cur])||ex.ans[ex.cur].some(p=>p===null))return;
  ex.confirmed[ex.cur]=true;
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const ok=isCorrect(ex.ans[ex.cur],q);
  if(ok){st.streak=(st.streak||0)+1;st.maxStreak=Math.max(st.maxStreak||0,st.streak);}else st.streak=0;
  if(!st.attempted.includes(q.id)){
    st.attempted.push(q.id);
    if(ok){st.correct++;ex.sc++;}else{st.incorrect++;ex.si++;if(!st.failed.includes(q.id))st.failed.push(q.id);}
  } else {
    if(ok){ex.sc++;const fi=st.failed.indexOf(q.id);if(fi>-1)st.failed.splice(fi,1);}else ex.si++;
  }
  saveSt();renderHSQ();
}

    <div class="q-meta"><span class="badge ${catCls(q.cat)}">${q.cat}</span><div class="ctrl-row">${flagBtn}${bkBtn}</div></div>
    <div class="qcard"><div style="font-size:11px;color:var(--amber);font-family:var(--mono);margin-bottom:8px;padding:5px 10px;background:rgba(245,158,11,.08);border-radius:6px;border:1px solid rgba(245,158,11,.25)">☑ HOTSPOT — Elige la opción correcta para cada desplegable, luego verifica</div>${q.q}</div>
    ${bottomHTML}`;
  setTimeout(()=>{const wrap=$('ve')?.querySelector('.dots-wrap');const curDot=wrap?.querySelectorAll('.dot-q')[ex.cur];if(curDot&&wrap)curDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
}

function dropPick(groupIdx,optionIdx){
  if(!ex.dropSels[ex.cur])ex.dropSels[ex.cur]=new Array(ex.qs[ex.cur].dropdowns.length).fill(null);
  ex.dropSels[ex.cur][groupIdx]=optionIdx;
  renderDropQ();
}

function dropSubmit(){
  // Phase 1→2: reveal answer image, wait for self-rating
  ex.peeks[ex.cur]=true;
  renderDropQ();
}

function dropSelfRate(knew){
  // Phase 2→3
  ex.confirmed[ex.cur]=true;
  ex.ans[ex.cur]=knew;
  const q=ex.qs[ex.cur];
  if(!st.attempted.includes(q.id)){
    st.attempted.push(q.id);
    if(knew){st.correct++;ex.sc++;}
    else{st.incorrect++;ex.si++;if(!st.failed.includes(q.id))st.failed.push(q.id);}
  }
  saveSt();renderDropQ();
}

// ────────────────────────────────────────────────────────────────
function pick(i){
  const now=Date.now();
  ex.qTimes[ex.cur]=(now-ex.qStart)/1000;
  ex.qStart=now;

  const q=ex.qs[ex.cur];
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const prevAns=ex.ans[ex.cur];

  // In test mode, allow changing answer without re-counting stats
  if(!isStudy&&prevAns!==null){
    ex.ans[ex.cur]=i;
    renderQ();
    return;
  }

  const ok=i===q.ans;
  ex.ans[ex.cur]=i;

  if(ok){st.streak=(st.streak||0)+1;st.maxStreak=Math.max(st.maxStreak||0,st.streak);}
  else st.streak=0;

  if(!st.attempted.includes(q.id)){
    st.attempted.push(q.id);
    if(ok){st.correct++;ex.sc++;}
    else{st.incorrect++;ex.si++;if(!st.failed.includes(q.id))st.failed.push(q.id);}
  } else {
    if(ok){ex.sc++;const fi=st.failed.indexOf(q.id);if(fi>-1)st.failed.splice(fi,1);}
    else ex.si++;
  }
  saveSt();
  renderQ();
}

function peekAnswer(){
  ex.peeks[ex.cur]=true;
  renderQ();
}

function toggleFlag(){ex.flagged[ex.cur]=!ex.flagged[ex.cur];renderQ();}

function toggleBk(id){
  if(!st.bookmarks)st.bookmarks=[];
  const i=st.bookmarks.indexOf(id);
  if(i>-1)st.bookmarks.splice(i,1);else st.bookmarks.push(id);
  saveSt();renderQ();
}

function goQ(i){
  // record time on current question before leaving
  ex.qTimes[ex.cur]=(Date.now()-ex.qStart)/1000;
  ex.qStart=Date.now();
  ex.cur=i;
  renderQ();
}

// ═══════════════════════════════════════════════════════════════
// ASK FINISH (warn about unanswered)
// ═══════════════════════════════════════════════════════════════
function askFinish(){
  const unanswered=ex.qs.filter((_,i)=>!isQAnswered(i)).length;
  if(unanswered>0&&ex.mode==='test'){
    const firstUn=ex.qs.findIndex((_,i)=>!isQAnswered(i));
    modal(
      `${unanswered} pregunta${unanswered>1?'s':''} sin responder`,
      `Aún tienes ${unanswered} pregunta${unanswered>1?'s':''} sin contestar. ¿Quieres volver a responderlas o finalizar igualmente?`,
      [
        {l:'Volver a Q'+(firstUn+1),c:'btn btn-p',a:`cm();goQ(${firstUn})`},
        {l:'Finalizar igualmente',c:'btn btn-d',a:'cm();finish(false)'}
      ]
    );
  } else {
    finish(false);
  }
}

// ═══════════════════════════════════════════════════════════════
// FINISH
// ═══════════════════════════════════════════════════════════════
function finish(timeout=false){
  if(ex.ti)clearInterval(ex.ti);
  // record last question time
  ex.qTimes[ex.cur]=(Date.now()-ex.qStart)/1000;

  const tot=ex.qs.length;
  const correct=ex.ans.filter((a,i)=>isCorrect(a,ex.qs[i])).length;
  const answered=ex.qs.filter((_,i)=>isQAnswered(i)).length;
  const unanswered=tot-answered;
  const pct=tot>0?Math.round((correct/tot)*100):0;
  const elapsed=Math.round((Date.now()-ex.startTime)/1000);
  const peekCount=ex.peeks.filter(Boolean).length;

  // Save history
  if(!st.history)st.history=[];
  st.history.push({ts:Date.now(),correct,total:tot,pct,mode:ex.mode,elapsed});
  if(st.history.length>30)st.history=st.history.slice(-30);
  saveSt();

  let sc='var(--red)',grd='b-red',grtxt='Necesita mejorar';
  if(pct>=80){sc='var(--green)';grd='b-green';grtxt='Excelente';}
  else if(pct>=70){sc='var(--amber)';grd='b-amber';grtxt='Aprobado borderline';}

  // Category breakdown sorted worst→best
  const catStats={};
  ex.qs.forEach((q,i)=>{
    if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};
    catStats[q.cat].t++;
    if(isCorrect(ex.ans[i],q))catStats[q.cat].c++;
  });
  const catBreak=Object.entries(catStats)
    .sort((a,b)=>a[1].c/a[1].t - b[1].c/b[1].t)
    .map(([cat,{c,t}])=>{
      const p=Math.round((c/t)*100);
      const col=p>=80?'var(--green)':p>=70?'var(--amber)':'var(--red)';
      return `<div class="cat-row">
        <span class="badge ${catCls(cat)}" style="font-size:9px">${cat}</span>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <div class="cat-bar-out"><div class="cat-bar-in" style="width:${p}%;background:${col}"></div></div>
          <span style="font-family:var(--mono);font-size:11px;color:${col};min-width:36px;text-align:right">${p}%</span>
          <span style="font-size:11px;color:var(--text-muted)">${c}/${t}</span>
        </div>
      </div>`;
    }).join('');

  // slowest 3 questions
  const slowest=[...ex.qTimes.map((t,i)=>({i,t,q:ex.qs[i]}))].sort((a,b)=>b.t-a.t).slice(0,3).filter(x=>x.t>15);
  const slowHTML=slowest.length>0?`
    <div class="card">
      <div class="card-title">⏱ Preguntas que más te costaron</div>
      ${slowest.map(({i,t,q})=>`<div class="res-row" style="cursor:default">
        <span class="res-q">${q.q.substring(0,70)}…</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--amber);flex-shrink:0">${fmtSecs(Math.round(t))}</span>
      </div>`).join('')}
    </div>`:'';

  // Question review rows
  const rows=ex.qs.map((q,i)=>{
    const a=ex.ans[i],pk=ex.peeks[i];
    const L=['A','B','C','D','E'];
    const isMultiQ=Array.isArray(q.ans)&&q.type!=='dd'&&q.type!=='hs';
    const ok=isCorrect(a,q);
    const unansweredQ=!isQAnswered(i);
    let yourAns,corrAns;
    if(q.type==='img'||q.type==='drop'){
      yourAns=unansweredQ?'(Sin responder)':a===1?'✓ Lo sabía':'✗ No lo sabía';
      corrAns='(ver imagen de respuesta)';
    } else if(q.type==='dd'){
      yourAns=unansweredQ?'(Sin responder)':(a||[]).map((v,n)=>`Box ${n+1}: ${v||'?'}`).join(' | ');
      corrAns=q.ans.map((v,n)=>`Box ${n+1}: ${v}`).join(' | ');
    } else if(q.type==='hs'){
      yourAns=unansweredQ?'(Sin responder)':(a||[]).map((v,n)=>`${q.statements[n].substring(0,30)}…: ${v||'?'}`).join(' | ');
      corrAns=q.ans.map((v,n)=>`Afirm. ${n+1}: ${v}`).join(' | ');
    } else if(isMultiQ){
      yourAns=unansweredQ?'(Sin responder)':a.map(x=>L[x]+'. '+q.opts[x]).join(' + ');
      corrAns=q.ans.map(x=>L[x]+'. '+q.opts[x]).join(' + ');
    } else {
      yourAns=unansweredQ?'(Sin responder)':(L[a]+'. '+q.opts[a]);
      corrAns=(L[q.ans]+'. '+q.opts[q.ans]);
    }
    let rightBadge='';
    if(ok)rightBadge=`<span class="badge b-green">OK</span>`;
    else if(unansweredQ)rightBadge=`<span class="badge b-amber">—</span>`;
    else rightBadge=`<span class="badge b-red">FAIL</span>`;
    return `<div class="res-row" onclick="togDetail('rd${i}')">
      <div class="res-q">
        <div style="margin-bottom:3px;display:flex;gap:6px;flex-wrap:wrap">
          <span class="badge ${catCls(q.cat)}" style="font-size:9px">${q.cat}</span>
          ${pk?'<span class="badge b-amber" style="font-size:9px">👁 PEEK</span>':''}
          ${ex.flagged[i]?'<span style="font-size:10px">🚩</span>':''}
        </div>
        <div>${q.q.length>100?q.q.substring(0,100)+'…':q.q}</div>
        <div class="res-detail" id="rd${i}">
          <div style="margin-bottom:6px">
            <span style="color:var(--text-muted);font-size:10px;font-family:var(--mono);text-transform:uppercase">Tu respuesta:</span><br>
            <span style="color:${ok?'var(--green)':unansweredQ?'var(--amber)':'var(--red)'}">${yourAns}</span>
          </div>
          ${!ok?`<div style="margin-bottom:8px">
            <span style="color:var(--text-muted);font-size:10px;font-family:var(--mono);text-transform:uppercase">Respuesta correcta:</span><br>
            <span style="color:var(--green)">${corrAns}</span>
          </div>`:''}
          <div>${q.exp||'Sin explicación disponible.'}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">${rightBadge}</div>
    </div>`;
  }).join('');

  const warns=[
    timeout?`<div class="alert alert-danger">⏱ El tiempo se agotó</div>`:'',
    unanswered>0?`<div class="alert alert-warn">⚠️ ${unanswered} pregunta${unanswered>1?'s':''} sin responder (cuentan como incorrectas)</div>`:'',
    peekCount>0?`<div class="alert alert-info">👁 Revelaste la respuesta en ${peekCount} pregunta${peekCount>1?'s':''} sin contestar (PEEK)</div>`:''
  ].join('');

  $('vr').innerHTML=`
    <div class="res-score">
      <p style="font-size:10px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px">Resultado final</p>
      <div class="res-pct" style="color:${sc}">${pct}%</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap">
        <span class="badge ${grd}" style="font-size:12px;padding:5px 14px">${grtxt}</span>
        <span class="badge b-blue" style="font-size:12px;padding:5px 14px">⏱ ${fmtSecs(elapsed)}</span>
        ${st.streak>=3?`<span class="badge b-amber" style="font-size:12px;padding:5px 14px">🔥 Racha ${st.streak}</span>`:''}
      </div>
    </div>
    <div class="g3" style="margin-bottom:12px">
      <div class="metric"><div class="metric-label">Correctas</div><div class="metric-value" style="color:var(--green)">${correct}</div></div>
      <div class="metric"><div class="metric-label">Incorrectas</div><div class="metric-value" style="color:var(--red)">${answered-correct}</div></div>
      <div class="metric"><div class="metric-label">Sin resp.</div><div class="metric-value" style="color:var(--text-muted)">${unanswered}</div></div>
    </div>
    ${warns}
    <div class="card"><div class="card-title">Resultado por categoría (peor → mejor)</div>${catBreak}</div>
    ${slowHTML}
    <div class="card">
      <p class="card-title">Revisión completa — pulsa para ver explicación</p>
      ${rows}
    </div>
    <div class="btn-group" style="margin-top:12px">
      <button class="btn btn-p" onclick="home()">← Volver al inicio</button>
      <button class="btn btn-a" onclick="setup('review')" ${st.failed.length===0?'disabled':''}>🔁 Repasar fallos (${st.failed.length})</button>
    </div>`;
  showV('r');
}
function togDetail(id){const el=$(id);if(el)el.classList.toggle('open');}

// ═══════════════════════════════════════════════════════════════
// FLASHCARDS
// ═══════════════════════════════════════════════════════════════
function goFlashcards(){
  const fail=st.failed.length;
  const notTried=QB.filter(q=>!st.attempted.includes(q.id)).length;
  $('vf').innerHTML=`
    <button class="btn btn-sm" onclick="home()" style="margin-bottom:1.25rem">← Volver</button>
    <p class="slabel">Flashcards</p>
    <div class="card">
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.6">Lee la pregunta, piensa la respuesta y voltea la tarjeta. Marca si la sabías o no para rastrear tu progreso.</p>
      <p class="slabel">Modo</p>
      <select id="fc-mode" style="width:100%;padding:10px 14px;border:1px solid var(--border-md);border-radius:var(--r);background:var(--surface2);color:var(--text);font-size:14px;font-family:var(--sans);outline:none;margin-bottom:14px">
        <option value="all">Todas las preguntas (${QB.length})</option>

      <div class="num-wrap">
        <button class="num-btn" onclick="chgFC(-1)">−</button>
        <input class="num-in" type="number" id="fcnum" value="20" min="5" max="${QB.length}" oninput="clampFC()">
        <button class="num-btn" onclick="chgFC(1)">+</button>
      </div>
      <div class="presets" style="margin-top:10px">
        ${[10,20,30,50].map(n=>`<button class="pre-btn" onclick="setFC(${n})">${n}</button>`).join('')}
        <button class="pre-btn" onclick="setFC(${QB.length})">Todas</button>
      </div>
    </div>
    <button class="btn btn-p" onclick="startFC()">Empezar →</button>`;
  showV('f');
}
function chgFC(d){const el=$('fcnum');el.value=Math.min(QB.length,Math.max(5,(parseInt(el.value)||20)+d));}
function setFC(n){$('fcnum').value=n;}
function clampFC(){const el=$('fcnum');if(parseInt(el.value)>QB.length)el.value=QB.length;if(parseInt(el.value)<1)el.value=1;}

function startFC(){
  const n=Math.min(QB.length,Math.max(1,parseInt($('fcnum').value)||20));
  const mode=$('fc-mode').value;
  let pool=QB;
  if(mode==='failed')pool=QB.filter(q=>st.failed.includes(q.id));
  else if(mode==='new')pool=QB.filter(q=>!st.attempted.includes(q.id));
  else if(mode==='bookmarks')pool=QB.filter(q=>(st.bookmarks||[]).includes(q.id));
  pool=shuffle(pool).slice(0,n);
  if(pool.length===0){alert('No hay preguntas disponibles para este modo.');return;}
  fc={qs:pool,cur:0,known:new Set(),unknown:new Set()};
  renderFC();
}

function renderFC(){
  const q=fc.qs[fc.cur];
  const tot=fc.qs.length;
  const L=['A','B','C','D','E'];
  const corrOpt=L[q.ans]+'. '+q.opts[q.ans];
  const k=fc.known.size,u=fc.unknown.size,rem=tot-k-u;
  const pct=tot>0?Math.round((k/tot)*100):0;

  const dots=fc.qs.map((_,i)=>{
    let cls='';
    if(fc.known.has(i))cls='k';
    else if(fc.unknown.has(i))cls='u';
    else if(i===fc.cur)cls='c';
    return `<span class="fc-dot ${cls}"></span>`;
  }).join('');

  $('vf').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-top:.25rem">
      <button class="btn btn-sm" onclick="goFlashcards()">← Config.</button>
      <div style="display:flex;gap:12px;font-size:13px">
        <span style="color:var(--green)">✓ ${k}</span>
        <span style="color:var(--red)">✗ ${u}</span>
        <span style="color:var(--text-muted)">⋯ ${rem}</span>
      </div>
      <span class="q-counter">${fc.cur+1}/${tot}</span>
    </div>
    <div style="margin-bottom:6px">
      <div class="r-bar"><div class="r-fill" style="width:${pct}%;background:var(--green)"></div></div>
      <div style="font-size:11px;color:var(--text-muted);text-align:right;margin-top:3px;font-family:var(--mono)">${pct}% conocidas</div>
    </div>
    <div class="fc-dots">${dots}</div>
    <div class="flashcard" id="fc-card" onclick="flipFC()">
      <div class="fc-inner">
        <div class="fc-front">
          <span class="fc-hint">toca para ver la respuesta</span>
          <p style="font-size:14px;line-height:1.7">${q.q}</p>
          <span class="badge ${catCls(q.cat)}" style="font-size:9px">${q.cat}</span>
        </div>
        <div class="fc-back">
          <span class="fc-hint" style="color:var(--green)">Respuesta correcta</span>
          <p style="font-size:16px;font-weight:500;color:var(--green)">${corrOpt}</p>
          <p style="font-size:12px;color:var(--text-dim);line-height:1.6;max-height:110px;overflow-y:auto;text-align:left">${(q.exp||'').substring(0,220)}${(q.exp||'').length>220?'…':''}</p>
        </div>
      </div>
    </div>
    <div id="fc-btns" class="hidden">
      <div class="g2">
        <button class="btn btn-d" onclick="fcAns(false)">✗ No lo sabía</button>
        <button class="btn btn-g" onclick="fcAns(true)">✓ Lo sabía</button>
      </div>
    </div>`;
  showV('f');
}

function flipFC(){
  const c=$('fc-card');
  c.classList.toggle('flipped');
  if(c.classList.contains('flipped'))$('fc-btns').classList.remove('hidden');
}
function fcAns(known){
  if(known)fc.known.add(fc.cur);else fc.unknown.add(fc.cur);
  const next=fc.cur+1;
  if(next>=fc.qs.length){
    const k=fc.known.size,u=fc.unknown.size;
    const pct=Math.round((k/(k+u||1))*100);
    $('vf').innerHTML=`
      <div style="text-align:center;padding:2.5rem 0 1rem">
        <div style="font-size:64px;font-weight:600;font-family:var(--mono);color:var(--green);margin-bottom:8px">${pct}%</div>
        <div style="display:flex;gap:16px;justify-content:center;font-size:14px;margin-bottom:1.5rem">
          <span style="color:var(--green)">✓ ${k} sabías</span>
          <span style="color:var(--red)">✗ ${u} no sabías</span>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-p" onclick="home()">← Inicio</button>
        <button class="btn" onclick="startFC()">🔁 Repetir mismas</button>
        <button class="btn btn-a" onclick="setup('review')" ${st.failed.length===0?'disabled':''}>📝 Repasar fallos (${st.failed.length})</button>
      </div>`;
    showV('f');
    return;
  }
  fc.cur=next;
  renderFC();
}

// ═══════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════
function goHistory(){
  const hist=(st.history||[]).slice().reverse();
  if(hist.length===0){
    $('vhist').innerHTML=`
      <button class="btn btn-sm" onclick="home()" style="margin-bottom:1.25rem">← Volver</button>
      <div style="text-align:center;padding:3rem 0;color:var(--text-muted)">
        <div style="font-size:40px;margin-bottom:12px">📊</div>
        <p>Aún no hay sesiones registradas.<br>Completa un test para ver tu historial.</p>
      </div>`;
    showV('hist');
    return;
  }
  const avg=Math.round(hist.reduce((a,h)=>a+h.pct,0)/hist.length);
  const best=Math.max(...hist.map(h=>h.pct));
  const trend=hist.length>=3
    ?(hist[0].pct>hist[2].pct?'📈 Tendencia al alza':'📉 Tendencia a la baja')
    :'—';

  const rows=hist.map((h,i)=>{
    const col=h.pct>=80?'var(--green)':h.pct>=70?'var(--amber)':'var(--red)';
    const ml={test:'Test',study:'Estudio',review:'Repaso'}[h.mode]||h.mode||'Test';
    return `<div class="hist-row">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;color:var(--text-dim)">${fmtDate(h.ts)}</div>
        <div style="font-size:11px;color:var(--text-muted)">${ml}${h.elapsed?' · '+fmtSecs(h.elapsed||0):''}</div>
      </div>
      <span class="badge b-blue" style="font-size:9px;flex-shrink:0">${ml}</span>
      <div class="hist-bar-out" style="width:70px"><div class="hist-bar-in" style="width:${h.pct}%;background:${col}"></div></div>
      <span style="font-family:var(--mono);font-size:12px;color:${col};min-width:32px;text-align:right">${h.pct}%</span>
      <span style="font-size:11px;color:var(--text-muted);white-space:nowrap">${h.correct}/${h.total}</span>
    </div>`;
  }).join('');

  $('vhist').innerHTML=`
    <button class="btn btn-sm" onclick="home()" style="margin-bottom:1.25rem">← Volver</button>
    <p class="slabel">Historial de sesiones</p>
    <div class="g3" style="margin-bottom:12px">
      <div class="metric"><div class="metric-label">Sesiones</div><div class="metric-value" style="color:var(--accent)">${hist.length}</div></div>
      <div class="metric"><div class="metric-label">Media</div><div class="metric-value" style="color:var(--amber)">${avg}%</div></div>
      <div class="metric"><div class="metric-label">Mejor</div><div class="metric-value" style="color:var(--green)">${best}%</div></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="text-align:center;font-size:14px;color:var(--text-dim);padding:.25rem 0">${trend}</div>
    </div>
    <div class="card">
      <div class="card-title">Todas las sesiones (más recientes primero)</div>
      ${rows}
    </div>`;
  showV('hist');
}

// ═══════════════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════════════
function modal(title,desc,btns){
  $('ov').innerHTML=`<div class="modal"><h2>${title}</h2><p>${desc}</p><div class="modal-btns">${btns.map(b=>`<button class="${b.c}" onclick="${b.a}" style="flex:1">${b.l}</button>`).join('')}</div></div>`;
  $('ov').classList.remove('hidden');
}
function cm(){$('ov').classList.add('hidden');}
$('ov').addEventListener('click',e=>{if(e.target===$('ov'))cm();});

function askExit(){
  const answered=ex.ans.filter(a=>a!==null).length;
  const msg=answered>0?`Llevas ${answered} pregunta${answered>1?'s':''} respondidas guardadas.`:'No has respondido ninguna pregunta aún.';
  modal('Salir del examen',msg,[
    {l:'Cancelar',c:'btn',a:'cm()'},
    {l:'Ver resultados',c:'btn btn-a',a:'cm();finish(false)'},
    {l:'Salir sin guardar',c:'btn btn-d',a:'cm();home()'}
  ]);
}
function askReset(){
  modal('Resetear todo el progreso','Se borrará tu historial, intentos, fallos, racha y marcadores. Esta acción no se puede deshacer.',[
    {l:'Cancelar',c:'btn',a:'cm()'},
    {l:'Resetear todo',c:'btn btn-d',a:'cm();doReset()'}
  ]);
}
function doReset(){st=JSON.parse(JSON.stringify(DEF_ST));saveSt();home();}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadSt();
initTheme();
home();
</script>
