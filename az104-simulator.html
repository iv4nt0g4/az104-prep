{id:269,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1. VM1 was deployed by using a custom Azure Resource Manager template named ARM1.json.<br>You receive a notification that VM1 will be affected by maintenance.<br>You need to move VM1 to a different host immediately.<br>Solution: From the Redeploy blade, you click Redeploy.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"C: A VPN gateway is used when creating a VPN connection to your on-premises network.\nRoute-based VPN devices use any-to-any (wildcard) traffic selectors, and let routing/forwarding\ntables direct traffic to different IPsec tunnels. It is typically built on router platforms where each\nIPsec tunnel is modeled as a network interface or VTI (virtual tunnel interface).\nE: Policy-based VPN devices use the combinations of prefixes from both networks to define how\ntraffic is encrypted/decrypted through IPsec tunnels. It is typically built on firewall devices that\nperform packet filtering. IPsec tunnel encryption and decryption are added to the packet filtering\nand processing engine.\nIncorrect Answers:\nF: Point-to-Site connections do not require a VPN device or a public-facing IP address."},
{id:270,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1. VM1 was deployed by using a custom Azure Resource Manager template named ARM1.json.<br>You receive a notification that VM1 will be affected by maintenance.<br>You need to move VM1 to a different host immediately.<br>Solution: From the Update management blade, you click Enable.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:271,cat:"Networking",q:"You have an Azure subscription that contains a web app named webapp1.<br>You need to add a custom domain named www.contoso.com to webapp1.<br>What should you do first?<br>",ans:0,opts:["Create a DNS record", "Add a connection string", "Upload a certificate.", "Stop webapp1."],exp:"A Site-to-Site VPN gateway connection can be used to connect your on-premises network to an\nAzure virtual network over an IPsec/IKE (IKEv1 or IKEv2) VPN tunnel.\nThis type of connection requires a VPN device, a VPN gateway, located on-premises that has an\nexternally facing public IP address assigned to it.\nIncorrect Answers:\nB: Application Proxy is a feature of Azure AD that enables users to access on-premises web\napplications from a remote client."},
{id:272,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0025300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 connects to VNET1.<br>You need to connect VM1 to VNET2.<br>Solution: You move VM1 to RG2, and then you add a new network interface to VM1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Azure virtual machine extensions are small packages that run post-deployment configuration and\nautomation on Azure virtual machines.\nIn the following example, the Azure CLI is used to deploy a custom script extension to an existing\nvirtual machine, which installs a Nginx webserver. az vm extension set \\\n--resource-group myResourceGroup \\\n--vm-name myVM --name customScript \\\n--publisher Microsoft.Azure.Extensions \\\n--settings '{\"commandToExecute\": \"apt-get install -y nginx\"}\n\nNote:\nThere are several versions of this question in the exam. The question has two correct answers:\n1. a Desired State Configuration (DSC) extension\n2. Azure Custom Script Extension\n\nThe question can have other incorrect answer options, including the following:\n- the Publish-AzVMDscConfiguration cmdlet\n- Azure Application Insights"},
{id:273,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0025400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 connects to VNET1.<br>You need to connect VM1 to VNET2.<br>Solution: You delete VM1. You recreate VM1, and then you create a new network interface for VM1 and connect it to VNET2.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Raw HTTP request data is provided by Web server logging and the question mentions 500 error\ncodes.\nYou need to catch connection error. When the connection fails it happens on web server, not\nwithin application. You can do it opening the web application -> Application Service logs -> Web\nserver logging (there are multiple switches there).\nYou can also see the errors live going to \"Log stream\" pane.\n\n\fWeb server logging Windows App Service file system or Azure Storage blobs Raw HTTP request\ndata in the W3C extended log file format. Each log message includes data such as the HTTP\nmethod, resource URI, client IP, client port, user agent, response code, and so on."},
{id:274,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0025600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 connects to VNET1.<br>You need to connect VM1 to VNET2.<br>Solution: You turn off VM1, and then you add a new network interface to VM1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Assign a role to a user\n1. Sign in to the Azure portal with an account that's a global admin or privileged role admin for the\ndirectory.\n2. Select Azure Active Directory, select Users, and then select a specific user from the list.\n3. For the selected user, select Directory role, select Add role, and then pick the appropriate\nadmin roles from the Directory roles list, such as Conditional access administrator.\n4. Press Select to save."},
{id:275,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1 that contains the quotas shown in the following table.<br><img src=\"imgs/0025700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You deploy virtual machines to Subscription1 as shown in the following table.<br><img src=\"imgs/0025700002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to deploy the virtual machines shown in the following table.<br><img src=\"imgs/0025700003.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0025800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["You can deploy VM3 to West US. fe", "You can deploy VM4 to West US.", "You can deploy VM5 to West US."],ans:["Yes", "No", "No"],exp:"To assign a license, under Azure Active Directory > Licenses > All Products, select one or more\nproducts, and then select Assign on the command bar.\nReferences: https://docs.microsoft.com/en-us/azure/active-directory/fundamentals/license-users-\ngroups\n\n\fQUESTION 24\nYou have an Azure subscription named Subscription1 and an on-premises deployment of\nMicrosoft System Center Service Manager.\n\nSubscription1 contains a virtual machine named VM1.\n\nYou need to ensure that an alert is set in Service Manager when the amount of available memory\non VM1 is below 10 percent.\n\nWhat should you do first?\n\nA.   Create an automation runbook\nB.   Deploy a function app\nC.   Deploy the IT Service Management Connector (ITSM)\nD.   Create a notification\n\nAnswer: C\nExplanation:\nThe IT Service Management Connector (ITSMC) allows you to connect Azure and a supported IT\nService Management (ITSM) product/service, such as the Microsoft System Center Service\nManager.\nWith ITSMC, you can create work items in ITSM tool, based on your Azure alerts (metric alerts,\nActivity Log alerts and Log Analytics alerts)."},
{id:276,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains an Azure Availability Set named WEBPROD-AS-USE2 as shown in the following exhibit.<br><img src=\"imgs/0025900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You add 14 virtual machines to WEBPROD-AS-USE2.<br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0026000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0026100001.png",exp:"Box 1: 2 -\nThere are 10 update domains. The 14 VMs are shared across the 10 update domains so four update domains will have two VMs and six update domains will have one VM. Only one update domain is rebooted at a time. Therefore, a maximum of two VMs will be offline.\nBox 2: 7 -\nThere are 2 fault domains. The 14 VMs are shared across the 2 fault domains, so 7 VMs in each fault domain. A rack failure will affect one fault domain so 7 VMs will be offline.\nReference:\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/manage-availability"},
{id:277,cat:"Networking",q:"You deploy an Azure Kubernetes Service (AKS) cluster named Cluster1 that uses the IP addresses shown in the following table.<br><img src=\"imgs/0026200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to provide internet users with access to the applications that run in Cluster1.<br>Which IP address should you include in the DNS record for Cluster1?<br>",ans:0,opts:["131.107.2.1", "10.0.10.11", "172.17.7.1", "192.168.10.2"],exp:"The azcopy copy command copies a directory (and all of the files in that directory) to a blob\ncontainer. The result is a directory in the container by the same name.\nIncorrect Answers:\nB: The azcopy sync command replicates the source location to the destination location. However,\nthe file is skipped if the last modified time in the destination is more recent.\nD: The az storage blob copy start-batch command copies multiple blobs to a blob container."},
{id:278,cat:"Networking",q:"You have a deployment template named Template1 that is used to deploy 10 Azure web apps.<br>You need to identify what to deploy before you deploy Template1. The solution must minimize Azure costs.<br>What should you identify?<br>",ans:1,opts:["five Azure Application Gateways", "one App Service plan", "10 App Service plans", "one Azure Traffic Manager", "one Azure Application Gateway"],exp:"Azure Import/Export service supports the following of storage accounts:\nStandard General Purpose v2 storage accounts (recommended for most scenarios)\nBlob Storage accounts\nGeneral Purpose v1 storage accounts (both Classic or Azure Resource Manager deployments),\nAzure Import/Export service supports the following storage types:\nImport supports Azure Blob storage and Azure File storage\nExport supports Azure Blob storage"},
{id:279,type:"drop",cat:"Containers",q:"HOTSPOT -<br>You plan to deploy an Azure container instance by using the following Azure Resource Manager template.<br><img src=\"imgs/0026400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the template.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0026500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Internet users [answer choice].",options:["ican connect to the container from any device","cannot connect to the container","can only connect to the container from devices that run Windows"]},{label:"If Internet Information Services (IIS) in",options:["the container fail, [answer choice]. the container will restart automatically","the container will only restart manually","the container must be redeployed"]}],ans_img:"imgs/0026500002.jpg",exp:"Correct.\n\nCan connect from any dev.\n\nWill restart autom. upvoted 65 times"},
{id:280,cat:"Compute",q:"You have an Azure subscription that contains a virtual machine named VM1. VM1 hosts a line-of-business application that is available 24 hours a day. VM1 has one network interface and one managed disk. VM1 uses the D4s v3 size.<br>You plan to make the following changes to VM1:<br>\u2711 Change the size to D8s v3.<br>\u2711 Add a 500-GB managed disk.<br>\u2711 Add the Puppet Agent extension.<br>\u2711 Enable Desired State Configuration Management.<br>Which change will cause downtime for VM1?<br>",ans:2,opts:["Enable Desired State Configuration Management", "Add a 500-GB managed disk", "Change the size to D8s v3", "Add the Puppet Agent extension"],exp:"Azure file shares can be used as persistent volumes for stateful containers. Containers deliver\n\"build once, run anywhere\" capabilities that enable developers to accelerate innovation. For the\ncontainers that access raw data at every start, a shared file system is required to allow these\ncontainers to access the file system no matter which instance they run on.\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-introduction"},
{id:281,cat:"Identity",q:"You have an app named App1 that runs on an Azure web app named webapp1.<br>The developers at your company upload an update of App1 to a Git repository named Git1.<br>Webapp1 has the deployment slots shown in the following table.<br><img src=\"imgs/0026700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to ensure that the App1 update is tested before the update is made available to users.<br>Which two actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[0, 3],opts:["Swap the slots", "Deploy the App1 update to webapp1-prod, and then test the update", "Stop webapp1-prod", "Deploy the App1 update to webapp1-test, and then test the update", "Stop webapp1-test"],exp:"For Windows Server, the temporary disk is mounted as \u201cD:\\\u201d.\nFor Linux based VM\u2019s the temporary disk is mounted as \u201c/dev/sdb1\u201d."},
{id:282,cat:"Compute",q:"You have an Azure subscription named Subscription1 that has the following providers registered:<br>\u2711 Authorization<br>\u2711 Automation<br>\u2711 Resources<br>\u2711 Compute<br>\u2711 KeyVault<br>\u2711 Network<br>\u2711 Storage<br>\u2711 Billing<br>\u2711 Web<br>Subscription1 contains an Azure virtual machine named VM1 that has the following configurations:<br>\u2711 Private IP address: 10.0.0.4 (dynamic)<br>\u2711 Network security group (NSG): NSG1<br>\u2711 Public IP address: None<br>\u2711 Availability set: AVSet<br>\u2711 Subnet: 10.0.0.0/24<br>\u2711 Managed disks: No<br>\u2711 Location: East US<br>You need to record all the successful and failed connection attempts to VM1.<br>Which three actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[3, 4, 5],opts:["Enable Azure Network Watcher in the East US Azure region.", "Add an Azure Network Watcher connection monitor.", "Register the MicrosoftLogAnalytics provider.", "Create an Azure Storage account.", "Register the Microsoft.Insights resource provider.", "Enable Azure Network Watcher flow logs."],exp:"From the exhibit we see that the disk is in the VHDX format.\nBefore you upload a Windows virtual machine (VM) from on-premises to Microsoft Azure, you\nmust prepare the virtual hard disk (VHD or VHDX). Azure supports only generation 1 VMs that\nare in the VHD file format and have a fixed sized disk. The maximum size allowed for the VHD is\n1,023 GB. You can convert a generation 1 VM from the VHDX file system to VHD and from a\ndynamically expanding disk to fixed-sized."},
{id:283,cat:"Compute",q:"You need to deploy an Azure virtual machine scale set that contains five instances as quickly as possible.<br>What should you do?<br>",ans:3,opts:["Deploy five virtual machines. Modify the Availability Zones settings for each virtual machine.", "Deploy five virtual machines. Modify the Size setting for each virtual machine.", "Deploy one virtual machine scale set that is set to VM (virtual machines) orchestration mode.", "Deploy one virtual machine scale set that is set to ScaleSetVM orchestration mode."],exp:"View template from deployment history\n1. Go to the resource group for your new resource group. Notice that the portal shows the result\nof the last deployment. Select this link.\n\n\f2. You see a history of deployments for the group. In your case, the portal probably lists only one\ndeployment. Select this deployment.\n\n3. The portal displays a summary of the deployment. The summary includes the status of the\ndeployment and its operations and the values that you provided for parameters. To see the\ntemplate that you used for the deployment, select View template."},
{id:284,cat:"AppService",q:"You plan to create the Azure web apps shown in the following table.<br><img src=\"imgs/0026900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>What is the minimum number of App Service plans you should create for the web apps?<br>",ans:1,opts:["1", "2", "3", "4"],exp:"When you swap deployment slots, Azure swaps the Virtual IP addresses of the source and\ndestination slots, thereby swapping the URLs of the slots. We can easily revert the deployment by\nswapping back."},
{id:285,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have a pay-as-you-go Azure subscription that contains the virtual machines shown in the following table.<br><img src=\"imgs/0027000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create the budget shown in the following exhibit.<br><img src=\"imgs/0027100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The AG1 action group contains a user named\n          <a class=\"__cf_email__\" data-cfemail=\"3352575e5a5d73505c5d475c405c1d505c5e\" href=\"/cdn-cgi/l/email-protection\">\n           [email\u00a0protected]\n          </a>\n          only.<br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>Hot Area:<br><img src=\"imgs/0027200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"When the maximum amount in Budget! is",options:["reached, [answer choice]","VM1 and VM2 are turned off","\\VM1 and VM2 continue to run","VM1 is turned off, and VM2 continues to run"]},{label:"Based on the current usage costs of the virtual",options:["inachioer: [attewer/ehalce]- no email notifications will be sent each month","‘one email notification will be sent each month","two email notifications will be sent each month","‘three email notifications will be sent each month"]}],ans_img:"imgs/0027200002.jpg",exp:"Box 1: VM1 and VM2 continue to run\nThe budget alerts are for Resource Group RG1, which include VM1, but not VM2. However, when the budget thresholds you've created are exceeded, only notifications are triggered. None of your resources are affected and your consumption isn't stopped.\nBox 2: one email notification will be sent each month.\nBudget alerts for Resource Group RG1, which include VM1, but not VM2.VM1 consumes 20 Euro/day. The 50%, 500 Euro limit, will be reached in 25 days, and an email will be sent.\nThe 70% and 100% alert conditions will not be reached within a month, and they don't trigger email actions anyway.\nCredit alerts: Credit alerts are generated automatically at 90% and at 100% of your Azure credit balance. Whenever an alert is generated, it's reflected in cost alerts and in the email sent to the account owners. 90% and 100% will not be reached though.\nReference:\nhttps://docs.microsoft.com/en-us/azure/cost-management-billing/costs/cost-mgt-alerts-monitor-usage-spending https://docs.microsoft.com/en-gb/azure/cost-management-billing/costs/tutorial-acm-create-budgets"},
{id:286,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription named Subscription1. Subscription1 contains a resource group named RG1. RG1 contains resources that were deployed by using templates.<br>You need to view the date and time when the resources were created in RG1.<br>Solution: From the Subscriptions blade, you select the subscription, and then click Programmatic deployment.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:287,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0027400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 connects to VNET1.<br>You need to connect VM1 to VNET2.<br>Solution: You create a new network interface, and then you add the network interface to VM1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Microsoft updates, which Microsoft refers to as planned maintenance events, sometimes require\nthat VMs be rebooted to complete the update. To reduce the impact on VMs, the Azure fabric is\ndivided into update domains to ensure that not all VMs are rebooted at the same time.\nIncorrect Answers:\nA: An update domain is a group of VMs and underlying physical hardware that can be rebooted at\nthe same time.\nB, C: A fault domain shares common storage as well as a common power source and network\nswitch. It is used to protect against unplanned system failure.\nReferences:\nhttps://petri.com/understanding-azure-availability-sets\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/tutorial-availability-sets"},
{id:288,cat:"Identity",q:"You have an Azure Active Directory (Azure AD) tenant named adatum.com that contains the users shown in the following table.<br><img src=\"imgs/0027500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Adatum.com has the following configurations:<br>\u2711 Users may join devices to Azure AD is set to User1.<br>\u2711 Additional local administrators on Azure AD joined devices is set to None.<br>You deploy Windows 10 to a computer named Computer1. User1 joins Computer1 to adatum.com.<br>You need to identify the local Administrator group membership on Computer1.<br>Which users are members of the local Administrators group?<br>",ans:2,opts:["User1 only", "User2 only", "User1 and User2 only", "User1, User2, and User3 only", "User1, User2, User3, and User4"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:289,type:"hs",cat:"Identity",q:"HOTSPOT -<br>You have Azure subscriptions named Subscription1 and Subscription2.<br>Subscription1 has following resource groups:<br><img src=\"imgs/0027600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>RG1 includes a web app named App1 in the West Europe location.<br>Subscription2 contains the following resource groups:<br><img src=\"imgs/0027600002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0027700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["App1 can be moved to RG2", "App1 can be moved to RG3 [ol", "App1 can be moved to RG4 fd"],ans:["Yes", "Yes", "Yes"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:290,type:"img",cat:"Storage",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1 that contains the following resource group:<br>\u2711 Name: RG1<br>\u2711 Region: West US<br>\u2711 Tag: `tag1`: `value1`<br>You assign an Azure policy named Policy1 to Subscription1 by using the following configurations:<br>\u2711 Exclusions: None<br>\u2711 Policy definition: Append a tag and its value to resources<br>\u2711 Assignment name: Policy1<br>\u2711 Parameters:<br>\u2711 Tag name: tag2<br><br>Tag value: value2 -<br><img src=\"imgs/0027800009.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>After Policy1 is assigned, you create a storage account that has the following configuration:<br>\u2711 Name: storage1<br>\u2711 Location: West US<br>\u2711 Resource group: RG1<br>\u2711 Tags: `tag3`: `value3`<br>You need to identify which tags are assigned to each resource.<br>What should you identify? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0027900005.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0028000001.jpg",exp:"The Network Contributor role lets you manage networks, but not access them.\nReference:\nhttps://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles"},
{id:291,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1.<br>In Subscription1, you create an alert rule named Alert1.<br>The Alert1 action group is configured as shown in the following exhibit.<br><img src=\"imgs/0028100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Alert1 alert criteria triggered every minute.<br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0028200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"The number of email messages that Alert will send in an hour is",options:["0","4","6","12","60"]},{label:"The number of SMS messages that Alert2 will send in an hour is",options:["0","4","6","12","60"]}],ans_img:"imgs/0028200002.png",exp:"The Answer is not correct. \nIt should be no access for both cases. \n- for first case, cause the IP is not matching the SAS requirements\n- for second case, since it is using \"net use\" where it uses SMB. The SMB (Server Message Broker) protocol does not support SAS. it still asks for username/password. Accordingly, it will give error wrong username/pass and will not provide access. upvoted 291 times researched_answer_boi 4\u00a0years, 5\u00a0months ago Authenticating against an Azure File Share using SAS is currently not supported. Only the Storage Account Keys would work.\nhttps://docs.microsoft.com/en-us/answers/questions/40741/sas-key-for-unc-path.html upvoted 6 times ... sshiv 4\u00a0years, 10\u00a0months ago could provide refer doc links what you are saying upvoted 1 times berkejf 4\u00a0years, 10\u00a0months ago fedztedz is correct. both are no access. upvoted 2 times berkejf 4\u00a0years, 10\u00a0months ago prove: https://docs.microsoft.com/en-us/azure/storage/files/storage-files-faq#:~:text=Shared%20access%20signature%20keys%20are%20supported%20only%20via%20the%20REST%20API%20or%20in%20client%20libraries.%20You%20must%20mount%20the%20Azure%20file%20share%20over%20SMB%20by%20using%20the%20storage%20account%20keys upvoted 3 times Allahham 4\u00a0years, 9\u00a0months ago so the answer will be prompted for credentials or have no access? upvoted 2 times Beitran 4\u00a0years, 9\u00a0months ago \"System error 86 has occurred.\nThe specified network password is not correct.\" upvoted 3 times ... Load full discussion... ... Load full discuss"},
{id:292,cat:"Compute",q:"You have an Azure subscription named Subscription1 that contains the resources shown in the following table.<br><img src=\"imgs/0028300005.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create virtual machines in Subscription1 as shown in the following table.<br><img src=\"imgs/0028400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to use Vault1 for the backup of as many virtual machines as possible.<br>Which virtual machines can be backed up to Vault1?<br>",ans:3,opts:["VM1 only", "VM3 and VMC only", "VM1, VM2, VM3, VMA, VMB, and VMC", "VM1, VM3, VMA, and VMC only", "VM1 and VM3 only"],exp:"Box 1: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 2: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 3: Yes\nUser3 can review the access guest users of Group1 which also includes Group2. UserB is the\nguest of Group2 and hence User3 can review the access of UserB."},
{id:293,cat:"Containers",q:"You have an Azure Kubernetes Service (AKS) cluster named AKS1.<br>You need to configure cluster autoscaler for AKS1.<br>Which two tools should you use? Each correct answer presents a complete solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[1, 3],opts:["the kubectl command", "the az aks command", "the Set-AzVm cmdlet", "the Azure portal", "the Set-AzAks cmdlet"],exp:"Box 1: No\nSubscription1 is a member of ManagementGroup21, ManagementGroup21 is a member of\nManagementGroup11, ManagementGroup11 is a member of the Tenant Root Group, The Tenant\nRoot group has \u2018Not allowed resource types for virtual network\u2019.\n\nBox 2: No:\nYou cannot create a VM, because based on the Policy you can only create VNETs in\nSybscription2 (ManagementGroup12).\n\nBox 3: No\nYou cannot ADD Subscription1 to ManagementGroup11, but you can MOVE Subscription1 from\nManagementGroup21 to ManagmentGroup11. Subscriptions can only be a member of ONE\nManagementGroup at a time.\n\nAllowed Resource Type (Deny): Defines the resource types that you can deploy. Its effect is to\ndeny all resources that aren't part of this defined list.\nNot allowed resource types (Deny): Prevents a list of resource types from being deployed.\nBased on the Policies, VNETs are not allowed in the Tenant Root Group scope, so you cannot\ndeploy VNETs. Also, VNETs only allowed in ManagementGroup12 scope, but you cannot deploy\nany other resource."},
{id:294,cat:"Governance",q:"You create the following resources in an Azure subscription:<br>\u2711 An Azure Container Registry instance named Registry1<br>\u2711 An Azure Kubernetes Service (AKS) cluster named Cluster1<br>You create a container image named App1 on your administrative workstation.<br>You need to deploy App1 to Cluster1.<br>What should you do first?<br>",ans:0,opts:["Run the docker push command.", "Create an App Service plan.", "Run the az acr build command.", "Run the az aks create command."],exp:"VNET1: Department: D1 only\nResources created before policy creation will not inherit the policy rules.\n\nVNET2: Label:Value1 only\nThe built-in policy definition \"Append a tag and its value to resources\" appends the specified tag\nand value when any resource which is missing this tag is created or updated. Does not modify the\ntags of resources created before this policy was applied until those resources are changed. Does\nnot apply to resource groups."},
{id:295,cat:"Identity",q:"You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0028600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to configure a proximity placement group for VMSS1.<br>Which proximity placement groups should you use?<br>",ans:0,opts:["Proximity2 only", "Proximity1, Proximity2, and Proximity3", "Proximity1 only", "Proximity1 and Proximity3 only"],exp:"Box 1: will have no access\nThe IP 193.77.134.1 does not have access on the SAS, because it is not matching the SAS\nrequirements. IP is out of range.\n\nBox 2: will have no access\nThe SAS token is not supported in mounting Azure File share currently, it just supports the Azure\nstorage account key.\nSince it is using \"net use\" where it uses SMB, the SMB (Server Message Broker) protocol does\nnot support SAS. it still asks for username/password. Accordingly, it will give error wrong\nusername/pass and will not provide access."},
{id:296,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription named Subscription1. Subscription1 contains a resource group named RG1. RG1 contains resources that were deployed by using templates.<br>You need to view the date and time when the resources were created in RG1.<br>Solution: From the Subscriptions blade, you select the subscription, and then click Resource providers.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Box 1: No\nA sync group contains one cloud endpoint, or Azure file share, and at least one server endpoint.\n\nBox 2: No\nAzure File Sync does not support more than one server endpoint from the same server in the\nsame Sync Group.\n\nBox 3: Yes\nMultiple server endpoints can exist on the same volume if their namespaces are not overlapping\n(for example, F:\\sync1 and F:\\sync2) and each endpoint is syncing to a unique sync group."},
{id:297,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription named Subscription1. Subscription1 contains a resource group named RG1. RG1 contains resources that were deployed by using templates.<br>You need to view the date and time when the resources were created in RG1.<br>Solution: From the RG1 blade, you click Automation script.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Box 1: contosostorage\nThe name of account\n\nBox 2: file.core.windows.net\n\nBox 3: data\nThe name of the file share is data.\n\nExample:"},
{id:298,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription named Subscription1. Subscription1 contains a resource group named RG1. RG1 contains resources that were deployed by using templates.<br>You need to view the date and time when the resources were created in RG1.<br>Solution: From the RG1 blade, you click Deployments.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Step 1: Install the Azure File Sync agent on Server1\nThe Azure File Sync agent is a downloadable package that enables Windows Server to be\nsynced with an Azure file share\n\nStep 2: Register Server1.\nRegister Windows Server with Storage Sync Service\nRegistering your Windows Server with a Storage Sync Service establishes a trust relationship\nbetween your server (or cluster) and the Storage Sync Service.\n\nStep 3: Add a server endpoint\nCreate a sync group and a cloud endpoint.\nA sync group defines the sync topology for a set of files. Endpoints within a sync group are kept\nin sync with each other. A sync group must contain one cloud endpoint, which represents an\n\n\fAzure file share and one or more server endpoints. A server endpoint represents a path on\nregistered server."},
{id:299,cat:"Compute",q:"You have an Azure subscription named Subscription1.<br>You deploy a Linux virtual machine named VM1 to Subscription1.<br>You need to monitor the metrics and the logs of VM1.<br>What should you use?<br>",ans:1,opts:["Azure HDInsight", "Linux Diagnostic Extension (LAD) 3.0", "the AzurePerformanceDiagnostics extension", "Azure Analysis Services"],exp:"All three VMs are in VNET2. Auto registration is enabled for private Azure DNS zone named\ncontoso.com, which is linked to VNET2. So, VM1, VM2 and VM3 will auto-register their host\nrecords to contoso.com.\nNone of the VM will auto-register to the public Azure DNS zone named adatum.com. You cannot\nregister private IPs on the internet (adatum.com)\n\nBox 1: Yes\nAuto registration is enabled for private Azure DNS zone named contoso.com.\n\nBox 2: Yes\nAuto registration is enabled for private Azure DNS zone named contoso.com.\n\nBox 3: No\nNone of the VM will auto-register to the public Azure DNS zone named adatum.com"},
{id:300,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1. Subscription1 contains a virtual machine named VM1.<br>You install and configure a web server and a DNS server on VM1.<br>VM1 has the effective network security rules shown in the following exhibit:<br><img src=\"imgs/0029000001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0029100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Internet users [answer choice].",options:["can connect to only the DNS server on VM1","can connect to only the web server on VM1","can connect to the web server and the DNS server on VM1","cannot connect to the web server and the DNS server on VM1"]},{label:"If you delete Rule2, Internet users",options:["answer choice]. can connect to only the DNS server on VM1","can connect to only the web server on VM1","can connect to the web server and the DNS server on VM1","cannot connect to the web server and the DNS server on VM1"]}],ans_img:"imgs/0029100002.png",exp:"Correct Answer: A\n\nYou can only move a resource to a Resource Group or Subscription, but the location stays the same. When you move WebApp1 to RG2, the resource will be restricted based on the policy of the new Resource Group (Policy2). upvoted 136 times Veks 3\u00a0years, 6\u00a0months ago I agree with the answer (A is correct), but your comments don't seem correct.\nyou are moving app from one region to another. Procedure is listed below:\n- Create a back up of the source app.\n- Create an app in a new App Service plan, in the target region.\n- Restore the back up in the target app\n- If you use a custom domain, bind it preemptively to the target app with 'awverify'. and enable the domain in the target app.\n- Configure everything else in your target app to be the same as the source app and verify your configuration.\n- When you're ready for the custom domain to point to the target app, remap the domain name.\n\nHere it states that you have to create new AppService plan in new region. So old plan stays where it is.\nReference:\nhttps://docs.microsoft.com/en-us/azure/app-service/manage-move-across-regions upvoted 21 times Ajinkyakore 3\u00a0years, 5\u00a0months ago So technically there will be no any migration or transfer happens? upvoted 2 times bryant12138 2\u00a0years, 1\u00a0month ago yeah I think you're right, both rg and subscription are ideological management tools upvoted 1 times ... ... klasbeatz 3\u00a0years, 4\u00a0months ago Your right.....New-AzAppServicePlan -Location \"North Central US\" -ResourceGroupName Desti"},
{id:301,cat:"Compute",q:"You plan to deploy three Azure virtual machines named VM1, VM2, and VM3. The virtual machines will host a web app named App1.<br>You need to ensure that at least two virtual machines are available if a single Azure datacenter becomes unavailable.<br>What should you deploy?<br>",ans:2,opts:["all three virtual machines in a single Availability Zone", "all virtual machines in a single Availability Set", "each virtual machine in a separate Availability Zone", "each virtual machine in a separate Availability Set"],exp:"i always get nervous when the discussion count hits 30-50+ . You know something isn't right :D , if its just below 20, then i just skip and continue"},
{id:302,cat:"Compute",q:"You have an Azure virtual machine named VM1 that runs Windows Server 2019.<br>You save VM1 as a template named Template1 to the Azure Resource Manager library.<br>You plan to deploy a virtual machine named VM2 from Template1.<br>What can you configure during the deployment of VM2?<br>",ans:3,opts:["operating system", "administrator username", "virtual machine size", "resource group"],exp:"If you look at the default policy which is in place for enforcing tags, you can see that the effect\nshould be Deny:\n\n\fSince this option is clearly mentioned in the Azure in-built policy, all other options are incorrect.\nhttps://docs.microsoft.com/en-us/azure/governance/policy/overview"},
{id:303,cat:"Compute",q:"You have an Azure subscription that contains an Azure virtual machine named VM1. VM1 runs a financial reporting app named App1 that does not support multiple active instances.<br>At the end of each month, CPU usage for VM1 peaks when App1 runs.<br>You need to create a scheduled runbook to increase the processor performance of VM1 at the end of each month.<br>What task should you include in the runbook?<br>",ans:1,opts:["Add the Azure Performance Diagnostics agent to VM1.", "Modify the VM size property of VM1.", "Add VM1 to a scale set.", "Increase the vCPU quota for the subscription.", "Add a Desired State Configuration (DSC) extension to VM1."],exp:"Box 1: 4\nIf you resize the Scale Set all the VMs get resized at once, thus 4 is the correct answer.\n\nBox 2: 1\nAutomatic OS updates update 20% of the VMs at once, with a minimum of 1 VM instance at a\ntime. Also 20% of 4 = 0.8."},
{id:304,cat:"Compute",q:"You plan to deploy several Azure virtual machines that will run Windows Server 2019 in a virtual machine scale set by using an Azure Resource Manager template.<br>You need to ensure that NGINX is available on all the virtual machines after they are deployed.<br>What should you use?<br>",ans:1,opts:["Deployment Center in Azure App Service", "A Desired State Configuration (DSC) extension", "the New-AzConfigurationAssignment cmdlet", "a Microsoft Intune device configuration profile"],exp:"Box 1: No\nAzure DNS provides automatic registration of virtual machines from a single virtual network that's\nlinked to a private zone as a registration virtual network. VM5 does not belong to the registration\nvirtual network though.\n\nBox 2: No\nForward DNS resolution is supported across virtual networks that are linked to the private zone\nas resolution virtual networks. VM5 does belong to a resolution virtual network.\n\nBox 3: Yes\nVM6 belongs to registration virtual network, and an A (Host) record exists for VM9 in the DNS\nzone. By default, registration virtual networks also act as resolution virtual networks, in the sense\nthat DNS resolution against the zone works from any of the virtual machines within the\nregistration virtual network."},
{id:305,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You deploy an Azure Kubernetes Service (AKS) cluster that has the network profile shown in the following exhibit.<br><img src=\"imgs/0029500003.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0029600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Containers will be assigned an IP address in the",options:["answer choice] subnet. 70.244.0.0/16","10.0.0.0/16","172.17.0.1/16"]},{label:"Services in the AKS cluster will be assigned an IP",options:["address in the [answer choice] subnet. 10.244.0.0/16","10.0.0.0/16","172.17.0.1/16"]}],ans_img:"imgs/0029600002.jpg",exp:"Box 1: 10.244.0.0/16 -\nThe Pod CIDR.\nNote: The --pod-cidr should be a large address space that isn't in use elsewhere in your network environment. This range includes any on-premises network ranges if you connect, or plan to connect, your Azure virtual networks using Express Route or a Site-to-Site VPN connection.\nThis address range must be large enough to accommodate the number of nodes that you expect to scale up to. You can't change this address range once the cluster is deployed if you need more addresses for additional nodes.\nBox 2: 10.0.0.0/16 -\nThe --service-cidr is used to assign internal services in the AKS cluster an IP address.\nReference:\nhttps://docs.microsoft.com/en-us/azure/aks/configure-kubenet"},
{id:306,type:"img",cat:"Monitor",q:"HOTSPOT -<br>You have the App Service plan shown in the following exhibit.<br><img src=\"imgs/0029800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The scale-in settings for the App Service plan are configured as shown in the following exhibit.<br><img src=\"imgs/0029900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The scale out rule is configured with the same duration and cool down tile as the scale in rule.<br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0030000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0030000002.png",exp:"Box 1: 5 -\nThe maximum 5 will kept as the CPU Usage >= 30.\nBox 2: 3 -\nAs soon as the average CPU usage drops below 30%, the count will decrease by 1. After the 5 minute cool-down it will decrease by another 1, reaching 3.\nReference:\nhttps://docs.microsoft.com/en-us/azure/azure-monitor/learn/tutorial-autoscale-performance-schedule"},
{id:307,cat:"Compute",q:"You have an Azure virtual machine named VM1 that runs Windows Server 2019. The VM was deployed using default drive settings.<br>You sign in to VM1 as a user named User1 and perform the following actions:<br>\u2711 Create files on drive C.<br>\u2711 Create files on drive D.<br>\u2711 Modify the screen saver timeout.<br>\u2711 Change the desktop background.<br>You plan to redeploy VM1.<br>Which changes will be lost after you redeploy VM1?<br>",ans:2,opts:["the modified screen saver timeout", "the new desktop background", "the new files on drive D", "the new files on drive C"],exp:"Box 1: No\nVM1 has the NSG1 on Subnet1, which allows traffic over port 1433 between Subnet2 and\nSubnet1. BUT NSG2 also applied on NIC level for VM1 that blocks the traffic on port 1433. Hence\nNo traffic allowed.\n\nBox 2: Yes\nNo rule explicitly blocks communication from VM1. The default rules, which allow communication,\nare thus applied.\n\nBox 3: Yes\nNo rule explicitly blocks communication between VM2 and VM3 which are both on Subnet2. The\ndefault rules, which allow communication, are thus applied."},
{id:308,cat:"Compute",q:"You have an Azure subscription.<br>You have an on-premises virtual machine named VM1. The settings for VM1 are shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0030300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to ensure that you can use the disks attached to VM1 as a template for Azure virtual machines.<br>What should you modify on VM1?<br>",ans:2,opts:["the memory", "the network adapters", "the hard drive", "the processor", "Integration Services"],exp:"IP forwarding enables the virtual machine a network interface is attached to:\nReceive network traffic not destined for one of the IP addresses assigned to any of the IP\nconfigurations assigned to the network interface.\nSend network traffic with a different source IP address than the one assigned to one of a network\ninterface's IP configurations.\n\nThe setting must be enabled for every network interface that is attached to the virtual machine\nthat receives traffic that the virtual machine needs to forward. A virtual machine can forward traffic\nwhether it has multiple network interfaces or a single network interface attached to it.\n\nBox 1: Yes\nThe routing table allows connections from VM3 to VM1 and VM2. And as IP forwarding is enabled\non VM3, VM3 can connect to VM1.\n\nBox 2: No\nVM3, which has IP forwarding, must be turned on, in order for VM2 to connect to VM1.\n\nBox 3: Yes\nThe routing table allows connections from VM1 and VM2 to VM3. IP forwarding on VM3 allows\nVM1 to connect to VM2 via VM3."},
{id:309,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains a virtual machine scale set. The scale set contains four instances that have the following configurations:<br>\u2711 Operating system: Windows Server 2016<br>\u2711 Size: Standard_D1_v2<br>You run the get-azvmss cmdlet as shown in the following exhibit:<br><img src=\"imgs/0030500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0030500002.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image918.png",exp:"1. Create Recovery Services Vault,\n2. Set Replication Policy to ZRS  (because of the requirement for having in three separate zones)\n3. For VM1, create a backup policy upvoted 96 times P123123 2\u00a0years, 10\u00a0months ago Agreed\n\nhttps://learn.microsoft.com/en-us/azure/backup/backup-create-recovery-services-vault\nhttps://learn.microsoft.com/en-us/azure/backup/quick-backup-vm-portal upvoted 5 times ... Bravo_Dravel 9\u00a0months, 2\u00a0weeks ago Agreed\nTo back up VM1 and ensure that backups are stored across three availability zones in the primary region, you should perform the following actions in sequence:\n1. Create a Recovery Services vault: This is the first step to set up a backup solution in Azure. The Recovery Services vault will store the backup data.\n\n2. Set Replication to Zone redundant storage (ZRS): This ensures that the backup data is replicated across three availability zones in the primary region, providing high availability and durability.\n\n3. For VM1, create a backup policy and configure the backup: This step involves creating a backup policy that defines the schedule and retention of the backups, and then applying this policy to VM1 to start the backup process.\n\nSo, the correct sequence is:\n\n1. Create a Recovery Services vault.\n2. Set Replication to Zone redundant storage (ZRS).\n3. For VM1, create a backup policy and configure the backup. upvoted 3 times ..."},
{id:310,cat:"Compute",q:"You have an Azure subscription named Subscription1 that is used by several departments at your company. Subscription1 contains the resources in the following table:<br><img src=\"imgs/0030700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Another administrator deploys a virtual machine named VM1 and an Azure Storage account named storage2 by using a single Azure Resource Manager template.<br>You need to view the template used for the deployment.<br>From which blade can you view the template that was used for the deployment?<br>",ans:1,opts:["VM1", "RG1", "storage2", "container1"],exp:"Correct answer B RG1. the only way to see both together storage and VM"},
{id:311,cat:"Backup",q:"You have an Azure web app named App1. App1 has the deployment slots shown in the following table:<br><img src=\"imgs/0030900002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>In webapp1-test, you test several changes to App1.<br>You back up App1.<br>You swap webapp1-test for webapp1-prod and discover that App1 is experiencing performance issues.<br>You need to revert to the previous version of App1 as quickly as possible.<br>What should you do?<br>",ans:1,opts:["Redeploy App1", "Swap the slots", "Clone App1", "Restore the backup of App1"],exp:"In Azure, you can move resources between resource groups as long as the resource type is\nsupported for move operations. Virtual Networks (VNETs) are supported for move operations, so\nyou can move the \"VNET1 - Virtual Network\" resource to RG2.\nThe other resources, such as \"W10_OsDisk\" (Managed Disk), \"W10\" (Virtual Machine), and\n\"VNET3 - Virtual Network\" (Classic Virtual Network), may have limitations or dependencies that\n\n\fprevent them from being moved. Classic resources, like the Classic Virtual Network, have more\nrestrictions on moving compared to Azure Resource Manager (ARM) resources."},
{id:312,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1. Subscription1 contains two Azure virtual machines VM1 and VM2. VM1 and VM2 run Windows Server<br>2016.<br>VM1 is backed up daily by Azure Backup without using the Azure Backup agent.<br>VM1 is affected by ransomware that encrypts data.<br>You need to restore the latest backup of VM1.<br>To which location can you restore the backup? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0031100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"You can perform a file recovery of",options:["Wie: \\VMt only","‘M1 or a new Azure virtual machine only","VMI and VM2 only","Anew Azure virtual machine only"]},{label:"You can restore VM1 to",options:["NI or a new Azure virtual machine onl","VMT and Vie only","Any Windows computer that has Internet connectivity"]}],ans_img:"imgs/image919.png",exp:"Correct Answer: A\n\nYou can only move a resource to a Resource Group or Subscription, but the location stays the same. When you move WebApp1 to RG2, the resource will be restricted based on the policy of the new Resource Group (Policy2). upvoted 136 times Veks 3\u00a0years, 6\u00a0months ago I agree with the answer (A is correct), but your comments don't seem correct.\nyou are moving app from one region to another. Procedure is listed below:\n- Create a back up of the source app.\n- Create an app in a new App Service plan, in the target region.\n- Restore the back up in the target app\n- If you use a custom domain, bind it preemptively to the target app with 'awverify'. and enable the domain in the target app.\n- Configure everything else in your target app to be the same as the source app and verify your configuration.\n- When you're ready for the custom domain to point to the target app, remap the domain name.\n\nHere it states that you have to create new AppService plan in new region. So old plan stays where it is.\nReference:\nhttps://docs.microsoft.com/en-us/azure/app-service/manage-move-across-regions upvoted 21 times Ajinkyakore 3\u00a0years, 5\u00a0months ago So technically there will be no any migration or transfer happens? upvoted 2 times bryant12138 2\u00a0years, 1\u00a0month ago yeah I think you're right, both rg and subscription are ideological management tools upvoted 1 times ... ... klasbeatz 3\u00a0years, 4\u00a0months ago Your right.....New-AzAppServicePlan -Location \"North Central US\" -ResourceGroupName Desti"},
{id:313,cat:"Compute",q:"You plan to back up an Azure virtual machine named VM1.<br>You discover that the Backup Pre-Check status displays a status of Warning.<br>What is a possible cause of the Warning status?<br>",ans:1,opts:["VM1 is stopped.", "VM1 does not have the latest version of the Azure VM Agent (WaAppAgent.exe) installed.", "VM1 has an unmanaged disk.", "A Recovery Services vault is unavailable."],exp:"With the Shared service plan, you are only allowed to run an App for 240 minutes a day. So, this\nwill not resolve the issue.\n\nhttps://azure.microsoft.com/en-us/pricing/details/app-service/plans/"},

{id:316,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1 that runs Windows Server 2016.<br>You need to create an alert in Azure when more than two error events are logged to the System event log on VM1 within an hour.<br>Solution: You create an Azure Log Analytics workspace and configure the Agent configuration settings. You install the Microsoft Monitoring Agent on VM1. You create an alert in Azure Monitor and specify the Log Analytics workspace as the source.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"User1: Read and Data Access\nUser2: Owner\n\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#reader-and-data-\naccess\nLets you view everything but will not let you delete or create a storage account or contained\nresource. It will also allow read/write access to all data contained in a storage account via access\nto storage account keys.\n\nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#owner\nGrants full access to manage all resources, including the ability to assign roles in Azure RBAC."},
{id:317,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription.<br>You deploy a virtual machine scale set that is configured as shown in the following exhibit.<br><img src=\"imgs/0031800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that answers each question based on the information presented in the graphic<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0031900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"At 9:00 AM, the scale set starts and CPU utilization is 90 percent for",options:["15 minutes. How many virtual machine instances will be running at 2","9:15 AM?","8)","4","5"]},{label:"At 10:00 AM, the scale set has five virtual machine instances",options:["running and CPU utilization falls to less than 15 percent for 60","minutes. How many virtual machine instances will be running at 1","11:00 AM? 2","3","4"]}],ans_img:"imgs/0032000001.jpg",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/virtual-machine-scale-sets/virtual-machine-scale-sets-autoscale-portal"},
{id:318,cat:"Identity",q:"You have web apps in the West US, Central US and East US Azure regions.<br>You have the App Service plans shown in the following table.<br><img src=\"imgs/0032100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to create an additional App Service plan named ASP5 that will use the Linux operating system.<br>You need to identify in which of the currently used locations you can deploy ASP5.<br>What should you recommend?<br>",ans:0,opts:["West US, Central US, or East US", "Central US only", "East US only", "West US only"],exp:"Option A is incorrect since it is the process server that sends the replication data\nOption D is incorrect since the process server needs to communicate over port 359\nhttps://docs.microsoft.com/en-us/azure/site-recovery/physical-azure-architecture"},
{id:319,cat:"Compute",q:"You plan to deploy several Azure virtual machines that will run Windows Server 2019 in a virtual machine scale set by using an Azure Resource Manager template.<br>You need to ensure that NGINX is available on all the virtual machines after they are deployed.<br>What should you use?<br>",ans:1,opts:["the New-AzConfigurationAssignment cmdlet", "a Desired State Configuration (DSC) extension", "Azure Active Directory (Azure AD) Application Proxy", "Azure Application Insights"],exp:"You can't delete a Recovery Services vault if it is registered to a server and holds backup data. If\nyou try to delete a vault, but can't, the vault is still configured to receive backup data.\nRemove vault dependencies and delete vault\nIn the vault dashboard menu, scroll down to the Protected Items section, and click Backup Items.\nIn this menu, you can stop and delete Azure File Servers, SQL Servers in Azure VM, and Azure\nvirtual machines.\n\nReferences: https://docs.microsoft.com/en-us/azure/backup/backup-azure-delete-vault\nYou can't delete a Recovery Services vault if it is registered to a server and holds backup data. If\nyou try to delete a vault, but can't, the vault is still configured to receive backup data.\nRemove vault dependencies and delete vault\nIn the vault dashboard menu, scroll down to the Protected Items section, and click Backup Items.\nIn this menu, you can stop and delete Azure File Servers, SQL Servers in Azure VM, and Azure\nvirtual machines."},
{id:320,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0032200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>In Azure Cloud Shell, you need to create a virtual machine by using an Azure Resource Manager (ARM) template.<br>How should you complete the command? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0032300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0032300002.jpg",exp:"Correct answer is:\nVNET1 will only have Department: D1 tag & VNET 2 will only have Label : Value1 tag upvoted 374 times Mucker973 3\u00a0years, 4\u00a0months ago nope, your answer is incorrect and the answers given are correct. You are assuming that Dept: D1 overwrites label:value (well I assume you did based on your answer), but resources can have any amount of tags applied. PLUS I have confirmed this in a lab upvoted 6 times amiban 2\u00a0years, 11\u00a0months ago but can't be applied by policy, we need to be compliant while creating the resources wrt the tags. upvoted 1 times ... cnduknthm 3\u00a0years ago Its not about OVERWRITTING... Its about the assignment of policy. The policy applies to resources that are created only after policy was applied but VNET1 is created before assigning the policy to Resource Group and for that reason VNET1 has only one tag which is Department : D1 upvoted 12 times ... ... Dennis_SOn 3\u00a0years, 3\u00a0months ago what is the answer? your answer seems not in the options? upvoted 2 times Dennis_SOn 3\u00a0years, 3\u00a0months ago are you referring to this answer?\ntag. vnet1 : departement D1 tag only.\nVNET1 - Department: D1 only VNET2 - Label: Value1 only upvoted 6 times Dennis_SOn 3\u00a0years, 3\u00a0months ago tag. vnet1 --- Department: D1 only.\nVNET1 - Department: D1 only VNET2 --- Label: Value1 only upvoted 2 times ... ... ... awssecuritynewbie 3\u00a0years, 1\u00a0month ago this is wrong people do not like it! upvoted 7 times ... marioZuo 2\u00a0years, 3\u00a0months ago Per tested, you are right! upvoted 4 ti"},
{id:321,cat:"Containers",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some questions sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You deploy an Azure Kubernetes Service (AKS) cluster named AKS1.<br>You need to deploy a YAML file to AKS1.<br>Solution: From Azure Cloud Shell, you run az aks.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Answer: NO To deploy a YAML file, the command is: kubectl apply -f example.yaml Src: https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough"},
{id:322,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1 that runs Windows Server 2016.<br>You need to create an alert in Azure when more than two error events are logged to the System event log on VM1 within an hour.<br>Solution: You create an Azure Log Analytics workspace and configure the data settings. You add the Microsoft Monitoring Agent VM extension to VM1. You create an alert in Azure Monitor and specify the Log Analytics workspace as the source.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Incorrect Answers:\nB: The network interface has already been added to VM.\nC: The Outbound rules are fine.\nD: The inbound rules are fine. Port 3389 is used for Remote Desktop. Note: Rules are processed\nin priority order, with lower numbers processed before higher numbers, because lower numbers\nhave higher priority. Once traffic matches a rule, processing stops. As a result, any rules that\n\n\fexist with lower priorities (higher numbers) that have the same attributes as rules with higher\npriorities are not processed.\nReferences: https://docs.microsoft.com/en-us/azure/virtual-network/security-overview"},

{id:328,cat:"Networking",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription named Subscription1 that contains the resources shown in the following table.<br><img src=\"imgs/0033200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Subscription1 also includes a virtual network named VNET2. VM1 connects to a virtual network named VNET2 by using a network interface named NIC1.<br>You need to create a new network interface named NIC2 for VM1.<br>Solution: You create NIC2 in RG2 and West US.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"The virtual networks can be in the same or different regions, and from the same or different\nsubscriptions. When connecting VNets from different subscriptions, the subscriptions do not need\nto be associated with the same Active Directory tenant.\nConfiguring a VNet-to-VNet connection is a good way to easily connect VNets. Connecting a\nvirtual network to another virtual network using the VNet-to-VNet connection type (VNet2VNet) is\nsimilar to creating a Site-to-Site IPsec connection to an on-premises location. Both connectivity\ntypes use a VPN gateway to provide a secure tunnel using IPsec/IKE, and both function the same\nway when communicating.\nThe local network gateway for each VNet treats the other VNet as a local site. This lets you\nspecify additional address space for the local network gateway in order to route traffic.\nReferences: https://docs.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-howto-vnet-vnet-\nresource-manager-portal"},

{id:330,type:"drop",cat:"Storage",q:"HOTSPOT -<br>You have an Azure App Service app named WebApp1 that contains two folders named Folder1 and Folder2.<br>You need to configure a daily backup of WebApp1. The solution must ensure that Folder2 is excluded from the backup.<br>What should you create first, and what should you use to exclude Folder2? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0033600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Select the correct answer",options:["First create:","‘A Backup vault","A Recovery Services vault","Aresource group","To exclude Folder2, use:","A backup policy","A WebJob"]}],ans_img:"imgs/0033700001.jpg",exp:"Box 1: An Azure Storage account -\nApp Service can back up the following information to an Azure storage account and container that you have configured your app to use.\nApp configuration -\nFile content -\nDatabase connected to your app -\nNote: Choose your backup destination by selecting a Storage Account and Container. The storage account must belong to the same subscription as the app you want to back up. If you wish, you can create a new storage account or a new container in the respective pages.\nBox 2: A _backup.filter file -\nExclude files from your backup.\nSuppose you have an app that contains log files and static images that have been backup once and are not going to change. In such cases, you can exclude those folders and files from being stored in your future backups. To exclude files and folders from your backups, create a _backup.filter file in the D:\\home\\site\n\\wwwroot folder of your app. Specify the list of files and folders you want to exclude in this file.\nReference:\nhttps://docs.microsoft.com/en-us/azure/app-service/manage-backup"},

ct its last modified time. If there is a lifecycle management policy in effect for the storage account, then rehydrating a blob with Set Blob Tier can result "},
{id:333,cat:"Compute",q:"You have an Azure subscription that contains three virtual machines named VM1, VM2, and VM3. All the virtual machines are in an availability set named AVSet1.<br><br>You need to scale up VM1 to a new virtual machine size, but the intended size is unavailable.<br><br>What should you do first?",ans:1,opts:["Create a proximity placement group.", "Deallocate VM1.", "Convert AvSet1 into a managed availability set.", "Shut down VM3 and VM3."],exp:"To verify your custom domain name (example)\n1. Sign in to the Azure portal using a Global administrator account for the directory.\n2. Select Azure Active Directory, and then select Custom domain names.\n3. On the Fabrikam - Custom domain names page, select the custom domain name, Contoso.\n4. On the Contoso page, select Verify to make sure your custom domain is properly registered\nand is valid for Azure AD. Use either the TXT or the MX record type.\n\nNote:\n\n\fThere are several versions of this question in the exam. The question can have two correct\nanswers:\n1. MX\n2. TXT\nThe question can also have other incorrect answer options, including the following:\n1. SRV\n2. NSEC3"},

{id:344,type:"drop",cat:"Governance",q:"HOTSPOT<br>-<br><br>You need to configure a new Azure App Service app named WebApp1. The solution must meet the following requirements:<br><br>\u2022\tWebApp1 must be able to verify a custom domain name of app.contoso.com.<br>\u2022\tWebApp1 must be able to automatically scale up to eight instances.<br>\u2022\tCosts and administrative effort must be minimized.<br><br>Which pricing plan should you choose, and which type of record should you use to verify the domain? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct answer is worth one point.<br><br><img src=\"imgs/image686.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Pricing plan",options:["Basic","Free","Shared"]},{label:"Record type",options:["A","AAAA","PTR"]}],ans_img:"imgs/image687.png",exp:"WebApp1 must be able to verify a custom domain name of app.contoso.com. All paid tiers (Basic, Standard, Premium, Isolated) allow for custom domains.\nWebApp1 must be able to automatically scale up to eight instances. Auto-scaling is a feature that is available in the Standard, Premium, and Isolated tiers. It is not available in the Basic tier, which allows you to manually scale up to 3 instances.\nCosts and administrative effort must be minimized.\nPricing Plan: Given these requirements, the best option is the \"Standard\" tier. It offers both auto-scaling and custom domains, while being less expensive than the Premium or Isolated tiers. The Basic tier does not support auto-scaling, and the Free and Shared tiers do not support custom domains or auto-scaling.\n\nFor verifying a custom domain, Azure uses a CNAME or TXT record. The A record cannot be used for domain verification\n\nPricing Plan: Standard\nRecord Type: TXT upvoted 60 times Nathan12345 8\u00a0months, 3\u00a0weeks ago I researched, for custom domain CNAME or A record is cost-effective.\nsince CNAME is not an option A record is correct. upvoted 1 times ... BE1234 1\u00a0year, 12\u00a0months ago To verify a domain, Azure uses TXT and MX record. upvoted 17 times Ahja666 1\u00a0year, 5\u00a0months ago https://learn.microsoft.com/en-us/entra/fundamentals/add-custom-domain\nYeah, I can see TXT and MX above. upvoted 2 times ... ..."},
