{id:193,type:"hs",cat:"Storage",q:"HOTSPOT -<br>You have an Azure subscription that contains an Azure Storage account named storageaccount1.<br>You export storageaccount1 as an Azure Resource Manager template. The template contains the following sections.<br><img src=\"imgs/0020500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point<br>Hot Area:<br><img src=\"imgs/0020600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["A server that has a public IP address of 131.107.103.10 can access storageaccount1", "Individual blobs in storageaccount1 can be set to use the archive tier", "Global administrations in Azure Active Directory (Azure AD) can access a file share", "hosted in storageaccount1 by using their Azure AD credentials"],ans:["Yes", "No", "Yes", "Yes"],exp:"Box 1- Yes. VirtualNetworkRules & IpRules are blank, with the default action Allow. Box 2- Yes. Individual blobs can be set to the archive tier - ref.https://docs.microsoft.com/en-us/azure/storage/blobs/access-tiers-overview Bob 3. No. To access blob data in the Azure portal with Azure AD credentials, a user must have the following role assignments: A data access role, such as Storage Blob Data Contributor The Azure Resource Manager Reader role Ref.https://docs.microsoft.com/en-us/azure/storage/blobs/assign-azure-role-data-access?tabs=portal"},
{id:194,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1.<br>You have the devices shown in the following table.<br><img src=\"imgs/0020700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>From which devices can you use AzCopy to copy data to storage1?<br>",ans:1,opts:["Device 1 only", "Device1, Device2 and Device3", "Device1 and Device2 only", "Device1 and Device3 only"],exp:"Box 1: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 2: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 3: Yes\nUser3 can review the access guest users of Group1 which also includes Group2. UserB is the\nguest of Group2 and hence User3 can review the access of UserB."},
{id:195,cat:"Storage",q:"You have an Azure Storage account named storage1 that contains a blob container named container1.<br>You need to prevent new content added to container1 from being modified for one year.<br>What should you configure?<br>",ans:1,opts:["the access tier", "an access policy", "the Access control (IAM) settings", "the access level"],exp:"Box 1: No\nSubscription1 is a member of ManagementGroup21, ManagementGroup21 is a member of\nManagementGroup11, ManagementGroup11 is a member of the Tenant Root Group, The Tenant\nRoot group has \u2018Not allowed resource types for virtual network\u2019.\n\nBox 2: No:\nYou cannot create a VM, because based on the Policy you can only create VNETs in\nSybscription2 (ManagementGroup12).\n\nBox 3: No\nYou cannot ADD Subscription1 to ManagementGroup11, but you can MOVE Subscription1 from\nManagementGroup21 to ManagmentGroup11. Subscriptions can only be a member of ONE\nManagementGroup at a time.\n\nAllowed Resource Type (Deny): Defines the resource types that you can deploy. Its effect is to\ndeny all resources that aren't part of this defined list.\nNot allowed resource types (Deny): Prevents a list of resource types from being deployed.\nBased on the Policies, VNETs are not allowed in the Tenant Root Group scope, so you cannot\ndeploy VNETs. Also, VNETs only allowed in ManagementGroup12 scope, but you cannot deploy\nany other resource."},
{id:196,type:"img",cat:"Storage",q:"HOTSPOT -<br>You have an Azure Storage account named storage1 that contains a blob container. The blob container has a default access tier of Hot. Storage1 contains a container named conainer1.<br>You create lifecycle management rules in storage1 as shown in the following table.<br><img src=\"imgs/0020800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You perform the actions shown in the following table.<br><img src=\"imgs/0020900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0020900002.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image909.png",exp:"Answer B\nTime-based retention policies: With a time-based retention policy, users can set policies to store data for a specified interval. When a time-based retention policy is set, objects can be created and read, but not modified or deleted. After the retention period has expired, objects can be deleted but not overwritten. upvoted 68 times rrabeya 4\u00a0years ago https://docs.microsoft.com/en-us/azure/storage/blobs/immutable-storage-overview?tabs=azure-portal upvoted 4 times duomianhu 3\u00a0years, 6\u00a0months ago More specific: https://docs.microsoft.com/en-us/azure/storage/blobs/immutable-time-based-retention-policy-overview upvoted 6 times ... ... Carlosadan10 2\u00a0years, 8\u00a0months ago Thanks upvoted 1 times ..."},
{id:197,cat:"Storage",q:"You are configuring Azure Active Directory (Azure AD) authentication for an Azure Storage account named storage1.<br>You need to ensure that the members of a group named Group1 can upload files by using the Azure portal. The solution must use the principle of least privilege.<br>Which two roles should you configure for storage1? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[1, 2],opts:["Storage Account Contributor", "Storage Blob Data Contributor", "Reader", "Contributor", "Storage Blob Data Reader"],exp:"Box 1: will have no access\nThe IP 193.77.134.1 does not have access on the SAS, because it is not matching the SAS\nrequirements. IP is out of range.\n\nBox 2: will have no access\nThe SAS token is not supported in mounting Azure File share currently, it just supports the Azure\nstorage account key.\nSince it is using \"net use\" where it uses SMB, the SMB (Server Message Broker) protocol does\nnot support SAS. it still asks for username/password. Accordingly, it will give error wrong\nusername/pass and will not provide access."},

{id:199,cat:"Storage",q:"You have an on-premises server that contains a folder named D:\\Folder1.<br>You need to copy the contents of D:\\Folder1 to the public container in an Azure Storage account named contosodata.<br>Which command should you run?<br>",ans:2,opts:["https://contosodata.blob.core.windows.net/public", "azcopy sync D:\\folder1 https://contosodata.blob.core.windows.net/public --snapshot", "azcopy copy D:\\folder1 https://contosodata.blob.core.windows.net/public --recursive", "az storage blob copy start-batch D:\\Folder1 https://contosodata.blob.core.windows.net/public"],exp:"Box 1: contosostorage\nThe name of account\n\nBox 2: file.core.windows.net\n\nBox 3: data\nThe name of the file share is data.\n\nExample:"},
{id:200,cat:"Storage",q:"You have an Azure subscription.<br>In the Azure portal, you plan to create a storage account named storage1 that will have the following settings:<br>\u2711 Performance: Standard<br>\u2711 Replication: Zone-redundant storage (ZRS)<br>\u2711 Access tier (default): Cool<br>\u2711 Hierarchical namespace: Disabled<br>You need to ensure that you can set Account kind for storage1 to BlockBlobStorage.<br>Which setting should you modify first?<br>",ans:0,opts:["Performance", "Replication", "Access tier (default)", "Hierarchical namespace"],exp:"Step 1: Install the Azure File Sync agent on Server1\nThe Azure File Sync agent is a downloadable package that enables Windows Server to be\nsynced with an Azure file share\n\nStep 2: Register Server1.\nRegister Windows Server with Storage Sync Service\nRegistering your Windows Server with a Storage Sync Service establishes a trust relationship\nbetween your server (or cluster) and the Storage Sync Service.\n\nStep 3: Add a server endpoint\nCreate a sync group and a cloud endpoint.\nA sync group defines the sync topology for a set of files. Endpoints within a sync group are kept\nin sync with each other. A sync group must contain one cloud endpoint, which represents an\n\n\fAzure file share and one or more server endpoints. A server endpoint represents a path on\nregistered server."},

{id:202,cat:"Storage",q:"You create an Azure Storage account.<br>You plan to add 10 blob containers to the storage account.<br>For one of the containers, you need to use a different key to encrypt data at rest.<br>What should you do before you create the container?<br>",ans:3,opts:["Generate a shared access signature (SAS).", "Modify the minimum TLS version.", "Rotate the access keys.", "Create an encryption scope."],exp:"You can provide authorization credentials by using Azure Active Directory (AD), or by using a\nShared Access Signature (SAS) token.\n\nBox 1:\nBoth Azure Active Directory (AD) and Shared Access Signature (SAS) token are supported for\nBlob storage.\n\nBox 2:\nOnly Shared Access Signature (SAS) token is supported for File storage."},
{id:203,type:"img",cat:"Storage",q:"HOTSPOT<br>-<br><br>You have an Azure subscription. The subscription contains a storage account named storage1 that has the lifecycle management rules shown in the following table.<br><br><img src=\"imgs/image578.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>On June 1, you store two blobs in storage1 as shown in the following table.<br><br><img src=\"imgs/image579.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image580.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image581.png",exp:"N-N-N\nOn June 6, File1 will be in archive because File1 is in container 1, and rule 1 applies 3 days after june 1.\nOn June 1, File2 will still be in Hot tier because File2 is in container2, Rule3 and Rule4 havent hit yet.\nOn June 16, File2 will be deleted because Rule3 applies 10 days after June 1. upvoted 106 times kanag1 2\u00a0years, 9\u00a0months ago Thank you for the logical explanation ! upvoted 5 times ... xRiot007 2\u00a0years, 5\u00a0months ago On June 6, File 1 will be in Cool, because Rule 2 applies after 5 days for all containers. upvoted 13 times garmatey 2\u00a0years, 4\u00a0months ago Incorrect because lifecycle management policies cant move objects from archive to cool, so file 1 will remain in archive. upvoted 22 times maxsteele 2\u00a0years, 1\u00a0month ago Do you have a source on this? because what Im reading is that it can be done, but its not advised because rehydrating does not change the modified date. So the issue would be that the file would be moved out of Archive into Cool (as per the rules) but then get moved back to Archive because that rule still applies. There are other modifiers that can be set to prevent this but Microsoft recommends Copying the file out of Archive instead of moving it:\n\nhttps://learn.microsoft.com/en-us/azure/storage/blobs/archive-rehydrate-overview?source=recommendations\n\n\"Changing a blob's tier doesn't affect its last modified time. If there is a lifecycle management policy in effect for the storage account, then rehydrating a blob with Set Blob Tier can result "},
{id:204,type:"img",cat:"Storage",q:"HOTSPOT<br>-<br><br>You have an Azure subscription.<br><br>You plan to deploy a storage account named storage1 by using the following Azure Resource Manager (ARM) template.<br><br><img src=\"imgs/image582.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is hue. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image583.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image584.png",exp:"N-N-Y\ndeleteRetentionPolicy is 7 days, so can not be restored after 7 days. Means, backup is deleted after 7 days.\nallowBlobPublicAccess is true, so anyone can access the blob, not just on Azure.\nkind is Standard_LRS, so 3 local copies are stored. upvoted 78 times RougePotatoe 2\u00a0years, 9\u00a0months ago For #1 I don't think there is a retention policy listed for storage 1. \n\nThere is a retention policy listed for microsoft.storage/storageaccounts/blobservices which would not apply to storage 1 since that rule is for the container in storage 1. upvoted 3 times ..."},
{id:205,cat:"Storage",q:"You have an on-premises server that contains a folder named D:\\Folder1.<br><br>You need to copy the contents of D:\\Folder1 to the public container in an Azure Storage account named contosodata.<br><br>Which command should you run?",ans:2,opts:["az storage blob copy start D:\\Folder1 https://contosodata.blob.core.windows.net/public", "azcopy sync D:\\folder1 https://contosodata.blob.core.windows.net/public --snapshot", "azcopy copy D:\\folder1 https://contosodata.blob.core.windows.net/public --recursive", "az storage blob copy start-batch D:\\Folder1 https://contosodata.blob.core.windows.net/public"],exp:"Box 1: 4\nIf you resize the Scale Set all the VMs get resized at once, thus 4 is the correct answer.\n\nBox 2: 1\nAutomatic OS updates update 20% of the VMs at once, with a minimum of 1 VM instance at a\ntime. Also 20% of 4 = 0.8."},

{id:207,type:"dd",cat:"Compute",q:"DRAG DROP<br>-<br><br>You have an Azure subscription that contains a virtual machine named VM1.<br><br>You need to back up VM1. The solution must ensure that backups are stored across three availability zones in the primary region.<br><br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br><br><img src=\"imgs/image587.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",items:["Create a Recovery Services vault", "Set vault storage redundancy to Zone-Redundant Storage (ZRS)", "Create a backup policy and configure the backup for VM1"],ans:["Create a Recovery Services vault", "Set vault storage redundancy to Zone-Redundant Storage (ZRS)", "Create a backup policy and configure the backup for VM1"],exp:"Box 1: 10.0.0.0/16\nAddress prefix\ndestination-> Vnet 1 (Address space of Vnet1)\n\nBox 2: Virtual appliance\nNext hop type\nVM1 ->Virtual Appliance. You can specify IP address of VM 1 when configuring next hop as\nVirtual appliance.\n\nBox 3: Gateway Subnet\nAssigned to\nThis route is to be followed by Gateway Subnet for the incoming traffic. You can associate routing\ntable to the Subnet from Rout Table -> subnet ->Associate."},
{id:208,cat:"Compute",q:"You have an Azure subscription named Subscription1.<br><br>You have 5 TB of data that you need to transfer to Subscription1.<br><br>You plan to use an Azure Import/Export job.<br><br>What can you use as the destination of the imported data?",ans:1,opts:["an Azure Cosmos DB database", "Azure File Storage", "Azure SQL Database", "a virtual machine"],exp:"Box 1: No\nNSG1 has default rules, which denies any port open for inbound rules\n\nBox 2: Yes\nNSG2 has custom Rule1, allowing RDP port 3389 with TCP.\n\nBox 3: Yes\nVM1 and VM2 are in the same Vnet. By default, communication is allowed."},
{id:209,cat:"Governance",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image589.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to perform the tasks shown in the following table.<br><br><img src=\"imgs/image590.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Which tasks can you perform by using Azure Storage Explorer?",ans:3,opts:["Task1 and Task3 only", "Task1, Task2, and Task3 only", "Task1, Task3, and Task4 only", "Task2, Task3, and Task4 only", "Task1, Task2, Task3, and Task4"],exp:"Box 1: No\nVM1 has the NSG1 on Subnet1, which allows traffic over port 1433 between Subnet2 and\nSubnet1. BUT NSG2 also applied on NIC level for VM1 that blocks the traffic on port 1433. Hence\nNo traffic allowed.\n\nBox 2: Yes\nNo rule explicitly blocks communication from VM1. The default rules, which allow communication,\nare thus applied.\n\nBox 3: Yes\nNo rule explicitly blocks communication between VM2 and VM3 which are both on Subnet2. The\ndefault rules, which allow communication, are thus applied."},

 7\u00a0months ago Whatever Manage means by Microsoft standards, as per the doc they say, VM Contributor can manage. \nVirtual Machine Contributor\tLets you \"manage\" virtual machines, but not access to them, and not the virtual network or storage account they're connected to.\nI would go for B. upvoted 3 times Gadzee 3\u00a0years, 9\u00a0months ago I would go for B taking into account that they say \"least privilege\" upvoted 5 times Broniac 3\u00a0years, 8\u00a0months ago yes but, with B you can only achieve to manage VMs not Vnets which is also mentioned. upvoted 10 times ... ... Deputy7 3\u00a0years, 8\u00a0months ago Bro, It is User1 can deploy virtual machines and manage virtual networks. So, Definitely C. upvoted 2 times ... brico 4\u00a0years, 4\u00a0months ago Can't be B. As you mentioned in your response, \"and not the virtual network...\". C is the correct answer. upvoted 8 times Hari2017 3\u00a0years, 8\u00a0months ago Answer is C because though the question says"},

{id:218,type:"img",cat:"Storage",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains a storage account named storage1. The storage1 account contains a container named container1.<br><br>You create a blob lifecycle rule named rule1.<br><br>You need to configure rule1 to automatically move blobs that were NOT updated for 45 days from contained to the Cool access tier.<br><br>How should you complete the rule? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image651.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image652.png",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-identity-ad-ds-assign-permissions?tabs=azure-portal"},
{id:219,cat:"Storage",q:"You have an Azure subscription named Subscription1.<br><br>You have 5 TB of data that you need to transfer to Subscription1.<br><br>You plan to use an Azure Import/Export job.<br><br>What can you use as the destination of the imported data?",ans:1,opts:["an Azure Cosmos DB database", "Azure Blob Storage", "Azure SQL Database", "the Azure File Sync Storage Sync Service"],exp:"Step 1 (E): Install the Azure File Sync agent on Server1 The Azure File Sync agent is a\ndownloadable package that enables Windows Server to be synced with an Azure file share\nStep 2 (D): Register Server1.\nRegister Windows Server with Storage Sync Service\nRegistering your Windows Server with a Storage Sync Service establishes a trust relationship\nbetween your server (or cluster) and the Storage Sync Service. Step 3 (C): Create a sync group\nand a cloud endpoint. A sync group defines the sync topology for a set of files. Endpoints within a\nsync group are kept in sync with each other. A sync group must contain one cloud endpoint,\nwhich represents an Azure file share and one or more server endpoints. A server endpoint\nrepresents a path on registered server.\nReferences: https://docs.microsoft.com/en-us/azure/storage/files/storage-sync-files-deployment-\nguide"},
{id:220,cat:"Storage",q:"You plan to create an Azure Storage account named storage1 that will contain a file share named share1.<br><br>You need to ensure that share1 can support SMB Multichannel. The solution must minimize costs.<br><br>How should you configure storage?",ans:0,opts:["Premium performance with locally-redundant storage (LRS)", "Standard performance with zone-redundant storage (ZRS)", "Premium performance with geo-redundant storage (GRS)", "Standard performance with locally-redundant storage (LRS)"],exp:"Option A is incorrect since it is the process server that sends the replication data\nOption D is incorrect since the process server needs to communicate over port 359\nhttps://docs.microsoft.com/en-us/azure/site-recovery/physical-azure-architecture"},
{id:221,cat:"Storage",q:"You have an Azure subscription named Subscription1.<br><br>You have 5 TB of data that you need to transfer to Subscription1.<br><br>You plan to use an Azure Import/Export job.<br><br>What can you use as the destination of the imported data?",ans:1,opts:["Azure Data Lake Store", "Azure File Storage", "Azure SQL Database", "the Azure File Sync Storage Sync Service"],exp:"You can't delete a Recovery Services vault if it is registered to a server and holds backup data. If\nyou try to delete a vault, but can't, the vault is still configured to receive backup data.\nRemove vault dependencies and delete vault\nIn the vault dashboard menu, scroll down to the Protected Items section, and click Backup Items.\nIn this menu, you can stop and delete Azure File Servers, SQL Servers in Azure VM, and Azure\nvirtual machines.\n\nReferences: https://docs.microsoft.com/en-us/azure/backup/backup-azure-delete-vault\nYou can't delete a Recovery Services vault if it is registered to a server and holds backup data. If\nyou try to delete a vault, but can't, the vault is still configured to receive backup data.\nRemove vault dependencies and delete vault\nIn the vault dashboard menu, scroll down to the Protected Items section, and click Backup Items.\nIn this menu, you can stop and delete Azure File Servers, SQL Servers in Azure VM, and Azure\nvirtual machines."},
{id:222,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1.<br><br>You plan to use conditions when assigning role-based access control (RBAC) roles to storage1.<br><br>Which storage1 services support conditions when assigning roles?",ans:4,opts:["containers only", "file shares only", "tables only", "queues only", "containers and queues only", "files shares and tables only"],exp:"https://docs.microsoft.com/en-us/azure/virtual-machines/windows/find-unattached-disks\n\n\fQUESTION 69\nYou have an Azure subscription named Subscription1.\nYou deploy a Linux virtual machine named VM1 to Subscription1.\nYou need to monitor the metrics and the logs of VM1.\nWhat should you use?\n\nA.   Linux Diagnostic Extension (LAD) 3.0\nB.   Azure Analysis Services\nC.   The AzurePerformanceDiagnostics extension\nD.   Azure HDInsight\n\nAnswer: A\nExplanation:\nThe Linux Diagnostic Extension should be used which downloads the Diagnostic Extension (LAD)\nagent on Linux server."},

t .With kubenet, a route table must exist on your cluster subnet(s). AKS supports bringing your own existing subnet and route table.\"\nhttps://learn.microsoft.com/en-us/azure/aks/configure-kubenet#prerequisites upvoted 33 times ..."},
{id:224,cat:"Storage",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure Storage account named storage1.<br><br>You need to enable a user named User1 to list and regenerate storage account keys for storage1.<br><br>Solution: You assign the Storage Account Encryption Scope Contributor Role to User1.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"Incorrect Answers:\nB: The network interface has already been added to VM.\nC: The Outbound rules are fine.\nD: The inbound rules are fine. Port 3389 is used for Remote Desktop. Note: Rules are processed\nin priority order, with lower numbers processed before higher numbers, because lower numbers\nhave higher priority. Once traffic matches a rule, processing stops. As a result, any rules that\n\n\fexist with lower priorities (higher numbers) that have the same attributes as rules with higher\npriorities are not processed.\nReferences: https://docs.microsoft.com/en-us/azure/virtual-network/security-overview"},

type is only changeable when you creating storage which eliminate this options here. \nEnable support for Customer-managed keys is also not applied on this storage because storage is created by selecting Microsoft managed keys. upvoted 4 times youngjanpawel 10\u00a0months ago It's not correct. Tested in lab\nPerformance can't be changed\n\"Standard storage accounts are backed by magnetic drives and provide the lowest cost per GB. They're best for applications that require bulk storage or where data is accessed infrequently. Premium storage accounts are backed by solid state drives and offer c"},
{id:226,type:"drop",cat:"Storage",q:"HOTSPOT<br>-<br><br>You have an Azure subscription.<br><br>You plan to deploy a new storage account.<br><br>You need to configure encryption for the account. The solution must meet the following requirements:<br><br>\u2022\tUse a customer-managed key stored in a key vault.<br>\u2022\tUse the maximum supported bit length.<br><br>Which type of key and which bit length should you use? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image674.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Key",options:["AES","3DES"]},{label:"Bit length",options:["2048","0","8192"]}],ans_img:"imgs/image675.png",exp:"Answer is correct:\n Key: RSA\nlength: 4096\nhttps://learn.microsoft.com/en-us/azure/storage/common/customer-managed-keys-overview#key-vault-requirements upvoted 16 times"},

{id:229,type:"img",cat:"Networking",q:"HOTSPOT<br>-<br><br>You have an Azure subscription.<br><br>You plan to create a role definition to meet the following requirements:<br><br>\u2022\tUsers must be able to view the configuration data of a storage account.<br>\u2022\tUsers must be able to perform all actions on a virtual network.<br>\u2022\tThe solution must use the principle of least privilege.<br><br>What should you include in the role definition for each requirement? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image707.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image708.png",exp:"Ans is correct. Passes the exam on 15 OCT. This question was there. Thanks ET Team upvoted 5 times AjmalNeelambra 2\u00a0years ago Did you purchase ET contribution subscription ? upvoted 2 times ..."},
{id:230,cat:"Governance",q:"You have an Azure subscription named Subscription1.<br><br>You have 5 TB of data that you need to transfer to Subscription1.<br><br>You plan to use an Azure Import/Export job.<br><br>What can you use as the destination of the imported data?",ans:2,opts:["Azure Data Factory", "the Azure File Sync Storage Sync Service", "Azure File Storage", "Azure SQL Database"],exp:"The virtual networks can be in the same or different regions, and from the same or different\nsubscriptions. When connecting VNets from different subscriptions, the subscriptions do not need\nto be associated with the same Active Directory tenant.\nConfiguring a VNet-to-VNet connection is a good way to easily connect VNets. Connecting a\nvirtual network to another virtual network using the VNet-to-VNet connection type (VNet2VNet) is\nsimilar to creating a Site-to-Site IPsec connection to an on-premises location. Both connectivity\ntypes use a VPN gateway to provide a secure tunnel using IPsec/IKE, and both function the same\nway when communicating.\nThe local network gateway for each VNet treats the other VNet as a local site. This lets you\nspecify additional address space for the local network gateway in order to route traffic.\nReferences: https://docs.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-howto-vnet-vnet-\nresource-manager-portal"},
{id:231,type:"drop",cat:"Compute",q:"HOTSPOT -<br><br>You have an Azure subscription that contains a virtual machine named VM1.<br><br>To VM1, you plan to add a 1-TB data disk that meets the following requirements:<br><br>\u2022\tProvides data resiliency in the event of a datacenter outage.<br>\u2022\tProvides the lowest latency and the highest performance.<br>\u2022\tEnsures that no data loss occurs if a host fails.<br><br>You need to recommend which type of storage and host caching to configure for the new data disk.<br><br><img src=\"imgs/image709.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Storage type",options:["Premium SSD that uses locally-redundant storage (LRS","Premium SSD that uses zone-redundant storage (ZRS)","Standard SSD that uses locally-redundant storage (LRS)","Standard SSD that uses zone-redundant storage (ZRS)"]},{label:"Host caching",options:["None","Read-only","Read/Write"]}],ans_img:"imgs/image912.png",exp:"1. Create Recovery Services Vault,\n2. Set Replication Policy to ZRS  (because of the requirement for having in three separate zones)\n3. For VM1, create a backup policy upvoted 96 times P123123 2\u00a0years, 10\u00a0months ago Agreed\n\nhttps://learn.microsoft.com/en-us/azure/backup/backup-create-recovery-services-vault\nhttps://learn.microsoft.com/en-us/azure/backup/quick-backup-vm-portal upvoted 5 times ... Bravo_Dravel 9\u00a0months, 2\u00a0weeks ago Agreed\nTo back up VM1 and ensure that backups are stored across three availability zones in the primary region, you should perform the following actions in sequence:\n1. Create a Recovery Services vault: This is the first step to set up a backup solution in Azure. The Recovery Services vault will store the backup data.\n\n2. Set Replication to Zone redundant storage (ZRS): This ensures that the backup data is replicated across three availability zones in the primary region, providing high availability and durability.\n\n3. For VM1, create a backup policy and configure the backup: This step involves creating a backup policy that defines the schedule and retention of the backups, and then applying this policy to VM1 to start the backup process.\n\nSo, the correct sequence is:\n\n1. Create a Recovery Services vault.\n2. Set Replication to Zone redundant storage (ZRS).\n3. For VM1, create a backup policy and configure the backup. upvoted 3 times ..."},
{id:232,cat:"Compute",q:"You have an Azure virtual machine named VM1 and an Azure key vault named Vault1.<br><br>On VM1, you plan to configure Azure Disk Encryption to use a key encryption key (KEK).<br><br>You need to prepare Vault1 for Azure Disk Encryption.<br><br>Which two actions should you perform on Vault1? Each correct answer presents part of the solution.<br><br>NOTE: Each correct selection is worth one point.",ans:[1, 4],opts:["Select Azure Virtual machines for deployment.", "Create a new key.", "Create a new secret.", "Configure a key rotation policy.", "Select Azure Disk Encryption for volume encryption."],exp:"https://docs.microsoft.com/en-us/azure/virtual-machine-scale-sets/virtual-machine-scale-sets-\nmanage-cli"},
{id:233,cat:"Compute",q:"You have an Azure subscription that contains a virtual machine named VM1 and an Azure key vault named KV1.<br><br>You need to configure encryption for VM1. The solution must meet the following requirements:<br><br>\u2022\tStore and use the encryption key in KV1.<br>\u2022\tMaintain encryption if VM1 is downloaded from Azure.<br>\u2022\tEncrypt both the operating system disk and the data disks.<br><br>Which encryption method should you use?",ans:2,opts:["customer-managed keys", "Confidential disk encryption", "Azure Disk Encryption", "encryption at host"],exp:"The virtual machine you attach a network interface to and the virtual network you connect it to\nmust exist in the same location, here West US, also referred to as a region."},

{id:235,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1. The storage1 account contains a container named container1.<br><br>You need to configure access to container1. The solution must meet the following requirements:<br>\u2022\tOnly allow read access.<br>\u2022\tAllow both HTTP and HTTPS protocols.<br>\u2022\tApply access permissions to all the content in the container.<br><br>What should you use?",ans:1,opts:["an access policy", "a shared access signature (SAS)", "Azure Content Delivery Network (CDN)", "access keys"],exp:"To verify your custom domain name (example)\n1. Sign in to the Azure portal using a Global administrator account for the directory.\n2. Select Azure Active Directory, and then select Custom domain names.\n3. On the Fabrikam - Custom domain names page, select the custom domain name, Contoso.\n4. On the Contoso page, select Verify to make sure your custom domain is properly registered\nand is valid for Azure AD. Use either the TXT or the MX record type.\n\nNote:\n\n\fThere are several versions of this question in the exam. The question can have two correct\nanswers:\n1. MX\n2. TXT\nThe question can also have other incorrect answer options, including the following:\n1. SRV\n2. NSEC3"},
{id:236,cat:"Storage",q:"You need to create an Azure Storage account named storage1. The solution must meet the following requirements:<br><br>\u2022\tSupport Azure Data Lake Storage.<br>\u2022\tMinimize costs for infrequently accessed data.<br>\u2022\tAutomatically replicate data to a secondary Azure region.<br><br>Which three options should you configure for storage1? Each correct answer presents part of the solution.<br><br>NOTE: Each correct answer is worth one point.",ans:[1, 2, 4],opts:["zone-redundant storage (ZRS)", "the Cool access tire", "geo-redundant storage (GRS)", "the Hot access tier", "hierarchical namespace"],exp:"No, the right solution is to modify the name server at the domain register.\nhttps://docs.microsoft.com/en-us/azure/active-directory/fundamentals/add-custom-domain"},
{id:237,type:"drop",cat:"Storage",q:"HOTSPOT<br>-<br><br>You have an Azure Storage account named storage1 that contains two containers named container1 and container2. Blob versioning is enabled for both containers.<br><br>You periodically take blob snapshots of critical blobs.<br><br>You create the following lifecycle management policy.<br><br><img src=\"imgs/image770.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image771.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Select the correct answer",options:["sist et","bob snapshot automatically moves to the Cool access ter after 15 days. oO"]}],ans_img:"imgs/image772.png",exp:"Answer B\nTime-based retention policies: With a time-based retention policy, users can set policies to store data for a specified interval. When a time-based retention policy is set, objects can be created and read, but not modified or deleted. After the retention period has expired, objects can be deleted but not overwritten. upvoted 68 times rrabeya 4\u00a0years ago https://docs.microsoft.com/en-us/azure/storage/blobs/immutable-storage-overview?tabs=azure-portal upvoted 4 times duomianhu 3\u00a0years, 6\u00a0months ago More specific: https://docs.microsoft.com/en-us/azure/storage/blobs/immutable-time-based-retention-policy-overview upvoted 6 times ... ... Carlosadan10 2\u00a0years, 8\u00a0months ago Thanks upvoted 1 times ..."},
{id:238,cat:"Storage",q:"You have an Azure subscription that contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image773.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Which storage account can be converted to zone-redundant storage (ZRS) replication?",ans:1,opts:["storage1", "storage2", "storage3", "storage4"],exp:"How can I freeze or lock my production/critical Azure resources from accidental deletion? There\nis way to do this with both ASM and ARM resources using Azure resource lock.\nReferences: https://blogs.msdn.microsoft.com/azureedu/2016/04/27/using-azure-resource-\nmanager-policy-and-azure-lock-to-control-your-azure-resources/"},
{id:239,cat:"Governance",q:"You have an Azure subscription that contains the devices shown in the following table.<br><br><img src=\"imgs/image774.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>On which devices can you install Azure Storage Explorer?",ans:3,opts:["Device1 only", "Device1 and Device2 only", "Device1 and Device3 only", "Device1, Device2, and Device3 only", "Device1, Device3, and Device4 only"],exp:"So, when you attach or have a network interface for a Virtual Machine, that network interface can\n\n\fhave both a private and public IP address.\n\nSo, by this measure, we only need to define 5 network interface cards, one for each virtual\nmachine.\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-network-network-interface"},

{id:243,type:"img",cat:"Storage",q:"HOTSPOT<br>-<br><br>You have an Azure subscription. The subscription contains a storage account named storage1 that has the lifecycle management rules shown in the following table.<br><br><img src=\"imgs/image782.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>On June 1, you store two blobs in storage1 as shown in the following table.<br><br><img src=\"imgs/image783.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image784.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image785.png",exp:"N-N-N\nOn June 6, File1 will be in archive because File1 is in container 1, and rule 1 applies 3 days after june 1.\nOn June 1, File2 will still be in Hot tier because File2 is in container2, Rule3 and Rule4 havent hit yet.\nOn June 16, File2 will be deleted because Rule3 applies 10 days after June 1. upvoted 106 times kanag1 2\u00a0years, 9\u00a0months ago Thank you for the logical explanation ! upvoted 5 times ... xRiot007 2\u00a0years, 5\u00a0months ago On June 6, File 1 will be in Cool, because Rule 2 applies after 5 days for all containers. upvoted 13 times garmatey 2\u00a0years, 4\u00a0months ago Incorrect because lifecycle management policies cant move objects from archive to cool, so file 1 will remain in archive. upvoted 22 times maxsteele 2\u00a0years, 1\u00a0month ago Do you have a source on this? because what Im reading is that it can be done, but its not advised because rehydrating does not change the modified date. So the issue would be that the file would be moved out of Archive into Cool (as per the rules) but then get moved back to Archive because that rule still applies. There are other modifiers that can be set to prevent this but Microsoft recommends Copying the file out of Archive instead of moving it:\n\nhttps://learn.microsoft.com/en-us/azure/storage/blobs/archive-rehydrate-overview?source=recommendations\n\n\"Changing a blob's tier doesn't affect its last modified time. If there is a lifecycle management policy in effect for the storage account, then rehydrating a blob with Set Blob Tier can result "},

{id:250,type:"img",cat:"Compute",q:"HOTSPOT -<br><br><br>Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You implement the planned changes for cont2.<br><br>What is the maximum number of additional access policies you can create for cont2? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image877.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image915.png",exp:"Box 1: No \nReference: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference#attribute-assignment-administrator (read the note)\n\nBox 2: No\nReference: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference#attribute-definition-administrator (definition admin can not assign roles)\n\nBox 3: No \nReference: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference#attribute-assignment-administrator (Read the Actions column in that link table; It has only users and servicePrincipals; not groups) upvoted 10 times"},
{id:251,cat:"Compute",q:"Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You need to configure encryption for the virtual machines. The solution must meet the technical requirements.<br><br>Which virtual machines can you encrypt?",ans:2,opts:["VM1 and VM3", "VM4 and VM5", "VM2 and VM3", "VM2 and VM4"],exp:"You should configure the storage account to store its keys in Azure Key Vault. Azure Key Vault\nprovides a mechanism to store secrets, such as storage account keys, user credentials, and\ndigital certificates, securely in the Microsoft Azure cloud. You can access the underlying\nRepresentational State Transfer (REST) application programming interface (API) to rotate or\nretrieve the secrets in your source code.\nYou should not enable SSE on the storage account for two reasons. First, SSE is enabled\nautomatically on all Azure storage accounts and encrypts all storage account data at rest.\nSecond, SSE in its native form uses Microsoft-managed access keys, which violates the scenario\nconstraint for customer-managed keys.\nYou should not require secure transfer for the storage account. Secure transfer forces all REST\nAPI calls to use HTTPS instead of HTTP. This feature has nothing to do with either access keys\nor their management and rotation.\nYou should not create a service endpoint between the storage account and a VNet. A service\nendpoint allows you limit traffic to a storage account from resources residing on an Azure VNet."},
{id:252,cat:"Compute",q:"Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You need to implement the planned changes for the storage account content.<br><br>Which containers and file shares can you use to organize the content?",ans:3,opts:["share1 only", "cont1 and share1 only", "share1 and share2 only", "cont1, share1, and share2 only", "cont1, cont2, share1, and share2"],exp:"You should configure peering between prod-vnet-west and prod-vnet-west. Peering enables VMs\nlocated on two different Azure VNets to be grouped logically together and thereby connect and\nshare resources. Traditional VNet peering involves two VNets located in the same region.\nHowever, global VNet peering, generally available in summer 2018, supports VNets distributed\nacross any Azure public region.\nYou should not deploy a VNet-to-VNet VPN. First, global VNet peering means that you are no\nlonger required to use a VPN gateway to link VNets located in different Azure regions. Second,\nthe scenario requires that you minimize cost and complexity.\nYou should not create a private zone in Azure DNS. This action would be necessary for\nresources in peered VNets to resolve each other's DNS host names. However, the scenario\nmakes no requirement for private host name resolution.\nYou should not add a service endpoint to each VNet. Service endpoints allow you to limit access\nto certain Azure resources, such as storage accounts and Azure SQL databases, to resources\nlocated on a single VNet. Thus, this feature cannot be used to link two VNets as the scenario\nmandates."},
{id:253,cat:"Containers",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You deploy an Azure Kubernetes Service (AKS) cluster named AKS1.<br>You need to deploy a YAML file to AKS1.<br>Solution: From Azure CLI, you run az aks.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Correct Answer B - No To deploy the YAML file you need to runs kubectl apply -f file_name.yaml https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough"},
{id:254,cat:"Containers",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You deploy an Azure Kubernetes Service (AKS) cluster named AKS1.<br>You need to deploy a YAML file to AKS1.<br>Solution: From Azure CLI, you run the kubectl client.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:255,cat:"Storage",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You deploy an Azure Kubernetes Service (AKS) cluster named AKS1.<br>You need to deploy a YAML file to AKS1.<br>Solution: From Azure CLI, you run azcopy.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"When you deploy a template, you specify a resource group that will contain the resources. Before\nrunning the deployment command, create the resource group or during deployment also we can\ncreate the resource group. If you try to deploy your own template in the portal, there are 3\navailable options - \"Subscription\", \"Resource Group\", \"Location\". Resource group is the only one\nof the three options available in this list of answers.Location\".\nhttps://github.com/Azure/azure-quickstart-templates/blob/master/101-vm-simple-\nwindows/azuredeploy.json"},
{id:256,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1 that runs Windows Server 2016.<br>You need to create an alert in Azure when more than two error events are logged to the System event log on VM1 within an hour.<br>Solution: You create an Azure storage account and configure shared access signatures (SASs). You install the Microsoft Monitoring Agent on VM1. You create an alert in Azure Monitor and specify the storage account as the source.<br>Does that meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Under the Configure Runbook option, enable the runbook and choose the config source as either\nbuilt-in or user. If you select the option 'user', you get to choose from a runbook that you have\ncreated in your automation account. If you select 'Built-in', a list of runbooks is presented in a\ndrop-down menu. Choose 'Scale up VM' to resize the VM to the next larger size."},
{id:257,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1. Subscription1 contains the resources in the following table.<br><img src=\"imgs/0023300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VNet1 is in RG1. VNet2 is in RG2. There is no connectivity between VNet1 and VNet2.<br>An administrator named Admin1 creates an Azure virtual machine named VM1 in RG1. VM1 uses a disk named Disk1 and connects to VNet1. Admin1 then installs a custom application in VM1.<br>You need to move the custom application to VNet2. The solution must minimize administrative effort.<br>Which two actions should you perform? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0023400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"First action",options:["\\Create a network interface in RG2.","Detach a network interface.","Delete VM1.","Move a network interface to RG2."]},{label:"Second action",options:["Attach a network interface.","Create a network interface in RG2.","Create a new virtual machine.","Move VM1 to RG2."]}],ans_img:"imgs/0023500001.png",exp:"Correct Answer: A\n\nYou can only move a resource to a Resource Group or Subscription, but the location stays the same. When you move WebApp1 to RG2, the resource will be restricted based on the policy of the new Resource Group (Policy2). upvoted 136 times Veks 3\u00a0years, 6\u00a0months ago I agree with the answer (A is correct), but your comments don't seem correct.\nyou are moving app from one region to another. Procedure is listed below:\n- Create a back up of the source app.\n- Create an app in a new App Service plan, in the target region.\n- Restore the back up in the target app\n- If you use a custom domain, bind it preemptively to the target app with 'awverify'. and enable the domain in the target app.\n- Configure everything else in your target app to be the same as the source app and verify your configuration.\n- When you're ready for the custom domain to point to the target app, remap the domain name.\n\nHere it states that you have to create new AppService plan in new region. So old plan stays where it is.\nReference:\nhttps://docs.microsoft.com/en-us/azure/app-service/manage-move-across-regions upvoted 21 times Ajinkyakore 3\u00a0years, 5\u00a0months ago So technically there will be no any migration or transfer happens? upvoted 2 times bryant12138 2\u00a0years, 1\u00a0month ago yeah I think you're right, both rg and subscription are ideological management tools upvoted 1 times ... ... klasbeatz 3\u00a0years, 4\u00a0months ago Your right.....New-AzAppServicePlan -Location \"North Central US\" -ResourceGroupName Desti"},
{id:258,cat:"Compute",q:"You download an Azure Resource Manager template based on an existing virtual machine. The template will be used to deploy 100 virtual machines.<br>You need to modify the template to reference an administrative password. You must prevent the password from being stored in plain text.<br>What should you create to store the password?<br>",ans:0,opts:["an Azure Key Vault and an access policy", "an Azure Storage account and an access policy", "a Recovery Services vault and a backup policy", "Azure Active Directory (AD) Identity Protection and an Azure policy"],exp:"Connection monitor lets you know the round-trip time to make the connection, in milliseconds.\nConnection monitor probes the connection every 60 seconds, so you can monitor latency over\ntime."},
{id:259,type:"drop",cat:"AppService",q:"HOTSPOT -<br>You have the App Service plans shown in the following table.<br><img src=\"imgs/0023600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to create the Azure web apps shown in the following table.<br><img src=\"imgs/0023700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to identify which App Service plans can be used for the web apps.<br>What should you identify? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0023700002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"WebApp1",options:["ASP1 only","‘ASP3 only","‘ASP1 and ASP2 only","‘ASP1 and ASP3 only","ASP1, ASP2, and ASP3"]},{label:"WebApp2",options:["ASP1 only","ASP3 only","ASP1 and ASP2 only","ASP1 and ASP3 only","ASP1, ASP2, and ASP3"]}],ans_img:"imgs/0023800001.png",exp:"Box 1: ASP1 ASP3 -\nAsp1, ASP3: ASP.NET Core apps can be hosted both on Windows or Linux.\nNot ASP2: The region in which your app runs is the region of the App Service plan it's in.\nBox 2: ASP1 -\nASP.NET apps can be hosted on Windows only.\nReference:\nhttps://docs.microsoft.com/en-us/azure/app-service/quickstart-dotnetcore?pivots=platform-linux https://docs.microsoft.com/en-us/azure/app-service/app-service-plan-manage#"},
{id:260,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You create a virtual machine scale set named Scale1. Scale1 is configured as shown in the following exhibit.<br><img src=\"imgs/0024000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0024100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"If Scale1 runs at 85% CPU for 6 min after deploy, Scale1 will be running [answer choice]",options:["2 virtual machines","4 virtual machines","6 virtual machines","10 virtual machines","20 virtual machines"]},{label:"If Scale1 starts at 25% then reaches 50% CPU for 6 min, Scale1 will be running [answer choice]",options:["4 virtual machines","6 virtual machines","8 virtual machines","10 virtual machines"]}],ans_img:"imgs/0024200001.jpg",exp:"Box 1: 6 virtual machines -\nThe Autoscale scale out rule increases the number of VMs by 2 if the CPU threshold is 80% or higher. The initial instance count is 4 and rises to 6 when the 2 extra instances of VMs are added.\nBox 2: 2 virtual machnes -\nThe Autoscale scale in rule decreases the number of VMs by 4 if the CPU threshold is 30% or lower. The initial instance count is 4 and thus cannot be reduced to\n0 as the minimum instances is set to 2. Instances are only added when the CPU threshold reaches 80%.\nReference:\nhttps://docs.microsoft.com/en-us/azure/azure-monitor/platform/autoscale-overview https://docs.microsoft.com/en-us/azure/azure-monitor/platform/autoscale-best-practices https://docs.microsoft.com/en-us/azure/azure-monitor/platform/autoscale-common-scale-patterns"},
{id:261,cat:"Compute",q:"You plan to automate the deployment of a virtual machine scale set that uses the Windows Server 2016 Datacenter image.<br>You need to ensure that when the scale set virtual machines are provisioned, they have web server components installed.<br>Which two actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[0, 3],opts:["Upload a configuration script", "Create an automation account", "Create an Azure policy", "Modify the extensionProfile section of the Azure Resource Manager template", "Create a new virtual machine scale set in the Azure portal"],exp:"User1 is global admin of contoso.onmicrosoft.com. As he created the new tenant called\nexternal.contoso.onmicrosoft.com, he will be the OWNER. Check the scope not just the role."},
{id:262,type:"drop",cat:"Containers",q:"HOTSPOT -<br>You have an Azure Kubernetes Service (AKS) cluster named AKS1 and a computer named Computer1 that runs Windows 10. Computer1 that has the Azure CLI installed.<br>You need to install the kubectl client on Computer1.<br>Which command should you run? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0024400001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Select the correct answer",options:[".","Vv 4 Install-cli","az aks","docker /package","msiexec.exe -name","Install-Module pull"]}],ans_img:"imgs/0024400002.jpg",exp:"Selected Answer: B Answer is correct B\n\nCluster administrators can configure Kubernetes role-based access control (Kubernetes RBAC) based on a user's identity or directory group membership. Azure AD authentication is provided to AKS clusters with OpenID Connect. OpenID Connect is an identity layer built on top of the OAuth 2.0 protocol\n\nhttps://docs.microsoft.com/en-us/azure/aks/managed-aad upvoted 78 times jackdryan 2\u00a0years, 8\u00a0months ago B is correct upvoted 2 times ... tweedo 3\u00a0years, 3\u00a0months ago This seems to be a correct answer in scope of listed answers, but please mind that AKS now supports direct integration with AAD, the method using OAuth 2.0 is considered legacy:\nhttps://docs.microsoft.com/en-us/azure/aks/azure-ad-integration-cli upvoted 34 times ... FredFrom 1\u00a0year ago it does not address the specific issue described in the question, which is that the administrator is unable to grant access to the AKS cluster to users in contoso.com.\n the issue here is not about configuring authentication mechanisms like OAuth 2.0; it\u2019s about ensuring that Azure AD integration is in place to allow access control for AKS.\nCorrect Answer: C. Recreate AKS1 upvoted 6 times ..."},
{id:263,type:"dd",cat:"Compute",q:"DRAG DROP -<br>You onboard 10 Azure virtual machines to Azure Automation State Configuration.<br>You need to use Azure Automation State Configuration to manage the ongoing consistency of the virtual machine configurations.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>NOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.<br>Select and Place:<br><img src=\"imgs/0024500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Create and upload a configuration to Azure Automation", "Compile a configuration into a node configuration", "Register a VM to be managed by State Configuration", "Specify configuration mode settings", "Assign a node configuration to a managed node", "Check the compliance status of a managed node"],ans:["Create and upload a configuration to Azure Automation", "Compile a configuration into a node configuration", "Check the compliance status of a managed node"],exp:"Only a global administrator can add users to this tenant."},
{id:264,cat:"Compute",q:"You have an Azure Resource Manager template named Template1 that is used to deploy an Azure virtual machine.<br>Template1 contains the following text:<br><img src=\"imgs/0024700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The variables section in Template1 contains the following text:<br>\"location\": \"westeurope\"<br>The resources section in Template1 contains the following text:<br><img src=\"imgs/0024700002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to deploy the virtual machine to the West US location by using Template1.<br>What should you do?<br>",ans:0,opts:["Modify the location in the resources section to westus", "Select West US during the deployment", "Modify the location in the variables section to westus"],exp:"https://kubernetes.io/docs/reference/access-authn-authz/authentication/"},
{id:265,cat:"Governance",q:"You create an App Service plan named Plan1 and an Azure web app named webapp1.<br>You discover that the option to create a staging slot is unavailable.<br>You need to create a staging slot for Plan1.<br>What should you do first?<br>",ans:0,opts:["From Plan1, scale up the App Service plan", "From webapp1, modify the Application settings", "From webapp1, add a custom domain", "From Plan1, scale out the App Service plan"],exp:"You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure AD).\nNote: With the increase in usage of Office 365 Groups, administrators and users need a way to\nclean up unused groups. Expiration policies can help remove inactive groups from the system\nand make things cleaner.\nWhen a group expires, all of its associated services (the mailbox, Planner, SharePoint site, etc.)\nare also deleted.\nYou can set up a rule for dynamic membership on security groups or Office 365 groups.\nIncorrect Answers:\nB, D, E: You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure\nAD)."},
{id:266,cat:"Compute",q:"You plan to move a distributed on-premises app named App1 to an Azure subscription.<br>After the planned move, App1 will be hosted on several Azure virtual machines.<br>You need to ensure that App1 always runs on at least eight virtual machines during planned Azure maintenance.<br>What should you create?<br>",ans:0,opts:["one virtual machine scale set that has 10 virtual machines instances", "one Availability Set that has three fault domains and one update domain", "one Availability Set that has 10 update domains and one fault domain", "one virtual machine scale set that has 12 virtual machines instances"],exp:"You are prevented from creating Azure SQL servers anywhere in Subscription 1 with the\nexception of ContosoRG1."},
{id:267,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1 that runs Windows Server 2016.<br>You need to create an alert in Azure when more than two error events are logged to the System event log on VM1 within an hour.<br>Solution: You create an event subscription on VM1. You create an alert in Azure Monitor and specify VM1 as the source<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You can move a VM and its associated resources to a different subscription by using the Azure\nportal.\nYou can now move an Azure Recovery Service (ASR) Vault to either a new resource group within\nthe current subscription or to a new subscription."},
{id:268,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure virtual machine named VM1. VM1 was deployed by using a custom Azure Resource Manager template named ARM1.json.<br>You receive a notification that VM1 will be affected by maintenance.<br>You need to move VM1 to a different host immediately.<br>Solution: From the Overview blade, you move the virtual machine to a different subscription.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Set-AzMarketplaceTerms - \"Accept or reject terms for a given publisher id(Publisher), offer\nid(Product) and plan id(Name). Please use Get-AzMarketplaceTerms to get the agreement\nterms.\"\n\nhttps://docs.microsoft.com/en-us/powershell/module/az.marketplaceordering/set-\nazmarketplaceterms?view=azps-8.3.0"},
