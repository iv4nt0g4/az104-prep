{id:526,type:"drop",cat:"Storage",q:"HOTSPOT -<br>You have an Azure subscription that contains an Azure Storage account named storage1 and the users shown in the following table.<br><img src=\"imgs/0053200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to monitor storage1 and to configure email notifications for the signals shown in the following table.<br><img src=\"imgs/0053200002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to identify the minimum number of alert rules and action groups required for the planned monitoring.<br>How many alert rules and action groups should you identify? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0053300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Alert rules",options:["1","2","13","4"]},{label:"Action groups",options:["4","2","3","4"]}],ans_img:"imgs/0053400001.jpg",exp:"Correct Answer:\n\nazcopy make 'https://mystorageaccount.blob.core.windows.net/vmimages'\n\nSimilar to OS Images, a VM Image is a collection of metadata and pointers to a set of VHDs (one VHD per disk) stored as page blobs in Azure Storage.\n\n\nReference:\n\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-ref-azcopy-make upvoted 293 times RougePotatoe 2\u00a0years, 9\u00a0months ago In case yall wanted to know where they got the quote from. You could've just googled it.\n\n\"Similar to OS Images, a VM Image is a collection of metadata and pointers to a set of VHDs (one VHD per disk) stored as page blobs in Azure Storage.\"\n\nhttps://azure.microsoft.com/en-us/blog/vm-image-blog-post/ upvoted 9 times garmatey 2\u00a0years, 6\u00a0months ago \"You could've just googled it.\"\nUm are you getting indignant over some imaginary person asking where some quote is from? upvoted 9 times tigerz 2\u00a0years, 2\u00a0months ago It must be nice being on such a high horse over us peasants. upvoted 2 times ... ... ... Juwizee 2\u00a0years, 1\u00a0month ago Say No More... The man himself got it again. upvoted 11 times ..."},
{id:527,cat:"Identity",q:"You have an Azure subscription that contains the identities shown in the following table.<br><img src=\"imgs/0053500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>User1, Principal1, and Group1 are assigned the Monitoring Reader role.<br>An action group named AG1 has the Email Azure Resource Manager Role notification type and is configured to email the Monitoring Reader role.<br>You create an alert rule named Alert1 that uses AG1.<br>You need to identity who will receive an email notification when Alert1 is triggered.<br>Who should you identify?<br>",ans:3,opts:["User1 and Principal1 only", "User1, User2, Principal1, and Principal2", "User1 only", "User1 and User2 only"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:528,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure virtual machine named VM1 and a Recovery Services vault named Vault1.<br>You create a backup policy named Policy1 as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0053600001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You configure the backup of VM1 to use Policy1 on Thursday, January 1 at 1:00 AM.<br>You need to identify the number of available recovery points for VM1.<br>How many recovery points are available on January 8 and January 15? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0053700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"January 8 at 2:00 PM (14:00)",options:["5","6","8","9"]},{label:"January 15 at 2:00 PM (14:00)",options:["5","8","17","19"]}],ans_img:"imgs/0053800001.jpg",exp:"Box 1: 6 -\n5 latest daily recovery points, which includes the weekly backup from the previous Sunday, plus the monthly recovery point.\nBox 2: 8 -\n5 latest daily recovery points, plus two weekly backups, plus the monthly recovery point.\nReference:\nhttps://social.technet.microsoft.com/Forums/en-US/854ab6ae-79aa-4bad-ac65-471c4d422e94/daily-monthly-yearly-recovery-points-and-storage-used? forum=windowsazureonlinebackup"},
{id:529,type:"drop",cat:"Monitor",q:"HOTSPOT -<br>You have the web apps shown in the following table.<br><img src=\"imgs/0053900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to monitor the performance and usage of the apps by using Azure Application Insights. The solution must minimize modifications to the application code.<br>What should you do on each app? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0054000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"App1",options:["Install the Log Analytics agent","Install the Azure Monitor agent","Use the Application Insights SDK","Install the Application Insights Agent"]},{label:"App2",options:["Install the Log Analytics agent","Install the Azure Monitor agent","Use the Application Insights SDK","Install the Application Insights Agent"]}],ans_img:"imgs/0054100001.png",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/azure-monitor/app/azure-web-apps"},
{id:530,cat:"Compute",q:"You have an Azure virtual machine named VM1.<br>You use Azure Backup to create a backup of VM1 named Backup1.<br>After creating Backup1, you perform the following changes to VM1:<br>\u2711 Modify the size of VM1.<br>\u2711 Copy a file named Budget.xls to a folder named Data.<br>\u2711 Reset the password for the built-in administrator account.<br>\u2711 Add a data disk to VM1.<br>An administrator uses the Replace existing option to restore VM1 from Backup1.<br>You need to ensure that all the changes to VM1 are restored.<br>Which change should you perform again?<br>",ans:3,opts:["Modify the size of VM1.", "Reset the password for the built-in administrator account.", "Add a data disk.", "Copy Budget.xls to Data."],exp:"A Recovery Services vault is a storage entity in Azure that houses data. The data is typically\ncopies of data, or configuration information for virtual machines (VMs), workloads, servers, or\nworkstations. You can use Recovery Services vaults to hold backup data for various Azure\nservices."},
{id:531,type:"hs",cat:"Identity",q:"HOTSPOT -<br>You have an Azure Active Directory (Azure AD) tenant named contoso.onmicrosoft.com that contains the users shown in the following table.<br><img src=\"imgs/0054300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You enable password reset for contoso.onmicrosoft.com as shown in the Password Reset exhibit. (Click the Password Reset tab.)<br><img src=\"imgs/0054300002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You configure the authentication methods for password reset as shown in the Authentication Methods exhibit. (Click the Authentication Methods tab.)<br><img src=\"imgs/0054400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0054500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["After User? answers three security questions correctly, he can", "reset his password immediately.", "If Usert forgets her password, she can reset the password by", "using the mobile phone app.", "User3 can add security questions to the password reset process {2}"],ans:["No", "No", "No", "Yes", "Yes"],exp:"User1 is global admin of contoso.onmicrosoft.com. As he created the new tenant called\nexternal.contoso.onmicrosoft.com, he will be the OWNER. Check the scope not just the role."},
{id:532,cat:"Networking",q:"Your company has a main office in London that contains 100 client computers.<br>Three years ago, you migrated to Azure Active Directory (Azure AD).<br>The company's security policy states that all personal devices and corporate-owned devices must be registered or joined to Azure AD.<br>A remote user named User1 is unable to join a personal device to Azure AD from a home network.<br>You verify that User1 was able to join devices to Azure AD in the past.<br>You need to ensure that User1 can join the device to Azure AD.<br>What should you do?<br>",ans:1,opts:["Assign the User administrator role to User1.", "From the Device settings blade, modify the Maximum number of devices per user setting.", "Create a point-to-site VPN from the home network of User1 to Azure.", "From the Device settings blade, modify the Users may join devices to Azure AD setting."],exp:"Only a global administrator can add users to this tenant."},
{id:533,type:"img",cat:"Backup",q:"HOTSPOT -<br>You have two Azure App Service app named App1 and App2. Each app has a production deployment slot and a test deployment slot.<br>The Backup Configuration settings for the production slots are shown in the following table.<br><img src=\"imgs/0054700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0054800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image944.png",exp:"NNY\n\nOn January 15th you will have 9 backups as 0 day retention is defined as indefinite.\n\n[How many days to keep a backup before automatically deleting it. Set to 0 for indefinite retention.]\n\nhttps://docs.microsoft.com/en-us/cli/azure/webapp/config/backup?view=azure-cli-latest\n\nThe DevOps / Web apps backup in the questions only includes the production slot. One cannot restore a test slot from a production slot backup.\n\n[If a slot is not specified, the API will create a backup for the production slot.]\n\nhttps://docs.microsoft.com/en-us/rest/api/appservice/web-apps/backup-slot\n\nJanuary 6th backup will still be within the 30 days retention as of January 15th. upvoted 97 times 117975e 2\u00a0months, 1\u00a0week ago Why do you give wrong answers:\nMS says: In Azure Backup, a \"0-day\" or zero-day retention period typically signifies no retention or that the feature is disabled for a specific type of backup or data. For example, setting a \"0\" retention for long-term backups in Azure SQL Database indicates that no long-term retention policy should be applied, while a \"0\" value for Azure App Service backups might suggest that scheduled backups are not being kept at all. The specific meaning of a 0-day retention depends on the Azure service and the feature it upvoted 1 times ... garmatey 2\u00a0years, 6\u00a0months ago great, i love when they use zero and don't mean zero... upvoted 44 times hebbo777 1\u00a0year, 11\u00a0months ago Hahaha crazy and confusing ,,, they can simply use unlimited shiittt upvoted 5 times "},
{id:534,type:"img",cat:"Identity",q:"HOTSPOT -<br>You have an Azure subscription that contains an Azure Active Directory (Azure AD) tenant named contoso.com. The tenant is synced to the on-premises Active<br>Directory domain. The domain contains the users shown in the following table.<br><img src=\"imgs/0054900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You enable self-service password reset (SSPR) for all users and configure SSPR to have the following authentication methods:<br>\u2711 Number of methods required to reset: 2<br>\u2711 Methods available to users: Mobile phone, Security questions<br>\u2711 Number of questions required to register: 3<br>\u2711 Number of questions required to reset: 3<br>You select the following security questions:<br>\u2711 What is your favorite food?<br>\u2711 In what city was your first job?<br>\u2711 What was the name of your first pet?<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0055000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image945.png",exp:"Selected Answer: B Answer is correct B\n\nCluster administrators can configure Kubernetes role-based access control (Kubernetes RBAC) based on a user's identity or directory group membership. Azure AD authentication is provided to AKS clusters with OpenID Connect. OpenID Connect is an identity layer built on top of the OAuth 2.0 protocol\n\nhttps://docs.microsoft.com/en-us/azure/aks/managed-aad upvoted 78 times jackdryan 2\u00a0years, 8\u00a0months ago B is correct upvoted 2 times ... tweedo 3\u00a0years, 3\u00a0months ago This seems to be a correct answer in scope of listed answers, but please mind that AKS now supports direct integration with AAD, the method using OAuth 2.0 is considered legacy:\nhttps://docs.microsoft.com/en-us/azure/aks/azure-ad-integration-cli upvoted 34 times ... FredFrom 1\u00a0year ago it does not address the specific issue described in the question, which is that the administrator is unable to grant access to the AKS cluster to users in contoso.com.\n the issue here is not about configuring authentication mechanisms like OAuth 2.0; it\u2019s about ensuring that Azure AD integration is in place to allow access control for AKS.\nCorrect Answer: C. Recreate AKS1 upvoted 6 times ..."},
{id:535,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following users in an Azure Active Directory tenant named contoso.onmicrosoft.com:<br><img src=\"imgs/0055100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>User1 creates a new Azure Active Directory tenant named external.contoso.onmicrosoft.com.<br>You need to create new user accounts in external.contoso.onmicrosoft.com.<br>Solution: You instruct User1 to create the user accounts.<br>Does that meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure AD).\nNote: With the increase in usage of Office 365 Groups, administrators and users need a way to\nclean up unused groups. Expiration policies can help remove inactive groups from the system\nand make things cleaner.\nWhen a group expires, all of its associated services (the mailbox, Planner, SharePoint site, etc.)\nare also deleted.\nYou can set up a rule for dynamic membership on security groups or Office 365 groups.\nIncorrect Answers:\nB, D, E: You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure\nAD)."},
{id:536,cat:"Compute",q:"You have an existing Azure subscription that contains 10 virtual machines.<br>You need to monitor the latency between your on-premises network and the virtual machines.<br>What should you use?<br>",ans:2,opts:["Service Map", "Connection troubleshoot", "Network Performance Monitor", "Effective routes"],exp:"You are prevented from creating Azure SQL servers anywhere in Subscription 1 with the\nexception of ContosoRG1."},
{id:537,type:"drop",cat:"Governance",q:"HOTSPOT -<br>You have an Azure App Service plan named ASP1.<br>CPU usage for ASP1 is shown in the following exhibit.<br><img src=\"imgs/0055300001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0055400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Select the correct answer",options:["The average CPU percentage is calculated [answer choice] per day [iy","once","four times","six times","24 times","ASP1 must be [answer choice] to optimize CPU usage [si","scaled up","scaled down","scaled out"]}],ans_img:"imgs/0055500001.png",exp:"Box 1: four times -\nFrom the exhibit we see that the time granularity  is 6 hours: Last 30 days (Automatic - 6 hours).\nCPU Percentage Last days Automatic - hours\nBox 2: scaled up -\nScale up when:\n* You see that your workloads are hitting some performance limit such as CPU or I/O limits.\n* You need to quickly react to fix performance issues that can't be solved with classic database optimization.\n* You need a solution that allows you to change service tiers to adapt to changing latency requirements.\nReference:\nhttps://docs.microsoft.com/en-us/azure/azure-monitor/essentials/metrics-troubleshoot https://azure.microsoft.com/en-us/overview/scaling-out-vs-scaling-up"},
{id:538,type:"dd",cat:"Compute",q:"DRAG DROP -<br>You have an Azure Linux virtual machine that is protected by Azure Backup.<br>One week ago, two files were deleted from the virtual machine.<br>You need to restore the deleted files to an on-premises Windows Server 2016 computer as quickly as possible.<br>Which four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0055700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Click File Recovery from the Recovery Services vault", "Download and run the script to mount the backup drive", "Browse to the folder and copy the files", "Unmount the drives in the portal"],ans:["Click File Recovery from the Recovery Services vault", "Download and run the script to mount the backup drive", "Browse to the folder and copy the files", "Unmount the drives in the portal"],exp:"Set-AzMarketplaceTerms - \"Accept or reject terms for a given publisher id(Publisher), offer\nid(Product) and plan id(Name). Please use Get-AzMarketplaceTerms to get the agreement\nterms.\"\n\nhttps://docs.microsoft.com/en-us/powershell/module/az.marketplaceordering/set-\nazmarketplaceterms?view=azps-8.3.0"},
{id:539,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You purchase a new Azure subscription named Subscription1.<br>You create a virtual machine named VM1 in Subscription1. VM1 is not protected by Azure Backup.<br>You need to protect VM1 by using Azure Backup. Backups must be created at 01:00 and stored for 30 days.<br>What should you do? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0056200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Location in which to store the",options:["backups: A blob container","A file share","A Recovery Services vault","Astorage account"]},{label:"Object to use to configure the",options:["protection for VM1: A backup policy","A batch job","Abatch schedule","A recovery plan"]}],ans_img:"imgs/0056300001.jpg",exp:"Box 1: A Recovery Services vault\nYou can set up a Recovery Services vault and configure backup for multiple Azure VMs.\nBox 2: A backup policy -\nIn Choose backup policy, do one of the following:\n\u2711 Leave the default policy. This backs up the VM once a day at the time specified, and retains backups in the vault for 30 days.\n\u2711 Select an existing backup policy if you have one.\n\u2711 Create a new policy, and define the policy settings.\nReference:\nhttps://docs.microsoft.com/en-us/azure/backup/backup-azure-vms-first-look-arm"},
{id:540,cat:"Compute",q:"You have an Azure virtual machine named VM1.<br>Azure collects events from VM1.<br>You are creating an alert rule in Azure Monitor to notify an administrator when an error is logged in the System event log of VM1.<br>Which target resource should you monitor in the alert rule?<br>",ans:3,opts:["virtual machine extension", "virtual machine", "metric alert", "Azure Log Analytics workspace"],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:541,cat:"Compute",q:"You have an Azure subscription that contains 100 virtual machines.<br>You regularly create and delete virtual machines.<br>You need to identify unattached disks that can be deleted.<br>What should you do?<br>",ans:3,opts:["From Azure Cost Management, view Cost Analysis", "From Azure Advisor, modify the Advisor configuration", "From Microsoft Azure Storage Explorer, view the Account Management properties", "From Azure Cost Management, view Advisor Recommendations"],exp:"A Site-to-Site VPN gateway connection can be used to connect your on-premises network to an\nAzure virtual network over an IPsec/IKE (IKEv1 or IKEv2) VPN tunnel.\nThis type of connection requires a VPN device, a VPN gateway, located on-premises that has an\nexternally facing public IP address assigned to it.\nIncorrect Answers:\nB: Application Proxy is a feature of Azure AD that enables users to access on-premises web\napplications from a remote client."},
{id:542,cat:"Identity",q:"You have an Azure web app named webapp1.<br>Users report that they often experience HTTP 500 errors when they connect to webapp1.<br>You need to provide the developers of webapp1 with real-time access to the connection errors. The solution must provide all the connection error details.<br>What should you do first?<br>",ans:0,opts:["From webapp1, enable Web server logging", "From Azure Monitor, create a workbook", "From Azure Monitor, create a Service Health alert", "From webapp1, turn on Application Logging"],exp:"Azure virtual machine extensions are small packages that run post-deployment configuration and\nautomation on Azure virtual machines.\nIn the following example, the Azure CLI is used to deploy a custom script extension to an existing\nvirtual machine, which installs a Nginx webserver. az vm extension set \\\n--resource-group myResourceGroup \\\n--vm-name myVM --name customScript \\\n--publisher Microsoft.Azure.Extensions \\\n--settings '{\"commandToExecute\": \"apt-get install -y nginx\"}\n\nNote:\nThere are several versions of this question in the exam. The question has two correct answers:\n1. a Desired State Configuration (DSC) extension\n2. Azure Custom Script Extension\n\nThe question can have other incorrect answer options, including the following:\n- the Publish-AzVMDscConfiguration cmdlet\n- Azure Application Insights"},
{id:543,cat:"Monitor",q:"You have an Azure web app named App1.<br>You need to monitor the availability of App1 by using a multi-step web test.<br>What should you use in Azure Monitor?<br>",ans:1,opts:["Azure Service Health", "Azure Application Insights", "the Diagnostic settings", "metrics"],exp:"Raw HTTP request data is provided by Web server logging and the question mentions 500 error\ncodes.\nYou need to catch connection error. When the connection fails it happens on web server, not\nwithin application. You can do it opening the web application -> Application Service logs -> Web\nserver logging (there are multiple switches there).\nYou can also see the errors live going to \"Log stream\" pane.\n\n\fWeb server logging Windows App Service file system or Azure Storage blobs Raw HTTP request\ndata in the W3C extended log file format. Each log message includes data such as the HTTP\nmethod, resource URI, client IP, client port, user agent, response code, and so on."},
{id:544,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that has diagnostic logging enabled and is configured to send logs to a Log Analytics workspace.<br>You are investigating a service outage.<br>You need to view the event time, the event name, and the affected resources.<br>How should you complete the query? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0056700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0056800001.jpg",exp:"Box 1: AzureActivity -\nThe AzureActivity table has entries from the Azure activity log, which provides insight into subscription-level or management group-level events occuring in Azure.\nLet's see only Critical entries during a specific week.\nThe where operator is common in the Kusto Query Language. where filters a table to rows that match specific criteria. The following example uses multiple commands. First, the query retrieves all records for the table. Then, it filters the data for only records that are in the time range. Finally, it filters those results for only records that have a Critical level.\nAzureActivity -\n| where TimeGenerated > datetime(10-01-2020) and TimeGenerated < datetime(10-07-2020)\n| where Level == 'Critical'\nIncorrect:\nnot Perf: The Perf table has performance data that's collected from virtual machines that run the Log Analytics agent.\nBox 2: | project -\nSelect a subset of columns: project.\nUse project to include only the columns you want. Building on the preceding example, let's limit the output to certain columns:\nAzureActivity -\n| where TimeGenerated > datetime(10-01-2020) and TimeGenerated < datetime(10-07-2020)\n| where Level == 'Critical'\n| project TimeGenerated, Level, OperationNameValue, ResourceGroup, _ResourceId\nReference:\nhttps://github.com/MicrosoftDocs/dataexplorer-docs/blob/main/data-explorer/kusto/query/tutorial.md"},
{id:545,cat:"Governance",q:"You have a Recovery Services vault named RSV1. RSV1 has a backup policy that retains instant snapshots for five days and daily backup for 14 days.<br>RSV1 performs daily backups of VM1. VM1 hosts a static website that was updated eight days ago.<br>You need to recover VM1 to a point eight days ago. The solution must minimize downtime.<br>What should you do first?<br>",ans:3,opts:["Deallocate VM1.", "Restore VM1 by using the Replace existing restore configuration option.", "Delete VM1.", "Restore VM1 by using the Create new restore configuration option."],exp:"To assign a license, under Azure Active Directory > Licenses > All Products, select one or more\nproducts, and then select Assign on the command bar.\nReferences: https://docs.microsoft.com/en-us/azure/active-directory/fundamentals/license-users-\ngroups\n\n\fQUESTION 24\nYou have an Azure subscription named Subscription1 and an on-premises deployment of\nMicrosoft System Center Service Manager.\n\nSubscription1 contains a virtual machine named VM1.\n\nYou need to ensure that an alert is set in Service Manager when the amount of available memory\non VM1 is below 10 percent.\n\nWhat should you do first?\n\nA.   Create an automation runbook\nB.   Deploy a function app\nC.   Deploy the IT Service Management Connector (ITSM)\nD.   Create a notification\n\nAnswer: C\nExplanation:\nThe IT Service Management Connector (ITSMC) allows you to connect Azure and a supported IT\nService Management (ITSM) product/service, such as the Microsoft System Center Service\nManager.\nWith ITSMC, you can create work items in ITSM tool, based on your Azure alerts (metric alerts,\nActivity Log alerts and Log Analytics alerts)."},
{id:546,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0057000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to create a data collection rule named DCR1 in Azure Monitor.<br>Which resources can you set as data sources in DCR1, and which resources can you set as destinations in DCR1? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0057100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Data sources",options:["VM1 only","VM1 and storage1 only","VM1, storage1, and DB1 only","VM1, storage1, Workspace1, and DB1"]},{label:"Destinations",options:["storage1 only","Workspace1 only","Workspace1 and storage1 only","Workspace1, storage1, and DB1 only"]}],ans_img:"imgs/0057200001.jpg",exp:"Correct answer is:\nVNET1 will only have Department: D1 tag & VNET 2 will only have Label : Value1 tag upvoted 374 times Mucker973 3\u00a0years, 4\u00a0months ago nope, your answer is incorrect and the answers given are correct. You are assuming that Dept: D1 overwrites label:value (well I assume you did based on your answer), but resources can have any amount of tags applied. PLUS I have confirmed this in a lab upvoted 6 times amiban 2\u00a0years, 11\u00a0months ago but can't be applied by policy, we need to be compliant while creating the resources wrt the tags. upvoted 1 times ... cnduknthm 3\u00a0years ago Its not about OVERWRITTING... Its about the assignment of policy. The policy applies to resources that are created only after policy was applied but VNET1 is created before assigning the policy to Resource Group and for that reason VNET1 has only one tag which is Department : D1 upvoted 12 times ... ... Dennis_SOn 3\u00a0years, 3\u00a0months ago what is the answer? your answer seems not in the options? upvoted 2 times Dennis_SOn 3\u00a0years, 3\u00a0months ago are you referring to this answer?\ntag. vnet1 : departement D1 tag only.\nVNET1 - Department: D1 only VNET2 - Label: Value1 only upvoted 6 times Dennis_SOn 3\u00a0years, 3\u00a0months ago tag. vnet1 --- Department: D1 only.\nVNET1 - Department: D1 only VNET2 --- Label: Value1 only upvoted 2 times ... ... ... awssecuritynewbie 3\u00a0years, 1\u00a0month ago this is wrong people do not like it! upvoted 7 times ... marioZuo 2\u00a0years, 3\u00a0months ago Per tested, you are right! upvoted 4 ti"},
{id:547,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You have the role assignment file shown in the following exhibit.<br><img src=\"imgs/0057300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0057400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"[Answer choice] assigned the Owner role for VM1",options:["User3 is","User3 and User4 are","User1 and User3 are","User1, User3, and User4 are","User1, User2, User3, and User4"]},{label:"[Answer choice] can create a virtual machine in RG1",options:["User1 and User4","User1, User2, and User3","User1, User2, and User4","User1, User3, and User4","User1, User2, User3, and User4"]}],ans_img:"imgs/0057500001.jpg",exp:"Answers are correct:\n\nUser1 - Owner of the subscription. (He can manage any resources in the subscription.)\nUser 2 - Owner of RG2(He can manage any resources in the RG2.)\nUser 3 - Owner of a single VM that is VM1.(he can manage VM1 only)\nUser 4 - Contributor of RG1.(He can manage everything in RG1, even he can delete VMs in RG1. But cannot change RABC) \n\nBox1: Owner of VM1 -        User1, User3\nBox2 : Create VM in RG1 -  User1,User4 upvoted 127 times FabrityDev 2\u00a0years, 10\u00a0months ago One correction, it's RBAC (Role Based Access Control) not RABC. But I guess it's just a typo upvoted 2 times ... noppy 2\u00a0years, 10\u00a0months ago Box1 : User3 is\nBox2 : User1 and User4\nIs User1 assigned to Owner role for VM1 only? User1 is owner of all resources in the subscription. I think that User1 has rights of owner with VM1 but it's not \"assigned\". It's \"inherited\".\n\nSo upvoted 7 times ... JayLearn2022 2\u00a0years, 8\u00a0months ago Correct. You should note that User 1 being owner of the Subscription is the Owner of every resource under it. He has Full power to do anything under the Subscription. upvoted 5 times RougePotatoe 2\u00a0years, 8\u00a0months ago The question is more down to if user 1 is \"assigned\" as a owner . Yes user 1 is an owner of VM1 but their role is inherited. Only User 3 is explicitly assigned the owner role for VM1. So it really depends on what the hell they mean by \"assigned\". upvoted 8 times Batiste2023 1\u00a0year, 12\u00a0months ago I think \"User1 and User3\" is fine as an answer for box1. What matt"},

{id:550,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains two Azure virtual networks named VNet1 and VNet2. VNet1 contains a VPN gateway named<br>VPNGW1 that uses static routing. There is a site-to-site VPN connection between your on-premises network and VNet1.<br>On a computer named Client1 that runs Windows 10, you configure a point-to-site VPN connection to VNet1.<br>You configure virtual network peering between VNet1 and VNet2. You verify that you can connect to VNet2 from the on-premises network. Client1 is unable to connect to VNet2.<br>You need to ensure that you can connect Client1 to VNet2.<br>What should you do?<br>",ans:2,opts:["Select Use the remote virtual network's gateway or Route Server on VNet1 to VNet2 peering.", "Select Use the remote virtual network s gateway or Route Server on VNet2 to VNet1 peering.", "Download and re-install the VPN client configuration package on Client1.", "Enable BGP on VPNGW1."],exp:"Azure file shares can be used as persistent volumes for stateful containers. Containers deliver\n\"build once, run anywhere\" capabilities that enable developers to accelerate innovation. For the\ncontainers that access raw data at every start, a shared file system is required to allow these\ncontainers to access the file system no matter which instance they run on.\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-introduction"},
{id:551,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have two Azure subscriptions named Sub1 and Sub2. Sub1 is in a management group named MG1. Sub2 is in a management group named MG2.<br>You have the resource groups shown in the following table.<br><img src=\"imgs/0058000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You have the virtual machines shown in the following table.<br><img src=\"imgs/0058100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You assign roles to users as shown in the following table.<br><img src=\"imgs/0058100002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0058200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image948.png",exp:"I think the answers should be: N N N\n1. User1 can sign in to VM1\nNo\nUser1 is assigned as Virtual Machine Contributor in MG1.\nAnd Virtual Machine Contributor can't log in to VM as a regular user.\n\n2. User2 can manage disks and disk snapshots of VM1\nNo\nSince User2 only has Virtual Machine User in Sub1, so he can log in to VM1 but can't manage disks or snapshots\n\n3. User2 can manage disks and disk snapshots of VM3\nNo\nVirtual Machine Contributor only has permission to manage disks, but not disk snapshots (Disk Snapshot Contributor permission) upvoted 111 times James3958904 3\u00a0years, 2\u00a0months ago refer:\nhttps://docs.microsoft.com/en-us/azure/role-based-access-control/built-in-roles upvoted 4 times ... Ravi1383 3\u00a0years, 1\u00a0month ago User1 can sign in to VM1\nNo - Only for classic VM contributor! \n\nClassic Virtual Machine Contributor\tLets you manage classic virtual machines, but not access to them, and not the virtual network or storage account they're connected to.\n\nVirtual Machine Contributor\tCreate and manage virtual machines, manage disks, install and run software, reset password of the root user of the virtual machine using VM extensions, and manage local user accounts using VM extensions. This role does not grant you management access to the virtual network or storage account the virtual machines are connected to. This role does not allow you to assign roles in Azure RBAC. upvoted 2 times yfontana 3\u00a0years ago Virtual Machine Contributor doesn't include the data action Microsoft.C"},
{id:552,cat:"Identity",q:"You have an Azure Active Directory (Azure AD) tenant that is linked to 10 Azure subscriptions.<br>You need to centrally monitor user activity across all the subscriptions.<br>What should you use?<br>",ans:3,opts:["Azure Application Insights Profiler", "access reviews", "Activity log filters", "a Log Analytics workspace"],exp:"From the exhibit we see that the disk is in the VHDX format.\nBefore you upload a Windows virtual machine (VM) from on-premises to Microsoft Azure, you\nmust prepare the virtual hard disk (VHD or VHDX). Azure supports only generation 1 VMs that\nare in the VHD file format and have a fixed sized disk. The maximum size allowed for the VHD is\n1,023 GB. You can convert a generation 1 VM from the VHDX file system to VHD and from a\ndynamically expanding disk to fixed-sized."},
{id:553,type:"dd",cat:"Compute",q:"DRAG DROP -<br>You have an Azure subscription that contains a virtual machine name VM1.<br>VM1 has an operating system disk named Disk1 and a data disk named Disk2.<br>You need to back up Disk2 by using Azure Backup.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0058400001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Create a Recovery Services vault", "Enable backup for VM1", "In the backup configuration, exclude Disk1 and include only Disk2"],ans:["Create a Recovery Services vault", "Enable backup for VM1", "In the backup configuration, exclude Disk1 and include only Disk2"],exp:"View template from deployment history\n1. Go to the resource group for your new resource group. Notice that the portal shows the result\nof the last deployment. Select this link.\n\n\f2. You see a history of deployments for the group. In your case, the portal probably lists only one\ndeployment. Select this deployment.\n\n3. The portal displays a summary of the deployment. The summary includes the status of the\ndeployment and its operations and the values that you provided for parameters. To see the\ntemplate that you used for the deployment, select View template."},
{id:554,cat:"Compute",q:"You have a subnet named Subnet1 that contains Azure virtual machines. A network security group (NSG) named NSG1 is associated to Subnet1. NSG1 only contains the default rules.<br>You need to create a rule in NSG1 to prevent the hosts on Subnet1 form connecting to the Azure portal. The hosts must be able to connect to other internet hosts.<br>To what should you set Destination in the rule?<br>",ans:2,opts:["Application security group", "IP Addresses", "Service Tag", "Any"],exp:"When you swap deployment slots, Azure swaps the Virtual IP addresses of the source and\ndestination slots, thereby swapping the URLs of the slots. We can easily revert the deployment by\nswapping back."},
{id:555,cat:"Governance",q:"You have an Azure subscription named Subscription1 that contains an Azure Log Analytics workspace named Workspace1.<br>You need to view the error events from a table named Event.<br>Which query should you run in Workspace1?<br>",ans:0,opts:["search in (Event) \"error\"", "Event | where EventType is \"error\"", "select * from Event where EventType == \"error\"", "Get-Event Event | where {$_.EventType == \"error\"}"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:556,cat:"Monitor",q:"You have an Azure App Service web app named App1.<br>You need to collect performance traces for App1.<br>What should you use?<br>",ans:0,opts:["Azure Application Insights Profiler", "the Activity log", "the Deployment center", "the Diagnose and solve problems settings"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:557,cat:"Storage",q:"You have an Azure subscription that contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image618.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You deploy a web app named App1 to the West US Azure region.<br><br>You need to back up App1. The solution must minimize costs.<br><br>Which storage account should you use as the target for the backup?",ans:1,opts:["storage1", "storage2", "storage3", "storage4"],exp:"Microsoft updates, which Microsoft refers to as planned maintenance events, sometimes require\nthat VMs be rebooted to complete the update. To reduce the impact on VMs, the Azure fabric is\ndivided into update domains to ensure that not all VMs are rebooted at the same time.\nIncorrect Answers:\nA: An update domain is a group of VMs and underlying physical hardware that can be rebooted at\nthe same time.\nB, C: A fault domain shares common storage as well as a common power source and network\nswitch. It is used to protect against unplanned system failure.\nReferences:\nhttps://petri.com/understanding-azure-availability-sets\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/tutorial-availability-sets"},
{id:558,type:"drop",cat:"Storage",q:"HOTSPOT -<br><br>You have an Azure subscription that is linked to an Azure AD tenant. The tenant contains two users named User1 and User2.<br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image619.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the alert rules shown in the following table.<br><br><img src=\"imgs/image620.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The users perform the following action:<br><br>\u2022\tUser1 creates a new virtual disk and attaches the disk to VM1<br>\u2022\tUser2 creates a new resource tag and assigns the tag to RG1 and VM1<br><br>Which alert rules are triggered by each user? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image621.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Select the correct answer",options:["User1","No alert is triggered","Only Alert1 is triggered","Only Alert2 is triggered","user: [VI","No alert is triggered","Only Alert1 is triggered","Only Alert2 is triggered"]}],ans_img:"imgs/image949.png",exp:"https://www.examtopics.com/discussions/microsoft/view/57784-exam-az-500-topic-2-question-58-discussion/\ni found similar questions in other page upvoted 31 times jimmyyml 2\u00a0years, 10\u00a0months ago Thanks. Answer should be \nRole3: Role1 and built-in Azure subscription roles only\nRole4: Role2 only\nExplanation: You cannot clone built-in Azure AD role upvoted 169 times Paul_white 2\u00a0years, 8\u00a0months ago This is the best answer here!!!  \nhttps://www.examtopics.com/discussions/microsoft/view/57784-exam-az-500-topic-2-question-58-discussion/ upvoted 4 times ... Kalzonee3611 2\u00a0years ago Good boy upvoted 6 times ... o0o0 2\u00a0years, 2\u00a0months ago just verified it upvoted 2 times ... Load full discussion... ... Panapi 2\u00a0years, 8\u00a0months ago Answer is correcrt Valid! This question was on the exam 22/02/2023. Scored 920. Thanks guys! upvoted 23 times Sandip671 2\u00a0years ago Hiii my exam are in 10 days plz help me to make my concepts clear upvoted 1 times neolisto 2\u00a0years ago Sandip671 how your exam? Did you pass it? upvoted 3 times ... ki01 1\u00a0year, 10\u00a0months ago it's usually a bad idea to book an exam soon when you have very little idea of what you're doing.... upvoted 3 times ... ... ..."},

{id:560,cat:"Compute",q:"You have an Azure subscription that contains eight virtual machines and the resources shown in the following table.<br><br><img src=\"imgs/image623.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to configure access for VNET1. The solution must meet the following requirements:<br><br>\u2022 The virtual machines connected to VNET1 must be able to communicate with the virtual machines connected to VNET2 by using the Microsoft backbone.<br>\u2022 The virtual machines connected to VNET1 must be able to access storage1, storage2, and Azure AD by using the Microsoft backbone.<br><br>What is the minimum number of service endpoints you should add to VNET1?",ans:1,opts:["1", "2", "3", "5"],exp:"From the RG1 blade, click Deployments. You see a history of deployment for the resource group."},
{id:561,cat:"AppService",q:"You need to configure an Azure web app named contoso.azurewebsites.net to host www.contoso.com.<br><br>What should you do first?",ans:1,opts:["Create A records named www.contoso.com and asuid.contoso.com.", "Create a TXT record named asuid that contains the domain verification ID.", "Create a CNAME record named asuid that contains the domain verification ID.", "Create a TXT record named www.contoso.com that has a value of contoso.azurewebsites.net."],exp:"nice to see 3 answers"},
{id:562,cat:"Compute",q:"You have an Azure subscription that contains 10 network security groups (NSGs), 10 virtual machines, and a Log Analytics workspace named Workspace1. Each NSG is connected to a virtual machine.<br><br>You need to configure an Azure Monitor Network Insights alert that will be triggered when suspicious network traffic is detected.<br><br>What should you do first?",ans:3,opts:["Deploy Connection Monitor.", "Configure data collection endpoints.", "Configure a private link.", "Configure NSG flow logs."],exp:"Box 1: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 2: No\nUser1 is a Member and not a Guest Account, Access Review specified Guests only.\n\nBox 3: Yes\nUser3 can review the access guest users of Group1 which also includes Group2. UserB is the\nguest of Group2 and hence User3 can review the access of UserB."},
{id:563,type:"img",cat:"Identity",q:"HOTSPOT<br>-<br><br>You have an Azure subscription named Sub1 that contains the resources shown in the following table.<br><br><img src=\"imgs/image624.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Sub1 contains the following alert rule:<br><br>\u2022\tName: Alert1<br>\u2022\tScope: All resource groups in Sub1<br>o\t  Include all future resources<br>\u2022\tCondition: All administrative operations<br>\u2022\tActions: Action1<br><br>Sub1 contains the following alert processing rule:<br><br>\u2022\tName: Rule1<br>\u2022\tScope: Sub1<br>\u2022\tRule type: Suppress notifications<br>\u2022\tApply the rule: On a specific time<br>o\t  Start: August 10, 2022<br>o\t  End: August 13, 2022<br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image625.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image626.png",exp:"Box 1: No -\nThe Azure Policy will add Tag4 to RG1.\nBox 2: No -\nTags applied to the resource group or subscription aren't inherited by the resources although you can enable inheritance with Azure Policy. Storage1 has Tag3:\nValue1 and the Azure Policy will add Tag4.\nBox 3: No -\nTags applied to the resource group or subscription aren't inherited by the resources so VNET1 does not have Tag2.\nVNET1 has Tag3:value2.  VNET1 is excluded from the Azure Policy so Tag4 will not be added to VNET1.\nReference:\nhttps://docs.microsoft.com/en-us/azure/azure-resource-manager/management/tag-resources?tabs=json"},
{id:564,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1 in the North Europe Azure region.<br><br>You need to ensure that when blob data is added to storage1, a secondary copy is created in the East US region. The solution must minimize administrative effort.<br><br>What should you configure?",ans:1,opts:["operational backup", "object replication", "geo-redundant storage (GRS)", "a lifecycle management rule"],exp:"VNET1: Department: D1 only\nResources created before policy creation will not inherit the policy rules.\n\nVNET2: Label:Value1 only\nThe built-in policy definition \"Append a tag and its value to resources\" appends the specified tag\nand value when any resource which is missing this tag is created or updated. Does not modify the\ntags of resources created before this policy was applied until those resources are changed. Does\nnot apply to resource groups."},
{id:565,cat:"Compute",q:"You have an Azure subscription that contains two Log Analytics workspaces named Workspace1 and Workspace2 and 100 virtual machines that run Windows Server.<br><br>You need to collect performance data and events from the virtual machines. The solution must meet the following requirements:<br><br>\u2022\tLogs must be sent to Workspace1 and Workspace 2.<br>\u2022\tAll Windows events must be captured.<br>\u2022\tAll security events must be captured.<br><br>What should you install and configure on each virtual machine?",ans:0,opts:["the Azure Monitor agent", "the Windows Azure diagnostics extension (WAD)", "the Windows VM agent"],exp:"Box 1: will have no access\nThe IP 193.77.134.1 does not have access on the SAS, because it is not matching the SAS\nrequirements. IP is out of range.\n\nBox 2: will have no access\nThe SAS token is not supported in mounting Azure File share currently, it just supports the Azure\nstorage account key.\nSince it is using \"net use\" where it uses SMB, the SMB (Server Message Broker) protocol does\nnot support SAS. it still asks for username/password. Accordingly, it will give error wrong\nusername/pass and will not provide access."},
{id:566,cat:"Compute",q:"You have an Azure subscription that contains a virtual machine named VM1 and an Azure function named App1.<br><br>You need to create an alert rule that will run App1 if VM1 stops.<br><br>What should you create for the alert rule?",ans:2,opts:["an application security group", "a security group that has dynamic device membership", "an action group", "an application group"],exp:"Box 1: No\nA sync group contains one cloud endpoint, or Azure file share, and at least one server endpoint.\n\nBox 2: No\nAzure File Sync does not support more than one server endpoint from the same server in the\nsame Sync Group.\n\nBox 3: Yes\nMultiple server endpoints can exist on the same volume if their namespaces are not overlapping\n(for example, F:\\sync1 and F:\\sync2) and each endpoint is syncing to a unique sync group."},
{id:567,cat:"Networking",q:"You have an Azure subscription that contains a virtual network named VNet1.<br><br>VNet1 uses two ExpressRoute circuits that connect to two separate on-premises datacenters.<br><br>You need to create a dashboard to display detailed metrics and a visual representation of the network topology.<br><br>What should you use?",ans:0,opts:["Azure Monitor Network Insights", "a Data Collection Rule (DCR)", "Azure Virtual Network Watcher", "Log Analytics"],exp:"Box 1: contosostorage\nThe name of account\n\nBox 2: file.core.windows.net\n\nBox 3: data\nThe name of the file share is data.\n\nExample:"},
{id:568,cat:"Compute",q:"You deploy Azure virtual machines to three Azure regions<br><br>Each region contains a virtual network. Each virtual network contains multiple subnets peered in a full mesh topology.<br><br>Each subnet contains a network security group (NSG) that has defined rules.<br><br>A user reports that he cannot use port 33000 to connect from a virtual machine in one region to a virtual machine in another region.<br><br>Which two options can you use to diagnose the issue? Each correct answer presents a complete solution.<br><br>NOTE: Each correct selection is worth one point.",ans:[1, 3],opts:["Azure Virtual Network Manager", "IP flow verify", "Azure Monitor Network Insights", "Connection troubleshoot", "elective security rules"],exp:"Step 1: Install the Azure File Sync agent on Server1\nThe Azure File Sync agent is a downloadable package that enables Windows Server to be\nsynced with an Azure file share\n\nStep 2: Register Server1.\nRegister Windows Server with Storage Sync Service\nRegistering your Windows Server with a Storage Sync Service establishes a trust relationship\nbetween your server (or cluster) and the Storage Sync Service.\n\nStep 3: Add a server endpoint\nCreate a sync group and a cloud endpoint.\nA sync group defines the sync topology for a set of files. Endpoints within a sync group are kept\nin sync with each other. A sync group must contain one cloud endpoint, which represents an\n\n\fAzure file share and one or more server endpoints. A server endpoint represents a path on\nregistered server."},
{id:569,cat:"Identity",q:"You have an Azure subscription.<br><br>You need to receive an email alert when a resource lock is removed from any resource in the subscription.<br><br>What should you use to create an activity log alert in Azure Monitor?",ans:0,opts:["a resource, a condition, and an action group", "a resource, a condition, and a Microsoft 365 group", "a Log Analytics workspace, a resource, and an action group", "a data collection endpoint, an application security group, and a resource group"],exp:"All three VMs are in VNET2. Auto registration is enabled for private Azure DNS zone named\ncontoso.com, which is linked to VNET2. So, VM1, VM2 and VM3 will auto-register their host\nrecords to contoso.com.\nNone of the VM will auto-register to the public Azure DNS zone named adatum.com. You cannot\nregister private IPs on the internet (adatum.com)\n\nBox 1: Yes\nAuto registration is enabled for private Azure DNS zone named contoso.com.\n\nBox 2: Yes\nAuto registration is enabled for private Azure DNS zone named contoso.com.\n\nBox 3: No\nNone of the VM will auto-register to the public Azure DNS zone named adatum.com"},
{id:570,type:"drop",cat:"Governance",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the alerts shown in the following exhibit.<br><br><img src=\"imgs/image680.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image681.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Select the correct answer",options:["For Alert1, User response [answer choice]. a","cannot be changed","can be changed to New only","can be changed to Acknowledged onl","For Alert2, User response [answer choice]. aa","cannot be changed","can be changed to Acknowledged only","can be changed to closed onl"]}],ans_img:"imgs/image950.png",exp:"Tested in lab.\n\nCorrect answer for:\nBox1: can be changed to New or Acknowledged\nExplanation: \"Changing the user response doesnt affect the alert condition\" is what the portal says while changing the response of an alert whose user response is closed\n\nBox2: can be changed to Acknowledged or Closed upvoted 54 times trferreiraBR 2\u00a0years ago Answers are correct. You can check here - https://learn.microsoft.com/en-us/training/modules/configure-azure-alerts/2b-manage-azure-monitor-alerts upvoted 3 times ziggy1117 2\u00a0years ago \"If an alert is in the Closed state, you can \"reopen\" the alert by changing the alert state to New or Acknowledged\"\nLink: https://learn.microsoft.com/en-us/training/modules/configure-azure-alerts/2b-manage-azure-monitor-alerts upvoted 6 times ... BluAlien 1\u00a0year, 10\u00a0months ago From the link you mentioned:\n\"If an alert is in the Closed state, you can \"reopen\" the alert by changing the alert state to New or Acknowledged.\"\nSo it can be changet to New or Acknowledged. upvoted 3 times ... ... Josh219 11\u00a0mont {id:571,type:"drop",cat:"Governance",q:"HOTSPOT<br>-<br><br>You create a Recovery Services vault backup policy named Policy1 as shown in the following exhibit:<br><br><img src=\"imgs/image752.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image753.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"‘The backup that occurs on Sunday, March 1, will be retained for [answer choice].",options:["30 days","10 weeks"]},{label:"The backup that occurs on Sunday, November 1, will be retained for [answer choice]",options:["30 days","Dyears"]}],ans_img:"imgs/image754.png",exp:"Correct answer\n\nBox 1: 10 years\nThe yearly backup point occurs to 1 March and its retention period is 10 years.\n\nBox 2: 36 months\nThe monthly backup point occurs on the 1\nof every month and its retention period is 36 months.\n\nNote: Azure retention policy takes the longest period of retention for each backup. In case of conflict between 2 different policies.\n\nReference:\nhttps://docs.microsoft.com/en-us/microsoft-365/compliance/retention?view=o365-worldwide upvoted 35 times"},

{id:573,cat:"Compute",q:"You have an Azure subscription. The subscription contains virtual machines that connect to a virtual network named VNet1.<br><br>You plan to configure Azure Monitor for VM Insights.<br><br>You need to ensure that all the virtual machines only communicate with Azure Monitor through VNet1.<br><br>What should you create first?",ans:2,opts:["a data collection rule (DCR)", "a Log Analytics workspace", "an Azure Monitor Private Link Scope (AMPLS)", "a private endpoint"],exp:"Box 1: 4\nIf you resize the Scale Set all the VMs get resized at once, thus 4 is the correct answer.\n\nBox 2: 1\nAutomatic OS updates update 20% of the VMs at once, with a minimum of 1 VM instance at a\ntime. Also 20% of 4 = 0.8."},
