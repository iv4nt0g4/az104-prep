{id:466,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have two Azure virtual machines as shown in the following table.<br><img src=\"imgs/0049500001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create the Azure DNS zones shown in the following table.<br><img src=\"imgs/0049500002.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You perform the following actions:<br>\u2711 \u05c0\u00a2\u05c0\u00be fabrikam.com, you add a virtual network link to vnet1 and enable auto registration.<br>\u2711 For contoso.com, you assign vm1 and vm2 the Owner role.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0049500005.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image935.png",exp:"N Y Y? Only private AZ DNS Zones can use auto registration. The set DNS search suffix in the client changes nothing about that https://docs.microsoft.com/en-us/azure/dns/private-dns-autoregistration upvoted 85 times skate_grizzly_123 2\u00a0years, 1\u00a0month ago A virtual machine with a DNS suffix configured in Windows will register its DNS record to the private DNS zone. However, the Azure DHCP service ignores any DNS suffix when it registers the private DNS zone. For example, if your virtual machine is configured for 'contoso.com' as the primary DNS suffix, but the virtual network is linked to the 'fabrikam.com' private DNS zone, the virtual machine's registration appears in the 'fabrikam.com' private DNS zone. upvoted 6 times ... qwerty100 3\u00a0years, 2\u00a0months ago I agree whit you upvoted 6 times ..."},
{id:467,cat:"Networking",q:"You have an on-premises datacenter and an Azure subscription.<br>You plan to connect the datacenter to Azure by using ExpressRoute.<br>You need to deploy an ExpressRoute gateway. The solution must meet the following requirements:<br>\u2711 Support up to 10 Gbps of traffic.<br>\u2711 Support availability zones.<br>\u2711 Support FastPath.<br>\u2711 Minimize costs.<br>Which SKU should you deploy?<br>",ans:3,opts:["ERGw1AZ", "ERGw2", "ErGw3", "ErGw3AZ"],exp:"To verify your custom domain name (example)\n1. Sign in to the Azure portal using a Global administrator account for the directory.\n2. Select Azure Active Directory, and then select Custom domain names.\n3. On the Fabrikam - Custom domain names page, select the custom domain name, Contoso.\n4. On the Contoso page, select Verify to make sure your custom domain is properly registered\nand is valid for Azure AD. Use either the TXT or the MX record type.\n\nNote:\nThere are several versions of this question in the exam. The question can have two correct\nanswers:\n1. MX\n2. TXT\nThe question can also have other incorrect answer options, including the following:\n1. SRV\n2. NSEC3"},
{id:468,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have a virtual network named VNET1 that contains the subnets shown in the following table:<br><img src=\"imgs/0049800002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You have Azure virtual machines that have the network configurations shown in the following table:<br><img src=\"imgs/0049900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For NSG1, you create the inbound security rule shown in the following table:<br><img src=\"imgs/0049900002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For NSG2, you create the inbound security rule shown in the following table:<br><img src=\"imgs/0049900003.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0049900004.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image936.png",exp:"I believe it should be No, Yes, Yes. The NSG2 on the NIC of VM1 blocks the request that passes through NSG1 which is attached on the subnet. There is no priority bypass between NSGs. Traffic is filtered independently between NSGs. upvoted 332 times rcdumps 4\u00a0years, 10\u00a0months ago The NSG2 blocks INBOUND requests, not OUTBOUND, hence VM2 can reach VM1. upvoted 11 times tita_tovenaar 4\u00a0years, 4\u00a0months ago thought so too but it is wrong. Look at the destination addresses.\nBasically you can imagine that NSG1 covers subnet 1 and NSG2 covers VM1 specifically. Tricky question, but answer is No. VM3 could RDP into VM1, if that makes it more clear. upvoted 5 times ... klexams 3\u00a0years ago NSG2 is on VM1 so it block inbound to VM1. upvoted 3 times ... JamesDC 4\u00a0years, 9\u00a0months ago Oh Dear!... do you understand VM2 and VM is on different subnets and both NSGs are applicable on subnet1 resources... so, there's no concept of outbound rule... Agree with Jhon, NSG1 is on subnet and NSG2 is on NIC, even VM2 can enter to the sunbet1 but NSG2 will block while going to VM1. upvoted 22 times Batiste2023 1\u00a0year, 12\u00a0months ago What you're saying is that for traffic between different subnets within a VNET, inbound rules block outbound connections - is there any source to document this? For now I am not convinced and would go for YYY... upvoted 1 times ... ... ... Bhuw 3\u00a0years, 3\u00a0months ago Think you're correct\nhttps://docs.microsoft.com/en-us/azure/virtual-network/network-security-group-how-it-works#"},
{id:469,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1.<br>Subscription1 contains the virtual machines in the following table:<br><img src=\"imgs/0050100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Subscription1 contains a virtual network named VNet1 that has the subnets in the following table:<br><img src=\"imgs/0050100002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM3 has multiple network adapters, including a network adapter named NIC3. IP forwarding is enabled on NIC3. Routing is enabled on VM3.<br>You create a route table named RT1 that contains the routes in the following table:<br><img src=\"imgs/0050100003.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You apply RT1 to Subnet1 and Subnet2.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0050200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0050200002.jpg",exp:"Correct Answer: A\n\nYou can only move a resource to a Resource Group or Subscription, but the location stays the same. When you move WebApp1 to RG2, the resource will be restricted based on the policy of the new Resource Group (Policy2). upvoted 136 times Veks 3\u00a0years, 6\u00a0months ago I agree with the answer (A is correct), but your comments don't seem correct.\nyou are moving app from one region to another. Procedure is listed below:\n- Create a back up of the source app.\n- Create an app in a new App Service plan, in the target region.\n- Restore the back up in the target app\n- If you use a custom domain, bind it preemptively to the target app with 'awverify'. and enable the domain in the target app.\n- Configure everything else in your target app to be the same as the source app and verify your configuration.\n- When you're ready for the custom domain to point to the target app, remap the domain name.\n\nHere it states that you have to create new AppService plan in new region. So old plan stays where it is.\nReference:\nhttps://docs.microsoft.com/en-us/azure/app-service/manage-move-across-regions upvoted 21 times Ajinkyakore 3\u00a0years, 5\u00a0months ago So technically there will be no any migration or transfer happens? upvoted 2 times bryant12138 2\u00a0years, 1\u00a0month ago yeah I think you're right, both rg and subscription are ideological management tools upvoted 1 times ... ... klasbeatz 3\u00a0years, 4\u00a0months ago Your right.....New-AzAppServicePlan -Location \"North Central US\" -ResourceGroupName Desti"},
{id:470,cat:"Networking",q:"Your on-premises network contains an SMB share named Share1.<br>You have an Azure subscription that contains the following resources:<br>\u2711 A web app named webapp1<br>\u2711 A virtual network named VNET1<br>You need to ensure that webapp1 can connect to Share1.<br>What should you deploy?<br>",ans:2,opts:["an Azure Application Gateway", "an Azure Active Directory (Azure AD) Application Proxy", "an Azure Virtual Network Gateway"],exp:"You should configure peering between prod-vnet-west and prod-vnet-west. Peering enables VMs\nlocated on two different Azure VNets to be grouped logically together and thereby connect and\nshare resources. Traditional VNet peering involves two VNets located in the same region.\nHowever, global VNet peering, generally available in summer 2018, supports VNets distributed\nacross any Azure public region.\nYou should not deploy a VNet-to-VNet VPN. First, global VNet peering means that you are no\nlonger required to use a VPN gateway to link VNets located in different Azure regions. Second,\nthe scenario requires that you minimize cost and complexity.\nYou should not create a private zone in Azure DNS. This action would be necessary for\nresources in peered VNets to resolve each other's DNS host names. However, the scenario\nmakes no requirement for private host name resolution.\nYou should not add a service endpoint to each VNet. Service endpoints allow you to limit access\nto certain Azure resources, such as storage accounts and Azure SQL databases, to resources\nlocated on a single VNet. Thus, this feature cannot be used to link two VNets as the scenario\nmandates."},
{id:471,cat:"Networking",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image853.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You create a public IP address named IP1.<br><br>Which two resources can you associate to IP1? Each correct answer presents a complete solution.<br><br>NOTE: Each correct selection is worth one point.",ans:[1, 2],opts:["VM1", "LB1", "NIC1", "VPN1", "VNet1"],exp:"You should add a Domain Name System (DNS) verification record at the domain registrar. This\nstep is required to verify to Microsoft that you own the public DNS domain name in question. You\nperform the validation by creating either a text (TXT) or mail exchanger (MX) record in your DNS\nzone file at the registrar's website, using Microsoft-provided values. You can delete the\nverification record after Azure validates the domain for use with Azure AD.\nYou should not remove the companycom.onmicrosoft.com domain name from the Azure AD\ntenant. In fact, you cannot remove this domain name because Azure uses it to identify your\ndirectory uniquely across the entire Microsoft Azure global ecosystem.\nYou should not add a company.com user principal name (UPN) suffix to the AD DS domain. If\nyou use a non-routable DNS domain in AD DS, then you may indeed be required to perform this\naction. However, the scenario does not specify what AD DS domain name is currently defined.\nYou should not run Azure AD Connect from a domain member server and specify the custom\ninstallation option. Configuring the proper public and private DNS domain names is one of the\nprerequisite steps that needs to be completed before you run the Azure AD Connect wizard for\nthe first time."},
{id:472,cat:"Storage",q:"You have an Azure subscription that contains a storage account named storage1.<br><br>You need to allow access to storage1 from selected networks and your home office. The solution must minimize administrative effort.<br><br>What should you do first for storage1?",ans:1,opts:["Add a private endpoint.", "Modify the Public network access settings.", "Select Internet routing.", "Modify the Access Control (IAM) settings."],exp:"Private networking is Not supported yet for Windows containers.\nhttps://learn.microsoft.com/en-us/azure/container-instances/container-instances-quickstart-portal"},
{id:473,cat:"Networking",q:"You plan to deploy route-based Site-to-Site VPN connections between several on-premises locations and an Azure virtual network.<br>Which tunneling protocol should you use?<br>",ans:2,opts:["IKEv1", "PPTP", "IKEv2", "L2TP"],exp:"An example screenshot is given below on the setting on the Azure Web app which is used to\ndisable anonymous access.\n\n\fSince this is clearly evident from the Azure portal, all other options are invalid.\nhttps://docs.microsoft.com/en-us/azure/app-service/overview-authentication-authorization"},
{id:474,cat:"Compute",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image608.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You configure Azure Site Recovery to replicate VM1 between the US East and West US regions.<br><br>You perform a test failover of VM1 and specify VNET2 as the target virtual network.<br><br>When the test version of VM1 is created, to which subnet will the virtual machine be connected?",ans:1,opts:["TestSubnet1", "DemoSubnet1", "RecoverySubnetA", "RecoverySubnetB"],exp:"https://docs.microsoft.com/en-us/azure/site-recovery/hyper-v-azure-tutorial"},
{id:475,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:3,opts:["Protocol to UDP", "Session persistence to None", "Floating IP (direct server return) to Disabled", "Session persistence to Client IP"],exp:"Box 1: Zone-redundant storage (ZRS)\n\n\fZone-redundant storage (ZRS) replicates your data synchronously across three storage clusters\nin a single region.\nLRS would not remain available if a data center in the region fails GRS and RA GRS use\nasynchronous replication.\n\nBox 2: StorageV2 (general purpose V2)\nZRS only support GPv2.\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy-zrs"},
{id:476,type:"img",cat:"Networking",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image845.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You have the peering options shown in the following exhibit.<br><br><img src=\"imgs/image846.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to design a communication strategy for the resources on the virtual networks.<br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image847.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image937.png",exp:"YNN\nPoint 1: Yes: Using virtual network integration enables your app to access:\n    Resources in the virtual network you're integrated with.\n    Resources in virtual networks peered to the virtual network your app is integrated with including global peering connections.\nPoint 2: NO: Virtual network integration is used only to make outbound calls from your app into your virtual network \nPoint 3: NO: There are some limitations with using virtual network integration: The feature isn't available for Isolated plan apps in an App Service Environment\nReference: https://learn.microsoft.com/en-us/azure/app-service/overview-vnet-integration upvoted 25 times flamingo23 1\u00a0year, 9\u00a0months ago In your link under limitations, we have \" You can't reach resources across peering connections with classic virtual networks\". So I think for the first question 'N'. We cannot peer if the other vm is also  virtually integrated. upvoted 1 times flamingo23 1\u00a0year, 9\u00a0months ago Sorry typo - other vm is also NOT virtually integrated. upvoted 1 times ... ... SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isolated apps does not need vnet intergation feature bcoz it is a Network-isolated application hosting , meaning the app is deployed into a subnet, which is inside vnet in this question. Since there is peering between vnet1 and vnet2, the app can communicate with a VM in the other vnet. upvoted 8 times SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isol"},
{id:477,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:1,opts:["Floating IP (direct server return) to Disabled", "Session persistence to Client IP", "Protocol to UDP", "Idle Time-out (minutes) to 20"],exp:"To add a custom domain to your app, you need to verify your ownership of the domain by adding\na verification ID as a TXT record with your domain provider.\nhttps://learn.microsoft.com/en-us/azure/app-service/app-service-web-tutorial-custom-\ndomain?tabs=a%2Cazurecli"},
{id:478,cat:"Compute",q:"You have an Azure subscription that contains 20 virtual machines, a network security group (NSG) named NSG1, and two virtual networks named VNET1 and VNET2 that are peered.<br><br>You plan to deploy an Azure Bastion Basic SKU host named Bastion1 to VNET1.<br><br>You need to configure NSG1 to allow inbound access to the virtual machines via Bastion1.<br><br>Which port should you configure for the inbound security rule?",ans:1,opts:["22", "443", "389", "8080"],exp:"Correct Answer B. 443 Using Bastion your RDP/SSH session is over TLS on port 443. https://learn.microsoft.com/en-us/azure/bastion/bastion-overview If you say port 22 then what about windows VM as it is not mentioned that the VM is windows or Linux? You will have to allow port 443 in NSG."},
{id:479,type:"drop",cat:"Networking",q:"HOTSPOT<br>-<br><br>Your network contains an on-premises Active Directory Domain Services (AD DS) domain named contoso.com. The domain contains the servers shown in the following table.<br><br><img src=\"imgs/image609.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to migrate contoso.com to Azure.<br><br>You create an Azure virtual network named VNET1 that has the following settings:<br><br>\u2022\tAddress space: 10.0.0.0/16<br>\u2022\tSubnet:<br>o\t  Name: Subnet1<br>o\t  IPv4: 10.0.1.0/24<br><br>You need to move DC1 to VNET1. The solution must ensure that the member servers in contoso.com can resolve AD DS DNS names.<br><br>How should you configure DC1? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image610.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"IP address",options:["Obtain an IP address automatically","Use 10.0.2.1","Use 192.168.2.1"]},{label:"Name resolution",options:["Configure VNET1 to use a custom DNS server","Configure VNET1 to use the default Azure-provided DNS server","Create an Azure public DNS zone named contoso.com"]}],ans_img:"imgs/image611.png",exp:"I think it is NYN.\nN - User 1 is in organizational unit 2, but OU2 isn't configured to sync from the AD DS domain to the Entra Tenant.\nY - User2 is in the OU1 domain which IS synced to the Entra tenant\nN - User3 has not been granted access either as an authenticated user or through an authenticated group. upvoted 24 times 117975e 2\u00a0months ago User1 is in OU2, which is not synced to Microsoft Entra.\n\nHowever, Group1 is a Global group & in OU1 & synced, which contains User1, has contributor role.\nSo User1 can access content of share1: Yes\n\u2705 Yes, User1 can access share1 via AD DS authentication. upvoted 2 times ... Dankho 1\u00a0year, 1\u00a0month ago User1 is a member of Group1 which is in OU1 which is synced to AD DS. so 1 is yes. upvoted 3 times Dankho 1\u00a0year, 1\u00a0month ago Nevermind.\n\nAzure AD role assignments are evaluated based on Azure AD identities. For User1 to have access, they need an Azure AD identity, which they don\u2019t have because they are in an organizational unit (OU2) that hasn\u2019t been synchronized. upvoted 3 times ... ... Mitko_V_Milkov 11\u00a0months ago It seems that NYN is the correct answer. You can type this question like this \"I have the following scenario. On-prem AD syncing to Azure Entra ID. On prem I have two OUs. OU1 and OU2. I have User1 in OU2 and User2 in OU1. In OU1 I have Group1 which contains User1. Only OU1 is is synced from on-prem AD to Azure. Is User1 going to be synced to Azure?\", and it will be explained to you that User1 will not be synced, therefore will "},
{id:480,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:2,opts:["Session persistence to None", "a health probe", "Session persistence to Client IP", "Idle Time-out (minutes) to 20"],exp:"Box 1: Any Windows computer that has Internet connectivity\nFor files recovery, you download and run a windows executable to map a network drive. It can\nonly run when the OS meets the requirements. Any computer running Windows Server 2016 or\nWindows 10 is suitable. File recovery can be done from any machine on the Internet.\n\nNote: There might be compatibility issues with any Windows computer, so consider VM1 and\nVM2 only as an answer.\n\nBox 2: VM1 or a new Azure virtual machine only\nFor restoring a VM, you can choose 'Create new' or 'Replace existing'.\n\n\fReference:\nhttps://docs.microsoft.com/en-us/azure/backup/backup-azure-restore-files-from-vm\nhttps://github.com/MicrosoftDocs/azure-docs/blob/master/articles/backup/backup-azure-restore-\nfiles-from-vm.md#for-windows-os"},
{id:481,cat:"Networking",q:"You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image612.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to deploy an Azure firewall named AF1 to RG1 in the West US Azure region.<br><br>To which virtual networks can you deploy AF1?",ans:2,opts:["VNET1, VNET2, VNET3, and VNET4", "VNET1 and VNET2 only", "VNET1 only", "VNET1, VNET2, and VNET4 only", "VNET1 and VNET4 only"],exp:"Box 1: A Recovery Services vault\nYou can set up a Recovery Services vault and configure backup for multiple Azure VMs.\n\nBox 2: A backup policy\nIn Choose backup policy, do one of the following:\n- Leave the default policy. This backs up the VM once a day at the time specified, and retains\nbackups in the vault for 30 days.\n- Select an existing backup policy if you have one.\n- Create a new policy, and define the policy settings."},
{id:482,cat:"Compute",q:"You have an on-premises network.<br><br>You have an Azure subscription that contains three virtual networks named VNET1. VNET2. and VNET3. The virtual networks are peered and connected to the on-premises network. The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image613.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to monitor connectivity between the virtual machines and the on-premises network by using Connection Monitor.<br><br>What is the minimum number of connection monitors you should deploy?",ans:1,opts:["1", "2", "3", "4"],exp:"Connection monitor resource: A region-specific Azure resource. https://learn.microsoft.com/en-us/azure/network-watcher/connection-monitor-create-using-portal#before-you-begin"},
{id:483,type:"hs",cat:"Azure",q:"HOTSPOT -<br><br>You plan to deploy the following Azure Resource Manager (ARM) template.<br><br><img src=\"imgs/image614.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image615.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",statements:["LB1 will be connected to a subnet named VNET1/netname O [O}", "LB1 can be deployed only to the resource group that contains VNET1", "The value of the sku variable can be provided as a parameter when the", "template is deployed from a command prompt"],ans:["No", "No", "No", "Yes"],exp:"I get so tired of these \"yes or no\" questions. It's basically 3 questions in 1. Disgusting material."},
{id:484,cat:"Networking",q:"You have an Azure subscription that contains a storage account. The account stores website data.<br><br>You need to ensure that inbound user traffic uses the Microsoft point-of-presence (POP) closest to the user's location.<br><br>What should you configure?",ans:2,opts:["private endpoints", "Azure Firewall rules", "Routing preference", "load balancing"],exp:"Box 1: Yes\nTraffic from VM1 and VM2 can reach VM3 thanks to the routing table, and as IP forwarding is\nenabled on VM3, traffic from VM3 can reach VM1.\nBox 2: No\nVM3, which has IP forwarding, must be turned on, in order for traffic from VM2 to reach VM1.\nBox 3: Yes\nThe traffic from VM1 will reach VM3, which thanks to IP forwarding, will send the traffic to VM2.\nReferences: https://www.quor\na.com/What-is-IP-forwarding\n\n\fQUESTION 113\nHotspot Question\n\nYou plan to deploy five virtual machines to a virtual network subnet. Each virtual machine will\nhave a public IP address and a private IP address.\nEach virtual machine requires the same inbound and outbound security rules.\nWhat is the minimum number of network interfaces and network security groups that you require?\nTo answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\n\nAnswer:\n\nExplanation:\nBox 1: 5\nA public and a private IP address can be assigned to a single network interface.\nBy default a NIC is associated to one IP address. Anyway nothing prevents a NIC to have MORE\nTHAN ONE IP address. So to the VM's NIC, you can associate the public and the private IP at\n\n\fthe same time. You are not forced to have one NIC for the public IP and one NIC for the private\nIP.\n\nBox 2: 1\nYou can associate zero, or one, network security group to each virtual network subnet and\nnetwork interface in a virtual machine. The same network security group can be associated to as\nmany subnets and network interfaces as you choose."},
{id:485,cat:"Compute",q:"You have two Azure virtual machines named VM1 and VM2 that run Windows Server. The virtual machines are in a subnet named Subnet1. Subnet1 is in a virtual network named VNet1.<br><br>You need to prevent VM1 from accessing VM2 on port 3389.<br><br>What should you do?",ans:0,opts:["Create a network security group (NSG) that has an outbound security rule to deny destination port 3389 and apply the NSG to the network interface of VM1.", "Configure Azure Bastion in VNet1.", "Create a network security group (NSG) that has an outbound security rule to deny source port 3389 and apply the NSG to Subnet1.", "Create a network security group (NSG) that has an inbound security rule to deny source port 3389 and apply the NSG to Subnet1."],exp:"Answer is correct. However, it will prevent VM1 from connecting to any machine using 3389, not just VM2"},
{id:486,cat:"Networking",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image617.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to manage outbound traffic from VNET1 by using Firewall1.<br><br>What should you do first?",ans:2,opts:["Configure the Hybrid Connection Manager.", "Upgrade ASP1 to the Premium SKU.", "Create a route table.", "Create an Azure Network Watcher."],exp:"Box 1: No\nAzure DNS provides automatic registration of virtual machines from a single virtual network that's\nlinked to a private zone as a registration virtual network. VM5 does not belong to the registration\nvirtual network though.\nBox 2: No\nForward DNS resolution is supported across virtual networks that are linked to the private zone\nas resolution virtual networks. VM5 does belong to a resolution virtual network.\nBox 3: Yes\nVM6 belongs to registration virtual network, and an A (Host) record exists for VM9 in the DNS\nzone. By default, registration virtual networks also act as resolution virtual networks, in the sense\nthat DNS resolution against the zone works from any of the virtual machines within the\nregistration virtual network.\nReferences: https://docs.microsoft.com/en-us/azure/dns/private-dns-overview"},
{id:487,cat:"Networking",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image645.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>All the resources connect to a virtual network named VNet1.<br><br>You plan to deploy an Azure Bastion host named Bastion1 to VNet1.<br><br>Which resources can be protected by using Bastion1?",ans:0,opts:["VM1 only", "contoso.com only", "App1 and contoso.com only", "VM1 and contoso.com only", "VM1, App1, and contoso.com"],exp:"Box 1:\nRule2 blocks ports 50-60, which includes port 53, the DNS port. Internet users can reach the Web\nserver, since it uses port 80.\n\nBox 2:\nIf Rule2 is removed internet users can reach the DNS server as well.\nNote: Rules are processed in priority order, with lower numbers processed before higher\nnumbers, because lower numbers have higher priority. Once traffic matches a rule, processing\nstops. As a result, any rules that exist with lower priorities (higher numbers) that have the same\nattributes as rules with higher priorities are not processed.\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/virtual-network/security-overview"},
{id:488,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:2,opts:["Session persistence to None", "a health probe", "Session persistence to Client IP and protocol", "Idle Time-out (minutes) to 20"],exp:"Cloud-initis a widely used approach to customize a Linux VM as it boots for the first time. You can\nuse cloud-init to install packages and write files, or to configure users and security. As cloud-init\nruns during the initial boot process, there are no additional steps or required agents to apply your\nconfiguration.\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/linux/tutorial-automate-vm-deployment"},
{id:489,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:2,opts:["a health probe", "Floating IP (direct server return) to Enabled", "Session persistence to Client IP and protocol", "Protocol to UDP"],exp:"A bidirectional link must be created in order to establish a successful connection.\nFor example, to peer VNet A to VNet B, a link must be created from VNetA to VNetB and from\nVNetB to VNetA. Creating both links will change the state to Connected.\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-networks-faq#my-vnet-peering-\nconnection-is-in-initiated-state-why-cant-i-connect"},
{id:490,cat:"Compute",q:"You have an Azure subscription that contains 10 virtual machines and the resources shown in the following table.<br><br><img src=\"imgs/image654.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that Bastion1 can support 100 concurrent SSH users. The solution must minimize administrative effort.<br><br>What should you do first?",ans:3,opts:["Resize the subnet of Bastion1", "Configure host scaling.", "Create a network security group (NSG)", "Upgrade Bastion1 to the Standard SKU"],exp:"The process is simple:\n1. Add the custom domain name to your directory\n2. Add a DNS entry for the domain name at the domain name registrar\n3. Verify the custom domain name in Azure AD\n\nReferences: https://docs.microsoft.com/en-us/azure/dns/dns-web-sites-custom-domain"},
{id:491,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:0,opts:["Session persistence to Client IP and protocol", "Protocol to UDP", "Session persistence to None", "Floating IP (direct server return) to Disabled"],exp:"We cannot just move a virtual machine between networks. What we need to do is identify the disk\nused by the VM, delete the VM itself while retaining the disk, and recreate the VM in the target\nvirtual network and then attach the original disk to it.\nhttps://blogs.technet.microsoft.com/canitpro/2014/06/16/step-by-step-move-a-vm-to-a-different-\nvnet-on-azure/\nhttps://4sysops.com/archives/move-an-azure-vm-to-another-virtual-network-vnet/#migrate-an-\nazure-vm-between-vnets"},
{id:492,type:"img",cat:"Governance",q:"DRAG DROP<br>-<br><br>You have a Windows 11 device named Device and an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image663.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Device1 has Azure PowerShell and Azure Command-Line Interface (CLI) installed.<br><br>From Device1, you need to establish a Remote Desktop connection to VM1.<br><br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br><br><img src=\"imgs/image664.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image665.png",exp:"Explanation:\n\nAzure Bastion is a service you deploy that lets you connect to a virtual machine using your browser and the Azure portal, or via the native SSH or RDP client already installed on your local computer.\n\nThe native client feature lets you connect to your target VMs via Bastion using Azure CLI, and expands your sign-in options to include local SSH key pair and Azure Active Directory (Azure AD).\n\nUsing the native client requires the Standard SKU tier for Azure Bastion. First, we need to upgrade the SKU of our Azure Bastion instance.\n\nSecond, we need to enable the native client support from the configuration settings of Bastion1 in the Azure Portal.\n\nThird, we need to sign in to our Azure account and select the subscription containing the Bastion resource as shown below: upvoted 36 times Teroristo 2\u00a0years, 3\u00a0months ago az login\naz account list\naz account set --subscription \"<subscription ID>\"\n\nLastly, we run the following command to connect via RDP. You\u2019ll then be prompted to input your credentials. You can use either a local username and password, or your Azure AD credentials. \n\naz network bastion rdp --name \"<BastionName>\" --resource-group \"<ResourceGroupName>\" --target-resource-id \"<VMResourceId>\" upvoted 15 times ..."},
{id:493,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:1,opts:["Floating IP (direct server return) to Enabled", "Session persistence to Client IP", "Protocol to UDP", "Idle Time-out (minutes) to 20"],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:494,cat:"Networking",q:"You have an Azure subscription that has the public IP addresses shown in the following table.<br><br><img src=\"imgs/image678.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to deploy an Azure Bastion Basic SKU host named Bastion1.<br><br>Which IP addresses can you use?",ans:0,opts:["IP1 only", "IP1 and IP2 only", "IP3, IP4, and IP5 only", "IP1, IP2, IP4, and IP5 only", "IP1, IP2, IP3, IP4, and IP5"],exp:"https://docs.microsoft.com/en-us/azure/active-directory/authentication/howto-mfa-mfasettings"},
{id:495,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:3,opts:["Floating IP (direct server return) to Disabled", "Floating IP (direct server return) to Enabled", "a health probe", "Session persistence to Client IP"],exp:"Only an admin can block users and not a reason and complaints in terms of the software way of\nworking."},
{id:496,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:3,opts:["Floating IP (direct server return) to Enabled", "Idle Time-out (minutes) to 20", "a health probe", "Session persistence to Client IP"],exp:"The virtual networks you peer must have non-overlapping IP address spaces. The VNet1 and\nVNhet2 address spaces overlap. The range of VNet2 is contained inside the range of VNet1.\nReferences:\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-network-manage-\npeering#requirements-and-constraints"},
{id:497,cat:"Compute",q:"You have two Azure subscriptions named Sub1 and Sub2.<br><br>Sub1 contains a virtual machine named VM1 and a storage account named storage1.<br><br>VM1 is associated to the resources shown in the following table.<br><br><img src=\"imgs/image679.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to move VM1 to Sub2.<br><br>Which resources should you move to Sub2?",ans:3,opts:["VM1, Disk1, and NetInt1 only", "VM1, Disk1, and VNet1 only", "VM1, Disk1, and storage1 only", "VM1, Disk1, NetInt1, and VNet1"],exp:"Box 1: Yes\nNo registration zone for VNET2.\n\nBox 2: Yes\nYou can link VNET1 to Zone3.com A private DNS zone can have multiple registration virtual\nnetworks. However, every virtual network can only have one registration zone associated with it.\n\nBox 3: No\nAuto registration is already enabled on Zone 1. When you add a link from VNET2 to Zone."},
{id:498,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:0,opts:["Session persistence to Client IP and protocol", "Idle Time-out (minutes) to 20", "Session persistence to None", "Floating IP (direct server return) to Enabled"],exp:"Application Gateway currently has seven metrics to view performance counters. Metrics are a\nfeature for certain Azure resources where you can view performance counters in the portal. For\nApplication Gateway, the following metrics are available:\nTotal Requests\nFailed Requests\nCurrent Connections\nHealthy Host Count\nResponse Status\nThroughput\nUnhealthy Host count\nYou can filter on a per backend pool basis to show healthy/unhealthy hosts in a specific backend\npool\nReferences: https://docs.microsoft.com/en-us/azure/application-gateway/application-\ngatewaydiagnostics#Metrics"},
{id:499,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:3,opts:["Floating IP (direct server return) to Disabled", "Idle Time-out (minutes) to 20", "a health probe", "Session persistence to Client IP"],exp:"Explanation:\nStep 1: Stop VM1.\nStep 2: Detach Disk1 from VM1.\nStep 3: Start VM1.\nDetach a data disk using the portal\n1. In the left menu, select Virtual Machines.\n2. Select the virtual machine that has the data disk you want to detach and click Stop to\ndeallocate the VM.\n3. In the virtual machine pane, select Disks.\n4. At the top of the Disks pane, select Edit.\n\n\f5. In the Disks pane, to the far right of the data disk that you would like to detach, click the Detach\nbutton image detach button.\n6. After the disk has been removed, click Save on the top of the pane.\n7. In the virtual machine pane, click Overview and then click the Start button at the top of the\npane to restart the VM.\n8. The disk stays in storage but is no longer attached to a virtual machine.\nStep 4: Attach Disk1 to VM2 -\nAttach an existing disk -\nFollow these steps to reattach an existing available data disk to a running VM.\n1. Select a running VM for which you want to reattach a data disk.\n2. From the menu on the left, select Disks.\n3. Select Attach existing to attach an available data disk to the VM.\n4. From the Attach existing disk pane, select OK.\nReferences:\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/detach-disk\nhttps://docs.microsoft.com/en-us/azure/lab-services/devtest-lab-attach-detach-data-disk"},
{id:500,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br><br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br><br>You need to ensure that visitors are serviced by the same web server for each request.<br><br>What should you configure?",ans:0,opts:["Session persistence to Client IP", "Idle Time-out (minutes) to 20", "Session persistence to None", "Protocol to UDP"],exp:"Box 1: Assign a tag to each resource.\nYou apply tags to your Azure resources giving metadata to logically organize them into a\ntaxonomy. After you apply tags, you can retrieve all the resources in your subscription with that\ntag name and value. Each resource or resource group can have a maximum of 15 tag\nname/value pairs. Tags applied to the resource group are not inherited by the resources in that\nresource group.\n\nBox 2: From the Cost analysis blade, filter the view by tag\nAfter you get your services running, regularly check how much they're costing you. You can see\nthe current spend and burn rate in Azure portal.\nVisit the Subscriptions blade in Azure portal and select a subscription. You should see the cost\nbreakdown and burn rate in the popup blade. Click Cost analysis in the list to the left to see the\ncost breakdown by resource. Wait 24 hours after you add a service for the data to populate.\nYou can filter by different properties like tags, resource group, and timespan. Click Apply to\nconfirm the filters and Download if you want to export the view to a Comma-Separated Values\n(.csv) file.\n\nBox 3: Download the usage report\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/azure-resource-manager/resource-group-using-tags\nhttps://docs.microsoft.com/en-us/azure/billing/billing-getting-started"},
{id:501,cat:"Networking",q:"You have an Azure subscription.<br><br>You create a routing table named RT1.<br><br>You need to add a route to RT1 that specifies the next hop IP address.<br><br>Which next hop type should you select?",ans:3,opts:["Internet", "Virtual network gateway", "Virtual network", "Virtual appliance"],exp:"Box 1: add an address space\nAs 192.168.1.0/24 is outside of the configured address space of 10.2.0.0/16, the answer is to\ncreate an address space.\n\nBox 2: add a subnet\nAs 10.2.1.0/24 subnet doesn\u2019t exist (only 10.2.0.0/24) the answer is to create a subnet."},
{id:502,cat:"Networking",q:"You have two Azure subscriptions named Sub1 and Sub2 that are linked to separate Microsoft Entra tenants.<br><br><img src=\"imgs/image844.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You have the virtual networks shown in the following table.<br><br>Which virtual networks can you peer with VNet1?",ans:4,opts:["VNet2 only", "VNet2 and VNet3 only", "VNet2 and VNet4 only", "VNet2, VNet3, and VNet4 only", "VNet2, VNet3, VNet4, and VNet5"],exp:"Box 1: Share1 only\nAzure Backup policies can only back up an Azure VM, SQL in an Azure VM or File Share. As\nsuch the answer to the first part should be Share1 only.\nBox 2: 99 years\nWith the latest update to Azure Backup, customers can retain their data for up to 99 years in\nAzure.\nNote: A backup policy defines a matrix of when the data snapshots are taken, and how long those\nsnapshots are retained.\nThe backup policy interface looks like this:\n\n\fReferences: https://docs.microsoft.com/en-us/azure/backup/backup-azure-vms-first-look-\narm#defining-a-backup-policy\nhttps://blogs.microsoft.com/firehose/2015/02/16/february-update-to-azure-backup-includes-data-\nretention-up-to-99-years-offline-backup-and-more/"},
{id:503,cat:"Identity",q:"You have an Azure subscription that contains a Recovery Services vault named Vault1.<br><br>You need to enable multi-user authorization (MAU) for Vault1.<br><br>Which resource should you create first?",ans:2,opts:["an administrative unit", "a managed identity", "a resource guard", "a custom Azure role"],exp:"https://learn.microsoft.com/en-us/azure/virtual-network/service-tags-overview#available-service-\ntags\n\"AzureKeyVault\" tag can be used in outbound NSGs."},
{id:504,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an app named App1 that is installed on two Azure virtual machines named VM1 and VM2. Connections to App1 are managed by using an Azure Load Balancer.<br><br>The effective network security configurations for VM2 are shown in the following exhibit.<br><br><img src=\"imgs/image688.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You discover that connections to App1 from 131.107.100.50 over TCP port 443 fail.<br><br>You verify that the Load Balancer rules are configured correctly.<br><br>You need to ensure that connections to App1 can be established successfully from 131.107.100.50 over TCP port 443.<br><br>Solution: You create an inbound security rule that allows any traffic from the AzureLoadBalancer source and has a priority of 150.<br><br>Does this meet the goal?",ans:0,opts:["Yes", "No"],exp:"Box 2: 4\n4 *0.50 * 0.95* 2 = 3.8\nNote: The number of cores in the machines must be equal to or less than the maximum number\nof cores (128 cores) supported for an Azure VM.\nIf performance history is available, Azure Migrate considers the utilized cores for comparison. If a\ncomfort factor is specified in the assessment settings, the number of utilized cores is multiplied by\nthe comfort factor.\nIf there's no performance history, Azure Migrate uses the allocated cores, without applying the\ncomfort factor.\nReferences:\nhttps://docs.microsoft.com/en-us/azure/migrate/concepts-assessment-calculation"},
{id:505,cat:"Networking",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image843.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You create a route table named RT1 in the East US Azure region.<br><br>To which resources can you associate RT1?",ans:1,opts:["VNet1 only", "Subnet1 only", "VNet1 and NIC1 only", "Subnet1 and NIC1 only", "VNet1, Subnet1, and NIC1"],exp:"Box 1: 60\nOne alert per minute will trigger one email per minute.\nBox 2: 12\nNo more than 1 SMS every 5 minutes can be send, which equals 12 per hour. Note: Rate limiting\nis a suspension of notifications that occurs when too many are sent to a particular phone number,\nemail address or device. Rate limiting ensures that alerts are manageable and actionable.\nThe rate limit thresholds are:\n\n\fSMS: No more than 1 SMS every 5 minutes.\nVoice: No more than 1 Voice call every 5 minutes.\nEmail: No more than 100 emails in an hour.\nOther actions are not rate limited.\nReferences:\nhttps://github.com/MicrosoftDocs/azure-docs/blob/master/articles/monitoring-and-\ndiagnostics/monitoring-overview-alerts.md"},
{id:506,cat:"Compute",q:"You create an Azure VM named VM1 that runs Windows Server 2019.<br><br>VM1 is configured as shown in the exhibit. (Click the Exhibit tab.)<br><br><img src=\"imgs/image690.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to enable Desired State Configuration for VM1.<br><br>What should you do first?",ans:1,opts:["Connect to VM1.", "Start VM1.", "Capture a snapshot of VM1.", "Configure a DNS name for VM1."],exp:"Box 1: VM3\nNot VM1 as Bitlocker is not supported. BitLocker must be disabled before you enable replication\nfor a VM.\nNot VM2 as maximum Operating system disk size for a generation VM is 2,048 GB.\nBox 2: VMA and VMB only\n\n\fNot VMC as the max data disk size is 4,095 GB\nReferences:\nhttps://docs.microsoft.com/en-us/azure/site-recovery/hyper-v-azure-support-matrix\nhttps://docs.microsoft.com/en-us/azure/site-recovery/vmware-physical-azure-support-\nmatrix#azure-vm-requirements"},
{id:507,type:"drop",cat:"Networking",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image728.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subnets have the IP address spaces shown in the following table.<br><br><img src=\"imgs/image729.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to create a container app named contapp1 in the East US Azure region.<br><br>You need to create a container app environment named con-env1 that meets the following requirements:<br><br>\u2022\tUses its own virtual network.<br>\u2022\tUses its own subnet.<br>\u2022\tIs connected to the smallest possible subnet.<br><br>To which virtual networks can you connect con-env1, and which subnet mask should you use? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image730.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Virtual network",options:["VNet1 only","VNet2 only","VNet1 or VNet2 only","VNet2 or VNet3 only","VNet1 or VNet3 only","VNet1, VNet2, or VNet3"]},{label:"f23",options:["/24","/26","/28"]}],ans_img:"imgs/image939.png",exp:"YNN\nPoint 1: Yes: Using virtual network integration enables your app to access:\n    Resources in the virtual network you're integrated with.\n    Resources in virtual networks peered to the virtual network your app is integrated with including global peering connections.\nPoint 2: NO: Virtual network integration is used only to make outbound calls from your app into your virtual network \nPoint 3: NO: There are some limitations with using virtual network integration: The feature isn't available for Isolated plan apps in an App Service Environment\nReference: https://learn.microsoft.com/en-us/azure/app-service/overview-vnet-integration upvoted 25 times flamingo23 1\u00a0year, 9\u00a0months ago In your link under limitations, we have \" You can't reach resources across peering connections with classic virtual networks\". So I think for the first question 'N'. We cannot peer if the other vm is also  virtually integrated. upvoted 1 times flamingo23 1\u00a0year, 9\u00a0months ago Sorry typo - other vm is also NOT virtually integrated. upvoted 1 times ... ... SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isolated apps does not need vnet intergation feature bcoz it is a Network-isolated application hosting , meaning the app is deployed into a subnet, which is inside vnet in this question. Since there is peering between vnet1 and vnet2, the app can communicate with a VM in the other vnet. upvoted 8 times SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isol"},
{id:508,cat:"Compute",q:"You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image732.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>All the virtual networks are peered. Each virtual network contains nine virtual machines.<br><br>You need to configure secure RDP connections to the virtual machines by using Azure Bastion.<br><br>What is the minimum number of Bastion hosts required?",ans:0,opts:["1", "3", "9", "10"],exp:"To access data sources on premises from your logic apps, you can create a data gateway\nresource in Azure so that your logic apps can use the on-premises connectors. Box 1: From an\non-premises computer, install an on-premises data gateway. Before you can connect to on-\npremises data sources from Azure Logic Apps, download and install the on-premises data\ngateway on a local computer.\nBox 2: From the Azure portal, create an on-premises data gateway Create Azure resource for\ngateway\nAfter you install the gateway on a local computer, you can then create an Azure resource for your\ngateway. This step also associates your gateway resource with your Azure subscription. Sign in\nto the Azure portal. Make sure you use the same Azure work or school email address used to\ninstall the gateway.\nOn the main Azure menu, select Create a resource > Integration > On-premises data gateway.\n\n\fOn the Create connection gateway page, provide this information for your gateway resource. To\nadd the gateway resource to your Azure dashboard, select Pin to dashboard. When you're done,\nchoose Create.\nBox 3: From the Logic Apps Designer in the Azure portal, add a connector After you create your\ngateway resource and associate your Azure subscription with this resource, you can now create a\nconnection between your logic app and your on-premises data source by using the gateway.\nIn the Azure portal, create or open your logic app in the Logic App Designer. Add a connector that\nsupports on-premises connections, for example, SQL Server.\nSet up your connection.\nReferences:\nhttps://docs.microsoft.com/en-us/azure/logic-apps/logic-apps-gateway-connection"},
{id:509,type:"img",cat:"Compute",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image733.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image734.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Each virtual machine contains only a private IP address.<br><br>You create an Azure bastion for VNet1 as shown in the following exhibit.<br><br><img src=\"imgs/image735.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image736.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image940.png",exp:"YNN\nPoint 1: Yes: Using virtual network integration enables your app to access:\n    Resources in the virtual network you're integrated with.\n    Resources in virtual networks peered to the virtual network your app is integrated with including global peering connections.\nPoint 2: NO: Virtual network integration is used only to make outbound calls from your app into your virtual network \nPoint 3: NO: There are some limitations with using virtual network integration: The feature isn't available for Isolated plan apps in an App Service Environment\nReference: https://learn.microsoft.com/en-us/azure/app-service/overview-vnet-integration upvoted 25 times flamingo23 1\u00a0year, 9\u00a0months ago In your link under limitations, we have \" You can't reach resources across peering connections with classic virtual networks\". So I think for the first question 'N'. We cannot peer if the other vm is also  virtually integrated. upvoted 1 times flamingo23 1\u00a0year, 9\u00a0months ago Sorry typo - other vm is also NOT virtually integrated. upvoted 1 times ... ... SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isolated apps does not need vnet intergation feature bcoz it is a Network-isolated application hosting , meaning the app is deployed into a subnet, which is inside vnet in this question. Since there is peering between vnet1 and vnet2, the app can communicate with a VM in the other vnet. upvoted 8 times SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isol"},
{id:510,type:"hs",cat:"Networking",q:"HOTSPOT -<br><br>You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image738.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the subnets shown in the following table.<br><br><img src=\"imgs/image739.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image740.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You create a service endpoint policy named Policy1 in the South Central US Azure region to allow connectivity to all the storage accounts in the subscription.<br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image741.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",statements:["Policy! can be applied to Subnet3.", "Only storage! and storage? can be accessed from VNet2.", "Only storage2 can be accessed from VNet3."],ans:["Yes", "No", "No"],exp:"Box 1: IP flow verify\nAt some point, a VM may become unable to communicate with other resources, because of a\nsecurity rule. The IP flow verify capability enables you to specify a source and destination IPv4\naddress, port, protocol (TCP or UDP), and traffic direction (inbound or outbound). IP flow verify\nthen tests the communication and informs you if the connection succeeds or fails. If the\nconnection fails, IP flow verify tells you which.\n\nBox 2: Connection troubleshoot\nDiagnose outbound connections from a VM: The connection troubleshoot capability enables you\nto test a connection between a VM and another VM, an FQDN, a URI, or an IPv4 address. The\ntest returns similar information returned when using the connection monitor capability, but tests\nthe connection at a point in time, rather than monitoring it over time, as connection monitor does.\nLearn more about how to troubleshoot connections using connection-troubleshoot."},
{id:511,cat:"Compute",q:"You have an Azure virtual network named VNet1 that contains the following settings:<br><br>\u2022\tIPv4 address space: 172.16.10.0/24<br>\u2022\tSubnet name: Subnet1<br>\u2022\tSubnet address range: 172.16.10.0/25<br><br>What is the maximum number of virtual machines that can connect to Subnet1?",ans:2,opts:["24", "25", "123", "128", "251"],exp:"To move existing resources to another resource group or subscription, use the Move-\nAzureRmResource cmdlet.\nhttps://docs.microsoft.com/en-in/azure/azure-resource-manager/resource-group-move-\nresources#move-resources"},
{id:512,cat:"Networking",q:"You have an Azure subscription that contains a resource group named RG1 and a virtual network named VNet1.<br><br>You plan to create an Azure container instance named container1.<br><br>You need to be able to configure DNS name label scope reuse for container1.<br><br>What should you configure for container1?",ans:1,opts:["the private networking type", "the public networking type", "a new subnet on VNet1", "a confidential SKU"],exp:"https://docs.microsoft.com/en-us/azure/billing/billing-getting-started\nhttps://docs.microsoft.com/en-us/azure/azure-resource-manager/resource-group-using-tags"},
{id:513,type:"img",cat:"Compute",q:"HOTSPOT -<br><br>You have the Azure virtual machines shown in the following table.<br><br><img src=\"imgs/image743.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>VNET1, VNET2, and VNET3 are peered.<br><br>VM4 has a DNS server that is authoritative for a zone named contoso.com and contains the records shown in the following table.<br><br><img src=\"imgs/image744.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The virtual networks are configured to use the DNS servers shown in the following table.<br><br><img src=\"imgs/image745.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image746.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image942.png",exp:"Correct Answer: D\n\nUse Virtual network peering to connect virtual networks to be able to connect to other VMs in different VNETs. Virtual network peering enables you to seamlessly connect networks in Azure Virtual Network. The virtual networks appear as one for connectivity purposes. The traffic between virtual machines uses the Microsoft backbone infrastructure.\n\nB, C: Virtual Network (VNet) service endpoint provides secure and direct connectivity to Azure services over an optimized route over the Azure backbone network. Endpoints allow you to secure your critical Azure service resources to only your virtual networks. Service Endpoints enables private IP addresses in the VNet to reach the endpoint of an Azure service without needing a public IP address on the VNet. upvoted 101 times"},
{id:514,type:"dd",cat:"Compute",q:"DRAG DROP<br>-<br><br>You have an Azure subscription that contains a resource group named RG1.<br><br>You plan to create an Azure Resource Manager (ARM) template to deploy a new virtual machine named VM1. VM1 must support the capture of performance data.<br><br>You need to specify resource dependencies for the ARM template.<br><br>In which order should you deploy the resources? To answer, move all resources from the list of resources to the answer area and arrange them in the correct order.<br><br><img src=\"imgs/image748.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",items:["Virtual network", "Network interface", "Virtual machine", "Monitoring extension"],ans:["Virtual network", "Network interface", "Virtual machine", "Monitoring extension"],exp:"Step 1. Choose Create a resource in the upper left-hand corner of the Azure portal.\n\nStep 2. In the Basics tab, under Project details, make sure the correct subscription is selected\nand then choose Web-RGlod8095859 resource group\n\nStep 3. Under Instance details type/select:\nVirtual machine name: Web01\nImage: Windows Server 2016\nSize: Standard_B2ms size\n\n\fLeave the other defaults.\n\nStep 4. Finish the Wizard\n\nNote: You will have option to create Availability Set and VNET when you create a new VM\nthrough Azure Portal Wizard."},
{id:515,cat:"Governance",q:"You have an Azure subscription.<br><br>You are creating a new Azure container instance that will have the following settings:<br><br>\u2022\tContainer name: cont1<br>\u2022\tSKU: Standard<br>\u2022\tOS type: Windows<br>\u2022\tNetworking type: Public<br>\u2022\tMemory (GiB): 2.5<br>\u2022\tNumber of CPU cores: 2<br><br>You discover that the Private setting for Networking type is unavailable.<br><br>You need to ensure that cont1 can be configured to use private networking.<br><br>Which setting should you change?",ans:1,opts:["Memory (GiB)", "Networking type", "Number of CPU cores", "OS type", "SKU"],exp:"Azure Import/Export service is used to securely import large amounts of data to Azure Blob\nstorage and Azure Files by shipping disk drives to an Azure datacenter.\nThe maximum size of an Azure Files Resource of a file share is 5 TB.\n\nNote:\nThere are several versions of this question in the exam. The question has two correct answers:\n1. Azure File Storage\n2. Azure Blob Storage\n\nThe question can have other incorrect answer options, including the following:\n- Azure Data Lake Store\n- Azure SQL Database\n- Azure Data Factory"},
{id:516,cat:"Compute",q:"You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image750.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image751.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>All the virtual machines have only private IP addresses.<br><br>You deploy an Azure Bastion host named Bastion1 to VNet1.<br><br>To which virtual machines can you connect through Bastion1?",ans:1,opts:["VM1 only", "VM1 and VM2 only", "VM1 and VM3 only", "VM1, VM2, and VM3"],exp:"VM1 and VM2, because they are peered."},
{id:517,cat:"Networking",q:"You have the Azure virtual networks shown in the following table.<br><br><img src=\"imgs/image817.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Which virtual networks can you peer with VNet1?",ans:2,opts:["VNet2, VNet3, and VNet4", "VNet2 only", "VNet3 and VNet4 only", "VNet2 and VNet3 only"],exp:"Azure portal create public container\nTo create a container in the Azure portal, follow these steps:\n\nStep 1. Navigate to your new storage account in the Azure portal.\n\nStep 2. In the left menu for the storage account, scroll to the lob service section, then select\nBlobs.\nSelect the + Container button.\nType a name for your new container: bios\nSet the level of public access to the container: Select anonymous access.\n\nStep 3. Select OK to create the container.\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/storage/blobs/storage-quickstart-blobs-portal"},
{id:518,cat:"Compute",q:"You have an Azure subscription.<br><br>You plan to migrate 50 virtual machines from VMware vSphere to the subscription.<br><br>You create a Recovery Services vault.<br><br>What should you do next?",ans:3,opts:["Configure an extended network.", "Create a recovery plan.", "Deploy an Open Virtualization Application (OVA) template to vSphere.", "Configure a virtual network."],exp:"Step 1. Go to the Storage Account blade on the Azure portal:\n\nStep 2. Click on add File Share button:\n\nStep 3. Provide Name (storagelod8095859) and Quota (250 GB).\n\n\fReferences:\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-how-to-create-file-share"},
{id:519,type:"drop",cat:"Compute",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image791.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Each virtual network has 50 connected virtual machines.<br><br>You need to implement Azure Bastion. The solution must meet the fallowing requirements:<br><br>\u2022\tSupport host scaling.<br>\u2022\tSupport uploading and downloading files.<br>\u2022\tSupport the virtual machines on both VNet1 and VNet2.<br>\u2022\tMinimize the number of addresses on the Azure Bastion subnet.<br><br>How should you configure Azure Bastion? To answer, select the options in the answer area.<br><br>NOTE: Each correct answer is worth one point.<br><br><img src=\"imgs/image792.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Subnet size",options:["24","26)","/28","129"]},{label:"Public IP",options:["Basic SKU with a dynamic allocation","Basic SKU with 2 static allocation."]}],ans_img:"imgs/image793.png",exp:"YNN\nPoint 1: Yes: Using virtual network integration enables your app to access:\n    Resources in the virtual network you're integrated with.\n    Resources in virtual networks peered to the virtual network your app is integrated with including global peering connections.\nPoint 2: NO: Virtual network integration is used only to make outbound calls from your app into your virtual network \nPoint 3: NO: There are some limitations with using virtual network integration: The feature isn't available for Isolated plan apps in an App Service Environment\nReference: https://learn.microsoft.com/en-us/azure/app-service/overview-vnet-integration upvoted 25 times flamingo23 1\u00a0year, 9\u00a0months ago In your link under limitations, we have \" You can't reach resources across peering connections with classic virtual networks\". So I think for the first question 'N'. We cannot peer if the other vm is also  virtually integrated. upvoted 1 times flamingo23 1\u00a0year, 9\u00a0months ago Sorry typo - other vm is also NOT virtually integrated. upvoted 1 times ... ... SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isolated apps does not need vnet intergation feature bcoz it is a Network-isolated application hosting , meaning the app is deployed into a subnet, which is inside vnet in this question. Since there is peering between vnet1 and vnet2, the app can communicate with a VM in the other vnet. upvoted 8 times SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isol"},
{id:520,cat:"Networking",q:"You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image816.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that all the traffic between VNet1 and VNet2 traverses the Microsoft backbone network.<br><br>What should you configure?",ans:1,opts:["a private endpoint", "peering", "Express Route", "a route table"],exp:"You would need to Redeploy the VM.\nReferences:\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/redeploy-to-new-node"},
{id:521,cat:"Compute",q:"You have an Azure subscription that contains two peered virtual networks named VNet1 and VNet2. VNet1 has a VPN gateway that uses static routing,<br><br>The on-premises network has a VPN connection that uses the VPN gateway of VNet1.<br><br>You need to configure access for users on the on-premises network to connect to a virtual machine on VNet2. The solution must minimize costs.<br><br>Which type of connectivity should you use?",ans:1,opts:["Azure Firewall with a private IP address", "service chaining and user-defined routes (UDRs)", "Azure Application Gateway", "ExpressRoute circuits to VNet2"],exp:"The Warning state indicates one or more issues in VM's configuration that might lead to backup\nfailures and provides recommended steps to ensure successful backups. Not having the latest\nVM Agent installed, for example, can cause backups to fail intermittently and falls in this class of\nissues.\nReferences:\nhttps://azure.microsoft.com/en-us/blog/azure-vm-backup-pre-checks/"},
{id:522,cat:"Networking",q:"You have an Azure subscription that contains two peered virtual networks named VNet1 and VNet2.<br><br>You have a Network Virtual Appliance (NVA) named NetVA1.<br><br>You need to ensure that the traffic from VNet1 to VNet2 is inspected by using NetVA1.<br><br>What should you use?",ans:1,opts:["a local network gateway", "a route table that has custom routes", "a service endpoint", "IP address reservations"],exp:"https://docs.microsoft.com/en-us/azure/backup/backup-azure-vms-first-look-arm"},
{id:523,cat:"Compute",q:"You have an Azure subscription that has a Recovery Services vault named Vault1. The subscription contains the virtual machines shown in the following table:<br><img src=\"imgs/0052600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to schedule backups to occur every night at 23:00.<br>Which virtual machines can you back up by using Azure Backup?<br>",ans:1,opts:["VM1 and VM3 only", "VM1, VM2, VM3 and VM4", "VM1 and VM2 only", "VM1 only"],exp:"Correct Answer: B Azure Backup supports backup of 64-bit Windows server operating system from Windows Server 2008. Azure Backup supports backup of 64-bit Windows 10 operating system. Azure Backup supports backup of 64-bit Ubuntu Server operating system from Ubuntu 12.04. Azure Backup supports backup of VM that are shutdown or offline. The Backup service installs the backup extension whether or not the VM is running."},
{id:524,cat:"Compute",q:"You have an Azure subscription that contains a virtual machine named VM1.<br><br>You plan to deploy an Azure Monitor alert rule that will trigger an alert when CPU usage on VM1 exceeds 80 percent.<br><br>You need to ensure that the alert rule sends an email message to two users named User1 and User2.<br><br>What should you create for Azure Monitor?",ans:0,opts:["an action group", "a mail-enabled security group", "a distribution group", "a Microsoft 365 group"],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:525,cat:"Compute",q:"You have the Azure virtual machines shown in the following table:<br><img src=\"imgs/0053100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You have a Recovery Services vault that protects VM1 and VM2.<br>You need to protect VM3 and VM4 by using Recovery Services.<br>What should you do first?<br>",ans:0,opts:["Create a new Recovery Services vault", "Create a storage account", "Configure the extensions for VM3 and VM4", "Create a new backup policy"],exp:"When you deploy a template, you specify a resource group that will contain the resources. Before\nrunning the deployment command, create the resource group or during deployment also we can\ncreate the resource group. If you try to deploy your own template in the portal, there are 3\navailable options - \"Subscription\", \"Resource Group\", \"Location\". Resource group is the only one\nof the three options available in this list of answers.Location\".\nhttps://github.com/Azure/azure-quickstart-templates/blob/master/101-vm-simple-\nwindows/azuredeploy.json"},
