exist on your cluster subnet(s). AKS supports bringing your own existing subnet and route table.\"\nhttps://learn.microsoft.com/en-us/azure/aks/configure-kubenet#prerequisites upvoted 33 times ..."},
{id:348,cat:"AppService",q:"You have an Azure App Service app named App1 that contains two running instances.<br><br>You have an autoscale rule configured as shown in the following exhibit.<br><br><img src=\"imgs/image724.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For the Instance limits scale condition setting, you set Maximum to 5.<br><br>During a 30-minute period, App1 uses 80 percent of the available memory.<br><br>What is the maximum number of instances for App1 during the 30-minute period?",ans:3,opts:["2", "3", "4", "5"],exp:"You should configure a SQL Server in Azure VM backup policy from the Recovery Services\nAzure portal blade.\nThe Azure Recovery Services vault has three default policy templates:\nAzure Virtual Machine\nAzure File Share\nSQL Server in Azure VM\nBecause you need to back up both the SQL Server databases as well as transaction logs, you\nshould create a SQL Server in Azure VM backup policy. These policies also enable you to specify\nbackup retention durations at the daily, weekly, monthly, and yearly scopes.\nYou should not configure point-in-time and long-term retention policies from the SQL Servers\nAzure portal blade. These backup and retention policies are available for the Azure SQL\nDatabase platform-as-a-service (PaaS) offering, and not for Azure virtual machines hosting SQL\nServer databases.\nYou should not configure a continuous delivery deployment group from the Virtual Machine Azure\nportal blade. This feature is unrelated to VM backup and recovery, and allows you to integrate a\nVM in a Visual Studio Team Services (VSTS) continuous integration/continuous deployment\n(Cl/CD) workflow.\nYou should not configure a point-in-time snapshot from the Disks Azure portal blade. The\nsnapshot functionality in Azure does not have formal policy associated with it, nor does it back up\n\n\fVM configuration."},
{id:349,type:"drop",cat:"Governance",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains the container images shown in the following table.<br><br><img src=\"imgs/image725.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to use the following services:<br><br>\u2022\tAzure Container Instances<br>\u2022\tAzure Container Apps<br>\u2022\tAzure App Service<br><br>In which services can you run the images? To answer, select the options in the answer area.<br><br>NOTE: Each correct answer is worth one point.<br><br><img src=\"imgs/image726.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Select the correct answer",options:["images: 7","‘Azure Container Instances only","Azure Container Instances, Azure Container Apps, and App Services","imaged: u","‘Azure Container Instances only","Azure Container Apps only","Azure Container Instances and App Services only","Azure Co er Apps and App jices o","Gaure Comainer instances, Azure Container Apps and App senyees )"]}],ans_img:"imgs/image727.png",exp:"Correct\n\n- Azure Container Instances can schedule both Windows and Linux containers with the same API. You can specify your OS type preference when you create your container groups.\nSome features are currently restricted to Linux containers. https://learn.microsoft.com/en-us/azure/container-instances/container-instances-overview\n\n- Azure Container Apps supports:  Any Linux-based x86-64 (linux/amd64) container image with no required base image Containers from any public or private container registry Sidecar and init containers https://learn.microsoft.com/en-us/azure/container-apps/containers\n\n- Azure App Service is an HTTP-based service for hosting web applications, REST APIs, and mobile back ends. You can develop in your favorite language, be it .NET, .NET Core, Java, Node.js, PHP, and Python. Applications run and scale with ease on both Windows and Linux-based environments.https://learn.microsoft.com/en-us/azure/app-service/overview upvoted 22 times"},
{id:350,cat:"Identity",q:"You have an Azure AD tenant named contoso.com.<br><br>You have an Azure subscription that contains an Azure App Service web app named App1 and an Azure key vault named KV1. KV1 contains a wildcard certificate for contoso.com.<br><br>You have a user named\n          <a class=\"__cf_email__\" data-cfemail=\"7b0e081e094a3b1814150f14081455181416\" href=\"/cdn-cgi/l/email-protection\">\n           [email\u00a0protected]\n          </a>\n          that is assigned the Owner role for App1 and KV1.<br><br>You need to configure App1 to use the wildcard certificate of KV1.<br><br>What should you do first?",ans:1,opts:["Create an access policy for KV1 and assign the Microsoft Azure App Service principal to the policy.", "Assign a managed user identity to App1.", "Configure KV1 to use the role-based access control (RBAC) authorization system.", "Create an access policy for KV1 and assign the policy to User1."],exp:"You should configure peering between prod-vnet-west and prod-vnet-west. Peering enables VMs\nlocated on two different Azure VNets to be grouped logically together and thereby connect and\nshare resources. Traditional VNet peering involves two VNets located in the same region.\nHowever, global VNet peering, generally available in summer 2018, supports VNets distributed\nacross any Azure public region.\nYou should not deploy a VNet-to-VNet VPN. First, global VNet peering means that you are no\nlonger required to use a VPN gateway to link VNets located in different Azure regions. Second,\nthe scenario requires that you minimize cost and complexity.\nYou should not create a private zone in Azure DNS. This action would be necessary for\nresources in peered VNets to resolve each other's DNS host names. However, the scenario\nmakes no requirement for private host name resolution.\nYou should not add a service endpoint to each VNet. Service endpoints allow you to limit access\nto certain Azure resources, such as storage accounts and Azure SQL databases, to resources\nlocated on a single VNet. Thus, this feature cannot be used to link two VNets as the scenario\nmandates."},
{id:351,cat:"Networking",q:"You have an Azure subscription.<br><br>You plan to deploy the resources shown in the following table.<br><br><img src=\"imgs/image767.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to create a single Azure Resource Manager (ARM) template that will be used to deploy the resources.<br><br>Which resource should be added to the dependsOn section for VM1?",ans:1,opts:["VNET1", "NIC1", "IP1", "NSG1"],exp:"You should add a Domain Name System (DNS) verification record at the domain registrar. This\nstep is required to verify to Microsoft that you own the public DNS domain name in question. You\nperform the validation by creating either a text (TXT) or mail exchanger (MX) record in your DNS\nzone file at the registrar's website, using Microsoft-provided values. You can delete the\nverification record after Azure validates the domain for use with Azure AD.\nYou should not remove the companycom.onmicrosoft.com domain name from the Azure AD\ntenant. In fact, you cannot remove this domain name because Azure uses it to identify your\ndirectory uniquely across the entire Microsoft Azure global ecosystem.\nYou should not add a company.com user principal name (UPN) suffix to the AD DS domain. If\nyou use a non-routable DNS domain in AD DS, then you may indeed be required to perform this\naction. However, the scenario does not specify what AD DS domain name is currently defined.\nYou should not run Azure AD Connect from a domain member server and specify the custom\ninstallation option. Configuring the proper public and private DNS domain names is one of the\nprerequisite steps that needs to be completed before you run the Azure AD Connect wizard for\nthe first time."},

{id:354,type:"img",cat:"Governance",q:"HOTSPOT<br>-<br><br>Your company purchases a new Azure subscription.<br><br>You create a file named Deploy.json as shown in the following exhibit.<br><br><img src=\"imgs/image787.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You connect to the subscription and run the following cmdlet.<br><br>New-AzDeployment -Location westus -TemplateFile \u201cdeploy.json\u201d<br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image788.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image789.png",exp:"YNY \nThe deployment creates 3 RGs called RG0, RG1, RG2 as the index is 0-based.\nYou can deploy to RG1 as the lock is delete.\nYou can't deploy to RG2 as the lock is read-only, hence it can't be modified. upvoted 42 times Alandt 1\u00a0year, 10\u00a0months ago Correct explanation! upvoted 1 times ... pasangawa 1\u00a0year, 2\u00a0months ago totally agree. \nThe   \"name\": \"[concat('RG-', copyIndex())]\", will start with 0 then increment to  3 counts..\nRG0. RG1, RG2 which Asryi mentioned. Since RG3 is not exising therefore can create RG3 manually upvoted 4 times ..."},
{id:355,cat:"Identity",q:"You have an Azure subscription that contains the resources shown in the following table.<br><br><img src=\"imgs/image790.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to configure a proximity placement group for VMSS1.<br><br>Which proximity placement groups should you use?",ans:2,opts:["Proximity2 only", "Proximity1, Proximity2, and Proximity3", "Proximity1 only", "Proximity1 and Proximity3 only"],exp:"Box 1: Zone-redundant storage (ZRS)\n\n\fZone-redundant storage (ZRS) replicates your data synchronously across three storage clusters\nin a single region.\nLRS would not remain available if a data center in the region fails GRS and RA GRS use\nasynchronous replication.\n\nBox 2: StorageV2 (general purpose V2)\nZRS only support GPv2.\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy\nhttps://docs.microsoft.com/en-us/azure/storage/common/storage-redundancy-zrs"},
{id:356,type:"img",cat:"Compute",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that contains the virtual networks shown in the following table.<br><br><img src=\"imgs/image809.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image810.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the Azure App Service web apps shown in the following table.<br><br><img src=\"imgs/image811.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image812.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image813.png",exp:"YNN\nPoint 1: Yes: Using virtual network integration enables your app to access:\n    Resources in the virtual network you're integrated with.\n    Resources in virtual networks peered to the virtual network your app is integrated with including global peering connections.\nPoint 2: NO: Virtual network integration is used only to make outbound calls from your app into your virtual network \nPoint 3: NO: There are some limitations with using virtual network integration: The feature isn't available for Isolated plan apps in an App Service Environment\nReference: https://learn.microsoft.com/en-us/azure/app-service/overview-vnet-integration upvoted 25 times flamingo23 1\u00a0year, 9\u00a0months ago In your link under limitations, we have \" You can't reach resources across peering connections with classic virtual networks\". So I think for the first question 'N'. We cannot peer if the other vm is also  virtually integrated. upvoted 1 times flamingo23 1\u00a0year, 9\u00a0months ago Sorry typo - other vm is also NOT virtually integrated. upvoted 1 times ... ... SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isolated apps does not need vnet intergation feature bcoz it is a Network-isolated application hosting , meaning the app is deployed into a subnet, which is inside vnet in this question. Since there is peering between vnet1 and vnet2, the app can communicate with a VM in the other vnet. upvoted 8 times SDiwan 1\u00a0year, 9\u00a0months ago Your 3rd answer is wrong. It shoudl be \"YES\". Isol"},
{id:357,cat:"Compute",q:"You have an Azure subscription named Subscription1 that contains the resources shown in the following table.<br><br><img src=\"imgs/image814.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You create virtual machines in Subscription1 as shown in the following table.<br><br><img src=\"imgs/image815.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to use Vault1 for the backup of as many virtual machines as possible.<br><br>Which virtual machines can be backed up to Vault1?",ans:3,opts:["VM1 only", "VM3 and VMC only", "VM1, VM2, VM3, VMA, VMB, and VMC", "VM1, VM3, VMA, and VMC only", "VM1 and VM3 only"],exp:"To add a custom domain to your app, you need to verify your ownership of the domain by adding\na verification ID as a TXT record with your domain provider.\nhttps://learn.microsoft.com/en-us/azure/app-service/app-service-web-tutorial-custom-\ndomain?tabs=a%2Cazurecli"},

{id:359,cat:"Governance",q:"You have an Azure subscription.<br><br>You plan to create an Azure container registry named ContReg1.<br><br>You need to ensure that you can push and pull signed images for ContReg1.<br><br>What should you do for ContReg1?",ans:3,opts:["Enable encryption by using a customer-managed key.", "Create a connected registry.", "Add a token.", "Enable content trust."],exp:"Box 1: Cloud-init.txt\nCloud-init.txt is used to customize a Linux VM on first boot up. It can be used to install packages\nand write files, or to configure users and security. No additional steps or agents are required to\napply your configuration.\nBox 2: The az vm create command\nOnce Cloud-init.txt has been created, you can deploy the VM with az vm create cmdlet, sing the -\n-custom-data parameter to provide the full path to the cloud-init.txt file.\nReferences:\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/linux/tutorial-automate-vm-deployment"},
{id:360,type:"drop",cat:"Governance",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that has the Azure container registries shown in the following table.<br><br><img src=\"imgs/image829.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You plan to use ACR Tasks and configure private endpoint connections.<br><br>Which container registries support ACR Tasks and private endpoints? To answer, select the appropriate options in the answer area.<br><br>NOTE: Each correct selection is worth one point.<br><br><img src=\"imgs/image830.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"ACR Tasks",options:["ContRegi only","ContRegi, ContReg2, and ContReg3"]},{label:"Private endpoints",options:["Ucontreg1 only J","ContRegi and ContReg2 only","ContRegi, ContReg?, and ContReg3"]}],ans_img:"imgs/image831.png",exp:"Only Premium Tier supports Private Endpoints:\nRef: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-skus upvoted 8 times thekrushka 1\u00a0year, 2\u00a0months ago I agree, and the given answer is correct upvoted 1 times ..."},
{id:361,cat:"Compute",q:"You plan to deploy several Azure virtual machines that will run Windows Server 2022 in a virtual machine scale set by using an Azure Resource Manager template.<br><br>You need to ensure that NGINX is available on all the virtual machines after they are deployed.<br><br>What should you use?",ans:0,opts:["Azure Custom Script Extension", "Deployment Center in Azure App Service", "Microsoft Entra Application Proxy", "the Publish-AzVMDscConfiguration cmdlet"],exp:"Box 1: A Recovery Services vault\nYou can set up a Recovery Services vault and configure backup for multiple Azure VMs.\n\nBox 2: A backup policy\nIn Choose backup policy, do one of the following:\n- Leave the default policy. This backs up the VM once a day at the time specified, and retains\nbackups in the vault for 30 days.\n- Select an existing backup policy if you have one.\n- Create a new policy, and define the policy settings."},
{id:362,cat:"Identity",q:"You have an Azure subscription that contains a container group named Group1. Group1 contains two Azure container instances as shown in the following table.<br><br><img src=\"imgs/image832.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>You need to ensure that container2 can use CPU resources without negatively affecting container1.<br><br>What should you do?",ans:2,opts:["Increase the resource limit of container1 to three CPUs.", "Increase the resource limit of container2 to six CPUs.", "Remove the resource limit for both containers.", "Decrease the resource limit of container2 to two CPUs."],exp:"Surprisingly C because 'If you don't specify a resource limit, the container instance's maximum resource usage is the same as its resource request.' https://learn.microsoft.com/en-us/azure/container-instances/container-instances-container-groups Hence none will go above their initial resource request. Actually makes sense that not specifying it wouldn't let it just be unlimited or something as was my initial thought."},
{id:363,cat:"Governance",q:"You have an Azure subscription.<br><br>You plan to deploy a container.<br><br>You need to recommend which Azure services can scale the container automatically.<br><br>What should you recommend?",ans:2,opts:["Azure Container Apps only", "Azure Container Instances only", "Azure Container Apps or Azure App Service only", "Azure Container Instances or Azure App Service only", "Azure Container Apps, Azure Container Instances, or Azure App Service"],exp:"To scale containers automatically, the following Azure services support this feature: Azure Container Apps: Supports automatic horizontal scaling through declarative scaling rules1. Azure App Service: Supports automatic scaling for web apps, including those deployed as containers"},
{id:364,type:"drop",cat:"Governance",q:"HOTSPOT<br>-<br><br>You have an Azure subscription that uses Azure Container Instances.<br><br>You have a computer that has Azure Command-Line Interface (CLI) and Docker installed.<br><br>You create a container image named image1.<br><br>You need to provision a new Azure container registry and add image1 to the registry.<br><br>Which command should you run for each requirement? To answer, select the options in the answer area.<br><br>NOTE: Each correct answer is worth one point.<br><br><img src=\"imgs/image833.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/>",dropdowns:[{label:"Provision a new container registry",options:["az acr build","az act create J","‘az contamer create","docker create"]},{label:"‘Add image! to the registry",options:["az acr create","az container create"]}],ans_img:"imgs/image834.png",exp:"az acr create\nhttps://learn.microsoft.com/en-us/cli/azure/acr?view=azure-cli-latest upvoted 2 times"},
{id:365,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure container registry named Registry1 that contains an image named image1.<br><br>You receive an error message when you attempt to deploy a container instance by using image1.<br><br>You need to be able to deploy a container instance by using image1.<br><br>Solution: You assign the AcrPull role to ACR-Tasks-Network for Registry1.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"Ans: No AcrPull role assigned to ACR-Tasks-Network does not meet the goal. This role should be assigned to the identity that is performing the container deployment."},
{id:366,cat:"Containers",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure container registry named Registry1 that contains an image named image1.<br><br>You receive an error message when you attempt to deploy a container instance by using image1.<br><br>You need to be able to deploy a container instance by using image1.<br><br>Solution: You select Use dedicated data endpoint for Registry1.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"Box 1: No\nAzure DNS provides automatic registration of virtual machines from a single virtual network that's\nlinked to a private zone as a registration virtual network. VM5 does not belong to the registration\nvirtual network though.\nBox 2: No\nForward DNS resolution is supported across virtual networks that are linked to the private zone\nas resolution virtual networks. VM5 does belong to a resolution virtual network.\nBox 3: Yes\nVM6 belongs to registration virtual network, and an A (Host) record exists for VM9 in the DNS\nzone. By default, registration virtual networks also act as resolution virtual networks, in the sense\nthat DNS resolution against the zone works from any of the virtual machines within the\nregistration virtual network.\nReferences: https://docs.microsoft.com/en-us/azure/dns/private-dns-overview"},
{id:367,cat:"Containers",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure container registry named Registry1 that contains an image named image1.<br><br>You receive an error message when you attempt to deploy a container instance by using image1.<br><br>You need to be able to deploy a container instance by using image1.<br><br>Solution: You create a private endpoint connection for Registry1.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"Box 1:\nRule2 blocks ports 50-60, which includes port 53, the DNS port. Internet users can reach the Web\nserver, since it uses port 80.\n\nBox 2:\nIf Rule2 is removed internet users can reach the DNS server as well.\nNote: Rules are processed in priority order, with lower numbers processed before higher\nnumbers, because lower numbers have higher priority. Once traffic matches a rule, processing\nstops. As a result, any rules that exist with lower priorities (higher numbers) that have the same\nattributes as rules with higher priorities are not processed.\n\nReferences:\nhttps://docs.microsoft.com/en-us/azure/virtual-network/security-overview"},
{id:368,cat:"AppService",q:"You have a Standard Azure App Service plan named Plan1.<br><br>You need to ensure that Plan1 will scale automatically when the CPU usage of the web app exceeds 80 percent.<br><br>What should you select for Plan1?",ans:1,opts:["Automatic in the Scale out method settings", "Rules Based in the Scale out method settings", "Premium P1 in the Scale up (App Service plan) settings", "Standard S1 in the Scale up (App Service plan) settings", "Manual in the Scale out method settings"],exp:"Cloud-initis a widely used approach to customize a Linux VM as it boots for the first time. You can\nuse cloud-init to install packages and write files, or to configure users and security. As cloud-init\nruns during the initial boot process, there are no additional steps or required agents to apply your\nconfiguration.\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/linux/tutorial-automate-vm-deployment"},
{id:369,cat:"Compute",q:"Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You need to configure WebApp1 to meet the technical requirements.<br><br>Which certificate can you use from Vault1?",ans:1,opts:["Cert1 only", "Cert1 or Cert2 only", "Cert1 or Cert3 only", "Cert3 or Cert4 only", "Cert1, Cert2 Cert3, or Cert4"],exp:"A bidirectional link must be created in order to establish a successful connection.\nFor example, to peer VNet A to VNet B, a link must be created from VNetA to VNetB and from\nVNetB to VNetA. Creating both links will change the state to Connected.\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-networks-faq#my-vnet-peering-\nconnection-is-in-initiated-state-why-cant-i-connect"},
{id:370,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure virtual machine named VM1. VM1 was deployed by using a custom Azure Resource Manager template named ARM1.json.<br><br>You receive a notification that VM1 will be affected by maintenance.<br><br>You need to move VM1 to a different host immediately.<br><br>Solution: From the resource group blade, move VM1 to another subscription.<br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"The process is simple:\n1. Add the custom domain name to your directory\n2. Add a DNS entry for the domain name at the domain name registrar\n3. Verify the custom domain name in Azure AD\n\nReferences: https://docs.microsoft.com/en-us/azure/dns/dns-web-sites-custom-domain"},
{id:371,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure virtual machine named VM1. VM1 was deployed by using a custom Azure Resource Manager template named ARM1.json.<br><br>You receive a notification that VM1 will be affected by maintenance.<br><br>You need to move VM1 to a different host immediately.<br><br>Solution: From the VM1 Redeploy + reapply blade, you select Redeploy.<br><br>Does this meet the goal?",ans:0,opts:["Yes", "No"],exp:"We cannot just move a virtual machine between networks. What we need to do is identify the disk\nused by the VM, delete the VM itself while retaining the disk, and recreate the VM in the target\nvirtual network and then attach the original disk to it.\nhttps://blogs.technet.microsoft.com/canitpro/2014/06/16/step-by-step-move-a-vm-to-a-different-\nvnet-on-azure/\nhttps://4sysops.com/archives/move-an-azure-vm-to-another-virtual-network-vnet/#migrate-an-\nazure-vm-between-vnets"},
{id:372,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br><br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br><br>You have an Azure virtual machine named VM1. VM1 was deployed by using a custom Azure Resource Manager template named ARM1.json.<br><br>You receive a notification that VM1 will be affected by maintenance.<br><br>You need to move VM1 to a different host immediately.<br><br>Solution: From the VM1 Updates blade, select One-time update.<br><br>Does this meet the goal?",ans:1,opts:["Yes", "No"],exp:"https://docs.microsoft.com/en-us/azure/active-directory/conditional-access/overview"},
{id:373,cat:"Compute",q:"Case study -<br><br>This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided.<br><br>To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study.<br><br>At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section.<br><br><br>To start the case study -<br>To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question.<br><br><br>Overview -<br><br>ADatum Corporation is consulting firm that has a main office in Montreal and branch offices in Seattle and New York.<br><br><br>Existing Environment -<br><br><br>Azure Environment -<br><br>ADatum has an Azure subscription that contains three resource groups named RG1, RG2, and RG3.<br><br>The subscription contains the storage accounts shown in the following table.<br><br><img src=\"imgs/image865.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the virtual machines shown in the following table.<br><br><img src=\"imgs/image866.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription has an Azure container registry that contains the images shown in the following table.<br><br><img src=\"imgs/image867.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The subscription contains the resources shown in the following table.<br><br><img src=\"imgs/image868.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Azure Key Vault -<br><br>The subscription contains an Azure key vault named Vault1.<br><br>Vault1 contains the certificates shown in the following table.<br><br><img src=\"imgs/image869.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>Vault1 contains the keys shown in the following table.<br><br><img src=\"imgs/image870.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br><br>Microsoft Entra Environment -<br><br>ADatum has a Microsoft Entra tenant named adatum.com that is linked to the Azure subscription and contains the users shown in the following table.<br><br><img src=\"imgs/image871.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The tenant contains the groups shown in the following table.<br><br><img src=\"imgs/image872.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br><br>The adatum.com tenant has a custom security attribute named Attribute1.<br><br><br>Planned Changes -<br><br>ADatum plans to implement the following changes:<br><br>\u2022\tConfigure a data collection rule (DCR) named DCR1 to collect only system events that have an event ID of 4648 from VM2 and VM4.<br>\u2022\tIn storage1, create a new container named cont2 that has the following access policies: o\tThree stored access policies named Stored1, Stored2, and Stored3 o\tA legal hold for immutable blob storage<br>\u2022\tWhenever possible, use directories to organize storage account content.<br>\u2022\tGrant User1 the permissions required to link Zone1 to VNet1.<br>\u2022\tAssign Attribute1 to supported adatum.com resources.<br>\u2022\tIn storage2, create an encryption scope named Scope1.<br>\u2022\tDeploy new containers by using Image1 or Image2.<br><br><br>Technical Requirements -<br><br>ADatum must meet the following technical requirements:<br><br>\u2022\tUse TLS for WebApp1.<br>\u2022\tFollow the principle of least privilege.<br>\u2022\tGrant permissions at the required scope only.<br>\u2022\tEnsure that Scope1 is used to encrypt storage services.<br>\u2022\tUse Azure Backup to back up cont1 and share1 as frequently as possible.<br>\u2022\tWhenever possible, use Azure Disk Encryption and a key encryption key (KEK) to encrypt the virtual machines.<br><br><br>You need to meet the technical requirements for the KEK.<br><br>Which PowerShell cmdlet and key should you use?",ans:3,opts:["Set-AzVMDiskEncryptionExtension and Key2.", "Set-AzDiskEncryptionKey and Key2.", "Set-AzDiskDiskEncryptionKey and Key1.", "Set-AzVMDiskEncryptionExtension and Key1."],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:374,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Sub1.<br>You plan to deploy a multi-tiered application that will contain the tiers shown in the following table.<br><img src=\"imgs/0034700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to recommend a networking solution to meet the following requirements:<br>\u2711 Ensure that communication between the web servers and the business logic tier spreads equally across the virtual machines.<br>\u2711 Protect the web servers from SQL injection attacks.<br>Which Azure resource should you recommend for each requirement? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0034800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Ensure that communication between the web",options:["servers and the business logic tier spreads TT ‘","equally across the virtual machines an application gateway that uses the Standard tier","an application gateway that uses the WAF tier","an internal load balancer","a network security group (NSG)","@ public load balancer"]},{label:"Protect the web servers from SQL injection",options:["atneks an application gateway that uses the Standard tier","an application gateway that uses the WAF tier","an internal load balancer","a network security group (NSG)","a public load balancer"]}],ans_img:"imgs/0034800002.jpg",exp:"Box 1: an internal load balancer\nAzure Internal Load Balancer (ILB) provides network load balancing between virtual machines that reside inside a cloud service or a virtual network with a regional scope.\nBox 2: an application gateway that uses the WAF tier\nAzure Web Application Firewall (WAF) on Azure Application Gateway provides centralized protection of your web applications from common exploits and vulnerabilities. Web applications are increasingly targeted by malicious attacks that exploit commonly known vulnerabilities.\nReference:\nhttps://docs.microsoft.com/en-us/azure/web-application-firewall/ag/ag-overview"},
{id:375,cat:"Networking",q:"Your company has three offices. The offices are located in Miami, Los Angeles, and New York. Each office contains datacenter.<br>You have an Azure subscription that contains resources in the East US and West US Azure regions. Each region contains a virtual network. The virtual networks are peered.<br>You need to connect the datacenters to the subscription. The solution must minimize network latency between the datacenters.<br>What should you create?<br>",ans:1,opts:["three Azure Application Gateways and one On-premises data gateway", "three virtual hubs and one virtual WAN", "three virtual WANs and one virtual hub", "three On-premises data gateways and one Azure Application Gateway"],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:376,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You plan to deploy five virtual machines to a virtual network subnet.<br>Each virtual machine will have a public IP address and a private IP address.<br>Each virtual machine requires the same inbound and outbound security rules.<br>What is the minimum number of network interfaces and network security groups that you require? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0035000001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Minimum number of network",options:["interfaces:","5","10","15","20"]},{label:"Minimum number of network",options:["security groups: 1","2","5","10"]}],ans_img:"imgs/0035100001.jpg",exp:"Box 1: 5 -\nA public and a private IP address can be assigned to a single network interface.\nBox 2: 1 -\nYou can associate zero, or one, network security group to each virtual network subnet and network interface in a virtual machine. The same network security group can be associated to as many subnets and network interfaces as you choose.\nReference:\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-network-network-interface-addresses"},
{id:377,cat:"Governance",q:"You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0035200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>LB1 is configured as shown in the following table.<br><img src=\"imgs/0035200002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You plan to create new inbound NAT rules that meet the following requirements:<br>\u2711 Provide Remote Desktop access to VM1 from the internet by using port 3389.<br>\u2711 Provide Remote Desktop access to VM2 from the internet by using port 3389.<br>What should you create on LB1 before you can create the new inbound NAT rules?<br>",ans:0,opts:["a frontend IP address", "a load balancing rule", "a health probe", "a backend pool"],exp:"Under the Configure Runbook option, enable the runbook and choose the config source as either\nbuilt-in or user. If you select the option 'user', you get to choose from a runbook that you have\ncreated in your automation account. If you select 'Built-in', a list of runbooks is presented in a\ndrop-down menu. Choose 'Scale up VM' to resize the VM to the next larger size."},
{id:378,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have Azure virtual machines that run Windows Server 2019 and are configured as shown in the following table.<br><img src=\"imgs/0035300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create a private Azure DNS zone named adatum.com. You configure the adatum.com zone to allow auto registration from VNET1.<br>Which A records will be added to the adatum.com zone for each virtual machine? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0035400001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Arecords for VM1",options:["None","Private IP address only","Public IP address only","Private IP address and public IP address"]},{label:"Arecords for VM2",options:["None","Private IP address only","Public IP address only","Private IP address and public IP address"]}],ans_img:"imgs/0035400002.jpg",exp:"The virtual machines are registered (added) to the private zone as A records pointing to their private IP addresses.\nReference:\nhttps://docs.microsoft.com/en-us/azure/dns/private-dns-overview https://docs.microsoft.com/en-us/azure/dns/private-dns-scenarios"},
{id:379,type:"img",cat:"Compute",q:"HOTSPOT -<br>You have an Azure virtual network named VNet1 that connects to your on-premises network by using a site-to-site VPN. VNet1 contains one subnet named<br>Sunet1.<br>Subnet1 is associated to a network security group (NSG) named NSG1. Subnet1 contains a basic internal load balancer named ILB1. ILB1 has three Azure virtual machines in the backend pool.<br>You need to collect data about the IP addresses that connects to ILB1. You must be able to run interactive queries from the Azure portal against the collected data.<br>What should you do? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0035600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image924.png",exp:"Correct Answer:\n\nBox 1: An Azure Log Analytics workspace\nIn the Azure portal you can set up a Log Analytics workspace, which is a unique Log Analytics environment with its own data repository, data sources, and solutions.\n\nBox 2: NSG1\nNSG flow logs allow viewing information about ingress and egress IP traffic through a Network security group. Through this, the IP addresses that connect to the ILB can be monitored when the diagnostics are enabled on a Network Security Group.\n\nWe cannot enable diagnostics on an internal load balancer to check for the IP addresses.\nAs for Internal LB, it is basic one. Basic can only connect to storage account. Also, Basic LB has only activity logs, which doesn't include the connectivity workflow. So, we need to use NSG to meet the mentioned requirements. upvoted 258 times mlantonis 4\u00a0years, 5\u00a0months ago Reference:\nhttps://docs.microsoft.com/en-us/azure/log-analytics/log-analytics-quick-create-workspace\nhttps://docs.microsoft.com/en-us/azure/load-balancer/load-balancer-standard-diagnostics upvoted 25 times ... elrizos 2\u00a0years, 7\u00a0months ago you r my hero upvoted 3 times ... Indy429 1\u00a0year, 10\u00a0months ago I was about to say \"why is the second one not NSG1?\" Glad you confirmed NSG1 is the right answer for Q2. upvoted 1 times ... awssecuritynewbie 3\u00a0years, 1\u00a0month ago very good catch! Because yes you are right after looking at the link :  https://learn.microsoft.com/en-gb/azure/load-balancer/skus#skus\nyou cannot do diagnostics for the load balancer yo"},
{id:380,cat:"Networking",q:"You have the Azure virtual networks shown in the following table.<br><img src=\"imgs/0035700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>To which virtual networks can you establish a peering connection from VNet1?<br>",ans:2,opts:["VNet2 andVNet3 only", "VNet2 only", "VNet3 and VNet4 only", "VNet2, VNet3, and VNet4"],exp:"Azure Backup supports backup of 64-bit Windows server operating system from Windows Server\n2008.\nAzure Backup supports backup of 64-bit Windows 10 operating system.\nAzure Backup supports backup of 64-bit Ubuntu Server operating system from Ubuntu 12.04.\nAzure Backup supports backup of VM that are shutdown or offline."},
{id:381,cat:"Networking",q:"You have an Azure subscription that contains a virtual network named VNet1. VNet1 contains four subnets named Gateway, Perimeter, NVA, and Production.<br>The NVA subnet contains two network virtual appliances (NVAs) that will perform network traffic inspection between the Perimeter subnet and the Production subnet.<br>You need to implement an Azure load balancer for the NVAs. The solution must meet the following requirements:<br>\u2711 The NVAs must run in an active-active configuration that uses automatic failover.<br>\u2711 The load balancer must load balance traffic to two services on the Production subnet. The services have different IP addresses.<br>Which three actions should you perform? Each correct answer presents part of the solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[1, 2, 5],opts:["Deploy a basic load balancer", "Deploy a standard load balancer", "Add two load balancing rules that have HA Ports and Floating IP enabled", "Add two load balancing rules that have HA Ports enabled and Floating IP disabled", "Add a frontend IP configuration, a backend pool, and a health probe", "Add a frontend IP configuration, two backend pools, and a health probe"],exp:"A Recovery Services vault is a storage entity in Azure that houses data. The data is typically\ncopies of data, or configuration information for virtual machines (VMs), workloads, servers, or\nworkstations. You can use Recovery Services vaults to hold backup data for various Azure\nservices."},
{id:382,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains two Azure virtual networks named VNet1 and VNet2. VNet1 contains a VPN gateway named<br>VPNGW1 that uses static routing. There is a site-to-site VPN connection between your on-premises network and VNet1.<br>On a computer named Client1 that runs Windows 10, you configure a point-to-site VPN connection to VNet1.<br>You configure virtual network peering between VNet1 and VNet2. You verify that you can connect to VNet2 from the on-premises network. Client1 is unable to connect to VNet2.<br>You need to ensure that you can connect Client1 to VNet2.<br>What should you do?<br>",ans:0,opts:["Download and re-install the VPN client configuration package on Client1.", "Select Allow gateway transit on VNet1.", "Select Allow gateway transit on VNet2.", "Enable BGP on VPNGW1"],exp:"User1 is global admin of contoso.onmicrosoft.com. As he created the new tenant called\nexternal.contoso.onmicrosoft.com, he will be the OWNER. Check the scope not just the role."},
{id:383,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription. The subscription contains virtual machines that run Windows Server 2016 and are configured as shown in the following table.<br><img src=\"imgs/0036000001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You create a public Azure DNS zone named adatum.com and a private Azure DNS zone named contoso.com.<br>You create a virtual network link for contoso.com as shown in the following exhibit.<br><img src=\"imgs/0036100001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0036200001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["When VM1 starts, a record for VM1 is added to the contoso.com DNS zone. re", "When VNV2 starts, a record for VM2 is added to the contoso.com DNS zone [o}", "When VNS starts, a record for VM3 is added to the adatum.com DNS zone."],ans:["Yes", "Yes", "No"],exp:"Only a global administrator can add users to this tenant."},
{id:384,cat:"Networking",q:"You have an Azure subscription that contains the resources in the following table.<br><img src=\"imgs/0036300001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>To which subnets can you apply NSG1?<br>",ans:3,opts:["the subnets on VNet1 only", "the subnets on VNet2 and VNet3 only", "the subnets on VNet2 only", "the subnets on VNet3 only", "the subnets on VNet1, VNet2, and VNet3"],exp:"Only a global administrator can add users to this tenant."},
{id:385,type:"img",cat:"Compute",q:"DRAG DROP -<br>You have an Azure subscription that contains two virtual networks named VNet1 and VNet2. Virtual machines connect to the virtual networks.<br>The virtual networks have the address spaces and the subnets configured as shown in the following table.<br><img src=\"imgs/0036300002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to add the address space of 10.33.0.0/16 to VNet1. The solution must ensure that the hosts on VNet1 and VNet2 can communicate.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0036400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0036500001.png",exp:"Step 1: Remove peering between Vnet1 and VNet2.\nYou can't add address ranges to, or delete address ranges from a virtual network's address space once a virtual network is peered with another virtual network.\nTo add or remove address ranges, delete the peering, add or remove the address ranges, then re-create the peering.\nStep 2: Add the 10.44.0.0/16 address space to VNet1.\nStep 3: Recreate peering between VNet1 and VNet2\nReference:\nhttps://docs.microsoft.com/en-us/azure/virtual-network/virtual-network-manage-peering"},
{id:386,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription that contains the resource groups shown in the following table.<br><img src=\"imgs/0036600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>RG1 contains the resources shown in the following table.<br><img src=\"imgs/0036600002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 is running and connects to NIC1 and Disk1. NIC1 connects to VNET1.<br>RG2 contains a public IP address named IP2 that is in the East US location. IP2 is not assigned to a virtual machine.<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0036700001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["You can move storage1 to RG2. fe", "You can move NIC1 to RG2. [e", "Ifyou move IP2 to RG1, the location of IP2 will change."],ans:["Yes", "Yes", "No"],exp:"You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure AD).\nNote: With the increase in usage of Office 365 Groups, administrators and users need a way to\nclean up unused groups. Expiration policies can help remove inactive groups from the system\nand make things cleaner.\nWhen a group expires, all of its associated services (the mailbox, Planner, SharePoint site, etc.)\nare also deleted.\nYou can set up a rule for dynamic membership on security groups or Office 365 groups.\nIncorrect Answers:\nB, D, E: You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure\nAD)."},
{id:387,cat:"Compute",q:"You have an Azure web app named webapp1.<br>You have a virtual network named VNET1 and an Azure virtual machine named VM1 that hosts a MySQL database. VM1 connects to VNET1.<br>You need to ensure that webapp1 can access the data hosted on VM1.<br>What should you do?<br>",ans:2,opts:["Deploy an internal load balancer", "Peer VNET1 to another virtual network", "Connect webapp1 to VNET1", "Deploy an Azure Application Gateway"],exp:"You are prevented from creating Azure SQL servers anywhere in Subscription 1 with the\nexception of ContosoRG1."},
{id:388,cat:"Compute",q:"You create an Azure VM named VM1 that runs Windows Server 2019.<br>VM1 is configured as shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0036900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to enable Desired State Configuration for VM1.<br>What should you do first?<br>",ans:1,opts:["Connect to VM1.", "Start VM1.", "Capture a snapshot of VM1.", "Configure a DNS name for VM1."],exp:"You can move a VM and its associated resources to a different subscription by using the Azure\nportal.\nYou can now move an Azure Recovery Service (ASR) Vault to either a new resource group within\nthe current subscription or to a new subscription."},
{id:389,cat:"Compute",q:"You have five Azure virtual machines that run Windows Server 2016. The virtual machines are configured as web servers.<br>You have an Azure load balancer named LB1 that provides load balancing services for the virtual machines.<br>You need to ensure that visitors are serviced by the same web server for each request.<br>What should you configure?<br>",ans:3,opts:["Floating IP (direct server return) to Disabled", "Session persistence to None", "Floating IP (direct server return) to Enabled", "Session persistence to Client IP"],exp:"Set-AzMarketplaceTerms - \"Accept or reject terms for a given publisher id(Publisher), offer\nid(Product) and plan id(Name). Please use Get-AzMarketplaceTerms to get the agreement\nterms.\"\n\nhttps://docs.microsoft.com/en-us/powershell/module/az.marketplaceordering/set-\nazmarketplaceterms?view=azps-8.3.0"},
{id:390,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following resources:<br>\u2711 A virtual network that has a subnet named Subnet1<br>\u2711 Two network security groups (NSGs) named NSG-VM1 and NSG-Subnet1<br>\u2711 A virtual machine named VM1 that has the required Windows Server configurations to allow Remote Desktop connections<br>NSG-Subnet1 has the default inbound security rules only.<br>NSG-VM1 has the default inbound security rules and the following custom inbound security rule:<br>\u2711 Priority: 100<br>\u2711 Source: Any<br>\u2711 Source port range: *<br>\u2711 Destination: *<br>\u2711 Destination port range: 3389<br>\u2711 Protocol: UDP<br>\u2711 Action: Allow<br>VM1 has a public IP address and is connected to Subnet1. NSG-VM1 is associated to the network interface of VM1. NSG-Subnet1 is associated to Subnet1.<br>You need to be able to establish Remote Desktop connections from the internet to VM1.<br>Solution: You add an inbound security rule to NSG-Subnet1 that allows connections from the Any source to the *destination for port range 3389 and uses the TCP protocol. You remove NSG-VM1 from the network interface of VM1.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"C: A VPN gateway is used when creating a VPN connection to your on-premises network.\nRoute-based VPN devices use any-to-any (wildcard) traffic selectors, and let routing/forwarding\ntables direct traffic to different IPsec tunnels. It is typically built on router platforms where each\nIPsec tunnel is modeled as a network interface or VTI (virtual tunnel interface).\nE: Policy-based VPN devices use the combinations of prefixes from both networks to define how\ntraffic is encrypted/decrypted through IPsec tunnels. It is typically built on firewall devices that\nperform packet filtering. IPsec tunnel encryption and decryption are added to the packet filtering\nand processing engine.\nIncorrect Answers:\nF: Point-to-Site connections do not require a VPN device or a public-facing IP address."},
{id:391,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following resources:<br>\u2711 A virtual network that has a subnet named Subnet1<br>\u2711 Two network security groups (NSGs) named NSG-VM1 and NSG-Subnet1<br>\u2711 A virtual machine named VM1 that has the required Windows Server configurations to allow Remote Desktop connections<br>NSG-Subnet1 has the default inbound security rules only.<br>NSG-VM1 has the default inbound security rules and the following custom inbound security rule:<br>\u2711 Priority: 100<br>\u2711 Source: Any<br>\u2711 Source port range: *<br>\u2711 Destination: *<br>\u2711 Destination port range: 3389<br><br>Protocol: UDP -<br><img src=\"imgs/0037200009.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>\u2711 Action: Allow<br>VM1 has a public IP address and is connected to Subnet1. NSG-VM1 is associated to the network interface of VM1. NSG-Subnet1 is associated to Subnet1.<br>You need to be able to establish Remote Desktop connections from the internet to VM1.<br>Solution: You add an inbound security rule to NSG-Subnet1 that allows connections from the internet source to the VirtualNetwork destination for port range 3389 and uses the UDP protocol.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:392,cat:"Compute",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure subscription that contains the following resources:<br>\u2711 A virtual network that has a subnet named Subnet1<br>\u2711 Two network security groups (NSGs) named NSG-VM1 and NSG-Subnet1<br>\u2711 A virtual machine named VM1 that has the required Windows Server configurations to allow Remote Desktop connections<br>NSG-Subnet1 has the default inbound security rules only.<br>NSG-VM1 has the default inbound security rules and the following custom inbound security rule:<br>\u2711 Priority: 100<br>\u2711 Source: Any<br>\u2711 Source port range: *<br>\u2711 Destination: *<br>\u2711 Destination port range: 3389<br>\u2711 Protocol: UDP<br>\u2711 Action: Allow<br>VM1 has a public IP address and is connected to Subnet1. NSG-VM1 is associated to the network interface of VM1. NSG-Subnet1 is associated to Subnet1.<br>You need to be able to establish Remote Desktop connections from the internet to VM1.<br>Solution: You add an inbound security rule to NSG-Subnet1 and NSG-VM1 that allows connections from the internet source to the VirtualNetwork destination for port range 3389 and uses the TCP protocol.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"A Site-to-Site VPN gateway connection can be used to connect your on-premises network to an\nAzure virtual network over an IPsec/IKE (IKEv1 or IKEv2) VPN tunnel.\nThis type of connection requires a VPN device, a VPN gateway, located on-premises that has an\nexternally facing public IP address assigned to it.\nIncorrect Answers:\nB: Application Proxy is a feature of Azure AD that enables users to access on-premises web\napplications from a remote client."},
{id:393,type:"drop",cat:"Networking",q:"HOTSPOT -<br>You have a virtual network named VNet1 that has the configuration shown in the following exhibit.<br><img src=\"imgs/0037500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0037600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"Before a virtual machine on VNet1 can receive an",options:["IP address from 192.168.1.0/24, you must first [add-a network interface","‘delete a subnet","delete an address space"]},{label:"Before a virtual machine on VNett can receive an",options:["IP address from 10.2.1.0/24, you must first [add a network interface","radd an address space","‘delete a subnet","delete an address space"]}],ans_img:"imgs/image926.png",exp:"- Add an address space\n- Add a subnet upvoted 281 times Alex2022_31 2\u00a0years, 10\u00a0months ago Agree: Add an Address Space and then Add a subnet. Just tested it on the Portal and worked :) upvoted 9 times ... usamnkkid 2\u00a0years, 7\u00a0months ago No you can't add 10.2.1.0/24 because it overlaps with 10.2.0.0/16. Check on Lab upvoted 7 times sardonique 2\u00a0years, 1\u00a0month ago Address spaces there can be more than one per vNET; Subnets are subsets of the address spaces, there can be more than a subnet for each address space. upvoted 1 times ... usamnkkid 2\u00a0years, 7\u00a0months ago No, I am wrong I am adding 10.2.1.0/24 in address space however it already exists. I need to add a subnet. I get confuse between address spaces and subnets. upvoted 17 times ... ... 01111010 2\u00a0years ago I tested this in the lab. \nBox 1: Add an address space - explanation: One can add additional address space (192.168.0.0/16) to the VNet1, without having to delete existing (10.2.0.0/16).\nBox 2: Add subnet - explanation: Defined 'default' subnet from image example (10.2.0.0/24) contains 254 IP addresses, with last IP being 10.2.0.254. In order to assign 10.2.1.0/24 IP address to VM we need to create add new subnet. upvoted 10 times ..."},
{id:394,cat:"Compute",q:"You have an Azure subscription that contains a virtual network named VNET1. VNET1 contains the subnets shown in the following table.<br><img src=\"imgs/0037800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Each virtual machine uses a static IP address.<br>You need to create network security groups (NSGs) to meet following requirements:<br>\u2711 Allow web requests from the internet to VM3, VM4, VM5, and VM6.<br>\u2711 Allow all connections between VM1 and VM2.<br>\u2711 Allow Remote Desktop connections to VM1.<br>\u2711 Prevent all other network traffic to VNET1.<br>What is the minimum number of NSGs you should create?<br>",ans:0,opts:["1", "3", "4", "12"],exp:"Raw HTTP request data is provided by Web server logging and the question mentions 500 error\ncodes.\nYou need to catch connection error. When the connection fails it happens on web server, not\nwithin application. You can do it opening the web application -> Application Service logs -> Web\nserver logging (there are multiple switches there).\nYou can also see the errors live going to \"Log stream\" pane.\n\n\fWeb server logging Windows App Service file system or Azure Storage blobs Raw HTTP request\ndata in the W3C extended log file format. Each log message includes data such as the HTTP\nmethod, resource URI, client IP, client port, user agent, response code, and so on."},
{id:395,cat:"Compute",q:"You have an Azure subscription that contains the resources shown in the following table.<br><img src=\"imgs/0037900001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>The Not allowed resource types Azure policy that has policy enforcement enabled is assigned to RG1 and uses the following parameters:<br>Microsoft.Network/virtualNetworks<br>Microsoft.Compute/virtualMachines<br>In RG1, you need to create a new virtual machine named VM2, and then connect VM2 to VNET1.<br>What should you do first?<br>",ans:0,opts:["Remove Microsoft.Compute/virtualMachines from the policy.", "Create an Azure Resource Manager template", "Add a subnet to VNET1.", "Remove Microsoft.Network/virtualNetworks from the policy."],exp:"Assign a role to a user\n1. Sign in to the Azure portal with an account that's a global admin or privileged role admin for the\ndirectory.\n2. Select Azure Active Directory, select Users, and then select a specific user from the list.\n3. For the selected user, select Directory role, select Add role, and then pick the appropriate\nadmin roles from the Directory roles list, such as Conditional access administrator.\n4. Press Select to save."},
{id:396,cat:"Networking",q:"Your company has an Azure subscription named Subscription1.<br>The company also has two on-premises servers named Server1 and Server2 that run Windows Server 2016. Server1 is configured as a DNS server that has a primary DNS zone named adatum.com. Adatum.com contains 1,000 DNS records.<br>You manage Server1 and Subscription1 from Server2. Server2 has the following tools installed:<br>\u2711 The DNS Manager console<br>\u2711 Azure PowerShell<br>\u2711 Azure CLI 2.0<br>You need to move the adatum.com zone to an Azure DNS zone in Subscription1. The solution must minimize administrative effort.<br>What should you use?<br>",ans:0,opts:["Azure CLI", "Azure PowerShell", "the Azure portal", "the DNS Manager console"],exp:"To assign a license, under Azure Active Directory > Licenses > All Products, select one or more\nproducts, and then select Assign on the command bar.\nReferences: https://docs.microsoft.com/en-us/azure/active-directory/fundamentals/license-users-\ngroups\n\n\fQUESTION 24\nYou have an Azure subscription named Subscription1 and an on-premises deployment of\nMicrosoft System Center Service Manager.\n\nSubscription1 contains a virtual machine named VM1.\n\nYou need to ensure that an alert is set in Service Manager when the amount of available memory\non VM1 is below 10 percent.\n\nWhat should you do first?\n\nA.   Create an automation runbook\nB.   Deploy a function app\nC.   Deploy the IT Service Management Connector (ITSM)\nD.   Create a notification\n\nAnswer: C\nExplanation:\nThe IT Service Management Connector (ITSMC) allows you to connect Azure and a supported IT\nService Management (ITSM) product/service, such as the Microsoft System Center Service\nManager.\nWith ITSMC, you can create work items in ITSM tool, based on your Azure alerts (metric alerts,\nActivity Log alerts and Log Analytics alerts)."},
{id:397,cat:"Compute",q:"You have a public load balancer that balances ports 80 and 443 across three virtual machines named VM1, VM2, and VM3.<br>You need to direct all the Remote Desktop Protocol (RDP) connections to VM3 only.<br>What should you configure?<br>",ans:0,opts:["an inbound NAT rule", "a new public load balancer for VM3", "a frontend IP configuration", "a load balancing rule"],exp:"An inbound NAT rule forwards incoming traffic to a specific virtual machine Service: RDP Protocol: TCP Port: 3389 Target VM =VM3"},
{id:398,type:"hs",cat:"Compute",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1 that contains the virtual networks in the following table.<br><img src=\"imgs/0038100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>Subscription1 contains the virtual machines in the following table.<br><img src=\"imgs/0038200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>In Subscription1, you create a load balancer that has the following configurations:<br>\u2711 Name: LB1<br>\u2711 SKU: Basic<br>\u2711 Type: Internal<br>\u2711 Subnet: Subnet12<br>\u2711 Virtual network: VNET1<br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0038200007.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",statements:["LB1 can balance the traffic between VM1 and VM2.", "LB1 can balance the traffic between VM3 and VM4.", "LB1 can balance the traffic between VM5 and VM6."],ans:["Yes", "No", "No"],exp:"The azcopy copy command copies a directory (and all of the files in that directory) to a blob\ncontainer. The result is a directory in the container by the same name.\nIncorrect Answers:\nB: The azcopy sync command replicates the source location to the destination location. However,\nthe file is skipped if the last modified time in the destination is more recent.\nD: The az storage blob copy start-batch command copies multiple blobs to a blob container."},
{id:399,type:"drop",cat:"Compute",q:"HOTSPOT -<br>You have an Azure virtual machine that runs Windows Server 2019 and has the following configurations:<br>\u2711 Name: VM1<br>\u2711 Location: West US<br>\u2711 Connected to: VNET1<br>\u2711 Private IP address: 10.1.0.4<br>\u2711 Public IP addresses: 52.186.85.63<br>\u2711 DNS suffix in Windows Server: Adatum.com<br>You create the Azure DNS zones shown in the following table.<br><img src=\"imgs/0038400001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to identify which DNS zones you can link to VNET1 and the DNS zones to which VM1 can automatically register.<br>Which zones should you identify? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0038400002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"DNS zones that you can link to VNET1",options:["Adatum.com only","Adatum.pri and adatum.com only","The private zones only","The public zones only"]},{label:"DNS zones to which VM1 can automatically register",options:["Adatum.com only","Adatum.pri and adatum.com only","The private zones only","The public zones only"]}],ans_img:"imgs/0038500001.png",exp:"Reference:\nhttps://docs.microsoft.com/en-us/azure/dns/private-dns-overview"},
{id:400,type:"dd",cat:"Networking",q:"DRAG DROP -<br>You have an on-premises network that you plan to connect to Azure by using a site-so-site VPN.<br>In Azure, you have an Azure virtual network named VNet1 that uses an address space of 10.0.0.0/16 VNet1 contains a subnet named Subnet1 that uses an address space of 10.0.0.0/24.<br>You need to create a site-to-site VPN to Azure.<br>Which four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>NOTE: More than one order of answer choice is correct. You will receive credit for any of the correct orders you select.<br>Select and Place:<br><img src=\"imgs/0038600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Create a virtual network", "Create a VPN gateway", "Create a local network gateway", "Create a VPN connection", "Verify the VPN connection"],ans:["Create a virtual network", "Create a VPN gateway", "Create a local network gateway", "Create a VPN connection"],exp:"AzCopy is a command-line utility that you can use to copy blobs or files to or from a storage\naccount.\nIncorrect Answers:\nA, C, E: AzCopy does not support table and queue storage services.\n\n\fD: AzCopy supports file storage services, as well as blob storage services."},
{id:401,cat:"Networking",q:"You have an Azure subscription that contains the resources in the following table.<br><img src=\"imgs/0038700002.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>VM1 and VM2 are deployed from the same template and host line-of-business applications.<br>You configure the network security group (NSG) shown in the exhibit. (Click the Exhibit tab.)<br><img src=\"imgs/0038800001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to prevent users of VM1 and VM2 from accessing websites on the Internet over TCP port 80.<br>What should you do?<br>",ans:2,opts:["Disassociate the NSG from a network interface", "Change the Port_80 inbound security rule.", "Associate the NSG to Subnet1.", "Change the DenyWebSites outbound security rule."],exp:"Azure file shares can be used as persistent volumes for stateful containers. Containers deliver\n\"build once, run anywhere\" capabilities that enable developers to accelerate innovation. For the\ncontainers that access raw data at every start, a shared file system is required to allow these\ncontainers to access the file system no matter which instance they run on.\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-introduction"},
