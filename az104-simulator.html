<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-104 Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#212d42;
  --border:rgba(100,160,255,0.1);--border-md:rgba(100,160,255,0.2);--border-lg:rgba(100,160,255,0.38);
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.13);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);--green-b:rgba(34,197,94,0.35);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);--red-b:rgba(239,68,68,0.35);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);--amber-b:rgba(245,158,11,0.3);
  --purple:rgba(139,92,246,0.13);--teal:rgba(20,184,166,0.13);
  --text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:8px;--rl:14px;--tr:.18s cubic-bezier(.4,0,.2,1);
}
body.light{
  --bg:#f1f5f9;--surface:#fff;--surface2:#f8fafc;--surface3:#e2e8f0;
  --border:rgba(0,0,0,0.07);--border-md:rgba(0,0,0,0.13);--border-lg:rgba(59,130,246,0.4);
  --text:#0f172a;--text-muted:#64748b;--text-dim:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--tr),color var(--tr)}
.hidden{display:none!important}
#app{max-width:720px;margin:0 auto;padding:1.25rem 1rem 5rem}

/* HEADER */
.app-header{display:flex;align-items:center;gap:12px;padding:.75rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.logo{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);background:var(--accent-dim);border:1px solid var(--border-lg);border-radius:6px;padding:4px 10px;letter-spacing:.1em}
.app-header h1{font-size:14px;font-weight:400;color:var(--text-dim)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-stat{font-family:var(--mono);font-size:11px;color:var(--text-muted)}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;transition:all var(--tr)}
.icon-btn:hover{background:var(--surface2);border-color:var(--border-md);color:var(--text)}

/* CARDS / LAYOUT */
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);font-family:var(--mono);margin-bottom:10px}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-family:var(--mono);margin-bottom:12px}
hr.sep{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:12px}
.line-accent{width:32px;height:2px;background:var(--accent);border-radius:1px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* METRICS */
.metric{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;transition:transform var(--tr)}
.metric:hover{transform:translateY(-1px)}
.metric-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:var(--mono)}
.metric-value{font-size:26px;font-weight:600;font-family:var(--mono)}

/* READINESS */
.r-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.r-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.r-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.r-hint{font-size:12px;color:var(--text-muted);margin-top:6px}
.streak-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--amber)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 16px;border:1px solid var(--border-md);border-radius:var(--r);background:transparent;color:var(--text);font-size:14px;font-family:var(--sans);cursor:pointer;transition:all var(--tr);font-weight:400;text-align:center}
.btn:hover{background:var(--surface2);border-color:var(--border-lg);transform:translateY(-1px)}
.btn:active{transform:scale(.98) translateY(0)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn-p{background:var(--accent-dim);border-color:rgba(59,130,246,.4);color:#93c5fd;font-weight:500}
.btn-p:hover{background:rgba(59,130,246,.22)}
.btn-d{background:var(--red-dim);border-color:var(--red-b);color:#fca5a5}
.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-a{background:var(--amber-dim);border-color:var(--amber-b);color:#fcd34d}
.btn-a:hover{background:rgba(245,158,11,.2)}
.btn-g{background:var(--green-dim);border-color:var(--green-b);color:#86efac}
.btn-g:hover{background:rgba(34,197,94,.2)}
.btn-sm{width:auto;padding:7px 14px;font-size:12px}
.btn-group{display:flex;flex-direction:column;gap:8px}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.b-blue{background:var(--accent-dim);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
.b-green{background:var(--green-dim);color:#86efac;border:1px solid rgba(34,197,94,.25)}
.b-red{background:var(--red-dim);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.b-amber{background:var(--amber-dim);color:#fcd34d;border:1px solid rgba(245,158,11,.25)}
.b-purple{background:var(--purple);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
.b-teal{background:var(--teal);color:#5eead4;border:1px solid rgba(20,184,166,.3)}

/* EXAM HEADER */
.exam-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-top:.25rem;gap:8px}
.q-counter{font-family:var(--mono);font-size:13px;color:var(--text-muted);white-space:nowrap}
.prog-out{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:14px}
.prog-in{height:100%;background:var(--accent);border-radius:2px;transition:width .4s var(--tr)}

/* TIMER */
.timer{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text-dim)}
.timer.warning{color:var(--amber)}
.timer.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* QUESTION */
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:12px;font-size:15px;line-height:1.8;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}

/* OPTIONS */
.opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;padding:13px 16px;margin-bottom:8px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;transition:all var(--tr);font-family:var(--sans);line-height:1.55}
.opt:hover:not(:disabled){background:var(--surface2);border-color:var(--border-md);transform:translateX(3px)}
.opt-l{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border-md);font-size:11px;font-family:var(--mono);flex-shrink:0;margin-top:1px;transition:all var(--tr)}
.opt.correct{background:var(--green-dim);border-color:var(--green-b);color:#bbf7d0;animation:popIn .25s ease}
.opt.correct .opt-l{background:rgba(34,197,94,.22);border-color:var(--green-b);color:#86efac}
.opt.wrong{background:var(--red-dim);border-color:var(--red-b);color:#fecaca;animation:shake .3s ease}
.opt.wrong .opt-l{background:rgba(239,68,68,.2);border-color:var(--red-b);color:#fca5a5}
.opt.reveal-c{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25);color:#bbf7d0}
.opt.reveal-c .opt-l{background:rgba(34,197,94,.13);border-color:rgba(34,197,94,.28);color:#86efac}
.opt.selected-pending{background:var(--accent-dim);border-color:rgba(59,130,246,.4);color:#93c5fd}
.opt.selected-pending .opt-l{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);color:#93c5fd}
.opt:disabled{cursor:default;transform:none!important}
@keyframes popIn{0%{transform:scale(1)}40%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(4px)}}

/* EXPLANATION */
.exp{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-top:6px;font-size:13px;color:var(--text-dim);line-height:1.75;animation:fadeUp .22s ease}
.exp .verd{font-family:var(--mono);font-size:10px;letter-spacing:.08em;margin-bottom:8px;display:block;text-transform:uppercase}
.vok{color:var(--green)}.vbad{color:var(--red)}.vpeek{color:var(--amber)}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* DRAG & DROP */
.dd-hint{font-size:12px;color:var(--text-muted);margin-bottom:10px;font-family:var(--mono)}
.dd-pool{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 16px}
.dd-item{background:var(--surface2);border:1.5px solid var(--border-md);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all var(--tr);user-select:none}
.dd-item:hover{border-color:var(--accent);color:var(--text)}
.dd-item.selected{background:rgba(99,102,241,.18);border-color:var(--accent);color:#c7d2fe}
.dd-item.used{opacity:.3;cursor:default;pointer-events:none}
.dd-slots{display:flex;flex-direction:column;gap:10px;margin:4px 0 14px}
.dd-slot{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px dashed var(--border-md);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all var(--tr)}
.dd-slot:hover{border-color:var(--accent)}
.dd-slot-label{font-size:11px;font-family:var(--mono);color:var(--text-muted);white-space:nowrap;min-width:44px}
.dd-slot-val{font-size:13px;color:var(--text);flex:1}
.dd-slot.filled{border-style:solid;border-color:var(--border-md)}
.dd-slot.correct{border-color:var(--green);background:rgba(16,185,129,.08)}
.dd-slot.wrong{border-color:var(--red);background:rgba(239,68,68,.08)}

/* HOTSPOT */
.hs-table{width:100%;border-collapse:collapse;margin:12px 0}
.hs-table th{background:var(--surface2);color:var(--text-muted);font-size:11px;font-family:var(--mono);padding:6px 10px;text-align:center;border:1px solid var(--border)}
.hs-table td{padding:8px 10px;border:1px solid var(--border);font-size:13px;color:var(--text-dim)}
.hs-table td:last-child,.hs-table td:nth-last-child(2){text-align:center;min-width:60px}
.hs-btn{background:var(--surface2);border:1.5px solid var(--border-md);border-radius:6px;padding:4px 14px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all var(--tr)}
.hs-btn:hover{border-color:var(--accent);color:var(--text)}
.hs-btn.sel{background:rgba(99,102,241,.18);border-color:var(--accent);color:#c7d2fe}
.hs-btn.correct{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.hs-btn.wrong{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.hs-btn.reveal-correct{background:rgba(16,185,129,.08);border-color:var(--green);color:var(--green)}

/* CONTROLS */
.ctrl-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.flag-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text-muted);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.flag-btn:hover{border-color:var(--amber-b);color:var(--amber)}
.flag-btn.flagged{background:var(--amber-dim);border-color:var(--amber-b);color:var(--amber)}
.bk-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text-muted);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all var(--tr)}
.bk-btn:hover{border-color:rgba(99,102,241,.4);color:#a5b4fc}
.bk-btn.bookmarked{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.35);color:#a5b4fc}
.nav-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* DOTS NAV */
.dots-wrap{overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:thin}
.dots-nav{display:flex;gap:3px;min-width:min-content}
.dot-q{height:5px;border-radius:3px;border:none;cursor:pointer;transition:all .18s;flex-shrink:0}

/* RESULTS */
.res-score{text-align:center;padding:1.5rem 0 1rem}
.res-pct{font-size:64px;font-weight:600;font-family:var(--mono);animation:scaleIn .4s ease}
@keyframes scaleIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.res-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;border-radius:4px;transition:all var(--tr)}
.res-row:last-child{border-bottom:none}
.res-row:hover{background:var(--surface2);padding-left:6px}
.res-q{color:var(--text-dim);flex:1;line-height:1.5;padding-right:8px}
.res-detail{font-size:12px;display:none;margin-top:8px;padding:10px 12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);line-height:1.7;color:var(--text-dim)}
.res-detail.open{display:block;animation:fadeUp .2s ease}

/* CAT BARS */
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-bar-out{width:80px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0}
.cat-bar-in{height:100%;border-radius:2px}

/* HISTORY */
.hist-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;gap:10px;flex-wrap:wrap}
.hist-row:last-child{border-bottom:none}
.hist-bar-out{flex:1;min-width:60px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.hist-bar-in{height:100%;border-radius:3px}

/* INPUTS */
.num-wrap{display:flex;align-items:center;border:1px solid var(--border-md);border-radius:var(--r);overflow:hidden;background:var(--surface2)}
.num-btn{background:transparent;border:none;color:var(--text-dim);font-size:20px;width:44px;height:44px;cursor:pointer;font-family:var(--mono);transition:background var(--tr);flex-shrink:0}
.num-btn:hover{background:var(--surface3);color:var(--text)}
.num-in{background:transparent;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:16px;font-weight:500;text-align:center;width:80px;height:44px;outline:none}
.num-in::-webkit-inner-spin-button{-webkit-appearance:none}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.pre-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:5px 12px;cursor:pointer;transition:all var(--tr)}
.pre-btn:hover{background:var(--surface3);border-color:var(--border-md);color:var(--text)}
.pre-btn.active{background:var(--accent-dim);border-color:rgba(59,130,246,.4);color:#93c5fd}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.cat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-size:11px;font-family:var(--mono);padding:4px 12px;cursor:pointer;transition:all var(--tr)}
.cat-chip:hover{border-color:var(--border-md);color:var(--text)}
.cat-chip.active{background:var(--accent-dim);border-color:rgba(59,130,246,.4);color:#93c5fd}

/* MODE CARDS */
.mode-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--rl);background:var(--surface);cursor:pointer;transition:all var(--tr);margin-bottom:10px;text-align:left;width:100%;font-family:var(--sans)}
.mode-card:hover{background:var(--surface2);border-color:var(--border-md);transform:translateX(3px)}
.mode-icon{font-size:24px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border)}
.mode-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.mode-desc{font-size:12px;color:var(--text-muted);line-height:1.4}

/* FLASHCARD */
.flashcard{perspective:1000px;cursor:pointer;margin-bottom:16px;min-height:200px}
.fc-inner{position:relative;width:100%;transition:transform .5s ease;transform-style:preserve-3d}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2rem 1.5rem;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:200px}
.fc-back{position:absolute;top:0;left:0;width:100%;transform:rotateY(180deg);background:var(--surface2);border-color:var(--green-b)}
.fc-hint{font-size:11px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}
.fc-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.fc-dot{width:8px;height:8px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);transition:all .2s}
.fc-dot.k{background:var(--green);border-color:var(--green-b)}
.fc-dot.u{background:var(--red);border-color:var(--red-b)}
.fc-dot.c{width:14px;height:8px;border-radius:4px;background:var(--accent)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;animation:fadeUp .15s ease}
.modal{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--rl);padding:1.5rem;width:100%;max-width:420px;animation:slideUp .2s ease}
.modal h2{font-size:16px;font-weight:500;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text-dim);margin-bottom:1.25rem;line-height:1.6}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ALERT */
.alert{border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:var(--amber-dim);border:1px solid var(--amber-b);color:var(--amber)}
.alert-danger{background:var(--red-dim);border:1px solid var(--red-b);color:var(--red)}
.alert-info{background:var(--accent-dim);border:1px solid rgba(59,130,246,.3);color:#93c5fd}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}

/* UNANSWERED INDICATOR */
.unanswered-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-left:4px;vertical-align:middle;animation:pulse 1.5s infinite}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="logo">AZ-104</div>
    <h1>Azure Administrator</h1>
    <div class="hdr-right">
      <span class="hdr-stat" id="htotal">— q</span>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Cambiar tema">🌙</button>
    </div>
  </header>
  <div id="vh"></div>
  <div id="vs" class="hidden"></div>
  <div id="ve" class="hidden"></div>
  <div id="vr" class="hidden"></div>
  <div id="vf" class="hidden"></div>
  <div id="vhist" class="hidden"></div>
</div>
<div id="ov" class="overlay hidden"></div>

<script>
// 449 questions
const QB=[
{id:1,cat:"Compute",q:"Your company has serval departments. Each department has a number of virtual machines (VMs).<br>The company has an Azure subscription that contains a resource group named RG1.<br>All VMs are located in RG1.<br>You want to associate each VM with its respective department.<br>What should you do?<br>",ans:2,opts:["Create Azure Management Groups for each department.", "Create a resource group for each department.", "Assign tags to the virtual machines.", "Modify the settings of the virtual machines."],exp:"C is correct, the tags ASSOCIATE the vms to each deparment, then for example it can be charged to each department."},
{id:2,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an Azure Active Directory (Azure AD) subscription.<br>You want to implement an Azure AD conditional access policy.<br>The policy must be configured to require members of the Global Administrators group to use Multi-Factor Authentication and an Azure AD-joined device when they connect to Azure AD from untrusted locations.<br>Solution: You access the multi-factor authentication page to alter the user settings.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Azure makes sure that the VMs you place within an Availability Set run across multiple physical\nservers, compute racks, storage units, and network switches.\nProtecting the app from a data center outage would (imho) require the distribution of VMs among\navailability zones."},
{id:3,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an Azure Active Directory (Azure AD) subscription.<br>You want to implement an Azure AD conditional access policy.<br>The policy must be configured to require members of the Global Administrators group to use Multi-Factor Authentication and an Azure AD-joined device when they connect to Azure AD from untrusted locations.<br>Solution: You access the Azure portal to alter the session control of the Azure AD conditional access policy.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"When you deploy a template, you specify a resource group that will contain the resources. Before\nrunning the deployment command, create the resource group or during deployment also we can\ncreate the resource group. If you try to deploy your own template in the portal, there are 3\navailable options - \"Subscription\", \"Resource Group\", \"Location\". Resource group is the only one\nof the three options available in this list of answers.Location\".\nhttps://github.com/Azure/azure-quickstart-templates/blob/master/101-vm-simple-\nwindows/azuredeploy.json"},
{id:4,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an Azure Active Directory (Azure AD) subscription.<br>You want to implement an Azure AD conditional access policy.<br>The policy must be configured to require members of the Global Administrators group to use Multi-Factor Authentication and an Azure AD-joined device when they connect to Azure AD from untrusted locations.<br>Solution: You access the Azure portal to alter the grant control of the Azure AD conditional access policy.<br>Does the solution meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Under the Configure Runbook option, enable the runbook and choose the config source as either\nbuilt-in or user. If you select the option 'user', you get to choose from a runbook that you have\ncreated in your automation account. If you select 'Built-in', a list of runbooks is presented in a\ndrop-down menu. Choose 'Scale up VM' to resize the VM to the next larger size."},
{id:5,cat:"Compute",q:"You are planning to deploy an Ubuntu Server virtual machine to your company's Azure subscription.<br>You are required to implement a custom deployment that includes adding a particular trusted root certification authority (CA).<br>Which of the following should you use to create the virtual machine?<br>",ans:3,opts:["The New-AzureRmVm cmdlet.", "The New-AzVM cmdlet.", "The Create-AzVM cmdlet.", "The az vm create command."],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:6,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company makes use of Multi-Factor Authentication for when users are not in the office. The Per Authentication option has been configured as the usage model.<br>After the acquisition of a smaller business and the addition of the new staff to Azure Active Directory (Azure AD) obtains a different company and adding the new employees to Azure Active Directory (Azure AD), you are informed that these employees should also make use of Multi-Factor Authentication.<br>To achieve this, the Per Enabled User setting must be set for the usage model.<br>Solution: You reconfigure the existing usage model via the Azure portal.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Connection monitor lets you know the round-trip time to make the connection, in milliseconds.\nConnection monitor probes the connection every 60 seconds, so you can monitor latency over\ntime."},
{id:7,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company's Azure solution makes use of Multi-Factor Authentication for when users are not in the office. The Per Authentication option has been configured as the usage model.<br>After the acquisition of a smaller business and the addition of the new staff to Azure Active Directory (Azure AD) obtains a different company and adding the new employees to Azure Active Directory (Azure AD), you are informed that these employees should also make use of Multi-Factor Authentication.<br>To achieve this, the Per Enabled User setting must be set for the usage model.<br>Solution: You reconfigure the existing usage model via the Azure CLI.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Azure Backup supports backup of 64-bit Windows server operating system from Windows Server\n2008.\nAzure Backup supports backup of 64-bit Windows 10 operating system.\nAzure Backup supports backup of 64-bit Ubuntu Server operating system from Ubuntu 12.04.\nAzure Backup supports backup of VM that are shutdown or offline."},
{id:8,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company's Azure solution makes use of Multi-Factor Authentication for when users are not in the office. The Per Authentication option has been configured as the usage model.<br>After the acquisition of a smaller business and the addition of the new staff to Azure Active Directory (Azure AD) obtains a different company and adding the new employees to Azure Active Directory (Azure AD), you are informed that these employees should also make use of Multi-Factor Authentication.<br>To achieve this, the Per Enabled User setting must be set for the usage model.<br>Solution: You create a new Multi-Factor Authentication provider with a backup from the existing Multi-Factor Authentication provider data.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"A Recovery Services vault is a storage entity in Azure that houses data. The data is typically\ncopies of data, or configuration information for virtual machines (VMs), workloads, servers, or\nworkstations. You can use Recovery Services vaults to hold backup data for various Azure\nservices."},
{id:9,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an Azure Active Directory (Azure AD) tenant named weyland.com that is configured for hybrid coexistence with the on-premises Active<br>Directory domain.<br>You have a server named DirSync1 that is configured as a DirSync server.<br>You create a new user account in the on-premise Active Directory. You now need to replicate the user information to Azure AD immediately.<br>Solution: You run the Start-ADSyncSyncCycle -PolicyType Initial PowerShell cmdlet.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"User1 is global admin of contoso.onmicrosoft.com. As he created the new tenant called\nexternal.contoso.onmicrosoft.com, he will be the OWNER. Check the scope not just the role."},
{id:10,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an Azure Active Directory (Azure AD) tenant named weyland.com that is configured for hybrid coexistence with the on-premises Active<br>Directory domain.<br>You have a server named DirSync1 that is configured as a DirSync server.<br>You create a new user account in the on-premise Active Directory. You now need to replicate the user information to Azure AD immediately.<br>Solution: You use Active Directory Sites and Services to force replication of the Global Catalog on a domain controller.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Only a global administrator can add users to this tenant."},
{id:11,cat:"Identity",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an Azure Active Directory (Azure AD) tenant named weyland.com that is configured for hybrid coexistence with the on-premises Active<br>Directory domain.<br>You have a server named DirSync1 that is configured as a DirSync server.<br>You create a new user account in the on-premise Active Directory. You now need to replicate the user information to Azure AD immediately.<br>Solution: You restart the NetLogon service on a domain controller.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Only a global administrator can add users to this tenant."},
{id:12,cat:"Governance",q:"Your company has a Microsoft Azure subscription.<br>The company has datacenters in Los Angeles and New York.<br>You are configuring the two datacenters as geo-clustered sites for site resiliency.<br>You need to recommend an Azure storage redundancy option.<br>You have the following data storage requirements:<br>\u2711 Data must be stored on multiple nodes.<br>\u2711 Data must be stored on nodes in separate geographic locations.<br>\u2711 Data can be read from the secondary location as well as from the primary location.<br>Which of the following Azure stored redundancy options should you recommend?<br>",ans:1,opts:["Geo-redundant storage", "Read-only geo-redundant storage", "Zone-redundant storage", "Locally redundant storage"],exp:"https://kubernetes.io/docs/reference/access-authn-authz/authentication/"},
{id:13,cat:"Compute",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an azure subscription that includes a storage account, a resource group, a blob container and a file share.<br>A colleague named Jon Ross makes use of a solitary Azure Resource Manager (ARM) template to deploy a virtual machine and an additional Azure Storage account.<br>You want to review the ARM template that was used by Jon Ross.<br>Solution: You access the Virtual Machine blade.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure AD).\nNote: With the increase in usage of Office 365 Groups, administrators and users need a way to\nclean up unused groups. Expiration policies can help remove inactive groups from the system\nand make things cleaner.\nWhen a group expires, all of its associated services (the mailbox, Planner, SharePoint site, etc.)\nare also deleted.\nYou can set up a rule for dynamic membership on security groups or Office 365 groups.\nIncorrect Answers:\nB, D, E: You can set expiration policy only for Office 365 groups in Azure Active Directory (Azure\nAD)."},
{id:14,cat:"Compute",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an azure subscription that includes a storage account, a resource group, a blob container and a file share.<br>A colleague named Jon Ross makes use of a solitary Azure Resource Manager (ARM) template to deploy a virtual machine and an additional Azure Storage account.<br>You want to review the ARM template that was used by Jon Ross.<br>Solution: You access the Resource Group blade.<br>Does the solution meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"You are prevented from creating Azure SQL servers anywhere in Subscription 1 with the\nexception of ContosoRG1."},
{id:15,cat:"Compute",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has an azure subscription that includes a storage account, a resource group, a blob container and a file share.<br>A colleague named Jon Ross makes use of a solitary Azure Resource Manager (ARM) template to deploy a virtual machine and an additional Azure Storage account.<br>You want to review the ARM template that was used by Jon Ross.<br>Solution: You access the Container blade.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You can move a VM and its associated resources to a different subscription by using the Azure\nportal.\nYou can now move an Azure Recovery Service (ASR) Vault to either a new resource group within\nthe current subscription or to a new subscription."},
{id:16,cat:"Compute",q:"Your company has three virtual machines (VMs) that are included in an availability set.<br>You try to resize one of the VMs, which returns an allocation failure message.<br>It is imperative that the VM is resized.<br>Which of the following actions should you take?<br>",ans:2,opts:["You should only stop one of the VMs.", "You should stop two of the VMs.", "You should stop all three VMs.", "You should remove the necessary VM from the availability set."],exp:"Set-AzMarketplaceTerms - \"Accept or reject terms for a given publisher id(Publisher), offer\nid(Product) and plan id(Name). Please use Get-AzMarketplaceTerms to get the agreement\nterms.\"\n\nhttps://docs.microsoft.com/en-us/powershell/module/az.marketplaceordering/set-\nazmarketplaceterms?view=azps-8.3.0"},
{id:17,cat:"Compute",q:"You have an Azure virtual machine (VM) that has a single data disk. You have been tasked with attaching this data disk to another Azure VM.<br>You need to make sure that your strategy allows for the virtual machines to be offline for the least amount of time possible.<br>Which of the following is the action you should take FIRST?<br>",ans:2,opts:["Stop the VM that includes the data disk.", "Stop the VM that the data disk must be attached to.", "Detach the data disk.", "Delete the VM that includes the data disk."],exp:"C: A VPN gateway is used when creating a VPN connection to your on-premises network.\nRoute-based VPN devices use any-to-any (wildcard) traffic selectors, and let routing/forwarding\ntables direct traffic to different IPsec tunnels. It is typically built on router platforms where each\nIPsec tunnel is modeled as a network interface or VTI (virtual tunnel interface).\nE: Policy-based VPN devices use the combinations of prefixes from both networks to define how\ntraffic is encrypted/decrypted through IPsec tunnels. It is typically built on firewall devices that\nperform packet filtering. IPsec tunnel encryption and decryption are added to the packet filtering\nand processing engine.\nIncorrect Answers:\nF: Point-to-Site connections do not require a VPN device or a public-facing IP address."},
{id:18,cat:"Compute",q:"Your company has an Azure subscription.<br>You need to deploy a number of Azure virtual machines (VMs) using Azure Resource Manager (ARM) templates. You have been informed that the VMs will be included in a single availability set.<br>You are required to make sure that the ARM template you configure allows for as many VMs as possible to remain accessible in the event of fabric failure or maintenance.<br>Which of the following is the value that you should configure for the platformFaultDomainCount property?<br>",ans:3,opts:["10", "30", "Min Value", "Max Value"],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:19,cat:"Compute",q:"Your company has an Azure subscription.<br>You need to deploy a number of Azure virtual machines (VMs) using Azure Resource Manager (ARM) templates. You have been informed that the VMs will be included in a single availability set.<br>You are required to make sure that the ARM template you configure allows for as many VMs as possible to remain accessible in the event of fabric failure or maintenance.<br>Which of the following is the value that you should configure for the platformUpdateDomainCount property?<br>",ans:1,opts:["10", "20", "30", "40"],exp:"A Site-to-Site VPN gateway connection can be used to connect your on-premises network to an\nAzure virtual network over an IPsec/IKE (IKEv1 or IKEv2) VPN tunnel.\nThis type of connection requires a VPN device, a VPN gateway, located on-premises that has an\nexternally facing public IP address assigned to it.\nIncorrect Answers:\nB: Application Proxy is a feature of Azure AD that enables users to access on-premises web\napplications from a remote client."},
{id:20,type:"img",cat:"Compute",q:"DRAG DROP -<br>You have downloaded an Azure Resource Manager (ARM) template to deploy numerous virtual machines (VMs). The ARM template is based on a current VM, but must be adapted to reference an administrative password.<br>You need to make sure that the password cannot be stored in plain text.<br>You are preparing to create the necessary components to achieve your goal.<br>Which of the following should you create to achieve your goal? Answer by dragging the correct option from the list to the answer area.<br>Select and Place:<br><img src=\"imgs/0001800001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0001900001.png",exp:"You can use a template that allows you to deploy a simple Windows VM by retrieving the password that is stored in a Key Vault. Therefore, the password is never put in plain text in the template parameter file."},
{id:21,cat:"Compute",q:"Your company has an Azure Active Directory (Azure AD) tenant that is configured for hybrid coexistence with the on-premises Active Directory domain.<br>The on-premise virtual environment consists of virtual machines (VMs) running on Windows Server 2012 R2 Hyper-V host servers.<br>You have created some PowerShell scripts to automate the configuration of newly created VMs. You plan to create several new VMs.<br>You need a solution that ensures the scripts are run on the new VMs.<br>Which of the following is the best solution?<br>",ans:0,opts:["Configure a SetupComplete.cmd batch file in the %windir%\\setup\\scripts directory.", "Configure a Group Policy Object (GPO) to run the scripts as logon scripts.", "Configure a Group Policy Object (GPO) to run the scripts as startup scripts.", "Place the scripts in a new virtual hard disk (VHD)."],exp:"Raw HTTP request data is provided by Web server logging and the question mentions 500 error\ncodes.\nYou need to catch connection error. When the connection fails it happens on web server, not\nwithin application. You can do it opening the web application -> Application Service logs -> Web\nserver logging (there are multiple switches there).\nYou can also see the errors live going to \"Log stream\" pane.\n\n\fWeb server logging Windows App Service file system or Azure Storage blobs Raw HTTP request\ndata in the W3C extended log file format. Each log message includes data such as the HTTP\nmethod, resource URI, client IP, client port, user agent, response code, and so on."},
{id:22,cat:"Compute",q:"Your company has an Azure Active Directory (Azure AD) tenant that is configured for hybrid coexistence with the on-premises Active Directory domain.<br>You plan to deploy several new virtual machines (VMs) in Azure. The VMs will have the same operating system and custom software requirements.<br>You configure a reference VM in the on-premise virtual environment. You then generalize the VM to create an image.<br>You need to upload the image to Azure to ensure that it is available for selection when you create the new Azure VMs.<br>Which PowerShell cmdlets should you use?<br>",ans:1,opts:["Add-AzVM", "Add-AzVhd", "Add-AzImage", "Add-AzImageDataDisk"],exp:"Assign a role to a user\n1. Sign in to the Azure portal with an account that's a global admin or privileged role admin for the\ndirectory.\n2. Select Azure Active Directory, select Users, and then select a specific user from the list.\n3. For the selected user, select Directory role, select Add role, and then pick the appropriate\nadmin roles from the Directory roles list, such as Conditional access administrator.\n4. Press Select to save."},
{id:23,type:"dd",cat:"Compute",q:"DRAG DROP -<br>Your company has an Azure subscription that includes a number of Azure virtual machines (VMs), which are all part of the same virtual network.<br>Your company also has an on-premises Hyper-V server that hosts a VM, named VM1, which must be replicated to Azure.<br>Which of the following objects that must be created to achieve this goal? Answer by dragging the correct option from the list to the answer area.<br>Select and Place:<br><img src=\"imgs/0002200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Hyper-V site", "Azure Recovery Services Vault"],ans:["Hyper-V site", "Azure Recovery Services Vault"],exp:"To assign a license, under Azure Active Directory > Licenses > All Products, select one or more\nproducts, and then select Assign on the command bar.\nReferences: https://docs.microsoft.com/en-us/azure/active-directory/fundamentals/license-users-\ngroups\n\n\fQUESTION 24\nYou have an Azure subscription named Subscription1 and an on-premises deployment of\nMicrosoft System Center Service Manager.\n\nSubscription1 contains a virtual machine named VM1.\n\nYou need to ensure that an alert is set in Service Manager when the amount of available memory\non VM1 is below 10 percent.\n\nWhat should you do first?\n\nA.   Create an automation runbook\nB.   Deploy a function app\nC.   Deploy the IT Service Management Connector (ITSM)\nD.   Create a notification\n\nAnswer: C\nExplanation:\nThe IT Service Management Connector (ITSMC) allows you to connect Azure and a supported IT\nService Management (ITSM) product/service, such as the Microsoft System Center Service\nManager.\nWith ITSMC, you can create work items in ITSM tool, based on your Azure alerts (metric alerts,\nActivity Log alerts and Log Analytics alerts)."},
{id:24,cat:"Networking",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company's Azure subscription includes two Azure networks named VirtualNetworkA and VirtualNetworkB.<br>VirtualNetworkA includes a VPN gateway that is configured to make use of static routing. Also, a site-to-site VPN connection exists between your company's on- premises network and VirtualNetworkA.<br>You have configured a point-to-site VPN connection to VirtualNetworkA from a workstation running Windows 10. After configuring virtual network peering between<br>VirtualNetworkA and VirtualNetworkB, you confirm that you are able to access VirtualNetworkB from the company's on-premises network. However, you find that you cannot establish a connection to VirtualNetworkB from the Windows 10 workstation.<br>You have to make sure that a connection to VirtualNetworkB can be established from the Windows 10 workstation.<br>Solution: You choose the Allow gateway transit setting on VirtualNetworkA.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"\"After configuring virtual network peering between VirtualNetworkA and VirtualNetworkB, you confirm that you are able to access VirtualNetworkB from the company's on-premises network.\" This indicates the Allow/Use gateway transit is set up working. The next step will be restart/reinstall the VPN-Client config at the windows 10 WS."},
{id:25,cat:"Networking",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company's Azure subscription includes two Azure networks named VirtualNetworkA and VirtualNetworkB.<br>VirtualNetworkA includes a VPN gateway that is configured to make use of static routing. Also, a site-to-site VPN connection exists between your company's on- premises network and VirtualNetworkA.<br>You have configured a point-to-site VPN connection to VirtualNetworkA from a workstation running Windows 10. After configuring virtual network peering between<br>VirtualNetworkA and VirtualNetworkB, you confirm that you are able to access VirtualNetworkB from the company's on-premises network. However, you find that you cannot establish a connection to VirtualNetworkB from the Windows 10 workstation.<br>You have to make sure that a connection to VirtualNetworkB can be established from the Windows 10 workstation.<br>Solution: You choose the Allow gateway transit setting on VirtualNetworkB.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"The azcopy copy command copies a directory (and all of the files in that directory) to a blob\ncontainer. The result is a directory in the container by the same name.\nIncorrect Answers:\nB: The azcopy sync command replicates the source location to the destination location. However,\nthe file is skipped if the last modified time in the destination is more recent.\nD: The az storage blob copy start-batch command copies multiple blobs to a blob container."},
{id:26,cat:"Networking",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company's Azure subscription includes two Azure networks named VirtualNetworkA and VirtualNetworkB.<br>VirtualNetworkA includes a VPN gateway that is configured to make use of static routing. Also, a site-to-site VPN connection exists between your company's on- premises network and VirtualNetworkA.<br>You have configured a point-to-site VPN connection to VirtualNetworkA from a workstation running Windows 10. After configuring virtual network peering between<br>VirtualNetworkA and VirtualNetworkB, you confirm that you are able to access VirtualNetworkB from the company's on-premises network. However, you find that you cannot establish a connection to VirtualNetworkB from the Windows 10 workstation.<br>You have to make sure that a connection to VirtualNetworkB can be established from the Windows 10 workstation.<br>Solution: You download and re-install the VPN client configuration package on the Windows 10 workstation.<br>Does the solution meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Azure Import/Export service supports the following of storage accounts:\nStandard General Purpose v2 storage accounts (recommended for most scenarios)\nBlob Storage accounts\nGeneral Purpose v1 storage accounts (both Classic or Azure Resource Manager deployments),\nAzure Import/Export service supports the following storage types:\nImport supports Azure Blob storage and Azure File storage\nExport supports Azure Blob storage"},
{id:27,cat:"Compute",q:"Your company has virtual machines (VMs) hosted in Microsoft Azure. The VMs are located in a single Azure virtual network named VNet1.<br>The company has users that work remotely. The remote workers require access to the VMs on VNet1.<br>You need to provide access for the remote workers.<br>What should you do?<br>",ans:2,opts:["Configure a Site-to-Site (S2S) VPN.", "Configure a VNet-toVNet VPN.", "Configure a Point-to-Site (P2S) VPN.", "Configure DirectAccess on a Windows Server 2012 server VM.", "Configure a Multi-Site VPN"],exp:"AzCopy is a command-line utility that you can use to copy blobs or files to or from a storage\naccount.\nIncorrect Answers:\nA, C, E: AzCopy does not support table and queue storage services.\n\n\fD: AzCopy supports file storage services, as well as blob storage services."},
{id:28,cat:"Compute",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has a Microsoft SQL Server Always On availability group configured on their Azure virtual machines (VMs).<br>You need to configure an Azure internal load balancer as a listener for the availability group.<br>Solution: You create an HTTP health probe on port 1433.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Azure file shares can be used as persistent volumes for stateful containers. Containers deliver\n\"build once, run anywhere\" capabilities that enable developers to accelerate innovation. For the\ncontainers that access raw data at every start, a shared file system is required to allow these\ncontainers to access the file system no matter which instance they run on.\nhttps://docs.microsoft.com/en-us/azure/storage/files/storage-files-introduction"},
{id:29,cat:"Compute",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has a Microsoft SQL Server Always On availability group configured on their Azure virtual machines (VMs).<br>You need to configure an Azure internal load balancer as a listener for the availability group.<br>Solution: You set Session persistence to Client IP.<br>Does the solution meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"For Windows Server, the temporary disk is mounted as \u201cD:\\\u201d.\nFor Linux based VM\u2019s the temporary disk is mounted as \u201c/dev/sdb1\u201d."},
{id:30,cat:"Compute",q:"Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.<br>Your company has a Microsoft SQL Server Always On availability group configured on their Azure virtual machines (VMs).<br>You need to configure an Azure internal load balancer as a listener for the availability group.<br>Solution: You enable Floating IP.<br>Does the solution meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"From the exhibit we see that the disk is in the VHDX format.\nBefore you upload a Windows virtual machine (VM) from on-premises to Microsoft Azure, you\nmust prepare the virtual hard disk (VHD or VHDX). Azure supports only generation 1 VMs that\nare in the VHD file format and have a fixed sized disk. The maximum size allowed for the VHD is\n1,023 GB. You can convert a generation 1 VM from the VHDX file system to VHD and from a\ndynamically expanding disk to fixed-sized."},
{id:31,cat:"Compute",q:"Your company has two on-premises servers named SRV01 and SRV02. Developers have created an application that runs on SRV01. The application calls a service on SRV02 by IP address.<br>You plan to migrate the application on Azure virtual machines (VMs). You have configured two VMs on a single subnet in an Azure virtual network.<br>You need to configure the two VMs with static internal IP addresses.<br>What should you do?<br>",ans:2,opts:["Run the New-AzureRMVMConfig PowerShell cmdlet.", "Run the Set-AzureSubnet PowerShell cmdlet.", "Modify the VM properties in the Azure Management Portal.", "Modify the IP properties in Windows Network and Sharing Center.", "Run the Set-AzureStaticVNetIP PowerShell cmdlet."],exp:"View template from deployment history\n1. Go to the resource group for your new resource group. Notice that the portal shows the result\nof the last deployment. Select this link.\n\n\f2. You see a history of deployments for the group. In your case, the portal probably lists only one\ndeployment. Select this deployment.\n\n3. The portal displays a summary of the deployment. The summary includes the status of the\ndeployment and its operations and the values that you provided for parameters. To see the\ntemplate that you used for the deployment, select View template."},

{id:35,cat:"Compute",q:"Your company's Azure subscription includes Azure virtual machines (VMs) that run Windows Server 2016.<br>One of the VMs is backed up every day using Azure Backup Instant Restore.<br>When the VM becomes infected with data encrypting ransomware, you are required to restore the VM.<br>Which of the following actions should you take?<br>",ans:2,opts:["You should restore the VM after deleting the infected VM.", "You should restore the VM to any VM within the company's subscription.", "You should restore the VM to a new Azure VM.", "You should restore the VM to an on-premise Windows device."],exp:"Microsoft updates, which Microsoft refers to as planned maintenance events, sometimes require\nthat VMs be rebooted to complete the update. To reduce the impact on VMs, the Azure fabric is\ndivided into update domains to ensure that not all VMs are rebooted at the same time.\nIncorrect Answers:\nA: An update domain is a group of VMs and underlying physical hardware that can be rebooted at\nthe same time.\nB, C: A fault domain shares common storage as well as a common power source and network\nswitch. It is used to protect against unplanned system failure.\nReferences:\nhttps://petri.com/understanding-azure-availability-sets\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/tutorial-availability-sets"},

{id:56,cat:"Networking",q:"You have an Azure subscription named Subscription1 that contains a virtual network named VNet1. VNet1 is in a resource group named RG1.<br>Subscription1 has a user named User1. User1 has the following roles:<br>\u2711 Reader<br>\u2711 Security Admin<br>\u2711 Security Reader<br>You need to ensure that User1 can assign the Reader role for VNet1 to other users.<br>What should you do?<br>",ans:1,opts:["Remove User1 from the Security Reader and Reader roles for Subscription1.", "Assign User1 the User Access Administrator role for VNet1.", "Assign User1 the Network Contributor role for VNet1.", "Assign User1 the Network Contributor role for RG1."],exp:"Set-AzMarketplaceTerms - \"Accept or reject terms for a given publisher id(Publisher), offer\nid(Product) and plan id(Name). Please use Get-AzMarketplaceTerms to get the agreement\nterms.\"\n\nhttps://docs.microsoft.com/en-us/powershell/module/az.marketplaceordering/set-\nazmarketplaceterms?view=azps-8.3.0"},
{id:57,cat:"Networking",q:"You have an Azure Active Directory (Azure AD) tenant named contosocloud.onmicrosoft.com.<br>Your company has a public DNS zone for contoso.com.<br>You add contoso.com as a custom domain name to Azure AD.<br>You need to ensure that Azure can verify the domain name.<br>Which type of DNS record should you create?<br>",ans:0,opts:["MX", "NSEC", "PTR", "RRSIG"],exp:"C: A VPN gateway is used when creating a VPN connection to your on-premises network.\nRoute-based VPN devices use any-to-any (wildcard) traffic selectors, and let routing/forwarding\ntables direct traffic to different IPsec tunnels. It is typically built on router platforms where each\nIPsec tunnel is modeled as a network interface or VTI (virtual tunnel interface).\nE: Policy-based VPN devices use the combinations of prefixes from both networks to define how\ntraffic is encrypted/decrypted through IPsec tunnels. It is typically built on firewall devices that\nperform packet filtering. IPsec tunnel encryption and decryption are added to the packet filtering\nand processing engine.\nIncorrect Answers:\nF: Point-to-Site connections do not require a VPN device or a public-facing IP address."},
{id:58,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure Directory (Azure AD) tenant named Adatum and an Azure Subscription named Subscription1. Adatum contains a group named Developers.<br>Subscription1 contains a resource group named Dev.<br>You need to provide the Developers group with the ability to create Azure logic apps in the Dev resource group.<br>Solution: On Subscription1, you assign the DevTest Labs User role to the Developers group.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"With Sticky Sessions when a client starts a session on one of your web servers, session stays on\nthat specific server. To configure An Azure Load-Balancer For Sticky Sessions set Session\npersistence to Client IP or to Client IP and protocol.\nOn the following image you can see sticky session configuration:\nNote:\n- Client IP and protocol specifies that successive requests from the same client IP address and\nprotocol combination will be handled by the same virtual machine.\n- Client IP specifies that successive requests from the same client IP address will be handled by\nthe same virtual machine."},
{id:59,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure Directory (Azure AD) tenant named Adatum and an Azure Subscription named Subscription1. Adatum contains a group named Developers.<br>Subscription1 contains a resource group named Dev.<br>You need to provide the Developers group with the ability to create Azure logic apps in the Dev resource group.<br>Solution: On Subscription1, you assign the Logic App Operator role to the Developers group.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"A Site-to-Site VPN gateway connection can be used to connect your on-premises network to an\nAzure virtual network over an IPsec/IKE (IKEv1 or IKEv2) VPN tunnel.\nThis type of connection requires a VPN device, a VPN gateway, located on-premises that has an\nexternally facing public IP address assigned to it.\nIncorrect Answers:\nB: Application Proxy is a feature of Azure AD that enables users to access on-premises web\napplications from a remote client."},
{id:60,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You have an Azure Directory (Azure AD) tenant named Adatum and an Azure Subscription named Subscription1. Adatum contains a group named Developers.<br>Subscription1 contains a resource group named Dev.<br>You need to provide the Developers group with the ability to create Azure logic apps in the Dev resource group.<br>Solution: On Dev, you assign the Contributor role to the Developers group.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"Azure virtual machine extensions are small packages that run post-deployment configuration and\nautomation on Azure virtual machines.\nIn the following example, the Azure CLI is used to deploy a custom script extension to an existing\nvirtual machine, which installs a Nginx webserver. az vm extension set \\\n--resource-group myResourceGroup \\\n--vm-name myVM --name customScript \\\n--publisher Microsoft.Azure.Extensions \\\n--settings '{\"commandToExecute\": \"apt-get install -y nginx\"}\n\nNote:\nThere are several versions of this question in the exam. The question has two correct answers:\n1. a Desired State Configuration (DSC) extension\n2. Azure Custom Script Extension\n\nThe question can have other incorrect answer options, including the following:\n- the Publish-AzVMDscConfiguration cmdlet\n- Azure Application Insights"},
{id:61,type:"dd",cat:"Identity",q:"DRAG DROP -<br>You have an Azure subscription that is used by four departments in your company. The subscription contains 10 resource groups. Each department uses resources in several resource groups.<br>You need to send a report to the finance department. The report must detail the costs for each department.<br>Which three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.<br>Select and Place:<br><img src=\"imgs/0006100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",items:["Assign a tag to each resource", "From the Cost analysis blade, filter the view by tag", "Download the usage report"],ans:["Assign a tag to each resource", "From the Cost analysis blade, filter the view by tag", "Download the usage report"],exp:"Raw HTTP request data is provided by Web server logging and the question mentions 500 error\ncodes.\nYou need to catch connection error. When the connection fails it happens on web server, not\nwithin application. You can do it opening the web application -> Application Service logs -> Web\nserver logging (there are multiple switches there).\nYou can also see the errors live going to \"Log stream\" pane.\n\n\fWeb server logging Windows App Service file system or Azure Storage blobs Raw HTTP request\ndata in the W3C extended log file format. Each log message includes data such as the HTTP\nmethod, resource URI, client IP, client port, user agent, response code, and so on."},
{id:62,cat:"Governance",q:"You have an Azure subscription named Subscription1 that contains an Azure Log Analytics workspace named Workspace1.<br>You need to view the error events from a table named Event.<br>Which query should you run in Workspace1?<br>",ans:1,opts:["Get-Event Event | where {$_.EventType == \"error\"}", "search in (Event) \"error\"", "select * from Event where EventType == \"error\"", "search in (Event) * | where EventType -eq \"error\""],exp:"Assign a role to a user\n1. Sign in to the Azure portal with an account that's a global admin or privileged role admin for the\ndirectory.\n2. Select Azure Active Directory, select Users, and then select a specific user from the list.\n3. For the selected user, select Directory role, select Add role, and then pick the appropriate\nadmin roles from the Directory roles list, such as Conditional access administrator.\n4. Press Select to save."},
{id:63,type:"img",cat:"Networking",q:"HOTSPOT -<br>You have an Azure subscription that contains a virtual network named VNET1 in the East US 2 region. A network interface named VM1-NI is connected to<br>VNET1.<br>You successfully deploy the following Azure Resource Manager template.<br><img src=\"imgs/0006500001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>For each of the following statements, select Yes if the statement is true. Otherwise, select No.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0006600001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/0006600002.png",exp:"Box 1: Yes -\nBox 2: Yes -\nVM1 is in Zone1, while VM2 is on Zone2.\nBox 3: No -\nReference:\nhttps://docs.microsoft.com/en-us/azure/architecture/resiliency/recovery-loss-azure-region"},
{id:64,cat:"Identity",q:"You have an Azure subscription named Subscription1. Subscription1 contains the resource groups in the following table.<br><img src=\"imgs/0006700001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>RG1 has a web app named WebApp1. WebApp1 is located in West Europe.<br>You move WebApp1 to RG2.<br>What is the effect of the move?<br>",ans:0,opts:["The App Service plan for WebApp1 remains in West Europe. Policy2 applies to WebApp1.", "The App Service plan for WebApp1 moves to North Europe. Policy2 applies to WebApp1.", "The App Service plan for WebApp1 remains in West Europe. Policy1 applies to WebApp1.", "The App Service plan for WebApp1 moves to North Europe. Policy1 applies to WebApp1."],exp:"Correct Answer: A You can only move a resource to a Resource Group or Subscription, but the location stays the same. When you move WebApp1 to RG2, the resource will be restricted based on the policy of the new Resource Group (Policy2)."},
{id:65,type:"img",cat:"Identity",q:"HOTSPOT -<br>You have an Azure subscription named Subscription1 that has a subscription ID of c276fc76-9cd4-44c9-99a7-4fd71546436e.<br>You need to create a custom RBAC role named CR1 that meets the following requirements:<br>\u2711 Can be assigned only to the resource groups in Subscription1<br>\u2711 Prevents the management of the access permissions for the resource groups<br>\u2711 Allows the viewing, creating, modifying, and deleting of resources within the resource groups<br>What should you specify in the assignable scopes and the permission elements of the definition of CR1? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0006900001.jpg\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",ans:0,opts:["Respuesta correcta (ver imagen)"],ans_img:"imgs/image889.png",exp:"Correct Answer:\n\n\u201c/subscriptions/c276fc76-9cd4-44c9-99a7-4fd71546435e\u201d\n\u201cMicrosoft.Authorization/\u201d upvoted 362 times Slimus 2\u00a0years, 5\u00a0months ago Azure RBAC) is the authorization system you use to manage access to Azure resources. \nhttps://learn.microsoft.com/en-us/azure/role-based-access-control/role-assignments-portal upvoted 2 times ... Awot 2\u00a0years, 1\u00a0month ago I have the feeling that the first option \u201c/subscriptions/c276fc76-9cd4-44c9-99a7-4fd71546435e\u201d  is wrong. because it doesn't specify the resource group, the implication is that the user will have access to all other things in the subscription. upvoted 10 times Alcpt 5\u00a0months, 3\u00a0weeks ago Read the line carefully. The is no such thing as plural /resourcegroupS upvoted 3 times ... ... justin19981 2\u00a0years, 11\u00a0months ago So often I have the feeling; This HAS to be wrong. And finding the community confirming my thoughts is nice :) upvoted 15 times ... Mitazure7 2\u00a0years, 1\u00a0month ago In Azure, the correct f {id:66,cat:"Compute",q:"You have an Azure subscription.<br>Users access the resources in the subscription from either home or from customer sites. From home, users must establish a point-to-site VPN to access the Azure resources. The users on the customer sites access the Azure resources by using site-to-site VPNs.<br>You have a line-of-business-app named App1 that runs on several Azure virtual machine. The virtual machines run Windows Server 2016.<br>You need to ensure that the connections to App1 are spread across all the virtual machines.<br>What are two possible Azure services that you can use? Each correct answer presents a complete solution.<br>NOTE: Each correct selection is worth one point.<br>",ans:[0, 4],opts:["an internal load balancer", "a public load balancer", "an Azure Content Delivery Network (CDN)", "Traffic Manager", "an Azure Application Gateway"],exp:"Azure Import/Export service supports the following of storage accounts:\nStandard General Purpose v2 storage accounts (recommended for most scenarios)\nBlob Storage accounts\nGeneral Purpose v1 storage accounts (both Classic or Azure Resource Manager deployments),\nAzure Import/Export service supports the following storage types:\nImport supports Azure Blob storage and Azure File storage\nExport supports Azure Blob storage"},

{id:69,cat:"Identity",q:"You have an Azure Active Directory (Azure AD) tenant named contoso.onmicrosoft.com.<br>The User administrator role is assigned to a user named Admin1.<br>An external partner has a Microsoft account that uses the\n          <a class=\"__cf_email__\" data-cfemail=\"790c0a1c0b4839160c0d15161612571a1614\" href=\"/cdn-cgi/l/email-protection\">\n           [email\u00a0protected]\n          </a>\n          sign in.<br>Admin1 attempts to invite the external partner to sign in to the Azure AD tenant and receives the following error message: `Unable to invite user\n          <a class=\"__cf_email__\" data-cfemail=\"a1d4d2c4d390e1ced4d5cdcececa8fc2cecc\" href=\"/cdn-cgi/l/email-protection\">\n           [email\u00a0protected]\n          </a>\n          `\" Generic authorization exception.`<br>You need to ensure that Admin1 can invite the external partner to sign in to the Azure AD tenant.<br>What should you do?<br>",ans:0,opts:["From the Users settings blade, modify the External collaboration settings.", "From the Custom domain names blade, add a custom domain.", "From the Organizational relationships blade, add an identity provider.", "From the Roles and administrators blade, assign the Security administrator role to Admin1."],exp:"For Windows Server, the temporary disk is mounted as \u201cD:\\\u201d.\nFor Linux based VM\u2019s the temporary disk is mounted as \u201c/dev/sdb1\u201d."},
{id:70,cat:"Identity",q:"You have an Azure subscription linked to an Azure Active Directory tenant. The tenant includes a user account named User1.<br>You need to ensure that User1 can assign a policy to the tenant root management group.<br>What should you do?<br>",ans:2,opts:["Assign the Owner role for the Azure Subscription to User1, and then modify the default conditional access policies.", "Assign the Owner role for the Azure subscription to User1, and then instruct User1 to configure access management for Azure resources.", "Assign the Global administrator role to User1, and then instruct User1 to configure access management for Azure resources.", "Create a new management group and delegate User1 as the owner of the new management group."],exp:"From the exhibit we see that the disk is in the VHDX format.\nBefore you upload a Windows virtual machine (VM) from on-premises to Microsoft Azure, you\nmust prepare the virtual hard disk (VHD or VHDX). Azure supports only generation 1 VMs that\nare in the VHD file format and have a fixed sized disk. The maximum size allowed for the VHD is\n1,023 GB. You can convert a generation 1 VM from the VHDX file system to VHD and from a\ndynamically expanding disk to fixed-sized."},

{id:72,type:"drop",cat:"Identity",q:"HOTSPOT -<br>You have a hybrid deployment of Azure Active Directory (Azure AD) that contains the users shown in the following table.<br><img src=\"imgs/0008100001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>You need to modify the JobTitle and UsageLocation attributes for the users.<br>For which users can you modify the attributes from Azure AD? To answer, select the appropriate options in the answer area.<br>NOTE: Each correct selection is worth one point.<br>Hot Area:<br><img src=\"imgs/0008200001.png\" style=\"max-width:100%;border-radius:6px;margin:6px 0;display:block\"/><br>",dropdowns:[{label:"JobTitle",options:["lUsert only","lUser1 and User2 only","lUser1 and User3 only","lUser1, User2, and User3"]},{label:"UsageLocation",options:["User only","lUser1 and User2 only","lUsert and User3 only","User1, User2, and User3"]}],ans_img:"imgs/0008300001.png",exp:"Box 1: User1 and User3 only -\nYou must use Windows Server Active Directory to update the identity, contact info, or job info for users whose source of authority is Windows Server Active\nDirectory.\nBox 2: User1, User2, and User3 -\nReference:\nhttps://docs.microsoft.com/en-us/azure/active-directory/fundamentals/active-directory-users-profile-azure-portal"},
{id:73,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You need to ensure that an Azure Active Directory (Azure AD) user named Admin1 is assigned the required role to enable Traffic Analytics for an Azure subscription.<br>Solution: You assign the Network Contributor role at the subscription level to Admin1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:74,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You need to ensure that an Azure Active Directory (Azure AD) user named Admin1 is assigned the required role to enable Traffic Analytics for an Azure subscription.<br>Solution: You assign the Owner role at the subscription level to Admin1.<br>Does this meet the goal?<br>",ans:0,opts:["Yes", "No"],exp:"You need to use a custom policy definition, because there is not a built-in policy.\nResource policy definition used by Azure Policy enables you to establish conventions for\nresources in your organization by describing when the policy is enforced and what effect to take.\nBy defining conventions, you can control costs and more easily manage your resources."},
{id:75,cat:"Identity",q:"Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.<br>After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.<br>You need to ensure that an Azure Active Directory (Azure AD) user named Admin1 is assigned the required role to enable Traffic Analytics for an Azure subscription.<br>Solution: You assign the Reader role at the subscription level to Admin1.<br>Does this meet the goal?<br>",ans:1,opts:["Yes", "No"],exp:"Microsoft updates, which Microsoft refers to as planned maintenance events, sometimes require\nthat VMs be rebooted to complete the update. To reduce the impact on VMs, the Azure fabric is\ndivided into update domains to ensure that not all VMs are rebooted at the same time.\nIncorrect Answers:\nA: An update domain is a group of VMs and underlying physical hardware that can be rebooted at\nthe same time.\nB, C: A fault domain shares common storage as well as a common power source and network\nswitch. It is used to protect against unplanned system failure.\nReferences:\nhttps://petri.com/understanding-azure-availability-sets\nhttps://docs.microsoft.com/en-us/azure/virtual-machines/windows/tutorial-availability-sets"},
