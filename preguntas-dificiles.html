{id:62,type:'mc',cat:'Storage',
q:'You have an Azure subscription that contains an image named Image1. Image1 contains a Microsoft SQL Server database. The database must use archival storage. Any data that has not been accessed for more than 90 days must be moved to archival storage automatically using a lifecycle management policy. Which Azure storage service should you use?',
opts:['Azure Blob storage (with Archive access tier)','Azure File storage','Azure Table storage','Azure Queue storage'],
ans:[0],
exp:'<strong>Azure Blob Storage con nivel de acceso Archive: Almacenamiento de archivado</strong><br><br>✅ <strong>Azure Blob Storage — Archive access tier</strong>: Es el único servicio de Azure Storage que admite el nivel de acceso <em>Archive</em>. Este nivel está diseñado para datos a los que casi nunca se accede y que pueden tolerar horas de latencia en la recuperación. Soporta <strong>Lifecycle Management Policies</strong> para mover automáticamente blobs de Hot → Cool → Cold → Archive según la antigüedad del último acceso. Es la solución más económica para archivado de datos a largo plazo.<br><br>❌ <strong>Azure File Storage</strong>: Recurso compartido de archivos administrado (SMB/NFS). No tiene niveles de acceso Archive ni soporte para políticas de ciclo de vida automáticas. No es adecuado para archivado masivo de datos.<br>❌ <strong>Azure Table Storage</strong>: Almacenamiento NoSQL para datos estructurados (pares clave-valor). No tiene niveles de acceso ni soporte para archivado automático.<br>❌ <strong>Azure Queue Storage</strong>: Servicio de mensajería para desacoplar componentes de aplicaciones. No tiene capacidades de archivado ni almacenamiento de datos de larga duración.<br><br>📌 <strong>Archive tier</strong>: Los blobs en nivel Archive están almacenados offline. Para acceder a ellos debes rehidratarlos (cambiar a Hot o Cool), proceso que puede tardar hasta 15 horas en el modo de rehidratación estándar.'},

{id:63,type:'mc',cat:'Compute & Backup',
q:'You have an Azure subscription that contains the following container images:<br><br><table style="border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:var(--surface2)"><th style="padding:6px 12px;border:1px solid var(--border)">Name</th><th style="padding:6px 12px;border:1px solid var(--border)">Operating System</th></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">Image1</td><td style="padding:6px 12px;border:1px solid var(--border)">Windows Server</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">Image2</td><td style="padding:6px 12px;border:1px solid var(--border)">Linux</td></tr></table>To which Azure services can you deploy <strong>Image1 (Windows Server)</strong>?',
opts:['Azure Container Instances only','Azure Container Apps only','Azure Container Instances and Azure App Service only','Azure Container Instances, Azure Container Apps, and Azure App Service'],
ans:[2],
exp:'<strong>Contenedores Windows: Servicios de Azure compatibles</strong><br><br>✅ <strong>Azure Container Instances (ACI)</strong>: Soporta tanto Linux como Windows Server. Puedes especificar <code>osType: Windows</code> en la definición del contenedor. Ideal para tareas de corta duración o contenedores aislados.<br>✅ <strong>Azure App Service</strong>: Soporta contenedores Windows Server mediante la configuración Docker Container con sistema operativo Windows. Debes crear el App Service Plan en modo Windows.<br><br>❌ <strong>Azure Container Apps</strong>: Solo soporta contenedores <strong>Linux</strong>. No es posible ejecutar imágenes de Windows Server en Azure Container Apps. Este es un error conceptual frecuente en el examen.<br><br>📌 <strong>Resumen de compatibilidad de SO</strong>:<br>• ACI → Linux ✅ Windows ✅<br>• Azure Container Apps → Linux ✅ Windows ❌<br>• Azure App Service → Linux ✅ Windows ✅ (en planes Windows)<br>• AKS → Linux ✅ Windows ✅ (con node pools Windows)<br><br>Para Image2 (Linux): los tres servicios son compatibles. Para Image1 (Windows): solo ACI y App Service.'},

{id:64,type:'mc',cat:'Storage',
q:'You have an Azure subscription that contains a Blob storage account with multiple containers used by different customers. You need to configure container-level encryption so that each container can use a different encryption key, without creating separate storage accounts for each customer. What should you configure?',
opts:['Encryption scopes','A single customer-managed key in Azure Key Vault applied to the whole storage account','Shared Access Signatures (SAS) with different permissions per container','Role-Based Access Control (RBAC) with different roles per container'],
ans:[0],
exp:'<strong>Encryption Scopes: Cifrado a nivel de contenedor en Blob Storage</strong><br><br>✅ <strong>Encryption Scopes</strong>: Permiten gestionar el cifrado con claves que tienen ámbito a nivel de contenedor o blob individual dentro de la misma cuenta de almacenamiento. Cada scope puede usar una clave diferente (clave gestionada por Microsoft o clave del cliente en Azure Key Vault). Esto permite separar los datos de distintos clientes con claves de cifrado independientes sin necesitar múltiples storage accounts. Se crean en la sección "Encryption" de la cuenta de almacenamiento.<br><br>❌ <strong>Una única CMK para toda la cuenta</strong>: El cifrado a nivel de cuenta usa una sola clave para todos los datos. No permite diferentes claves por contenedor. No cumple el requisito de aislamiento por cliente.<br>❌ <strong>Shared Access Signatures (SAS)</strong>: Controlan el acceso (autorización) a los blobs, no el cifrado de los datos. Aunque se pueden generar SAS por contenedor, no afectan a la clave de cifrado usada.<br>❌ <strong>RBAC por contenedor</strong>: Controla quién puede leer/escribir en cada contenedor (autorización), no cómo se cifran los datos en reposo. Son capas ortogonales: RBAC controla acceso, encryption scopes controlan cifrado.<br><br>📌 <strong>Caso de uso típico</strong>: Una empresa SaaS que almacena datos de múltiples clientes en la misma cuenta de Storage puede usar encryption scopes para garantizar que los datos de cada cliente estén cifrados con una clave diferente, cumpliendo requisitos de aislamiento de datos.'},

{id:65,type:'mc',cat:'Compute & Backup',
q:'You have an Azure Container Registry named contoso2023. The registry uses the Standard pricing tier and is located in East US. You need to configure contoso2023 to use a dedicated data endpoint to improve reliability when pulling container images from the registry. Which setting in the Azure portal should you configure?',
opts:['Subscriptions','Tags','Networking','Pricing plan'],
ans:[2],
exp:'<strong>Azure Container Registry: Dedicated Data Endpoint a través de Networking</strong><br><br>✅ <strong>Networking</strong>: La configuración de <em>dedicated data endpoints</em> se realiza desde la sección <strong>Networking</strong> del registro de contenedores. Los dedicated data endpoints crean endpoints de datos específicos por región (ej: <code>contoso2023.eastus.data.azurecr.io</code>) en lugar del endpoint genérico. Esto permite a los firewalls y NSGs permitir solo el tráfico hacia regiones específicas, mejora la confiabilidad al separar el tráfico de datos del de gestión, y facilita el cumplimiento de políticas de red. Solo está disponible en los niveles Premium (y Standard en algunos casos).<br><br>❌ <strong>Subscriptions</strong>: Muestra a qué suscripción está asociado el registro. No contiene configuraciones de conectividad o endpoints.<br>❌ <strong>Tags</strong>: Permite añadir metadatos (etiquetas) al recurso para organización y facturación. No afecta a la conectividad ni a los endpoints de datos.<br>❌ <strong>Pricing plan</strong>: Permite cambiar entre los niveles Basic, Standard y Premium. Cambiar el nivel puede habilitar características, pero la configuración específica del dedicated data endpoint se hace desde Networking, no desde aquí.<br><br>📌 <strong>Niveles y características</strong>: Dedicated data endpoints están disponibles en niveles Standard y Premium de Azure Container Registry. Basic no los soporta.'},

{id:66,type:'mc',cat:'Storage',
q:'You have an Azure subscription that contains the following storage accounts:<br><br><table style="border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:var(--surface2)"><th style="padding:6px 12px;border:1px solid var(--border)">Name</th><th style="padding:6px 12px;border:1px solid var(--border)">Kind</th><th style="padding:6px 12px;border:1px solid var(--border)">Redundancy</th></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">storage1</td><td style="padding:6px 12px;border:1px solid var(--border)">StorageV2</td><td style="padding:6px 12px;border:1px solid var(--border)">Geo-zone-redundant storage (GZRS)</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">storage2</td><td style="padding:6px 12px;border:1px solid var(--border)">BlobStorage</td><td style="padding:6px 12px;border:1px solid var(--border)">Read-access geo-redundant storage (RA-GRS)</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">storage3</td><td style="padding:6px 12px;border:1px solid var(--border)">BlockBlobStorage</td><td style="padding:6px 12px;border:1px solid var(--border)">Zone-redundant storage (ZRS)</td></tr></table>You need to identify which storage accounts support <strong>Azure Data Lake Storage Gen2 (hierarchical namespace)</strong>. Which storage account(s) meet this requirement?',
opts:['storage1 only','storage2 only','storage3 only','storage1 and storage2 only'],
ans:[0],
exp:'<strong>Azure Data Lake Storage Gen2: Requisito de tipo de cuenta</strong><br><br>✅ <strong>storage1 only (StorageV2 / General-purpose v2)</strong>: ADLS Gen2 se implementa habilitando el <em>Hierarchical Namespace (HNS)</em> en una cuenta de tipo <strong>StorageV2 (general-purpose v2)</strong>. StorageV2 es el único tipo de cuenta que soporta HNS de forma completa y es el recomendado para cargas de trabajo de análisis de datos (Azure Synapse, HDInsight, Databricks).<br><br>❌ <strong>storage2 (BlobStorage)</strong>: Las cuentas de tipo BlobStorage son un tipo legacy optimizado para blobs. No soportan la habilitación del Hierarchical Namespace requerido para ADLS Gen2. Para nuevas implementaciones se debe usar StorageV2 en lugar de BlobStorage.<br>❌ <strong>storage3 (BlockBlobStorage)</strong>: Las cuentas BlockBlobStorage son cuentas de premium performance para blobs de bloque. Aunque ofrecen alto rendimiento, no soportan el Hierarchical Namespace necesario para ADLS Gen2.<br><br>📌 <strong>Redundancia y ADLS Gen2</strong>: El tipo GZRS de storage1 es el más redundante (zona + geo), lo que además lo hace idóneo cuando también se requiere alta disponibilidad ante desastres continentales. La redundancia no afecta al soporte de HNS/ADLS Gen2, pero StorageV2+GZRS es la combinación óptima cuando se requieren ambos.<br><br>📌 <strong>Pasos para habilitar ADLS Gen2</strong>: Al crear la cuenta StorageV2, habilita "Hierarchical namespace" en la sección Advanced. No puede habilitarse en cuentas existentes sin HNS.'},

{id:67,type:'mc',cat:'Networking',
q:'You have an Azure subscription. You plan to create a virtual network named VNet1 with a subnet named Subnet1. You need to configure VNet1 to protect the virtual network resources against Distributed Denial of Service (DDoS) attacks originating from the internet. What should you configure for VNet1?',
opts:['Apply an Azure DDoS Network Protection plan to VNet1','Enable an Azure Firewall in Subnet1','Configure a Network Security Group (NSG) on Subnet1','Enable Azure ExpressRoute for VNet1'],
ans:[0],
exp:'<strong>Azure DDoS Network Protection: Protección contra ataques DDoS</strong><br><br>✅ <strong>Azure DDoS Network Protection Plan</strong>: Proporciona capacidades avanzadas de mitigación de DDoS a nivel de red virtual. Al asociar un DDoS Protection Plan a VNet1, Azure monitoriza continuamente el tráfico y aplica mitigación automática cuando detecta un ataque DDoS. Incluye: mitigación adaptativa basada en ML, alertas en tiempo real, métricas de ataque, y garantía de disponibilidad durante ataques. Es la solución específicamente diseñada para proteger VNets contra ataques volumétricos externos.<br><br>❌ <strong>Azure Firewall en Subnet1</strong>: Azure Firewall filtra tráfico a nivel de aplicación (L7) y puede bloquear IPs maliciosas, pero no está diseñado específicamente para absorber y mitigar ataques DDoS volumétricos. Los ataques DDoS a gran escala saturarían el firewall antes de que pudiera procesarlos. Además, Azure Firewall se despliega en su propia subnet dedicada (AzureFirewallSubnet), no en Subnet1.<br>❌ <strong>NSG en Subnet1</strong>: Los NSGs filtran tráfico basándose en reglas de puerto/protocolo/IP. No tienen capacidad para absorber ataques DDoS de alto volumen ni mitigación adaptativa.<br>❌ <strong>Azure ExpressRoute</strong>: Conexión privada dedicada entre on-premises y Azure. No protege contra ataques DDoS desde Internet; al contrario, el tráfico de ExpressRoute viene de circuitos privados, no de Internet.<br><br>📌 <strong>DDoS Basic vs Network Protection</strong>: DDoS Basic está incluido gratuitamente y protege la infraestructura Azure. DDoS Network Protection (de pago) ofrece protección específica para tus recursos, alertas y SLA de respuesta.'},

{id:68,type:'mc',cat:'Security & KeyVault',
q:'You have an Azure subscription that contains the following resources:<br><br><table style="border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:var(--surface2)"><th style="padding:6px 12px;border:1px solid var(--border)">Name</th><th style="padding:6px 12px;border:1px solid var(--border)">Type</th><th style="padding:6px 12px;border:1px solid var(--border)">Location</th></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">app1</td><td style="padding:6px 12px;border:1px solid var(--border)">Container App</td><td style="padding:6px 12px;border:1px solid var(--border)">East US</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">Vault1</td><td style="padding:6px 12px;border:1px solid var(--border)">Azure Key Vault</td><td style="padding:6px 12px;border:1px solid var(--border)">East US</td></tr></table>You need to configure app1 to access secrets stored in Vault1 <strong>without storing any credentials or secrets in the application code or configuration</strong>. What should you configure?',
opts:['A service principal with a client secret stored in app settings','A managed identity for app1, then grant it access to Vault1','A Shared Access Signature (SAS) token for Vault1','An app registration with certificate-based authentication'],
ans:[1],
exp:'<strong>Managed Identity: Acceso a Key Vault sin credenciales</strong><br><br>✅ <strong>Managed Identity para app1</strong>: Una identidad administrada es una identidad en Microsoft Entra ID que Azure gestiona automáticamente. Al habilitarla en app1, Azure crea una identidad que la aplicación puede usar para autenticarse en cualquier servicio que soporte autenticación de Entra ID, incluyendo Key Vault, sin necesidad de almacenar credenciales. El proceso: (1) Habilitar Managed Identity en app1, (2) Asignar el rol "Key Vault Secrets User" a esa identidad sobre Vault1, (3) La app accede a los secretos usando el SDK de Azure sin credenciales explícitas.<br><br>❌ <strong>Service principal con client secret</strong>: Aunque funciona técnicamente, requiere almacenar el client_secret como credencial en la configuración de la app. Esto introduce el mismo problema que se trata de evitar: gestionar y rotar credenciales sensibles. Las managed identities eliminan esta necesidad.<br>❌ <strong>SAS token para Vault1</strong>: Las SAS tokens son para Azure Storage (Blob, File, Queue, Table). Azure Key Vault no usa SAS tokens para autenticación; usa Azure AD/Entra ID.<br>❌ <strong>App registration con certificado</strong>: Aunque es más seguro que client secrets, aún requiere gestionar el certificado (renovación, distribución segura). Con managed identity, Azure gestiona automáticamente las credenciales subyacentes.<br><br>📌 <strong>System-assigned vs User-assigned</strong>: System-assigned (lifecycle ligado al recurso, se elimina con el recurso) vs User-assigned (lifecycle independiente, reutilizable en múltiples recursos).'},

{id:69,type:'mc',cat:'Networking',
q:'You have an Azure subscription that contains the following resources:<br><br><table style="border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:var(--surface2)"><th style="padding:6px 12px;border:1px solid var(--border)">Name</th><th style="padding:6px 12px;border:1px solid var(--border)">Type</th></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">VM1</td><td style="padding:6px 12px;border:1px solid var(--border)">Virtual machine</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">VNet1</td><td style="padding:6px 12px;border:1px solid var(--border)">Virtual network</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">NIC1</td><td style="padding:6px 12px;border:1px solid var(--border)">Network interface</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">LB1</td><td style="padding:6px 12px;border:1px solid var(--border)">Load balancer</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">VPN1</td><td style="padding:6px 12px;border:1px solid var(--border)">Virtual network gateway</td></tr></table>Which <strong>three</strong> resources can be directly associated with a public IP address? Each correct answer presents a complete solution.',
opts:['VM1','VNet1','NIC1','LB1','VPN1'],
ans:[2,3,4],
exp:'<strong>Public IP addresses: Recursos de Azure con los que se pueden asociar</strong><br><br>✅ <strong>NIC1 (Network Interface)</strong>: Una interfaz de red puede tener una IP pública directamente asignada. Cuando la NIC de una VM tiene una IP pública, la VM es accesible desde Internet en esa IP. La IP pública se asocia a la configuración IP de la NIC.<br>✅ <strong>LB1 (Load Balancer)</strong>: Los Load Balancers Standard y Basic pueden tener IPs públicas en su frontend. Esto permite que el balanceador distribuya el tráfico de Internet entre las VMs del backend pool.<br>✅ <strong>VPN1 (Virtual Network Gateway)</strong>: Un VPN Gateway requiere una IP pública dedicada para establecer túneles VPN con endpoints on-premises o con otros gateways de Azure. Sin IP pública, el gateway no puede recibir conexiones entrantes desde Internet/on-premises.<br><br>❌ <strong>VM1 (Virtual Machine)</strong>: Las VMs no reciben IPs públicas directamente. Obtienen la IP pública a través de su NIC (que sí puede tener una). La VM en sí no es un recurso "asociable" a una IP pública directamente.<br>❌ <strong>VNet1 (Virtual Network)</strong>: Las redes virtuales son contenedores lógicos de subredes y no tienen IPs públicas asociadas directamente. El tráfico de Internet llega a través de los recursos dentro de la VNet (NICs, LBs, Gateways).'},

{id:70,type:'mc',cat:'Governance & Cost',
q:'You need to configure an Azure Cost Management budget for your subscription that sends alerts in two situations: when actual spending has exceeded the threshold, AND when spending is predicted to exceed the threshold before the budget period ends. Which <strong>two</strong> types of budget alert conditions should you configure?',
opts:['Actual','Forecasted','Anomaly detection','Commitment discount'],
ans:[0,1],
exp:'<strong>Azure Cost Management: Tipos de alertas de presupuesto</strong><br><br>✅ <strong>Actual</strong>: Las alertas de tipo "Actual" se disparan cuando el gasto real acumulado en el período de presupuesto supera el umbral configurado (ej: 80% del presupuesto mensual). Son reactivas: alertan cuando ya se ha gastado el dinero.<br>✅ <strong>Forecasted</strong>: Las alertas de tipo "Forecasted" se disparan cuando la proyección del gasto (basada en el ritmo actual) indica que se superará el umbral antes de que termine el período. Son proactivas: alertan antes de que ocurra el sobregasto, permitiendo tomar acción preventiva.<br><br>❌ <strong>Anomaly detection</strong>: Azure Cost Management tiene una función de detección de anomalías de costos (Azure Cost Anomaly Detection) separada de los presupuestos. No es un tipo de condición de alerta dentro de la configuración de presupuestos.<br>❌ <strong>Commitment discount</strong>: Los descuentos por compromiso (Reserved Instances, Savings Plans) son mecanismos de optimización de costos, no tipos de alerta de presupuesto.<br><br>📌 <strong>Configuración</strong>: En Azure Cost Management → Budgets → Create budget → Alert conditions → puedes añadir múltiples condiciones con diferentes porcentajes y tipos (Actual/Forecasted). Las notificaciones se envían por email o a Action Groups.'},

{id:71,type:'mc',cat:'Monitor & Alerts',
q:'You plan to create an Azure virtual machine named VM1 that will be placed behind a load balancer. You need to monitor the end-to-end network connectivity between VM1 and a remote endpoint, including latency and packet loss over time. Which feature of Azure Network Watcher should you use?',
opts:['IP flow verify','BGP route information','Connection Monitor','Packet capture'],
ans:[2],
exp:'<strong>Azure Network Watcher Connection Monitor: Monitoreo continuo de conectividad</strong><br><br>✅ <strong>Connection Monitor</strong>: Proporciona monitoreo de conectividad unificado de extremo a extremo en Azure Network Watcher. Permite: monitorear la accesibilidad entre VMs de Azure y endpoints (URLs, IPs, otros recursos), medir latencia y pérdida de paquetes de forma continua a lo largo del tiempo, detectar problemas de conectividad antes de que los usuarios los reporten, recibir alertas cuando la latencia supera umbrales o cuando hay pérdida de paquetes, y ver el tiempo de ida y vuelta (RTT) en un timeline histórico.<br><br>❌ <strong>IP flow verify</strong>: Verifica si un paquete específico será permitido o denegado por las reglas NSG en una interfaz de red, para una combinación específica de IP origen/destino y puerto. Es una verificación puntual, no monitoreo continuo.<br>❌ <strong>BGP route information</strong>: Muestra las rutas BGP aprendidas por los VPN Gateways. Solo aplica a conectividad de VPN con BGP habilitado, no a monitoreo de VMs o aplicaciones.<br>❌ <strong>Packet capture</strong>: Captura el tráfico de red en una VM para análisis forense detallado. Es una herramienta de diagnóstico reactivo, no de monitoreo continuo de latencia y disponibilidad.<br><br>📌 <strong>Connection Monitor vs. Network Performance Monitor</strong>: Connection Monitor (v2) reemplaza al antiguo Network Performance Monitor y al Connection Monitor v1. Soporta tanto recursos Azure como endpoints on-premises.'},

{id:72,type:'mc',cat:'Networking',
q:'You plan to use Azure Virtual Network Manager to manage security across multiple virtual networks in your organization. You need to enforce a set of security rules that <strong>always apply</strong> across all managed VNets, regardless of the NSG rules that individual teams configure on their own VNets. Which feature should you configure?',
opts:['Azure Firewall rules','User-Defined Routes (UDR)','Security admin rules','NSG flow logs'],
ans:[2],
exp:'<strong>Security Admin Rules: Reglas de seguridad forzadas en Azure Virtual Network Manager</strong><br><br>✅ <strong>Security admin rules</strong>: Son un componente específico de Azure Virtual Network Manager que permite definir reglas de seguridad centralizadas que se <em>aplican forzosamente</em> a todas las VNets seleccionadas, independientemente de lo que los propietarios de las VNets configuren en sus NSGs. Las security admin rules pueden Permitir o Denegar tráfico y tienen precedencia sobre las NSGs locales cuando el efecto es "Always Allow" o "Always Deny". Son ideales para políticas de seguridad corporativas como "nunca bloquear el tráfico de gestión" o "siempre bloquear el puerto X".<br><br>❌ <strong>Azure Firewall rules</strong>: Azure Firewall filtra tráfico de aplicación (L4-L7) en una arquitectura hub-and-spoke. Requiere enrutar el tráfico a través del firewall. No es un mecanismo de "reglas forzadas" en múltiples VNets sin cambiar el enrutamiento.<br>❌ <strong>User-Defined Routes (UDR)</strong>: Las UDR controlan el enrutamiento del tráfico (hacia dónde va), no las reglas de seguridad (si se permite o no). Se pueden usar junto con Firewall para inspeccionar tráfico, pero no imponen reglas de seguridad directamente.<br>❌ <strong>NSG flow logs</strong>: Registran información sobre el tráfico IP que pasa por los NSGs para análisis y auditoría. Son una herramienta de visibilidad, no de enforcement de seguridad.<br><br>📌 <strong>Jerarquía</strong>: Security admin rules → NSGs (admin rules pueden anular o complementar las NSGs locales sin eliminarlas).'},

{id:73,type:'mc',cat:'Monitor & Alerts',
q:'You have an Azure subscription that contains 10 network security groups (NSGs) and a Log Analytics workspace named WorkSpace1. You need to log and analyze all IP traffic flowing through the NSGs, including source/destination IPs, ports, and whether traffic was allowed or denied. The data must be sent to WorkSpace1. What should you configure?',
opts:['Azure Network Watcher packet capture on each VM','NSG flow logs (enabled on each NSG, destination: WorkSpace1 via Traffic Analytics)','Azure Firewall diagnostic logs','Azure Monitor Network Insights dashboards only'],
ans:[1],
exp:'<strong>NSG Flow Logs: Registro y análisis de tráfico IP</strong><br><br>✅ <strong>NSG flow logs</strong>: Son un recurso de Azure Network Watcher que registra información sobre el tráfico IP que fluye a través de cada NSG. Capturan: dirección (entrada/salida), protocolo, IPs y puertos de origen/destino, estado de flujo (permitido/denegado), bytes y paquetes transferidos. Los logs se almacenan en una cuenta de Storage y, al habilitar <em>Traffic Analytics</em>, se envían a un Log Analytics workspace para análisis con KQL, dashboards y alertas. Es el mecanismo estándar para análisis de tráfico de red en Azure.<br><br>❌ <strong>Packet capture</strong>: Captura todo el contenido del tráfico (payload incluido) en VMs específicas. Útil para diagnóstico forense puntual, pero no para el registro continuo de flujos en todos los NSGs. Genera grandes volúmenes de datos y no se puede correlacionar fácilmente en Log Analytics.<br>❌ <strong>Azure Firewall diagnostic logs</strong>: Registran el tráfico que pasa por Azure Firewall (en arquitectura hub-and-spoke). Solo aplica si el tráfico pasa por el firewall; los NSGs de las subredes individuales no están cubiertos.<br>❌ <strong>Azure Monitor Network Insights</strong>: Proporciona dashboards de visibilidad de red, pero no registra logs de tráfico por sí solo. Necesita que los NSG flow logs estén habilitados como fuente de datos.<br><br>📌 <strong>Versiones</strong>: NSG flow logs v1 registran solo el estado del flujo. NSG flow logs v2 incluyen también bytes y paquetes. Traffic Analytics procesa los flow logs y los envía a Log Analytics.'},

{id:74,type:'mc',cat:'Compute & Backup',
q:'You need to recommend Azure container services that can <strong>automatically scale</strong> the number of container instances based on HTTP traffic load or event-driven triggers (such as message queue depth). Which <strong>two</strong> services support this automatic scaling capability?',
opts:['Azure Container Instances (ACI)','Azure Container Apps','Azure App Service (with container deployment)','Azure Container Registry (ACR)'],
ans:[1,2],
exp:'<strong>Autoescalado en servicios de contenedor de Azure</strong><br><br>✅ <strong>Azure Container Apps</strong>: Diseñado específicamente para aplicaciones basadas en eventos y microservicios. Soporta autoescalado basado en: tráfico HTTP (número de peticiones concurrentes), KEDA (Kubernetes Event-Driven Autoscaling) para colas (Service Bus, Storage Queue, Event Hubs), métricas de CPU y memoria, y reglas de escalado a cero (0 instancias cuando no hay tráfico = sin costo). Es el servicio más potente para autoescalado basado en eventos.<br>✅ <strong>Azure App Service</strong>: Soporta configuración de reglas de autoescalado basadas en métricas (CPU, memoria, peticiones por segundo) o en un horario predefinido. El autoescalado aumenta o reduce el número de instancias del App Service Plan automáticamente dentro de los límites configurados.<br><br>❌ <strong>Azure Container Instances (ACI)</strong>: Diseñado para ejecutar contenedores individuales de forma aislada (tareas cortas, pipelines de CI/CD, pruebas). NO soporta autoescalado automático. Cada instancia se gestiona de forma independiente; no hay un controlador que añada/elimine instancias automáticamente según la carga.<br>❌ <strong>Azure Container Registry (ACR)</strong>: Es un registro privado para almacenar y gestionar imágenes de contenedor. No ejecuta contenedores y por tanto no tiene concepto de escalado.<br><br>📌 <strong>Para autoescalado avanzado con orquestación</strong>: Azure Kubernetes Service (AKS) con Horizontal Pod Autoscaler y Cluster Autoscaler ofrece el mayor control, pero con mayor complejidad operativa.'},

{id:75,type:'mc',cat:'Governance & Cost',
q:'You manage multiple Azure subscriptions across different departments. Costs are showing signs of overruns and you need a solution to analyze current spending, create budgets, set spending alerts, and implement cost controls — all from a single centralized service. Which Azure service should you use?',
opts:['Azure Cost Management + Billing','Azure Monitor (Metrics and Alerts)','Azure Policy','Azure Advisor'],
ans:[0],
exp:'<strong>Azure Cost Management + Billing: Control centralizado de costos</strong><br><br>✅ <strong>Azure Cost Management + Billing</strong>: Servicio nativo de Azure para análisis, optimización y control de costos. Proporciona: análisis de costos con vistas por suscripción, grupo de recursos, servicio o etiqueta; creación de presupuestos con alertas automáticas (tipo Actual y Forecasted); informes programados por email; recomendaciones de optimización integradas; soporte para múltiples suscripciones y grupos de administración; y exportación de datos de costos a Azure Storage para análisis avanzado.<br><br>❌ <strong>Azure Monitor</strong>: Servicio de monitoreo de rendimiento y disponibilidad de recursos (métricas de CPU, memoria, latencia, errores). Puede generar alertas sobre métricas de rendimiento, pero no sobre costos. No tiene capacidades de análisis de gasto ni creación de presupuestos financieros.<br>❌ <strong>Azure Policy</strong>: Gobierno de recursos mediante políticas que auditan o impiden configuraciones no conformes. Puede ayudar indirectamente a controlar costos (ej: restringir SKUs caros), pero no analiza ni monitorea el gasto real.<br>❌ <strong>Azure Advisor</strong>: Proporciona recomendaciones proactivas de mejores prácticas en cuatro áreas: costos, rendimiento, seguridad y fiabilidad. En la categoría de costos sugiere recursos infrautilizados que podrían eliminarse o redimensionarse. Es complementario a Cost Management pero no tiene las capacidades completas de análisis de gasto y presupuestos.<br><br>📌 <strong>Integración</strong>: Azure Advisor + Cost Management se usan juntos: Advisor identifica optimizaciones, Cost Management realiza el seguimiento y control presupuestario.'},

{id:76,type:'dropq',cat:'Governance & Cost',
q:'You need to complete an ARM template that deploys a virtual machine named myVM001 with a variable number of data disks. The number of disks is controlled by the <code>numberOfDataDisks</code> integer parameter. The template uses property iteration (<code>copy</code> inside <code>storageProfile</code>) to create multiple disks:<br><br><pre style="font-size:11px;background:#0a0e1a;padding:10px;border-radius:6px;margin:8px 0;overflow-x:auto">"storageProfile": {\n  "dataDisks": [\n    {\n      "lun": "[ ▼ Dropdown 1 ]",\n      "name": "[concat(parameters(\'vmName\'),\'-disk\',copyIndex(\'diskCopy\'))]",\n      "createOption": "Empty",\n      "diskSizeGB": 128\n    }\n  ],\n  "copy": [\n    {\n      "name": "diskCopy",\n      "count": "[ ▼ Dropdown 2 ]"\n    }\n  ]\n}</pre>Select the correct values for each dropdown.',
dropdowns:[
{label:'Dropdown 1 — valor para "lun" (número de unidad lógica de cada disco)',options:['[copyIndex(\'diskCopy\')]','[parameters(\'numberOfDataDisks\')]','[variables(\'diskCount\')]','[add(copyIndex(),1)]'],ans:0},
{label:'Dropdown 2 — valor para "count" (cantidad de discos a crear)',options:['[copyIndex(\'diskCopy\')]','[parameters(\'numberOfDataDisks\')]','[variables(\'diskCopy\')]','1'],ans:1}
],
exp:'<strong>ARM Templates: Property Iteration con copy para múltiples discos de datos</strong><br><br>✅ <strong>Dropdown 1 → [copyIndex(\'diskCopy\')]</strong>: La propiedad <code>lun</code> (Logical Unit Number) identifica de forma única cada disco de datos en una VM. Al usar la iteración de propiedades con <code>copy</code>, <code>copyIndex(\'diskCopy\')</code> devuelve el índice actual de la iteración (0, 1, 2...) dentro del bucle nombrado "diskCopy". Esto garantiza que cada disco recibe un LUN único: disco 0 → LUN 0, disco 1 → LUN 1, etc.<br>✅ <strong>Dropdown 2 → [parameters(\'numberOfDataDisks\')]</strong>: La propiedad <code>count</code> del elemento <code>copy</code> determina cuántas iteraciones (cuántos discos) se crearán. Al usar el parámetro <code>numberOfDataDisks</code>, el número de discos se convierte en configurable en tiempo de despliegue sin modificar el template.<br><br>❌ <strong>[parameters(\'numberOfDataDisks\')] para lun</strong>: El parámetro tiene un valor fijo (ej: 3). Si se usara como LUN, todos los discos tendrían el mismo LUN (3), causando conflicto. El LUN debe ser único y secuencial por disco.<br>❌ <strong>[copyIndex(\'diskCopy\')] para count</strong>: copyIndex() depende de estar dentro de un bucle copy activo y devuelve el índice actual, no el total. Usarlo como count causaría una referencia circular o error de evaluación.<br><br>📌 <strong>Property iteration vs Resource iteration</strong>: La propiedad <code>copy</code> dentro de un recurso (storageProfile) crea múltiples instancias de una propiedad. La propiedad <code>copy</code> al nivel de resources crea múltiples recursos completos.'},

{id:77,type:'mc',cat:'Monitor & Alerts',
q:'You have an Azure subscription that contains the following resources:<br><br><table style="border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:var(--surface2)"><th style="padding:6px 12px;border:1px solid var(--border)">Name</th><th style="padding:6px 12px;border:1px solid var(--border)">Type</th></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">VM1</td><td style="padding:6px 12px;border:1px solid var(--border)">Virtual machine</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">storage1</td><td style="padding:6px 12px;border:1px solid var(--border)">Storage account</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">WorkSpace1</td><td style="padding:6px 12px;border:1px solid var(--border)">Log Analytics workspace</td></tr><tr><td style="padding:6px 12px;border:1px solid var(--border)">DB1</td><td style="padding:6px 12px;border:1px solid var(--border)">Azure SQL database</td></tr></table>You plan to use Data Collection Rules (DCR) with the Azure Monitor Agent (AMA) to collect security events and performance counters directly from VM1. Which resource from the table must be configured as the <strong>destination</strong> in the DCR?',
opts:['VM1 (the virtual machine itself)','storage1 (as a blob destination)','WorkSpace1 (Log Analytics workspace)','DB1 (Azure SQL database)'],
ans:[2],
exp:'<strong>Data Collection Rules (DCR): Log Analytics workspace como destino</strong><br><br>✅ <strong>WorkSpace1 (Log Analytics workspace)</strong>: Un Data Collection Rule (DCR) define qué datos recopilar (contadores de rendimiento, registros de eventos, syslog, etc.) y a dónde enviarlos. El destino principal para DCRs con Azure Monitor Agent es un <strong>Log Analytics workspace</strong>. Los datos se almacenan allí y se pueden consultar con KQL, crear alertas y dashboards. Es el único destino compatible para eventos de seguridad y logs del sistema operativo mediante AMA.<br><br>❌ <strong>VM1 (Virtual machine)</strong>: La VM es el <em>origen</em> de los datos (donde está instalado el Azure Monitor Agent), no el destino. El DCR se asocia a la VM para definir qué datos recoger de ella.<br>❌ <strong>storage1 (Storage account)</strong>: Aunque se pueden enviar algunos tipos de logs de diagnóstico a Storage accounts (como archivado de logs), los DCRs estándar con AMA para eventos de seguridad y métricas de rendimiento usan Log Analytics como destino principal, no Storage.<br>❌ <strong>DB1 (Azure SQL database)</strong>: Las bases de datos Azure SQL no son destinos compatibles para los Data Collection Rules. Los datos de monitoreo no se envían directamente a SQL; si se necesita almacenar en SQL para análisis, se puede exportar desde Log Analytics.<br><br>📌 <strong>Flujo DCR</strong>: VM1 (AMA instalado) → DCR (define qué recoger y a dónde) → WorkSpace1 (Log Analytics) → KQL queries + Alerts + Dashboards.'},

{id:78,type:'mc',cat:'Governance & Cost',
q:'You have an Azure subscription that contains the following hierarchy:<br><br><div style="font-family:var(--mono);font-size:12px;padding:10px;background:var(--surface2);border-radius:8px;margin:8px 0">Tenant Root Group<br>└─ ManagementGroup1<br>&nbsp;&nbsp; └─ Subscription1<br>&nbsp;&nbsp;&nbsp;&nbsp; └─ RG1<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; └─ VM1</div>You create an Azure Policy definition named Policy1 and assign it to <strong>ManagementGroup1</strong>. Which Azure resources can you identify as <strong>exclusions</strong> from Policy1?',
opts:['VM1 only','RG1 and VM1 only','Subscription1, RG1, and VM1 only','ManagementGroup1, Subscription1, RG1, and VM1'],
ans:[3],
exp:'<strong>Azure Policy: Exclusiones en la jerarquía de alcance</strong><br><br>✅ <strong>ManagementGroup1, Subscription1, RG1, y VM1</strong>: Cuando asignas una política a un ámbito (en este caso ManagementGroup1), puedes añadir exclusiones a cualquier nivel dentro de ese ámbito, incluyendo el propio ámbito de asignación. Las exclusiones se añaden como "Not scopes" y se especifican por el ID del recurso. Puedes excluir:<br>• El propio ManagementGroup1 (para excluir determinados child groups)<br>• Subscription1 (para que toda esa suscripción quede exenta)<br>• RG1 (para eximir un grupo de recursos específico)<br>• VM1 (para eximir un recurso individual)<br><br>❌ <strong>VM1 only</strong>: Incorrecta porque también se pueden excluir niveles más altos de la jerarquía.<br>❌ <strong>RG1 y VM1 only</strong>: Incorrecta porque Subscription1 y ManagementGroup1 también pueden ser excluidos.<br>❌ <strong>Subscription1, RG1, y VM1 only</strong>: Incorrecta porque ManagementGroup1 también puede ser excluido (aunque es el ámbito de asignación, se puede añadir una exclusión para sus recursos hijos).<br><br>📌 <strong>Casos de uso de exclusiones</strong>: Excluir suscripciones de sandbox/desarrollo de políticas de producción, excluir RGs de equipos de seguridad que necesitan configuraciones especiales, excluir VMs individuales con requisitos legacy incompatibles con la política.'},

{id:79,type:'mc',cat:'App Services',
q:'Your Azure App Service web app named WebApp2 has been deployed to App Service Plan Plan1. WebApp2 contains two folders: Folder1 and Folder2. You need to configure a <strong>daily automatic backup</strong> of WebApp2 that excludes Folder1. What should you configure first before you can set up the backup schedule?',
opts:['A Recovery Services vault','An Azure Storage account','A backup policy in Azure Backup','An additional App Service Plan slot'],
ans:[1],
exp:'<strong>App Service Backup: Requisito previo — Azure Storage Account</strong><br><br>✅ <strong>Azure Storage account</strong>: El sistema de backup nativo de App Service requiere que configures una cuenta de Azure Storage donde se almacenarán los archivos de backup (.zip con el contenido de la app + base de datos). Sin una Storage account vinculada, no puedes habilitar ni configurar el backup. El proceso: (1) Crear/especificar una Storage account → (2) Crear un contenedor de blobs → (3) Configurar el backup schedule en App Service → (4) Especificar carpetas a excluir (Folder1 en este caso). La función de exclusión de carpetas está disponible en la configuración de backup de App Service.<br><br>❌ <strong>Recovery Services vault</strong>: El vault de Recovery Services es para Azure Backup de VMs, bases de datos SQL, y Azure Files. El backup nativo de App Service (en la configuración de la propia web app) usa directamente una Storage account, NO un Recovery Services vault.<br>❌ <strong>Backup policy en Azure Backup</strong>: Azure Backup (el servicio centralizado) no gestiona directamente el backup de contenido de App Service con exclusión de carpetas. El backup nativo de App Service tiene su propia configuración con esta capacidad.<br>❌ <strong>Slot de App Service Plan</strong>: Los deployment slots son entornos de staging/producción separados. No tienen relación con la configuración de backups.<br><br>📌 <strong>Nivel requerido</strong>: El backup automático de App Service solo está disponible en los niveles Standard, Premium y Isolated. No está disponible en Free, Shared o Basic.'},

{id:80,type:'mc',cat:'Networking',
q:'You need to create a new Azure private DNS zone named <code>private.contoso.com</code> using the Azure CLI. The zone should be created in a resource group named <code>myResourceGroup</code>. Which command should you use?',
opts:['az network dns zone create --resource-group myResourceGroup --name private.contoso.com','az network private-dns zone create --resource-group myResourceGroup --name private.contoso.com','az network private-dns link vnet create --resource-group myResourceGroup --name private.contoso.com','az dns zone create --resource-group myResourceGroup --name private.contoso.com --private'],
ans:[1],
exp:'<strong>Azure CLI: Creación de zona DNS privada</strong><br><br>✅ <strong>az network private-dns zone create</strong>: Es el comando correcto para crear una zona DNS privada en Azure. La sintaxis completa es:<br><pre style="font-size:11px;background:#0a0e1a;padding:8px;border-radius:6px;margin:8px 0">az network private-dns zone create \\\n  --resource-group myResourceGroup \\\n  --name "private.contoso.com"</pre>Las zonas DNS privadas de Azure solo son visibles y resolvibles dentro de las redes virtuales a las que están vinculadas (virtual network links).<br><br>❌ <strong>az network dns zone create</strong>: Crea una zona DNS <strong>pública</strong>. Las zonas públicas son accesibles desde Internet. No es el comando para zonas privadas, aunque la sintaxis es similar.<br>❌ <strong>az network private-dns link vnet create</strong>: Crea un <em>vínculo de red virtual</em> entre una zona DNS privada ya existente y una VNet. Es el paso SIGUIENTE después de crear la zona, no el comando para crearla.<br>❌ <strong>az dns zone create --private</strong>: No existe la opción <code>--private</code> en <code>az dns zone create</code>. Las zonas públicas y privadas son recursos diferentes con comandos diferentes en la CLI.<br><br>📌 <strong>Flujo completo</strong>:<br>1. <code>az network private-dns zone create</code> → crear la zona<br>2. <code>az network private-dns link vnet create</code> → vincular a una VNet<br>3. <code>az network private-dns record-set</code> → añadir registros DNS'},

{id:81,type:'mc',cat:'Compute & Backup',
q:'You have a virtual machine named VM2 running Windows Server in the West US region (resource group RG1). VM2 is backed up to a Recovery Services vault. A user accidentally deleted specific files from VM2. You need to restore only the deleted files and folders — NOT the entire VM. What should you use to perform this file-level restore?',
opts:['Restore the entire VM from the Azure portal and copy the files manually afterward','Microsoft Azure Recovery Services (MARS) agent','Azure VM Restore with item-level recovery from the Azure portal','AzCopy to download files from the vault storage directly'],
ans:[1],
exp:'<strong>MARS Agent: Restauración de archivos y carpetas individuales en Windows Server</strong><br><br>✅ <strong>MARS Agent (Microsoft Azure Recovery Services Agent)</strong>: Permite restaurar archivos y carpetas individuales directamente desde un punto de recuperación en el Recovery Services vault, sin necesidad de restaurar la VM completa. El proceso: (1) Descargar e instalar el agente MARS en la VM de destino o en cualquier Windows Server, (2) Conectarlo al Recovery Services vault, (3) Seleccionar el punto de recuperación deseado, (4) Montar el disco de backup como unidad temporal, (5) Copiar los archivos/carpetas específicos a su ubicación de destino. Es rápido, no requiere downtime de la VM y permite recuperación granular.<br><br>❌ <strong>Restaurar la VM completa y copiar archivos</strong>: Restaurar toda la VM crea una nueva VM o sobreescribe la existente. Es mucho más lento, caro y disruptivo para recuperar solo unos archivos. No es la solución óptima para recuperación a nivel de archivo.<br>❌ <strong>Item-level recovery desde el portal</strong>: La opción "File Recovery" del portal Azure (también llamada item-level recovery) usa un proceso similar al MARS agent pero integrado en el portal. Descarga un script que monta el punto de recuperación como unidad en la VM local. Ambos métodos son válidos, pero el MARS Agent es la respuesta estándar para este escenario en el examen AZ-104.<br>❌ <strong>AzCopy desde vault storage</strong>: Los datos del Recovery Services vault están en un formato propietario cifrado de Azure Backup, no como archivos directamente accesibles con AzCopy. No se puede acceder a los datos del vault directamente mediante AzCopy.<br><br>📌 <strong>MARS vs Azure Backup (vault)</strong>: MARS Agent puede usarse para backup y restore tanto de VMs como de Windows Server on-premises. En VMs de Azure, se usa principalmente para restore de archivos individuales cuando el backup fue realizado con Azure Backup.'},

{id:93,type:'hs',cat:'Networking',
q:'You have an Azure subscription that contains the following virtual network configuration:<br><br><div style="font-family:var(--mono);font-size:12px;padding:10px;background:var(--surface2);border-radius:8px;margin:8px 0">VNet1 → DNS: Custom server at 10.0.0.15 (authoritative for contoso.com)<br>VNet2 → DNS: Azure-provided default DNS<br>VNet3 → DNS: Custom server at 10.0.0.15 (authoritative for contoso.com)</div>VNet1, VNet2, and VNet3 are peered. An Azure private DNS zone named <strong>contoso.com</strong> is linked to VNet2 (auto-registration: <strong>Enabled</strong>) and VNet3 (auto-registration: <strong>Disabled</strong>).<br><br>For each statement, select Yes if the statement is true, otherwise No.',
statements:['VMs deployed in VNet2 can automatically resolve DNS names registered in the contoso.com Azure private DNS zone.','VMs deployed in VNet1 can automatically resolve DNS names from the contoso.com Azure private DNS zone without any additional configuration.'],
ans:['Yes','No'],
exp:'<strong>Azure Private DNS: resolución en VNets con DNS personalizado vs. DNS de Azure</strong><br><br>✅ <strong>Sí — VMs en VNet2 SÍ pueden resolver la zona privada</strong>: VNet2 usa el <strong>DNS de Azure (predeterminado)</strong>. Las VMs de VNet2 resuelven nombres a través de Azure DNS (168.63.129.16), que tiene acceso directo a la zona DNS privada vinculada a VNet2. Además, con auto-registration habilitada, las VMs de VNet2 obtienen automáticamente registros A en la zona privada.<br><br>❌ <strong>No — VMs en VNet1 NO pueden resolver automáticamente</strong>: VNet1 usa un <strong>servidor DNS personalizado</strong>. Las consultas DNS de las VMs van al servidor personalizado, <em>no</em> a Azure DNS. Aunque la zona privada exista, el servidor personalizado no conoce esa zona a menos que esté configurado para reenviar consultas de contoso.com a Azure DNS (168.63.129.16 — <em>conditional forwarder</em>). Sin esa configuración, las VMs de VNet1 no pueden resolver la zona privada.<br><br>📌 <strong>Regla fundamental</strong>:<br>• VNet con DNS de Azure → puede usar zonas DNS privadas vinculadas automáticamente<br>• VNet con DNS personalizado → necesita un <em>conditional forwarder</em> a 168.63.129.16 para las zonas privadas<br><br>📌 <strong>Auto-registration vs. resolución</strong>: La auto-registration crea registros A automáticamente para las VMs de la VNet vinculada. La <em>resolución</em> depende del servidor DNS que usan los clientes. Son capacidades independientes.'},

{id:94,type:'hs',cat:'App Services',
q:'You have an Azure subscription with the following configuration:<br><br><div style="font-family:var(--mono);font-size:12px;padding:10px;background:var(--surface2);border-radius:8px;margin:8px 0">VNet1:<br>  Subnet1 → associated with NSG1, VM1 connected<br>  Subnet2 → VM2 connected<br>VNet1 peered ↔ VNet2<br><br>WebApp1 → Premium pricing tier, VNet Integration with Subnet2<br>WebApp2 → Isolated pricing tier (App Service Environment), deployed to Subnet2</div>For each statement, select Yes if the statement is true, otherwise No.',
statements:['WebApp1 with VNet Integration (Premium tier) can access resources hosted in VNet2 through the VNet1-VNet2 peering.','WebApp2 using the Isolated pricing tier (App Service Environment) can be deployed to Subnet2, which already contains VM2.'],
ans:['Yes','No'],
exp:'<strong>App Service: VNet Integration vs. App Service Environment (ASE)</strong><br><br>✅ <strong>Sí — WebApp1 puede acceder a recursos en VNet2 a través del peering</strong>: La <strong>VNet Integration</strong> (disponible desde el plan Premium) conecta el tráfico <em>saliente</em> de la web app a Subnet2 en VNet1. Cuando VNet1 está emparejada con VNet2, la app puede también acceder a recursos en VNet2. Es uno de los casos de uso más comunes: WebApp1 → Subnet2 (VNet1) → peering → VNet2 recursos.<br><br>❌ <strong>No — WebApp2 (ASE/Isolated) NO puede compartir Subnet2 con VM2</strong>: El <strong>App Service Environment (ASE)</strong> requiere una <strong>subred dedicada y vacía</strong>. La subred debe: (1) tener al menos /24 (256 IPs, preferiblemente /23 o mayor), (2) no contener VMs, NICs ni otros recursos existentes. Si Subnet2 ya tiene VM2, no es posible desplegar el ASE allí. El ASE "toma posesión" completa de la subred.<br><br>📌 <strong>Diferencias clave</strong>:<br>• <strong>VNet Integration</strong> (Standard/Premium): Solo tráfico <em>saliente</em>. Subnet compartible con otros recursos.<br>• <strong>ASE/Isolated</strong>: App desplegada <em>dentro</em> de la VNet. Tráfico entrante Y saliente. Requiere subred dedicada /24+.<br>• <strong>NSG en Subnet de integración</strong>: Controla tráfico de salida de VNet Integration. El NSG NO controla el tráfico entrante a la web app (ese llega al frontend del App Service, no a la subred de integración).'},

{id:95,type:'mc',cat:'Storage',
q:'You have two <strong>premium block blob</strong> Azure Storage accounts named <strong>storage1</strong> (source) and <strong>storage2</strong> (destination). You need to configure <strong>object replication</strong> from storage1 to storage2.<br><br>Which <strong>three</strong> features must be enabled as prerequisites before configuring object replication? (Select 3)',
opts:['Blob versioning on storage1 (source account)','Blob versioning on storage2 (destination account)','Change feed on storage1 (source account)','Change feed on storage2 (destination account)','Point-in-time restore for containers on storage1','Point-in-time restore for containers on storage2'],
ans:[0,1,2],
exp:'<strong>Object Replication: prerrequisitos obligatorios</strong><br><br>✅ <strong>Blob versioning en storage1 (origen)</strong>: La replicación de objetos requiere versionado habilitado en la cuenta de origen. Cada versión de un blob es el "objeto" que se replica.<br><br>✅ <strong>Blob versioning en storage2 (destino)</strong>: También debe estar habilitado en el destino para recibir y mantener las versiones replicadas.<br><br>✅ <strong>Change feed en storage1 (origen)</strong>: El change feed registra todos los cambios (creación, modificación, eliminación) en los blobs del origen. La replicación usa el change feed para saber qué blobs han cambiado y necesitan replicarse. Solo se habilita en la cuenta <em>origen</em>.<br><br>❌ <strong>Change feed en storage2 (destino)</strong>: No es necesario. Solo el origen necesita el change feed.<br><br>❌ <strong>Point-in-time restore</strong>: No es un prerequisito para la replicación de objetos. Es una función separada de recuperación de datos que permite restaurar blobs a estados anteriores.<br><br>📌 <strong>Resumen</strong>: Blob versioning en AMBAS cuentas + Change feed en SOLO la cuenta origen.'},

{id:96,type:'mc',cat:'Networking',
q:'You have an Azure subscription that contains the following virtual networks:<br><ul style="margin:6px 0 6px 20px"><li><strong>VNet1</strong> (10.0.0.0/16): contains VM1 running Windows Server</li><li><strong>VNet2</strong> (172.16.0.0/16): contains VM2 running Linux</li></ul>VNet1 and VNet2 are connected via virtual network peering. Users report that VM1 <strong>cannot connect to VM2</strong>. You need to verify whether connectivity is blocked and identify the cause.<br><br>Which Azure Network Watcher tool should you use?',
opts:['IP flow verify — checks if a specific IP flow is allowed or denied by NSG rules','Connection troubleshooting — tests end-to-end connectivity from VM1 to VM2','Effective routes — shows the routing table for VM1\'s network interface','Network topology — displays a visual map of the virtual network resources'],
ans:[1],
exp:'<strong>Connection Troubleshooting: diagnóstico de conectividad VM-to-VM</strong><br><br>✅ <strong>Connection troubleshooting</strong>: Herramienta de Azure Network Watcher que realiza un diagnóstico de conectividad de extremo a extremo entre dos endpoints. Para VM1→VM2 verifica si la conexión puede establecerse, identifica dónde falla (NSG bloqueando, ruta incorrecta, servicio no escuchando) y proporciona detalles del hop-by-hop. Es la herramienta correcta cuando los usuarios reportan que "no pueden conectarse" y quieres saber el motivo exacto.<br><br>❌ <strong>IP flow verify</strong>: Comprueba si un flujo específico (IP origen, IP destino, puerto, protocolo) está permitido o denegado por las reglas NSG. Útil para confirmar si un NSG bloquea algo, pero no prueba la conectividad real completa. Úsalo cuando sospechas que un NSG específico es el problema; usa Connection Troubleshooting cuando no sabes cuál es el problema.<br><br>❌ <strong>Effective routes</strong>: Muestra la tabla de rutas efectivas de la NIC, útil para diagnosticar problemas de routing. No prueba activamente si la conexión puede establecerse.<br><br>❌ <strong>Network topology</strong>: Visualización del mapa de la red. No diagnostica ni prueba conectividad.<br><br>📌 <strong>Herramientas de Network Watcher</strong>: IP Flow Verify (NSG check) → Connection Troubleshooting (conectividad E2E) → Connection Monitor (monitoreo continuo) → Packet Capture (análisis profundo) → Effective Routes (routing).'},

{id:97,type:'mc',cat:'Networking',
q:'You have an Azure virtual network that contains <strong>four subnets</strong>. Each subnet contains <strong>10 virtual machines</strong>. You plan to configure a network security group (NSG) to allow inbound traffic over <strong>TCP port 8080</strong> to exactly <strong>2 virtual machines on each subnet</strong>, using the <strong>fewest number of NSG rules possible</strong>.<br><br>What should you use as the <strong>destination</strong> in the NSG rule?',
opts:['An application security group (ASG)','A service tag (e.g. VirtualNetwork, AzureLoadBalancer)','The IP address of each individual target virtual machine','The subnets containing the virtual machines'],
ans:[0],
exp:'<strong>Application Security Groups (ASG): destino NSG para VMs específicas con mínimas reglas</strong><br><br>✅ <strong>Application Security Group (ASG)</strong>: Permite agrupar las interfaces de red (NICs) de VMs específicas en un objeto lógico reutilizable como origen o destino en reglas NSG. Proceso:<br>1. Creas un ASG (ej: "TargetVMs_8080")<br>2. Asocias las NICs de los 8 VMs objetivo (2 por subred × 4 subredes) al ASG<br>3. Creas <strong>una sola regla NSG</strong>: TCP puerto 8080, destino = el ASG<br>Resultado: <strong>1 regla</strong> cubre exactamente los 8 VMs target, sin importar sus IPs. Mínimo de reglas posible.<br><br>❌ <strong>Service tag</strong>: Los service tags (como AzureLoadBalancer, Storage, Internet) identifican grupos de IPs de <em>servicios de Azure</em>, no de VMs específicas. No se puede crear un service tag apuntando a tus propias VMs.<br><br>❌ <strong>IP de cada VM individualmente</strong>: Requeriría múltiples reglas o rangos de IP. Más reglas = más complejidad. Los ASGs eliminan esta necesidad.<br><br>❌ <strong>Subredes completas</strong>: Permitiría acceso a los 10 VMs de cada subred, no solo a los 2 objetivo. Viola el principio de mínimo privilegio y no usa el mínimo de reglas para el objetivo correcto.<br><br>📌 <strong>Requisito de ASG</strong>: Las NICs asociadas a un ASG deben estar en la <strong>misma VNet</strong>. Como todas las subredes están en la misma VNet, un solo ASG funciona perfectamente para este escenario.'},

{id:98,type:'mc',cat:'Networking',
q:'Your company has deployed an Azure Load Balancer to distribute traffic across multiple VMs. Users report <strong>intermittent connection timeouts</strong> when accessing the web application. You want to resolve the connection timeout issue using load balancer settings.<br><br>What should you do?',
opts:['Change the load balancing distribution mode to five-tuple hash','Configure a health probe for the load balancer','Enable session persistence (source IP affinity)','Upgrade the load balancer to the Standard SKU'],
ans:[3],
exp:'<strong>Azure Standard Load Balancer: TCP Reset on Idle para resolver timeouts de conexión</strong><br><br>✅ <strong>Upgrade a Standard Load Balancer SKU</strong>: El <strong>Standard LB</strong> soporta la funcionalidad <code>TCP Reset on Idle</code>. Cuando una conexión queda inactiva durante el timeout configurado, el Standard LB envía paquetes <strong>TCP RST</strong> a ambos extremos, notificándoles que la conexión se ha cerrado. Esto evita conexiones "zombie" que parecen abiertas pero están muertas, lo que se manifiesta como timeouts intermitentes en las aplicaciones. El <strong>Basic LB</strong> no soporta TCP Reset on Idle, causando este tipo de problemas con conexiones de larga duración o aplicaciones que mantienen conexiones persistentes.<br><br>❌ <strong>Five-tuple hash</strong>: Es el modo de distribución por defecto. Cambiarlo afecta cómo se distribuye el tráfico entre VMs, no la gestión del ciclo de vida de las conexiones.<br><br>❌ <strong>Health probe</strong>: Detecta VMs no saludables para dejar de enviarles tráfico. No resuelve timeouts en conexiones existentes activas.<br><br>❌ <strong>Session persistence</strong>: Envía todo el tráfico del mismo cliente al mismo VM. Puede <em>causar</em> sobrecarga de VMs específicas y empeorar los timeouts, no mejorarlos.<br><br>📌 <strong>Standard vs Basic LB</strong>: SLA 99.99%, TCP Reset on Idle, zonas de disponibilidad, hasta 1000 instancias backend. Microsoft recomienda usar siempre Standard para producción.'},

{id:99,type:'mc',cat:'Networking',
q:'Your organization uses an Azure Load Balancer for VMs hosting a web application. Users experience <strong>uneven traffic distribution</strong> — some VMs receive significantly more traffic than others. You need to configure the load balancer to ensure <strong>even traffic distribution</strong> across all VMs.<br><br>What should you do?',
opts:['Add more VMs to the backend pool','Adjust the load balancing rule to use a different frontend port','Disable session persistence (source IP affinity)','Enable session persistence (source IP affinity)'],
ans:[2],
exp:'<strong>Azure LB: distribución uniforme deshabilitando la persistencia de sesión</strong><br><br>✅ <strong>Deshabilitar session persistence (source IP affinity)</strong>: La persistencia de sesión hace que todo el tráfico de la <strong>misma IP de origen</strong> se dirija siempre al mismo VM. Si muchos clientes comparten una IP (ej: NAT corporativo), un solo VM recibe toda esa carga mientras los demás quedan infrautilizados. Deshabilitar la persistencia permite que el LB distribuya cada nueva conexión según el hash de 5 tuplas, logrando distribución uniforme.<br><br>❌ <strong>Habilitar session persistence</strong>: Es exactamente lo contrario — la persistencia <em>causa</em> la distribución desigual observada.<br><br>❌ <strong>Añadir más VMs</strong>: Añadir instancias reduce la carga absoluta pero no resuelve la <em>desigualdad</em>. Con session persistence activa, los nuevos VMs recibirán poco tráfico.<br><br>❌ <strong>Cambiar el puerto frontend</strong>: El puerto afecta qué tráfico se balancea, no la distribución entre VMs del backend.<br><br>📌 <strong>Modos de distribución</strong>:<br>• None (5-tuple): Hash de IP src/dst + puerto src/dst + protocolo → distribución uniforme ✅<br>• Client IP (2-tuple): Hash de IP origen → sticky sessions<br>• Client IP + Protocol (3-tuple): Hash de IP origen + protocolo → sticky sessions más granular'},

{id:100,type:'mc',cat:'Governance & Cost',
q:'You are an Azure administrator for an organization. The company uses ARM templates for deployments. You need to pass an <strong>array</strong> as an <strong>inline parameter</strong> during the deployment of an ARM template.<br><br>What should you do?',
opts:['Modify the template to include the array values directly in the resource definition','Use the <code>--parameters</code> switch in the deployment command with inline JSON array syntax','Create a separate JSON parameters file that includes the array values','Provide the array values as OS environment variables before running the deployment'],
ans:[1],
exp:'<strong>ARM Templates: pasar arrays como parámetros inline</strong><br><br>✅ <strong>Usar <code>--parameters</code> con sintaxis inline</strong>: Para pasar un array inline en un deployment de ARM, se usa el switch <code>--parameters</code> con objeto JSON. Ejemplo con Azure CLI:<br><pre style="font-size:11px;background:#0a0e1a;padding:8px;border-radius:6px;margin:8px 0">az deployment group create \\\n  --resource-group myRG \\\n  --template-file template.json \\\n  --parameters \'{"arrayParam":{"value":["val1","val2","val3"]}}\'</pre>Esta sintaxis permite pasar el array directamente en el comando sin necesitar un archivo separado.<br><br>❌ <strong>Modificar el template</strong>: Los valores de parámetros no deben hardcodearse en el template; los templates deben ser reutilizables. Los valores se pasan en tiempo de deployment.<br><br>❌ <strong>Archivo de parámetros separado</strong>: Válido para deployments en pipelines CI/CD, pero NO es pasar parámetros "inline". El archivo usa <code>--parameters @params.json</code>.<br><br>❌ <strong>Variables de entorno del OS</strong>: No son leídas directamente por el comando de deployment de ARM.<br><br>📌 <strong>Cuándo usar cada método</strong>: Inline → pruebas rápidas y desarrollo. Archivo de parámetros → producción, pipelines, auditoría.'},

{id:101,type:'mc',cat:'Compute & Backup',
q:'Your company has an Azure subscription linked to a Microsoft Entra tenant. You need to <strong>limit access to the Kubernetes API server</strong> of an AKS cluster to prevent unauthorized access. Which <strong>two</strong> options should you configure? Each correct answer presents a complete solution.',
opts:['API server authorized IP ranges','Private cluster','Azure Key Vault secrets integration','Azure AD group-based Kubernetes RBAC only'],
ans:[0,1],
exp:'<strong>AKS: Limitar acceso al API server — dos enfoques</strong><br><br>✅ <strong>API server authorized IP ranges</strong>: Configura una lista de CIDRs con permiso de comunicarse con el API server de AKS. El API server mantiene IP pública, pero solo los IPs de la whitelist pueden conectarse. Ideal para acceso desde ubicaciones fijas (oficinas, pipelines CI/CD con IPs estáticas).<br><br>✅ <strong>Private cluster</strong>: Hace el API server completamente privado — sin IP pública. El endpoint del API server obtiene una IP privada dentro de la VNet. Solo recursos en la VNet (o VNets conectadas via peering/VPN) pueden acceder. Es la opción más segura para entornos de producción críticos.<br><br>❌ <strong>Key Vault integration</strong>: Gestiona secretos y certificados de aplicaciones. No controla el acceso de red al API server de AKS.<br><br>❌ <strong>Azure AD RBAC only</strong>: Controla los permisos de usuarios autenticados dentro del cluster. No restringe el acceso de <em>red</em> al API server — cualquier IP puede intentar autenticarse. Son capas de seguridad distintas (autenticación/autorización vs. acceso de red).<br><br>📌 <strong>Uso combinado recomendado</strong>: Private cluster + Azure AD RBAC + Network Policies = defensa en profundidad.'},

{id:102,type:'mc',cat:'Compute & Backup',
q:'You have an Azure subscription with a container app named <strong>App1</strong>. App1 is configured to use <strong>cached data</strong>. You plan to add a new container that will run alongside App1 in the same container group. You need to ensure that the new container <strong>automatically refreshes the cache used by App1</strong>.<br><br>Which type of container should you configure?',
opts:['Dapr (Distributed Application Runtime) component','Init container','Sidecar container','Privileged container'],
ans:[2],
exp:'<strong>Sidecar container: patrón para funcionalidades auxiliares en Azure Container Apps</strong><br><br>✅ <strong>Sidecar container</strong>: Un sidecar es un contenedor adicional que se ejecuta en el mismo pod/replica que el contenedor principal, compartiendo red (localhost) y almacenamiento. Es el patrón correcto para servicios auxiliares que extienden la funcionalidad del contenedor principal de forma continua. El sidecar puede: ejecutarse continuamente junto a App1, conectarse a la fuente de datos original, y actualizar el caché compartido. En Azure Container Apps, defines múltiples contenedores (principal + sidecars) en la misma app.<br><br>❌ <strong>Dapr</strong>: Runtime para microservicios que provee pub/sub, invocación de servicios, etc. Se integra automáticamente como sidecar cuando se habilita, pero no es el "tipo de contenedor" a configurar para este escenario.<br><br>❌ <strong>Init container</strong>: Se ejecuta <em>antes</em> del contenedor principal y termina. Ideal para tareas de inicialización (setup). No es adecuado para actualizar caché de forma continua porque no persiste durante la vida de la app.<br><br>❌ <strong>Privileged container</strong>: Contenedor con privilegios elevados del SO. No tiene relación con la actualización de caché y es un riesgo de seguridad innecesario.<br><br>📌 <strong>Patrón Sidecar</strong>: Logging sidecar, proxy (Envoy/Istio), agente de monitoreo, agente de sincronización de caché. Es uno de los patrones de diseño de contenedores más usados.'},

{id:103,type:'mc',cat:'App Services',
q:'You have an Azure App Service web app named <strong>App1</strong> with the following diagnostic logging configurations:<br><ul style="margin:6px 0 6px 20px"><li>Application Logging (FileSystem)</li><li>Application Logging (Blob)</li><li>Web Server Logging</li></ul>You need to configure the logging to capture <strong>all warnings and higher severity messages</strong>. The logs must be <strong>stored for more than one week</strong>.<br><br>Which configuration should you enable?',
opts:['Application Logging (FileSystem) with level: Verbose','Application Logging (FileSystem) with level: Error','Application Logging (Blob) with level: Warning','Web Server Logging (Filesystem) with level: Warning'],
ans:[2],
exp:'<strong>App Service Logs: nivel Warning con Blob para retención superior a 7 días</strong><br><br>✅ <strong>Application Logging (Blob) con nivel Warning</strong>: Combinación correcta por dos razones:<br>1. <strong>Nivel Warning</strong>: Captura Warning, Error y Critical (jerárquico). Excluye Verbose e Information (bajo valor para producción).<br>2. <strong>Application Logging (Blob)</strong>: Los logs en Azure Blob Storage pueden retenerse por tiempo indefinido. <strong>Application Logging (FileSystem) tiene un límite máximo de 7 días</strong>. Para cumplir el requisito de "más de una semana", es obligatorio usar el destino Blob.<br><br>❌ <strong>FileSystem con Verbose</strong>: Verbose es el nivel más detallado (captura todo, muy ruidoso). Además, FileSystem tiene el límite de 7 días — no cumple el requisito de retención.<br><br>❌ <strong>FileSystem con Error</strong>: Error excluye los mensajes de tipo Warning. El requisito especifica capturar "warnings y superiores". Además, FileSystem no puede retener más de 7 días.<br><br>❌ <strong>Web Server Logging con Warning</strong>: Web Server Logging registra solicitudes HTTP (acceso al servidor web). No captura mensajes del código de la aplicación. Es para debugging de peticiones, no para warnings de la app.<br><br>📌 <strong>Niveles de App Service (menor → mayor)</strong>: Verbose → Information → Warning → Error → Critical. Elegir un nivel captura ESE nivel y todos los superiores.'},

{id:104,type:'mc',cat:'Networking',
q:'You have an Azure App Service web app named <strong>App1</strong> configured with the custom domain name <code>webapp1.contoso.com</code>. You need to create a DNS record for App1. The solution must ensure that <strong>App1 remains accessible if the IP address changes</strong>.<br><br>Which type of DNS record should you create?',
opts:['A record — maps webapp1.contoso.com directly to App1\'s current public IP address','CNAME record — maps webapp1.contoso.com to App1\'s default Azure hostname (app1.azurewebsites.net)','SOA record — defines the authoritative DNS server for contoso.com','TXT record — stores text data for domain ownership verification'],
ans:[1],
exp:'<strong>CNAME vs A record: resistencia ante cambios de IP en App Service</strong><br><br>✅ <strong>CNAME record</strong>: Un CNAME crea un <em>alias</em> que apunta a un <strong>nombre de host</strong>, no a una IP. Para App Service, apuntarías <code>webapp1.contoso.com</code> → <code>app1.azurewebsites.net</code>. Cuando la IP de App1 cambia (escalado, mantenimiento), Azure actualiza automáticamente la IP que resuelve <code>app1.azurewebsites.net</code>. Tu CNAME sigue apuntando al hostname, que a su vez resuelve a la nueva IP. <strong>El acceso no se interrumpe.</strong><br><br>❌ <strong>A record</strong>: Apunta directamente a una IP. Si la IP de App1 cambia, el registro A queda obsoleto y <code>webapp1.contoso.com</code> deja de funcionar hasta que actualices manualmente el A record. No cumple el requisito.<br><br>❌ <strong>SOA</strong>: El registro SOA define el servidor DNS autoritativo de una zona y sus parámetros. No se usa para mapear nombres de host a servicios específicos.<br><br>❌ <strong>TXT</strong>: Los registros TXT se usan para verificación de propiedad del dominio en Azure App Service (paso de configuración). No se usan para routing de tráfico de producción.<br><br>📌 <strong>Restricción CNAME para dominio apex</strong>: No puedes usar CNAME para el dominio raíz (<code>contoso.com</code>). Solo para subdominios como <code>webapp1.contoso.com</code>. Para el apex, usa un A record con la IP estática o un registro ALIAS si tu proveedor DNS lo soporta.'},

{id:105,type:'mc',cat:'Monitor & Alerts',
q:'You need to create Azure alerts based on <strong>metric values and activity log events</strong>. The solution must meet the following requirements:<br><ul style="margin:6px 0 6px 20px"><li>Control the frequency of alert notifications sent</li><li>Call an Azure function when an alert is triggered</li><li>Configure the alert severity as <strong>Warning</strong></li></ul>Which <strong>two</strong> resources should you create? Each correct answer presents part of the solution.',
opts:['An action group','An alert rule','A notification-only contact group','A secure webhook endpoint resource'],
ans:[0,1],
exp:'<strong>Azure Monitor Alerts: action group + alert rule</strong><br><br>✅ <strong>Alert Rule</strong>: Define QUÉ monitorizar y CUÁNDO disparar la alerta. Configuras: scope (recurso a monitorizar), condición (métrica/umbral o evento de Activity Log), <strong>severidad</strong> (Warning = Sev 2 o Sev 3), frecuencia de evaluación, y el action group a invocar.<br><br>✅ <strong>Action Group</strong>: Define QUÉ HACER cuando se dispara el alert rule. Configuras: notificaciones (email, SMS — controla frecuencia/cooldown para evitar spam), y <strong>acciones automáticas</strong> como llamar una Azure Function, webhook, Logic App o Automation Runbook. Un action group puede usarse en múltiples alert rules.<br><br>❌ <strong>Notification-only contact group</strong>: No es un recurso de Azure Monitor. Las notificaciones se configuran <em>dentro</em> del Action Group, no como recurso independiente.<br><br>❌ <strong>Secure webhook endpoint</strong>: Un webhook es una <em>acción</em> dentro de un Action Group (no un recurso independiente). Para llamar una Azure Function específicamente, se configura la acción "Azure Function" en el action group.<br><br>📌 <strong>Flujo</strong>: Signal (métrica/log) → Alert Rule (condición + severidad Warning) → Action Group (notificaciones + llamar Azure Function).'},

{id:106,type:'mc',cat:'Monitor & Alerts',

opts:['The Azure MMA/OMS extension (Microsoft Monitoring Agent — legacy)','The Custom Script Extension Version 2','The Azure Monitor agent for Linux','The DSC (Desired State Configuration) extension for Linux'],

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const LS='az104_dificiles_v1';
const DEF={attempted:[],failed:[],correct:0,incorrect:0,bookmarks:[]};
let st=JSON.parse(JSON.stringify(DEF));

let ex={qs:[],cur:0,ans:[],confirmed:[],peeks:[],flagged:[],ddState:[],dropSels:[],mode:'',sc:0,si:0};

function loadSt(){try{const s=localStorage.getItem(LS);if(s){const p=JSON.parse(s);st={...DEF,...p};}}catch(e){}}
function saveSt(){try{localStorage.setItem(LS,JSON.stringify(st));}catch(e){}}
function $(i){return document.getElementById(i);}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function catCls(c){
  const m={'Identity & Access':'b-blue','Networking':'b-purple','Compute & Backup':'b-amber',
           'Storage':'b-green','App Services':'b-teal','Governance & Cost':'b-amber',
           'Monitor & Alerts':'b-red','Security & KeyVault':'b-purple','Automation & Config':'b-blue','Azure General':'b-green'};
  return m[c]||'b-blue';
}

function showV(id){
  ['vh','ve','vr','vfc'].forEach(v=>$(v).classList.add('hidden'));
  $(id).classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function home(){
  loadSt();
  const tot=QB.length,att=st.attempted.length,fail=st.failed.length;
  const r=(st.correct+st.incorrect)>0?Math.round((st.correct/(st.correct+st.incorrect))*100):0;
  const col=r>=80?'var(--green)':r>=70?'var(--amber)':'var(--red)';
  $('vh').innerHTML=`
    <div class="line-accent"></div>
    <div class="g3">
      <div class="metric"><div class="metric-label">Total</div><div class="metric-value" style="color:var(--accent)">${tot}</div></div>
      <div class="metric"><div class="metric-label">Correctas</div><div class="metric-value" style="color:var(--green)">${st.correct}</div></div>
      <div class="metric"><div class="metric-label">Falladas</div><div class="metric-value" style="color:var(--red)">${st.incorrect}</div></div>
    </div>
    ${r>0?`<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">

    </div>`:''}
    <hr class="sep">
    <p class="slabel">Modo examen</p>
    <button class="mode-card" onclick="startSession('study')">
      <div class="mode-icon">📝</div>
      <div><div class="mode-title">Estudio — feedback inmediato</div><div class="mode-desc">Ves si aciertas o fallas tras cada respuesta. Explicaciones visibles al instante.</div></div>
    </button>
    <button class="mode-card" onclick="startSession('test')">
      <div class="mode-icon">🎯</div>
      <div><div class="mode-title">Test — corrección al final</div><div class="mode-desc">Responde todas las preguntas y obtén tu nota al finalizar.</div></div>
    </button>
    ${fail>0?`<button class="mode-card" onclick="startSession('review')">
      <div class="mode-icon">🔁</div>

    </button>`:''}
    <hr class="sep">
    <p class="slabel">Modo repaso</p>
    <button class="mode-card" onclick="startFlashcards('all')" style="border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.06)">
      <div class="mode-icon" style="background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3)">🃏</div>
      <div><div class="mode-title">Flashcards — todas las preguntas</div><div class="mode-desc">Repasa conceptos clave con tarjetas. Muestra la pregunta, luego revela la respuesta y explicación. Marca si la sabías o no.</div></div>
    </button>
    ${fail>0?`<button class="mode-card" onclick="startFlashcards('failed')" style="border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04)">
      <div class="mode-icon" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)">🔴</div>
      <div><div class="mode-title">Flashcards — solo fallos (${fail})</div><div class="mode-desc">Tarjetas solo con las preguntas que has fallado anteriormente.</div></div>
    </button>`:''}
