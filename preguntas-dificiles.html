function startSession(mode){
  let pool;
  if(mode==='review') pool=shuffle(QB.filter(q=>st.failed.includes(q.id)));
  else pool=shuffle(QB);

  ex={
    qs:pool, cur:0,
    ans:new Array(pool.length).fill(null),
    confirmed:new Array(pool.length).fill(false),
    peeks:new Array(pool.length).fill(false),
    flagged:new Array(pool.length).fill(false),
    ddState:pool.map(q=>q.type==='dd'?{slots:new Array(q.ans.length).fill(null),sel:null}:null),
    dropSels:pool.map(q=>q.type==='dropq'?new Array(q.dropdowns.length).fill(null):null),
    mode, sc:0, si:0
  };
  showV('ve');
  renderQ();
}

// ═══════════════════════════════════════════════════════════════
// CORRECT / ANSWERED
// ═══════════════════════════════════════════════════════════════
function isCorrect(ans,q){
  if(q.type==='hs'){
    if(!Array.isArray(ans))return false;
    return q.ans.length===ans.length&&q.ans.every((a,i)=>a===ans[i]);
  }
  if(q.type==='dd'){
    if(!Array.isArray(ans))return false;
    return q.ans.length===ans.length&&q.ans.every((a,i)=>a===ans[i]);
  }
  if(q.type==='dropq'){
    if(!Array.isArray(ans))return false;
    return q.dropdowns.every((d,i)=>ans[i]===d.ans);
  }
  if(Array.isArray(q.ans)){
    if(!Array.isArray(ans))return false;
    return q.ans.length===ans.length&&q.ans.every(a=>ans.includes(a));
  }
  return ans===q.ans;
}

function isQAnswered(i){
  const q=ex.qs[i];
  if(q.type==='dd'||q.type==='hs'||q.type==='dropq'||Array.isArray(q.ans))return ex.confirmed[i];
  return ex.ans[i]!==null;
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════════════
function renderQ(){
  const q=ex.qs[ex.cur];
  if(q.type==='dd') return renderDDQ();
  if(q.type==='hs') return renderHSQ();
  if(q.type==='dropq') return renderDropQ();
  renderMCQ();
}

// ── DOT NAV shared helper ────────────────────────────────────────
function makeDots(){
  const isStudy=ex.mode==='study'||ex.mode==='review';
  return ex.qs.map((_,i)=>{
    const qi=ex.qs[i];const answered=isQAnswered(i);
    let bg='var(--surface3)',w='16px';
    if(answered){bg=isStudy?(isCorrect(ex.ans[i],qi)?'var(--green)':'var(--red)'):'var(--accent-dim)';}
    else if(ex.peeks[i])bg='var(--amber)';
    if(ex.flagged[i])bg='var(--amber)';
    if(i===ex.cur){bg='var(--accent)';w='26px';}
    return `<button onclick="goQ(${i})" title="Q${i+1}" class="dot-q" style="width:${w};background:${bg}"></button>`;
  }).join('');
}

function makeTopBar(){
  const tot=ex.qs.length,pct=Math.round((ex.cur/tot)*100);
  const modeTag={test:'<span class="badge b-red">Test</span>',study:'<span class="badge b-blue">Estudio</span>',review:'<span class="badge b-amber">Repaso</span>'}[ex.mode];
  const q=ex.qs[ex.cur];
  const flagCls=ex.flagged[ex.cur]?'flagged':'';
  return `
    <div class="exam-top">
      <button class="btn btn-sm" onclick="askExit()">← Salir</button>
      ${modeTag}
      <span class="q-counter">${ex.cur+1}/${tot}</span>
    </div>
    <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
    <div class="dots-wrap"><div class="dots-nav">${makeDots()}</div></div>
    <div class="q-meta">
      <span class="badge ${catCls(q.cat)}">${q.cat}</span>
      <div class="ctrl-row">
        ${!isQAnswered(ex.cur)&&!ex.peeks[ex.cur]?`<button class="flag-btn" onclick="peekAnswer()" style="color:var(--amber);border-color:var(--amber-b)">👁 Ver resp.</button>`:''}
        <button class="flag-btn ${flagCls}" onclick="toggleFlag()">${ex.flagged[ex.cur]?'🚩':'🏳'} Marcar</button>
      </div>
    </div>`;
}

function makeNavHTML(done){
  const tot=ex.qs.length,isLast=ex.cur===tot-1;
  const prevBtn=ex.cur>0
    ?`<button class="btn btn-sm" onclick="goQ(${ex.cur-1})">← Anterior</button>`
    :`<button class="btn btn-sm" style="opacity:.3;cursor:default" disabled>← Anterior</button>`;
  const nextBtn=isLast
    ?`<button class="btn btn-p btn-sm" onclick="askFinish()">Finalizar ✓</button>`
    :`<button class="btn btn-sm ${done?'btn-p':''}" onclick="goQ(${ex.cur+1})">Siguiente →</button>`;
  return `<div class="nav-always">${prevBtn}<span></span>${nextBtn}</div>`;
}

function scoreAnswer(ok){
  const q=ex.qs[ex.cur];
  if(!st.attempted.includes(q.id)){
    st.attempted.push(q.id);
    if(ok){st.correct++;ex.sc++;}
    else{st.incorrect++;ex.si++;if(!st.failed.includes(q.id))st.failed.push(q.id);}
  } else {
    if(ok){ex.sc++;const fi=st.failed.indexOf(q.id);if(fi>-1)st.failed.splice(fi,1);}
    else ex.si++;
  }
  saveSt();
}

// ═══════════════════════════════════════════════════════════════
// MC RENDERER
// ═══════════════════════════════════════════════════════════════
function renderMCQ(){
  const q=ex.qs[ex.cur];
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const isMulti=Array.isArray(q.ans);
  const confirmed=ex.confirmed[ex.cur];
  const peeked=ex.peeks[ex.cur];
  const done=confirmed||peeked;
  const answered=isMulti?confirmed:(ex.ans[ex.cur]!==null);
  const pendingMulti=isMulti&&Array.isArray(ex.ans[ex.cur])?ex.ans[ex.cur]:[];
  const L='ABCDEFGHIJ'.split('');

  const multiHint=isMulti
    ?`<div style="font-size:11px;color:var(--amber);margin-bottom:8px;font-family:var(--mono);padding:6px 10px;background:var(--amber-dim);border:1px solid var(--amber-b);border-radius:6px">▣ SELECCIÓN MÚLTIPLE — Elige ${q.ans.length} opciones</div>`:'';

  const optHTML=q.opts.map((opt,i)=>{
    let cls='';
    const isDisabled=peeked||(answered&&(isStudy||isMulti));
    if(peeked){if(isMulti?q.ans.includes(i):(i===q.ans))cls='reveal-c';}
    else if(answered){
      if(isStudy||isMulti){
        if(isMulti?q.ans.includes(i):(i===q.ans))cls='correct';
        else if(isMulti?pendingMulti.includes(i):(i===ex.ans[ex.cur]))cls='wrong';
      } else {if(i===ex.ans[ex.cur])cls='selected-pending';}
    } else {
      if(isMulti&&pendingMulti.includes(i))cls='selected-pending';
      else if(!isMulti&&i===ex.ans[ex.cur])cls='selected-pending';
    }
    const clickFn=isMulti?`pickMulti(${i})`:`pick(${i})`;
    const label=isMulti
      ?`<span class="opt-l" style="border-radius:4px">${(answered&&q.ans.includes(i))||(!answered&&!peeked&&pendingMulti.includes(i))?'✓':L[i]}</span>`
      :`<span class="opt-l">${L[i]}</span>`;
    return `<button class="opt ${cls}" onclick="${clickFn}" ${isDisabled?'disabled':''}>${label}<span>${opt}</span></button>`;
  }).join('');

  let confirmBtn='';
  if(isMulti&&!answered&&!peeked){
    confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmMulti()" ${pendingMulti.length===0?'disabled':''}>Confirmar selección (${pendingMulti.length}/${q.ans.length} elegidas)</button>`;
  }

  let expHTML='';
  if(peeked){
    const corrLabel=isMulti?q.ans.map(a=>L[a]+'. '+q.opts[a]).join(' + '):(L[q.ans]+'. '+q.opts[q.ans]);
    expHTML=`<div class="exp" style="border-left-color:var(--amber)"><span class="verd vpeek">👁 RESPUESTA REVELADA — ${corrLabel}</span>${q.exp||''}</div>`;
  } else if(answered&&isStudy){
    const ok=isCorrect(ex.ans[ex.cur],q);
    const corrLabel=isMulti?q.ans.map(a=>L[a]+'. '+q.opts[a]).join(' + '):(L[q.ans]+'. '+q.opts[q.ans]);
    expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}"><span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'} — ${corrLabel}</span>${q.exp||''}</div>`;
  } else if(answered&&!isStudy){
    expHTML=`<div class="exp" style="border-left-color:var(--accent)"><span class="verd" style="color:var(--accent)">✓ Respuesta guardada.</span></div>`;
  }

  $('ve').innerHTML=`${makeTopBar()}<div class="qcard">${multiHint}${q.q}</div>${optHTML}${confirmBtn}<div id="exp-area">${expHTML}</div>${makeNavHTML(done)}`;
  scrollDot();
}

function pick(i){
  if(ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  const isStudy=ex.mode==='study'||ex.mode==='review';
  ex.ans[ex.cur]=i;
  if(isStudy){
    const ok=isCorrect(i,ex.qs[ex.cur]);
    scoreAnswer(ok);
  }
  renderMCQ();
}

function pickMulti(i){
  if(ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=[];
  const idx=ex.ans[ex.cur].indexOf(i);
  if(idx>-1)ex.ans[ex.cur].splice(idx,1);
  else ex.ans[ex.cur].push(i);
  renderMCQ();
}

function confirmMulti(){
  const q=ex.qs[ex.cur];
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=[];
  ex.confirmed[ex.cur]=true;
  scoreAnswer(isCorrect(ex.ans[ex.cur],q));
  renderMCQ();
}

// ═══════════════════════════════════════════════════════════════
// DD RENDERER
// ═══════════════════════════════════════════════════════════════
function renderDDQ(){
  const q=ex.qs[ex.cur];
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const confirmed=ex.confirmed[ex.cur];
  const peeked=ex.peeks[ex.cur];
  const done=confirmed||peeked;
  const ds=ex.ddState[ex.cur]||(ex.ddState[ex.cur]={slots:new Array(q.ans.length).fill(null),sel:null});

  const usedItems=ds.slots.filter(s=>s!==null);
  const poolHTML=q.items.map((item,idx)=>{
    const used=!done&&usedItems.includes(item);
    const sel=!done&&ds.sel===item;
    return `<div class="dd-item${used?' used':''}${sel?' selected':''}" data-didx="${idx}" onclick="clickDDItem(parseInt(this.dataset.didx))">${item}</div>`;
  }).join('');

  const slotsHTML=ds.slots.map((val,n)=>{
    let cls='dd-slot'+(val?' filled':'');
    if(done){
      if(peeked)cls='dd-slot filled';
      else if(val===q.ans[n])cls='dd-slot correct';
      else cls='dd-slot wrong';
    }
    const display=done?(peeked?q.ans[n]:(ex.ans[ex.cur]?.[n]||'(vacío)')):(val||'');
    const clickAttr=done?'':`onclick="clickDDSlot(${n})"`;
    return `<div class="${cls}" ${clickAttr}>
      <span class="dd-slot-label">Paso ${n+1}</span>
      <span class="dd-slot-val">${display||'<span style="color:var(--text-muted);font-style:italic">Toca para colocar aquí</span>'}</span>
      ${done&&!peeked&&val!==q.ans[n]?`<span style="font-size:11px;color:var(--green);margin-left:8px">→ ${q.ans[n]}</span>`:''}
    </div>`;
  }).join('');

  const allFilled=ds.slots.every(s=>s!==null);
  let confirmBtn='';
  if(!done)confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmDD()" ${allFilled?'':'disabled'}>Confirmar orden (${ds.slots.filter(s=>s).length}/${q.ans.length} colocados)</button>`;

  let expHTML='';
  if(peeked){expHTML=`<div class="exp" style="border-left-color:var(--amber)"><span class="verd vpeek">👁 RESPUESTA REVELADA</span>${q.exp||''}</div>`;}
  else if(confirmed&&isStudy){const ok=isCorrect(ex.ans[ex.cur],q);expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}"><span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'}</span>${q.exp||''}</div>`;}
  else if(confirmed&&!isStudy){expHTML=`<div class="exp" style="border-left-color:var(--accent)"><span class="verd" style="color:var(--accent)">✓ Orden guardado.</span></div>`;}

  $('ve').innerHTML=`${makeTopBar()}<div class="qcard"><div style="font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:8px;padding:5px 10px;background:rgba(99,102,241,.1);border-radius:6px;border:1px solid rgba(99,102,241,.25)">↕ DRAG & DROP — Selecciona un elemento y toca el paso donde colocarlo</div>${q.q}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-family:var(--mono)">Elementos disponibles:</div>
    <div class="dd-pool">${poolHTML}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-family:var(--mono)">Coloca en el orden correcto:</div>
    <div class="dd-slots">${slotsHTML}</div>
    ${confirmBtn}
    <div id="exp-area">${expHTML}</div>
    ${makeNavHTML(done)}`;
  scrollDot();
}

function clickDDItem(idx){
  const q=ex.qs[ex.cur];
  const item=q.items[idx];
  const ds=ex.ddState[ex.cur];
  if(!ds||ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  const slotIdx=ds.slots.indexOf(item);
  if(slotIdx>-1){ds.slots[slotIdx]=null;ds.sel=item;renderDDQ();return;}
  ds.sel=(ds.sel===item)?null:item;
  renderDDQ();
}

function clickDDSlot(n){
  const ds=ex.ddState[ex.cur];
  if(!ds||ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  if(ds.sel!==null){
    if(ds.slots[n]!==null){const prev=ds.slots[n];ds.slots[n]=ds.sel;ds.sel=prev;}
    else{ds.slots[n]=ds.sel;ds.sel=null;}
  } else if(ds.slots[n]!==null){ds.sel=ds.slots[n];ds.slots[n]=null;}
  renderDDQ();
}

function confirmDD(){
  const q=ex.qs[ex.cur];const ds=ex.ddState[ex.cur];
  if(!ds||!ds.slots.every(s=>s!==null))return;
  ex.ans[ex.cur]=[...ds.slots];
  ex.confirmed[ex.cur]=true;
  scoreAnswer(isCorrect(ex.ans[ex.cur],q));
  renderDDQ();
}

// ═══════════════════════════════════════════════════════════════
// HS RENDERER
// ═══════════════════════════════════════════════════════════════
function renderHSQ(){
  const q=ex.qs[ex.cur];
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const confirmed=ex.confirmed[ex.cur];
  const peeked=ex.peeks[ex.cur];
  const done=confirmed||peeked;
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=new Array(q.statements.length).fill(null);
  const picks=ex.ans[ex.cur];

  const rows=q.statements.map((stmt,n)=>{
    const cur=picks[n];const ans=q.ans[n];
    const mkBtn=(val)=>{
      let cls='hs-btn';
      if(done){if(peeked)cls+=(val===ans)?' reveal-correct':'';else{if(val===ans)cls+=' correct';else if(cur===val&&val!==ans)cls+=' wrong';}}
      else if(cur===val)cls+=' sel';
      return `<button class="${cls}" onclick="clickHS(${n},'${val}')" ${done?'disabled':''}>${val}</button>`;
    };
    return `<tr><td>${stmt}</td><td>${mkBtn('Yes')}</td><td>${mkBtn('No')}</td></tr>`;
  }).join('');

  const allPicked=picks.every(p=>p!==null);
  let confirmBtn='';
  if(!done)confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmHS()" ${allPicked?'':'disabled'}>Confirmar respuestas (${picks.filter(p=>p).length}/${q.statements.length})</button>`;

  let expHTML='';
  if(peeked){expHTML=`<div class="exp" style="border-left-color:var(--amber)"><span class="verd vpeek">👁 RESPUESTA REVELADA</span>${q.exp||''}</div>`;}
  else if(confirmed&&isStudy){const ok=isCorrect(ex.ans[ex.cur],q);expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}"><span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'}</span>${q.exp||''}</div>`;}
  else if(confirmed&&!isStudy){expHTML=`<div class="exp" style="border-left-color:var(--accent)"><span class="verd" style="color:var(--accent)">✓ Respuestas guardadas.</span></div>`;}

  $('ve').innerHTML=`${makeTopBar()}<div class="qcard">${q.q}</div>
    <table class="hs-table"><thead><tr><th style="text-align:left">Afirmación</th><th>Yes</th><th>No</th></tr></thead><tbody>${rows}</tbody></table>
    ${confirmBtn}<div id="exp-area">${expHTML}</div>${makeNavHTML(done)}`;
  scrollDot();
}

function clickHS(n,val){
  if(ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  if(!Array.isArray(ex.ans[ex.cur]))ex.ans[ex.cur]=new Array(ex.qs[ex.cur].statements.length).fill(null);
  ex.ans[ex.cur][n]=val;
  renderHSQ();
}

function confirmHS(){
  const q=ex.qs[ex.cur];
  ex.confirmed[ex.cur]=true;
  scoreAnswer(isCorrect(ex.ans[ex.cur],q));
  renderHSQ();
}

// ═══════════════════════════════════════════════════════════════
// DROPQ RENDERER (auto-score dropdown)
// ═══════════════════════════════════════════════════════════════
function renderDropQ(){
  const q=ex.qs[ex.cur];
  const isStudy=ex.mode==='study'||ex.mode==='review';
  const confirmed=ex.confirmed[ex.cur];
  const peeked=ex.peeks[ex.cur];
  const done=confirmed||peeked;
  if(!Array.isArray(ex.dropSels[ex.cur]))ex.dropSels[ex.cur]=new Array(q.dropdowns.length).fill(null);
  const sels=ex.dropSels[ex.cur];
  const allSelected=sels.every(s=>s!==null);

  const rowsHTML=q.dropdowns.map((d,i)=>{
    const selected=sels[i];
    let rowCls='dq-row';
    if(done&&!peeked){
      rowCls+=(selected===d.ans)?' dq-correct':' dq-wrong';
    }
    const selHTML=`<select class="dq-select" onchange="pickDrop(${i},this.value)" ${done?'disabled':''}>
      <option value="">— selecciona —</option>
      ${d.options.map((opt,j)=>`<option value="${j}" ${selected===j?'selected':''}>${opt}</option>`).join('')}
    </select>`;
    const corrNote=done&&!peeked&&selected!==d.ans?`<span style="font-size:11px;color:var(--green);margin-left:8px">→ ${d.options[d.ans]}</span>`:'';
    const peekNote=peeked?`<span style="font-size:11px;color:var(--amber);margin-left:8px">→ ${d.options[d.ans]}</span>`:'';
    return `<div class="${rowCls}"><span class="dq-label">${d.label}</span>${selHTML}${corrNote}${peekNote}</div>`;
  }).join('');

  let confirmBtn='';
  if(!done)confirmBtn=`<button class="btn btn-p" style="margin-bottom:8px" onclick="confirmDrop()" ${allSelected?'':'disabled'}>Confirmar respuestas</button>`;

  let expHTML='';
  if(peeked){expHTML=`<div class="exp" style="border-left-color:var(--amber)"><span class="verd vpeek">👁 RESPUESTA REVELADA</span>${q.exp||''}</div>`;}
  else if(confirmed&&isStudy){
    const ok=isCorrect(ex.dropSels[ex.cur],q);
    expHTML=`<div class="exp" style="border-left-color:${ok?'var(--green)':'var(--red)'}"><span class="verd ${ok?'vok':'vbad'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'}</span>${q.exp||''}</div>`;
  } else if(confirmed&&!isStudy){
    expHTML=`<div class="exp" style="border-left-color:var(--accent)"><span class="verd" style="color:var(--accent)">✓ Respuestas guardadas.</span></div>`;
  }

  $('ve').innerHTML=`${makeTopBar()}<div class="qcard">${q.q}</div>
    <div style="font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:10px;padding:5px 10px;background:rgba(59,130,246,.08);border-radius:6px;border:1px solid rgba(59,130,246,.2)">▼ DROPDOWN — Selecciona la opción correcta en cada desplegable</div>
    ${rowsHTML}${confirmBtn}
    <div id="exp-area">${expHTML}</div>${makeNavHTML(done)}`;
  scrollDot();
}

function pickDrop(i,val){
  if(ex.confirmed[ex.cur]||ex.peeks[ex.cur])return;
  if(!Array.isArray(ex.dropSels[ex.cur]))ex.dropSels[ex.cur]=new Array(ex.qs[ex.cur].dropdowns.length).fill(null);
  ex.dropSels[ex.cur][i]=val===''?null:parseInt(val);
  renderDropQ();
}

function confirmDrop(){
  const q=ex.qs[ex.cur];
  ex.ans[ex.cur]=ex.dropSels[ex.cur];
  ex.confirmed[ex.cur]=true;
  scoreAnswer(isCorrect(ex.dropSels[ex.cur],q));
  renderDropQ();
}

// ═══════════════════════════════════════════════════════════════
// FINISH / RESULTS
// ═══════════════════════════════════════════════════════════════
function finish(){
  const tot=ex.qs.length,sc=ex.sc,pct=Math.round((sc/tot)*100);
  const col=pct>=80?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
  const L='ABCDEFGHIJ'.split('');

  const rows=ex.qs.map((q,i)=>{
    const answered=isQAnswered(i);
    const ok=answered?isCorrect(ex.ans[i],q):false;
    const peeked=ex.peeks[i];
    let statusIcon=peeked?'👁':'';
    if(answered)statusIcon=ok?'✓':'✗';
    const statusCol=peeked?'var(--amber)':(answered?(ok?'var(--green)':'var(--red)'):'var(--text-muted)');

    let ansDetail='';
    if(q.type==='mc'){
      const isMulti=Array.isArray(q.ans);
      if(peeked){ansDetail=`<div>Respuesta correcta: ${isMulti?q.ans.map(a=>L[a]+'. '+q.opts[a]).join(', '):(L[q.ans]+'. '+q.opts[q.ans])}</div>`;}
      else if(answered){
        const userAns=isMulti?(Array.isArray(ex.ans[i])?ex.ans[i].map(a=>L[a]).join(', '):'—'):(ex.ans[i]!==null?L[ex.ans[i]]:'—');
        const corrAns=isMulti?q.ans.map(a=>L[a]).join(', '):L[q.ans];
        ansDetail=`<div>Tu respuesta: ${userAns} | Correcta: ${corrAns}</div>`;
      }
    } else if(q.type==='dd'){
      if(answered){
        const corrCount=ex.ans[i]?q.ans.filter((a,j)=>a===ex.ans[i][j]).length:0;
        ansDetail=`<div>${corrCount}/${q.ans.length} pasos correctos</div>`;
      } else if(peeked) ansDetail=`<div>Respuesta revelada — ver explicación</div>`;
    } else if(q.type==='hs'){
      if(answered){
        const corrCount=q.ans.filter((a,j)=>a===ex.ans[i]?.[j]).length;
        ansDetail=`<div>${corrCount}/${q.statements.length} afirmaciones correctas</div>`;
      }
    } else if(q.type==='dropq'){
      if(answered){
        const corrCount=q.dropdowns.filter((d,j)=>d.ans===ex.dropSels[i]?.[j]).length;
        ansDetail=`<div>${corrCount}/${q.dropdowns.length} selecciones correctas</div>`;
      }
    }

    return `<div class="res-row" onclick="this.querySelector('.res-detail').classList.toggle('open')">
      <span style="font-size:16px;color:${statusCol};min-width:20px">${statusIcon}</span>
      <div class="res-q">
        <span class="badge ${catCls(q.cat)}" style="font-size:9px;margin-bottom:4px;display:inline-block">${q.cat}</span><br>
        ${q.q.replace(/<[^>]+>/g,' ').substring(0,90)}…
        <div class="res-detail">
          ${ansDetail}
          <div style="margin-top:6px;color:var(--text-muted);font-size:11px">${q.exp||''}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  $('vr').innerHTML=`
    <div class="res-score">
      <div class="res-pct" style="color:${col}">${pct}%</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${sc} correctas de ${tot} | ${ex.mode==='study'?'Estudio':ex.mode==='review'?'Repaso':'Test'}</div>
    </div>
    <div class="g3">
      <div class="metric"><div class="metric-label">Correctas</div><div class="metric-value" style="color:var(--green)">${sc}</div></div>
      <div class="metric"><div class="metric-label">Falladas</div><div class="metric-value" style="color:var(--red)">${tot-sc}</div></div>
      <div class="metric"><div class="metric-label">Score</div><div class="metric-value" style="color:${col}">${pct}%</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-p btn-sm" onclick="home()">← Inicio</button>
      <button class="btn btn-sm" onclick="startSession('${ex.mode}')">🔁 Repetir</button>
    </div>
    <div class="card">
      <div class="card-title">Revisión de preguntas</div>
      ${rows}
    </div>`;
  showV('vr');
}

// ═══════════════════════════════════════════════════════════════
// FLASHCARD ENGINE
// ═══════════════════════════════════════════════════════════════
let fc={qs:[],cur:0,flipped:false,knew:0,again:0,done:[]};

function startFlashcards(mode){
  let pool;
  if(mode==='failed') pool=shuffle(QB.filter(q=>st.failed.includes(q.id)));
  else pool=shuffle([...QB]);
  fc={qs:pool,cur:0,flipped:false,knew:0,again:0,done:new Array(pool.length).fill(null)};
  showV('vfc');
  renderFC();
}

function fcAnswerHTML(q){
  const L='ABCDEFGHIJ'.split('');
  if(q.type==='mc'){
    const isMulti=Array.isArray(q.ans);
    if(isMulti){
      const correct=q.ans.map(i=>`<div style="padding:4px 0;color:#86efac">✓ ${L[i]}. ${q.opts[i]}</div>`).join('');
      const wrong=q.opts.map((o,i)=>q.ans.includes(i)?null:`<div style="padding:2px 0;color:var(--text-muted);text-decoration:line-through;font-size:12px">${L[i]}. ${o}</div>`).filter(Boolean).join('');
      return `<div style="margin-bottom:8px">${correct}${wrong}</div>`;
    } else {
      return q.opts.map((o,i)=>{
        const ok=i===q.ans;
        return `<div style="padding:3px 0;color:${ok?'#86efac':'var(--text-muted)'};${ok?'':' text-decoration:line-through;font-size:12px'}">${ok?'✓':''} ${L[i]}. ${o}</div>`;
      }).join('');
    }
  }
  if(q.type==='dd'){
    return q.ans.map((a,i)=>`<div style="padding:3px 0;color:#86efac"><span style="font-family:var(--mono);font-size:11px;color:var(--accent);margin-right:6px">Paso ${i+1}</span>${a}</div>`).join('');
  }
  if(q.type==='hs'){
    return q.statements.map((s,i)=>`<div style="padding:3px 0;font-size:13px"><span style="color:${q.ans[i]==='Yes'?'#86efac':'#fca5a5'};font-family:var(--mono);font-size:11px;margin-right:6px">${q.ans[i]}</span>${s}</div>`).join('');
  }
  if(q.type==='dropq'){
    return q.dropdowns.map(d=>`<div style="padding:3px 0"><span style="color:var(--text-muted);font-size:12px">${d.label}</span><br><span style="color:#86efac;font-size:13px">→ ${d.options[d.ans]}</span></div>`).join('<br>');
  }
  return '';
}

function renderFC(){
  if(fc.cur>=fc.qs.length){renderFCEnd();return;}
  const q=fc.qs[fc.cur];
  const tot=fc.qs.length;
  const pct=Math.round((fc.cur/tot)*100);
  const typeTag={dd:'↕ Ordenar pasos',mc:'☑ Selección múltiple',hs:'✓/✗ Sí / No',dropq:'▼ Desplegables'}[q.type]||q.type;

  const ansHTML=fcAnswerHTML(q);

  const frontH=200+Math.min(q.q.length*0.4,120);
  const backH=250+Math.min((ansHTML.length+q.exp.length)*0.3,300);
  const cardH=Math.max(frontH,backH);

  $('vfc').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px">
      <button class="btn btn-sm" onclick="home()">← Inicio</button>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">${fc.cur+1} / ${tot}</span>
      <span class="badge ${catCls(q.cat)}">${q.cat}</span>
    </div>
    <div class="prog-out" style="margin-bottom:12px"><div class="prog-in" style="width:${pct}%"></div></div>
    <div class="fc-stat-bar">
      <div class="fc-stat" style="background:rgba(34,197,94,.1);border:1px solid var(--green-b)">
        <span style="color:var(--green)">${fc.knew}</span>
        <span class="fc-stat-label">La sabía</span>
      </div>
      <div class="fc-stat" style="background:rgba(245,158,11,.08);border:1px solid var(--amber-b)">
        <span style="color:var(--amber)">${fc.qs.length-fc.cur-1}</span>
        <span class="fc-stat-label">Pendientes</span>
      </div>
      <div class="fc-stat" style="background:rgba(239,68,68,.08);border:1px solid var(--red-b)">
        <span style="color:var(--red)">${fc.again}</span>
        <span class="fc-stat-label">A repasar</span>
      </div>
    </div>

    <div class="fc-wrap" style="height:${cardH}px" onclick="fcFlip()">
      <div class="fc-inner${fc.flipped?' flipped':''}" id="fc-inner" style="min-height:${cardH}px">
        <div class="fc-face fc-front" style="min-height:${cardH}px">
          <div class="fc-hint">
            <span class="badge ${catCls(q.cat)}" style="margin-right:6px">${q.cat}</span>
            <span style="background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border)">${typeTag}</span>
          </div>
          <div class="fc-q">${q.q}</div>
          <div class="fc-tap">👆 Toca para ver la respuesta</div>
        </div>
        <div class="fc-face fc-back" style="min-height:${cardH}px">
          <div class="fc-ans-label">✅ Respuesta correcta</div>
          <div class="fc-ans-body">${ansHTML}</div>
          <div class="fc-exp-body">${q.exp||''}</div>
          ${fc.flipped?`<div class="fc-btns" onclick="event.stopPropagation()">
            <button class="fc-again" onclick="fcRate(false)">✗ No la sabía</button>
            <button class="fc-knew" onclick="fcRate(true)">✓ La sabía</button>
          </div>`:''}
        </div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:10px">
      ${fc.cur>0?`<button class="btn btn-sm" onclick="fcPrev()">← Anterior</button>`:'<span></span>'}
      <button class="btn btn-sm" style="margin-left:auto" onclick="fcSkip()">Saltar →</button>
    </div>`;
}

function fcFlip(){
  if(fc.flipped)return;
  fc.flipped=true;
  renderFC();
}

function fcRate(knew){
  fc.done[fc.cur]=knew;
  if(knew)fc.knew++;else fc.again++;
  fc.cur++;
  fc.flipped=false;
  renderFC();
}

function fcSkip(){
  fc.done[fc.cur]=null;
  fc.cur++;
  fc.flipped=false;
  renderFC();
}

function fcPrev(){
  if(fc.cur===0)return;
  if(fc.done[fc.cur-1]===true)fc.knew--;
  else if(fc.done[fc.cur-1]===false)fc.again--;
  fc.done[fc.cur-1]=null;
  fc.cur--;
  fc.flipped=false;
  renderFC();
}

function renderFCEnd(){
  const tot=fc.qs.length;
  const pct=Math.round((fc.knew/tot)*100);
  const col=pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
  const againList=fc.qs.filter((_,i)=>fc.done[i]===false);
  $('vfc').innerHTML=`
    <div class="res-score">
      <div class="res-pct" style="color:${col}">${pct}%</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px">Sesión de flashcards completada</div>
    </div>
    <div class="fc-stat-bar" style="margin-bottom:20px">
      <div class="fc-stat" style="background:rgba(34,197,94,.1);border:1px solid var(--green-b)">
        <span style="color:var(--green)">${fc.knew}</span>
        <span class="fc-stat-label">La sabía</span>
      </div>
      <div class="fc-stat" style="background:rgba(239,68,68,.08);border:1px solid var(--red-b)">
        <span style="color:var(--red)">${fc.again}</span>
        <span class="fc-stat-label">A repasar</span>
      </div>
      <div class="fc-stat" style="background:var(--surface2);border:1px solid var(--border)">
        <span style="color:var(--text-dim)">${tot}</span>
        <span class="fc-stat-label">Total</span>
      </div>
    </div>
    ${againList.length>0?`
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Preguntas a repasar (${againList.length})</div>
      ${againList.map(q=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-dim)">${q.q.replace(/<[^>]+>/g,' ').substring(0,80)}…</div>`).join('')}
    </div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-p btn-sm" onclick="home()">← Inicio</button>
      <button class="btn btn-sm" onclick="startFlashcards('all')">🔁 Repetir todas</button>
      ${fc.again>0?`<button class="btn btn-sm" style="border-color:var(--red-b);color:#fca5a5" onclick="fcRepeatFailed()">↺ Repetir fallos</button>`:''}
    </div>`;
}

function fcRepeatFailed(){
  const failed=fc.qs.filter((_,i)=>fc.done[i]===false);
  fc={qs:shuffle(failed),cur:0,flipped:false,knew:0,again:0,done:new Array(failed.length).fill(null)};
  renderFC();
}

// ── INIT ──────────────────────────────────────────────────────
loadSt();
home();
</script>
</body>
</html>
