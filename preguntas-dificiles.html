opts:['Azure Monitor REST API','Azure Diagnostics extension (on Azure VMs)','Application Insights SDK','Azure Policy custom initiative definitions'],
ans:[0,1,2],
exp:'<strong>Métodos para publicar métricas personalizadas en Azure Monitor:</strong><br><br>✅ <strong>A. Azure Monitor REST API</strong> — POST al endpoint regional de métricas con autenticación Azure AD. Método más flexible para cualquier aplicación o lenguaje.<br>✅ <strong>B. Azure Diagnostics Extension</strong> — Extensión de VM que captura contadores de rendimiento Windows/Linux y los envía como métricas personalizadas a Azure Monitor.<br>✅ <strong>C. Application Insights SDK</strong> — <code>TrackMetric()</code> y eventos personalizados se envían automáticamente a Azure Monitor via el SDK de AI.<br><br>❌ <strong>D. Azure Policy custom initiative</strong> — Las iniciativas de Policy definen reglas de cumplimiento; no emiten métricas de monitorización. Evalúan configuración, no datos de rendimiento.'},

{id:44,type:'mc',cat:'Networking',
q:'A company has an Azure Web App in Central US. The team wants to serve content globally with low latency. What is an Azure Content Delivery Network (CDN)?',
opts:['A single caching server located in the Azure Central US region','A distributed network of servers at edge locations that delivers web content efficiently from locations close to users','An Azure service exclusively for video streaming and media content','A private dedicated network that connects Azure datacenters to customers\' on-premises locations'],
ans:[1],
exp:'<strong>¿Qué es Azure CDN?</strong><br><br>✅ <strong>A. Red distribuida de servidores en ubicaciones edge que entrega contenido eficientemente</strong> — Azure CDN es una red global de Points of Presence (PoPs) que cachean contenido estático (imágenes, scripts, videos, documentos) y lo sirven desde el servidor más cercano al usuario, reduciendo latencia.<br><br>❌ <strong>B. Un único servidor de caché en Central US</strong> — Lo opuesto: la CDN tiene cientos de nodos globalmente. Un único servidor de caché no es una CDN.<br>❌ <strong>C. Solo disponible en ciertas regiones</strong> — Azure CDN tiene PoPs en decenas de ubicaciones mundiales sin restricción regional.<br>❌ <strong>D. Solo para streaming de video</strong> — Azure CDN sirve cualquier contenido HTTP/HTTPS: sitios web, descargas, APIs, imágenes. El streaming es uno de los muchos casos de uso.'},

{id:45,type:'dropq',cat:'Identity & Access',
q:'You have a Microsoft Entra tenant with the following users and groups:<br><br><strong>Users:</strong> Admin1 (Global Administrator, Assigned), Admin2 (Authentication Policy Administrator, Dynamic group membership), Admin3 (Authentication Administrator, Assigned)<br><strong>Groups:</strong> Group1 (Security, Assigned), Group2 (Microsoft 365, Dynamic), Group3 (Mail-enabled security, Assigned)<br><br>Self-service password reset (SSPR) needs to be configured. For each question, select the correct answer.',
dropdowns:[
  {label:'Which users can configure SSPR for the tenant?',options:['Admin1 only','Admin2 only','Admin3 only','Admin1 and Admin2 only','Admin1, Admin2, and Admin3'],ans:3},
  {label:'For which group can SSPR be scoped/enabled?',options:['Group1 only','Group2 only','Group1 or Group2 only','Group1 or Group3 only','Group1, Group2, or Group3'],ans:0}
],
exp:'<strong>SSPR — quién puede configurarlo y para qué grupos:</strong><br><br>✅ <strong>Configuran SSPR: Admin1 y Admin2</strong> — Solo <em>Global Administrator</em> (Admin1) y <em>Authentication Policy Administrator</em> (Admin2) pueden modificar la directiva SSPR del tenant. Admin3 (Authentication Administrator) puede resetear contraseñas manualmente pero <em>no</em> puede configurar la directiva SSPR.<br><br>✅ <strong>Grupo habilitado: solo Group1</strong> — SSPR con alcance "Grupo seleccionado" acepta únicamente <em>grupos de seguridad con membresía Assigned</em>. Group1 cumple ambas condiciones. Group2 (Microsoft 365 + Dynamic) no es válido: la membresía dinámica no es compatible. Group3 (Mail-enabled security) tampoco es válido para SSPR.<br><br>❌ <strong>Admin3</strong> — Puede resetear pero no configurar la directiva global.<br>❌ <strong>Group2 (Dynamic) o Group3 (Mail-enabled)</strong> — SSPR solo acepta Security groups con membresía estática Assigned.'},

{id:46,type:'dd',cat:'Compute & Backup',
q:'You have an Azure VM configured with Azure Disk Encryption (ADE) using customer-managed keys (CMK) stored in Azure Key Vault. You need to ensure that newly-created managed VM disks are automatically encrypted with the CMK. Which <strong>four</strong> actions should you perform in sequence?',
items:['Attach the newly created disk to the VM','Define the managed disk and reference the Disk Encryption Set in its configuration','Create an Azure Disk Encryption Set (DES) referencing the Key Vault and the specific CMK key','Download/export the managed disk configuration that references the Disk Encryption Set'],
ans:['Create an Azure Disk Encryption Set (DES) referencing the Key Vault and the specific CMK key','Define the managed disk and reference the Disk Encryption Set in its configuration','Download/export the managed disk configuration that references the Disk Encryption Set','Attach the newly created disk to the VM'],
exp:'<strong>Cifrado de discos gestionados con CMK usando Disk Encryption Set:</strong><br><br>✅ <strong>1. Crear Disk Encryption Set (DES)</strong> — Recurso Azure que vincula una clave específica del Key Vault con los discos. El Key Vault debe tener Soft delete y Purge protection habilitados.<br>✅ <strong>2. Configurar el disco gestionado referenciando el DES</strong> — Al crear/modificar el disco, especificas el DES. El disco usará CMK en lugar del cifrado por defecto de Azure (PME).<br>✅ <strong>3. Verificar la configuración del disco</strong> — Confirmas que el disco referencia correctamente el DES y que la clave del Key Vault es accesible.<br>✅ <strong>4. Conectar el disco cifrado a la VM</strong> — Una vez configurado con CMK, lo adjuntas a la VM.<br><br>❌ <strong>Adjuntar antes de configurar DES</strong> — El disco debe tener el DES configurado antes de adjuntarlo para garantizar que todos los datos escritos estén cifrados con CMK desde el primer momento.<br>❌ <strong>Confundir con ADE</strong> — ADE usa BitLocker/dm-crypt dentro de la VM. CMK con DES opera a nivel de plataforma de almacenamiento (Server-Side Encryption), no dentro del sistema operativo de la VM.'},

{id:54,type:'mc',cat:'Governance & Cost',
q:'You have an Azure Resource Manager (ARM) template named Template1 that is used to deploy Azure virtual machines. Template1 already contains the resource definition for a single VM (type, apiVersion, name, location, properties). You need to deploy <strong>two</strong> Azure virtual machines by using Template1. What should you add to Template1?',
opts:['A copy element','The API version','The Azure subscription ID','The resource group location'],
ans:[0],
exp:'<strong>ARM Templates: Desplegar múltiples instancias con copy</strong><br><br>✅ <strong>copy element</strong>: La propiedad <code>copy</code> en ARM templates permite desplegar múltiples instancias de un mismo recurso en un único despliegue. Se define así:<br><pre style="font-size:11px;background:#0a0e1a;padding:8px;border-radius:6px;margin:8px 0">"copy": {\n  "name": "vmCopy",\n  "count": 2\n}</pre>Junto con <code>[copyIndex()]</code> en el nombre para que cada VM tenga un nombre único. Es la única forma nativa de crear varias instancias del mismo recurso en un solo template sin duplicar el bloque de código.<br><br>❌ <strong>The API version</strong>: Ya está definida en el template (<code>apiVersion: "2022-04-01"</code>). Cambiarla o añadirla de nuevo no crea instancias adicionales.<br>❌ <strong>The Azure subscription ID</strong>: Ya está implícito en el contexto del despliegue. No controla el número de instancias a crear.<br>❌ <strong>The resource group location</strong>: Ya está referenciado mediante <code>[resourceGroup().location]</code>. No afecta al número de VMs desplegadas.<br><br>📌 <strong>Alternativas</strong>: También se puede usar <code>copy</code> con bucles (<em>property iteration</em>) para iterar sobre propiedades, o usar Bicep con bucles <code>for</code> que compilan internamente a la misma estructura <code>copy</code>.'},

{id:55,type:'mc',cat:'App Services',
q:'You have an Azure subscription that contains a Docker container image named container1. You plan to create a new Azure App Service web app named WebApp1. You need to ensure that you can use container1 for WebApp1. Which WebApp1 setting should you configure?',
opts:['Continuous deployment','Pricing plan','Publish','Runtime stack'],
ans:[2],
exp:'<strong>App Service: Configurar Docker container en una Web App</strong><br><br>✅ <strong>Publish</strong>: Al crear una nueva Azure App Service Web App, la primera configuración clave es <strong>Publish</strong>, que determina cómo se despliega el código. Las opciones son: <em>Code</em> (código tradicional), <em>Docker Container</em> (imagen de contenedor), y <em>Static Web App</em>. Para usar container1, debes seleccionar <strong>Docker Container</strong> como método de publicación y luego especificar la imagen y el registro de contenedor.<br><br>❌ <strong>Continuous deployment</strong>: Es una estrategia de entrega continua que actualiza la app automáticamente cuando hay cambios en el repositorio. No configura el tipo de contenido desplegado. Esta opción no está disponible directamente durante la creación cuando se usa Docker Container.<br>❌ <strong>Pricing plan</strong>: Define el nivel de recursos (CPU, memoria, escalado). No determina si la app usa una imagen de contenedor o código.<br>❌ <strong>Runtime stack</strong>: Especifica el entorno de ejecución para aplicaciones de <em>código</em> (Node.js, Python, .NET, Java, PHP). Cuando se selecciona Docker Container como Publish, la opción Runtime stack queda deshabilitada porque el runtime está dentro del propio contenedor.<br><br>📌 <strong>Flujo correcto</strong>: Crear Web App → Publish: Docker Container → Container tab → Image Source (Docker Hub, ACR, etc.) → especificar imagen container1.'},

{id:56,type:'mc',cat:'App Services',
q:'You have an Azure subscription that contains multiple resource groups and Azure App Service web apps. RG1 hosts a web app named AppService1. The App Service uses an SSL certificate. You create a resource group named RG2. You plan to move all the resources in RG1 to RG2. Which <strong>two</strong> actions should you perform? Each correct answer presents part of the solution.',
opts:['Create a new App Service plan in RG2','Create a new web app in RG2','Delete the SSL certificate from RG1','Move all the resources from RG1 without modification to RG2','Move the SSL certificate to RG2 (export and re-import it)'],
ans:[0,4],
exp:'<strong>App Service: Mover recursos con certificado SSL entre grupos de recursos</strong><br><br>✅ <strong>Crear nuevo App Service Plan en RG2</strong>: Los App Service Plans se pueden mover entre grupos de recursos, pero en ciertos escenarios (especialmente cuando el plan de origen tiene configuraciones que no son compatibles) es más limpio crear uno nuevo en el RG de destino y reasignar la Web App a él.<br>✅ <strong>Mover el certificado SSL a RG2</strong>: Los certificados SSL asociados a App Services tienen restricciones de movimiento entre grupos de recursos. El proceso correcto es: exportar el certificado (.pfx con su clave privada), eliminarlo del RG1, e importarlo en RG2. Los certificados no se pueden mover directamente con <em>Move resources</em> si están vinculados a una web app activa.<br><br>❌ <strong>Crear nueva web app en RG2</strong>: No es necesario crear una web app completamente nueva. La web app existente puede moverse al nuevo grupo de recursos manteniendo su configuración, código y datos.<br>❌ <strong>Eliminar el certificado de RG1</strong>: Eliminar sin exportar primero causaría pérdida del certificado. Primero hay que exportarlo con su clave privada.<br>❌ <strong>Mover todos los recursos sin modificación</strong>: Los recursos de App Service tienen dependencias y restricciones de movimiento. El certificado SSL requiere tratamiento especial; no se puede mover "tal cual" junto con el resto de recursos.'},

{id:57,type:'mc',cat:'Governance & Cost',
q:'You have an Azure subscription. You plan to create an Azure Policy definition named Policy1. You need to include remediation information in Policy1. To which definition section should you add the remediation information for Policy1?',
opts:['metadata','mode','parameters','policyRule'],
ans:[0],
exp:'<strong>Azure Policy: Sección metadata para información de remediación</strong><br><br>✅ <strong>metadata</strong>: La sección <code>metadata</code> de una definición de Azure Policy es el lugar correcto para incluir información descriptiva y de remediación. Puede contener campos personalizados como <code>description</code>, <code>category</code>, y anotaciones adicionales que documentan cómo remediar el incumplimiento. El portal de Azure usa esta sección para mostrar información contextual a los administradores.<br><br>❌ <strong>mode</strong>: Define el scope de los recursos que evalúa la política: <code>All</code> (todos los tipos de recursos, incluyendo grupos de recursos y suscripciones) o <code>Indexed</code> (solo recursos que soportan tags y location). No contiene información de remediación.<br>❌ <strong>parameters</strong>: Permite hacer la política reutilizable y configurable mediante valores parametrizables (ej. lista de regiones permitidas, SKUs, etc.). No es el lugar para información de remediación.<br>❌ <strong>policyRule</strong>: Contiene la lógica de evaluación (<code>if</code>/<code>then</code>) y el efecto a aplicar (Audit, Deny, DeployIfNotExists, Modify). Aunque <code>DeployIfNotExists</code> ejecuta remediación automática, la <em>información</em> sobre cómo remediar manualmente se documenta en <code>metadata</code>.<br><br>📌 <strong>Estructura básica</strong>: Una definición de política tiene: <code>displayName</code>, <code>description</code>, <code>mode</code>, <code>metadata</code>, <code>parameters</code> y <code>policyRule</code>.'},

{id:58,type:'mc',cat:'Networking',
q:'You have an Azure subscription that contains a virtual network named VNet1. You plan to enable VNet1 connectivity to on-premises resources by using an <strong>encrypted connection</strong>. What should you configure for VNet1?',
opts:['A private endpoint connection','A public IP address on VNet1','A virtual network gateway','Internal routing only'],
ans:[2],
exp:'<strong>Virtual Network Gateway: Conectividad cifrada con recursos on-premises</strong><br><br>✅ <strong>Virtual network gateway</strong>: Un VPN Gateway es un tipo de puerta de enlace de red virtual que envía tráfico <strong>cifrado</strong> entre una red virtual de Azure y una ubicación on-premises a través de una conexión pública (Internet). El cifrado se realiza mediante IPsec/IKE. Para crearlo se necesita: una Gateway Subnet en VNet1, una IP pública para el gateway, un local network gateway (representando el lado on-premises) y la conexión VPN. También puede usarse para conectar VNets entre sí con tráfico cifrado.<br><br>❌ <strong>Private endpoint connection</strong>: Los Private Endpoints proporcionan acceso privado a servicios PaaS de Azure (Storage, SQL, etc.) dentro de la red virtual. No establecen conectividad con recursos on-premises ni crean túneles cifrados hacia redes externas.<br>❌ <strong>Public IP address on VNet1</strong>: Las VNets no tienen IPs públicas directamente. Las IPs públicas se asignan a recursos individuales (VMs, Load Balancers, Gateways). Asignar una IP pública a un recurso dentro de VNet1 no crea conectividad cifrada con on-premises.<br>❌ <strong>Internal routing only</strong>: El enrutamiento interno de Azure gestiona el tráfico dentro de la red virtual y entre VNets. No extiende la conectividad cifrada hacia infraestructura on-premises.<br><br>📌 <strong>Alternativa premium</strong>: Azure ExpressRoute también conecta on-premises con Azure pero mediante circuito privado dedicado (no a través de Internet), con mayor ancho de banda y menor latencia.'},

{id:59,type:'mc',cat:'Networking',
q:'You have an Azure subscription that contains network security groups (NSGs). Which <strong>two</strong> resources can be associated with an NSG? Each correct answer presents a complete solution.',
opts:['Virtual networks','Network interfaces','Subnets','Virtual machines directly','Route tables'],
ans:[1,2],
exp:'<strong>NSG: Recursos con los que se puede asociar</strong><br><br>✅ <strong>Network interfaces (NIC)</strong>: Un NSG puede asociarse directamente a una interfaz de red de una VM. Las reglas se aplican únicamente al tráfico de esa interfaz específica, permitiendo un control granular por VM individual.<br>✅ <strong>Subnets</strong>: Un NSG puede asociarse a una subred dentro de una VNet. Las reglas ACL del NSG se aplican a <strong>todas</strong> las instancias de VM dentro de esa subred, proporcionando protección centralizada para un segmento de red completo.<br><br>❌ <strong>Virtual networks</strong>: Los NSGs NO pueden asociarse directamente a una VNet completa. Se asocian a las subredes dentro de la VNet o a las NICs individuales. Si quieres proteger toda una VNet, debes asociar el NSG a cada subred.<br>❌ <strong>Virtual machines directly</strong>: Las VMs no se asocian directamente con NSGs. La protección llega a la VM a través de su NIC (que puede tener un NSG) o de la subred donde reside (que puede tener un NSG). Una VM puede tener protección de ambos niveles simultáneamente.<br>❌ <strong>Route tables</strong>: Las tablas de rutas (UDR - User Defined Routes) son un recurso separado que se asocia a subredes para controlar el enrutamiento del tráfico. No tienen relación de asociación con NSGs.<br><br>📌 <strong>Orden de evaluación</strong>: Cuando un NSG está en la NIC Y en la subred, Azure evalúa primero el NSG de la subred para tráfico entrante, luego el de la NIC. Para tráfico saliente, primero el de la NIC y luego el de la subred.'},

{id:60,type:'mc',cat:'Networking',
q:'Your company has deployed an Azure Load Balancer to distribute traffic across multiple VMs in a web farm. Users report intermittent connection timeouts when accessing the web app. You need to resolve the traffic distribution issues and ensure even traffic distribution by the load balancer. What should you do?',
opts:['Change the distribution mode to five-tuple hash','Configure a health probe for the load balancer','Enable session persistence with source IP affinity','Upgrade the load balancer to a higher SKU'],
ans:[1],
exp:'<strong>Azure Load Balancer: Health Probes para distribución correcta del tráfico</strong><br><br>✅ <strong>Configurar un health probe</strong>: Un health probe permite al Load Balancer detectar automáticamente cuándo una VM está no disponible o no responde correctamente. Si una VM falla la verificación de salud (no responde en el puerto/protocolo configurado), el LB deja de enviarle tráfico hasta que vuelva a estar disponible. Esto elimina los timeouts porque el tráfico solo llega a instancias sanas. Se puede configurar como TCP, HTTP o HTTPS probe con intervalo y umbral de fallos personalizables.<br><br>❌ <strong>Cambiar a five-tuple hash</strong>: El five-tuple hash (IP origen, IP destino, puerto origen, puerto destino, protocolo) es el modo de distribución predeterminado del Azure Load Balancer. Cambiarlo no resolverá timeouts causados por VMs no saludables.<br>❌ <strong>Session persistence (source IP affinity)</strong>: La persistencia de sesión dirige las peticiones del mismo cliente siempre a la misma VM. Esto puede <em>empeorar</em> la distribución del tráfico (ya no es uniforme) y no resuelve los timeouts si esa VM tiene problemas.<br>❌ <strong>Upgrade a higher SKU</strong>: El SKU Standard ya incluye health probes y distribución avanzada. Subir de Basic a Standard podría dar más funcionalidades, pero si el problema es la falta de health probe, configurarlo en el SKU actual es la solución directa y correcta.<br><br>📌 <strong>Tipos de health probe</strong>: TCP (verifica conexión en puerto), HTTP/HTTPS (verifica código de respuesta HTTP 200). Se recomienda HTTP/HTTPS para aplicaciones web ya que verifica la lógica de la aplicación, no solo la red.'},

{id:61,type:'mc',cat:'Networking',
q:'An organization uses a Microsoft Azure Standard Load Balancer to distribute traffic across multiple virtual machines (VMs) in a backend pool. Users report intermittent connectivity issues with applications on these VMs. You need to troubleshoot and resolve the connectivity issues. Which <strong>three</strong> actions should you perform? Each correct answer presents part of the solution.',
opts:['Check the health probe configuration','Ensure the VMs are responding on the configured load balancing port','Increase the VM SKU to a higher size','Modify the session persistence setting','Restart the VMs','Verify that NSG rules allow the required inbound traffic'],
ans:[0,1,5],
exp:'<strong>Azure Standard Load Balancer: Resolución de problemas de conectividad</strong><br><br>✅ <strong>Comprobar la configuración del health probe</strong>: Si el health probe no está correctamente configurado (puerto incorrecto, protocolo equivocado, umbrales muy bajos), el LB puede marcar VMs saludables como no disponibles o viceversa, causando problemas de conectividad intermitentes.<br>✅ <strong>Verificar que las VMs responden en el puerto configurado</strong>: El backend pool solo distribuye tráfico a VMs que responden correctamente en el puerto definido en las reglas de balanceo. Si la aplicación no está escuchando en ese puerto o ha fallado, las conexiones se agotarán (timeout).<br>✅ <strong>Verificar que las reglas NSG permiten el tráfico entrante</strong>: El Azure Standard Load Balancer requiere que los NSGs asociados a las NICs o subredes de las VMs del backend <strong>permitan explícitamente</strong> el tráfico desde el LB. Si las reglas NSG bloquean el tráfico, las conexiones fallarán aunque el LB funcione correctamente.<br><br>❌ <strong>Aumentar el SKU de las VMs</strong>: Subir el tamaño de las VMs aumenta CPU/memoria/red, pero no resuelve problemas de configuración del LB, NSG o disponibilidad de la aplicación. Los timeouts intermitentes raramente se deben a falta de recursos de la VM.<br>❌ <strong>Modificar la persistencia de sesión</strong>: Cambiar entre None, Client IP o Client IP+Protocol afecta la distribución del tráfico, pero no resuelve problemas de conectividad. Podría incluso empeorarlos al concentrar tráfico en VMs con problemas.<br>❌ <strong>Reiniciar las VMs</strong>: El reinicio puede resolver problemas transitorios de la aplicación, pero no es una solución de troubleshooting estructurada. No aborda la causa raíz (configuración del LB, NSG o health probe) y puede causar downtime innecesario.<br><br>📌 <strong>Nota importante sobre Standard LB</strong>: A diferencia del Basic SKU, el Standard Load Balancer es seguro por defecto — bloquea todo el tráfico entrante que no esté explícitamente permitido por NSG. Esto es una causa frecuente de problemas de conectividad al migrar de Basic a Standard.'},

{id:47,type:'mc',cat:'Storage',
q:'To maintain seamless access control, Azure Files requires two distinct layers of authorization: a high-level gatekeeper and a granular file/directory permission system. Which <strong>two</strong> components correctly represent these two authorization layers in Azure Files?',
opts:['Share-level permissions managed through Azure RBAC using Microsoft Entra ID (identity-based or key-based)','File-level permissions managed through Windows Access Control Lists (ACLs / NTFS permissions)','Network-level access controlled by Network Security Groups (NSGs)','Disk-level encryption managed through Azure Disk Encryption (ADE)'],
ans:[0,1],
exp:'<strong>Azure Files: Modelo de autorización de dos capas</strong><br><br>✅ <strong>Capa 1 — Permisos a nivel de recurso compartido (Share-level)</strong>: Se gestionan a través de Azure RBAC con Microsoft Entra ID. Definen el acceso <em>inicial</em> al recurso compartido (quién puede conectarse). Se asignan roles como "Storage File Data SMB Share Contributor" a usuarios o grupos de Entra ID.<br>✅ <strong>Capa 2 — Permisos a nivel de archivo/directorio (File-level)</strong>: Se gestionan mediante Windows ACLs (Access Control Lists) / permisos NTFS. Controlan el acceso <em>granular</em> dentro del recurso compartido: qué archivos y carpetas puede ver o modificar cada usuario una vez dentro.<br><br>❌ <strong>NSGs</strong>: Controlan el tráfico de red a nivel de subred o interfaz de red. No forman parte del modelo de autorización de Azure Files para archivos y directorios.<br>❌ <strong>Azure Disk Encryption (ADE)</strong>: Tecnología de cifrado de datos en reposo para discos de VM usando BitLocker/dm-crypt. No es un mecanismo de autorización de acceso a archivos.<br><br>📌 <strong>Flujo completo</strong>: Autenticación con Entra ID o AD DS (Kerberos) → Verificación de permisos de nivel de recurso compartido (Share-level RBAC) → Aplicación de ACLs de nivel de archivo/directorio (File-level NTFS).'},

{id:48,type:'mc',cat:'Storage',
q:'Your team uses .NET and needs to transfer large amounts of data to Azure Blob Storage efficiently. The solution must support chunked uploads, automatic retries, and parallel transfers to maximize throughput — all integrated within application code. Which Azure solution should you use?',
opts:['Azure Blob Storage client library for .NET','AzCopy command-line tool','Azure Data Box physical device','Azure Storage Explorer (GUI application)'],
ans:[0],
exp:'<strong>Azure Blob Storage client library for .NET: Subida eficiente de grandes archivos</strong><br><br>✅ <strong>Azure Blob Storage client library for .NET</strong>: Librería programática oficial del SDK de Azure para .NET. Proporciona: subida por bloques (<em>block blobs</em>) con chunking automático, reintentos automáticos configurables mediante políticas de resiliencia, transferencias paralelas con concurrencia configurable, control total del flujo directamente desde código .NET. Ideal para aplicaciones que necesitan integrar la lógica de subida de archivos como parte de su propio código.<br><br>❌ <strong>AzCopy</strong>: Excelente herramienta de línea de comandos para transferencias manuales o scripts de administración, pero NO es una librería integrable en código .NET. Es un ejecutable externo, no un SDK.<br>❌ <strong>Azure Data Box</strong>: Dispositivo físico para migración offline de grandes volúmenes (terabytes/petabytes). Se envía físicamente a Microsoft. No sirve para subidas programáticas desde aplicaciones en tiempo real.<br>❌ <strong>Azure Storage Explorer</strong>: Aplicación de escritorio con interfaz gráfica para gestionar recursos de Storage manualmente. Es una herramienta de administración, no una librería para integrar en aplicaciones.'},

{id:49,type:'mc',cat:'Networking',
q:'A company has an Azure Web App deployed in Central US. After deployment, they need to improve the response time for users located all around the world. Which of the following solutions should they implement?',
opts:['Scale out the App Service Plan by adding more instances in Central US','Enable Azure Content Delivery Network (CDN) for the Web App','Move the Web App to East US region','Configure Azure Traffic Manager with geographic routing'],
ans:[1],
exp:'<strong>Azure CDN: Mejora de rendimiento global para Web Apps</strong><br><br>✅ <strong>Azure CDN (Content Delivery Network)</strong>: Red de distribución de contenido que almacena en caché el contenido estático (imágenes, CSS, JS, vídeos) en servidores perimetrales (<em>edge nodes / POPs</em>) distribuidos por todo el mundo. Los usuarios reciben el contenido desde el nodo más cercano geográficamente, reduciendo drásticamente la latencia. Es la solución estándar y más eficiente para mejorar el rendimiento de aplicaciones web para usuarios globales.<br><br>❌ <strong>Scale out en Central US</strong>: Agregar más instancias en la misma región aumenta la capacidad de proceso, pero NO mejora la latencia geográfica. Un usuario en Asia seguirá experimentando alta latencia.<br>❌ <strong>Mover a East US</strong>: Cambiar de región solo mejora el acceso para usuarios en la costa este de EE.UU., pero puede empeorar para usuarios en otras zonas. No es una solución global.<br>❌ <strong>Azure Traffic Manager</strong>: Servicio de enrutamiento DNS inteligente que dirige tráfico a distintas regiones, pero requiere desplegar la aplicación en múltiples regiones y no cachea contenido. CDN es más eficiente y económico para este escenario cuando la app está en una sola región.<br><br>📌 <strong>¿Qué es Azure CDN?</strong> Es una red distribuida de servidores que entrega contenido web eficientemente a usuarios de todo el mundo minimizando la latencia al servir desde el nodo más cercano.'},

{id:50,type:'mc',cat:'Governance & Cost',
q:'You need to implement Azure Policy across your organization to ensure resources comply with corporate standards. Which <strong>two</strong> statements correctly describe Azure Policy capabilities?',
opts:['Azure Policy provides built-in policy definitions that address common compliance scenarios without requiring custom code','Custom policy definitions cannot be created; only Microsoft built-in definitions are available','Azure Policy continuously evaluates resources and displays a compliance dashboard showing compliant vs. non-compliant resources with a compliance rating','Azure Policy assignments can only be applied at the subscription level, not at management group or resource group scope'],
ans:[0,2],
exp:'<strong>Azure Policy: Características y capacidades clave</strong><br><br>✅ <strong>Definiciones de política integradas (built-in)</strong>: Azure proporciona cientos de definiciones predefinidas que cubren escenarios comunes: forzar cifrado en reposo, requerir etiquetas, restringir regiones de despliegue, limitar SKUs de VM, aplicar configuraciones de diagnóstico, etc. No necesitas escribir código desde cero para los requisitos más comunes de cumplimiento.<br>✅ <strong>Panel de cumplimiento (Compliance Dashboard)</strong>: Azure Policy evalúa continuamente los recursos y muestra en tiempo real: porcentaje de cumplimiento global, recursos conformes vs. no conformes, desglose por iniciativa/política y por recurso. Facilita la auditoría continua y la mejora del estado de cumplimiento.<br><br>❌ <strong>No se pueden crear políticas personalizadas</strong>: INCORRECTO. Azure Policy soporta completamente la creación de definiciones personalizadas usando JSON con condiciones, efectos (Audit, Deny, DeployIfNotExists, Modify, Append) y parámetros configurables para adaptar las políticas a requisitos específicos de tu organización.<br>❌ <strong>Solo a nivel de suscripción</strong>: INCORRECTO. Las asignaciones pueden aplicarse a: Grupo de Gestión (hereda a múltiples suscripciones), Suscripción, Grupo de Recursos o Recurso individual. Los Management Groups son clave para aplicar políticas corporativas a toda la organización.'},

{id:51,type:'mc',cat:'Monitor & Alerts',
q:'You have an Azure App Service web application and need to implement performance monitoring to track key application metrics including response time, HTTP requests per second, and failed requests — with the ability to set performance alerts and view traces. Which Azure service should you use?',
opts:['Azure Application Insights','Azure Network Watcher','Azure Monitor platform metrics (built-in only)','Azure Advisor'],
ans:[0],
exp:'<strong>Azure Application Insights: Monitoreo de rendimiento de aplicaciones</strong><br><br>✅ <strong>Azure Application Insights</strong>: Servicio de APM (Application Performance Monitoring) diseñado específicamente para monitorear aplicaciones web. Proporciona: tiempo de respuesta de solicitudes HTTP, tasa de solicitudes y fallos por segundo, trazas distribuidas y excepciones de código, dependencias (llamadas a bases de datos, APIs externas), mapa de aplicación visual, detección de anomalías automática (<em>Smart Detection</em>), y alertas configurables por métrica. Se integra nativamente con Azure App Service con un solo clic.<br><br>❌ <strong>Azure Network Watcher</strong>: Servicio para diagnóstico y monitoreo de redes: captura de paquetes, diagnóstico de VPN, verificación de flujo IP. NO proporciona métricas de rendimiento de aplicaciones como tiempo de respuesta o tasa de HTTP requests.<br>❌ <strong>Azure Monitor platform metrics</strong>: Proporciona métricas de infraestructura básicas (CPU, memoria, conexiones HTTP). Aunque muestra algunas métricas de App Service, no ofrece el nivel de detalle de telemetría de aplicación que Application Insights brinda (trazas de código, excepciones, dependencias, mapas de aplicación).<br>❌ <strong>Azure Advisor</strong>: Servicio de recomendaciones proactivas de mejores prácticas (rendimiento, seguridad, costos, fiabilidad). No es un servicio de monitoreo activo; proporciona sugerencias basadas en análisis del uso, no telemetría en tiempo real de la aplicación.'},

{id:52,type:'mc',cat:'Monitor & Alerts',
q:'You need to review the status of your Azure Backup jobs and receive automated notifications when backups fail or complete. Which Azure service should you configure to implement this monitoring solution?',
opts:['Azure Monitor (with Azure Backup alerts and Log Analytics)','Azure Advisor','Azure Service Health','Azure Resource Health'],
ans:[0],
exp:'<strong>Azure Monitor: Monitoreo y alertas para Azure Backup</strong><br><br>✅ <strong>Azure Monitor</strong>: Es el servicio correcto para monitorear Azure Backup. Permite: configurar reglas de alerta basadas en el estado de trabajos de backup (completado, fallido, advertencia), crear Action Groups para enviar notificaciones por email, SMS, webhook o llamada de voz, consultar historial detallado de backup en Log Analytics con KQL, crear dashboards con el estado de todos los jobs, y configurar diagnósticos de Azure Backup para enviar logs a un workspace de Log Analytics. Desde Azure Backup Center se pueden gestionar alertas de forma centralizada integradas con Azure Monitor.<br><br>❌ <strong>Azure Advisor</strong>: Proporciona recomendaciones proactivas de mejores prácticas (ej. "Configura backup para esta VM no protegida"), pero NO monitorea el estado en tiempo real de trabajos de backup individuales ni envía notificaciones cuando un job falla.<br>❌ <strong>Azure Service Health</strong>: Proporciona información sobre incidentes de la plataforma Azure (interrupciones, mantenimiento planificado, avisos de salud del servicio). No monitorea los trabajos de backup específicos de tu suscripción.<br>❌ <strong>Azure Resource Health</strong>: Informa sobre la disponibilidad de recursos individuales de Azure (si una VM está disponible o degradada). No rastrea el estado de trabajos de Azure Backup ni envía notificaciones de fallos de backup.'},

{id:53,type:'mc',cat:'Compute & Backup',
q:'You need to review the status of your Azure Backup plans and receive notifications for all failed or completed backups using the native Azure Backup monitoring capabilities available directly in the Azure portal. Which solution should you configure?',
opts:['Azure Backup Center with built-in backup alerts','Azure Log Analytics workspace with custom KQL queries','Azure Network Watcher','Azure Activity Log only'],
ans:[0],
exp:'<strong>Azure Backup Center: Monitoreo nativo centralizado de backups</strong><br><br>✅ <strong>Azure Backup Center + Alertas integradas</strong>: Azure Backup Center es el panel unificado nativo del portal que proporciona: vista centralizada del estado de todos los trabajos de backup (completados, fallidos, en progreso), gestión de políticas de backup activas, visión de instancias protegidas y no protegidas, alertas integradas configurables para notificaciones de fallos sin necesidad de servicios adicionales, y acceso directo a informes de backup. Es la solución más directa y nativa para revisar el estado de los planes de backup desde el portal Azure.<br><br>❌ <strong>Azure Log Analytics con KQL</strong>: Solución muy poderosa para análisis avanzado y retención a largo plazo, pero requiere configuración adicional: habilitar diagnósticos, definir consultas KQL personalizadas, crear dashboards. No es la opción "nativa" más inmediata para revisar el estado de backup.<br>❌ <strong>Azure Network Watcher</strong>: Servicio de diagnóstico y monitoreo de redes. No tiene ninguna relación con el monitoreo de Azure Backup.<br>❌ <strong>Azure Activity Log únicamente</strong>: Registra operaciones de plano de control (quién realizó qué acción sobre qué recurso), pero no proporciona el estado detallado de los trabajos de backup individuales ni notificaciones proactivas de fallos de backup.<br><br>📌 <strong>Azure Monitor vs. Backup Center</strong>: Para alertas avanzadas con integración de Action Groups y análisis KQL → Azure Monitor. Para una revisión rápida nativa del estado de backup con alertas básicas integradas → Azure Backup Center.'},

{id:82,type:'mc',cat:'App Services',
q:'A company has deployed a web application across a set of Azure virtual machines. The web application will be used by customers across the world. The company needs to optimize the response times and support a high number of simultaneous connections from global users. Which Azure resource would best support this requirement?',
opts:['Azure Availability Set','Azure Site Recovery','Azure App Service Plan with autoscale','Azure Virtual Machine Scale Set (VMSS)'],
ans:[3],
exp:'<strong>Azure Virtual Machine Scale Set (VMSS): Soporte para múltiples conexiones globales</strong><br><br>✅ <strong>Azure Virtual Machine Scale Set (VMSS)</strong>: Permite desplegar y gestionar automáticamente un conjunto de VMs idénticas. Cuando la demanda aumenta (más conexiones globales), VMSS escala automáticamente el número de VMs hacia arriba; cuando disminuye, reduce las instancias. Es la solución idónea para aplicaciones web en VMs que necesitan soportar un alto número de conexiones simultáneas de usuarios globales, ya que aumenta la capacidad de proceso horizontalmente.<br><br>❌ <strong>Azure Availability Set</strong>: Garantiza alta disponibilidad distribuyendo las VMs entre diferentes dominios de fault y update dentro de un datacenter. No escala el número de VMs ni mejora el rendimiento para usuarios globales; solo protege contra fallos de hardware/mantenimiento en una región.<br>❌ <strong>Azure Site Recovery</strong>: Servicio de recuperación ante desastres (DR) que replica VMs a una región secundaria. No tiene relación con el rendimiento o el número de conexiones simultáneas.<br>❌ <strong>Azure App Service Plan</strong>: Es para aplicaciones web gestionadas por Azure (PaaS), no para aplicaciones en VMs (IaaS). El enunciado especifica que la app está en VMs, por lo que App Service Plan no aplica directamente.<br><br>📌 <strong>VMSS + Load Balancer + Traffic Manager</strong>: Para una arquitectura global completa con VMs: VMSS en múltiples regiones + Azure Load Balancer para distribución dentro de región + Azure Traffic Manager para enrutamiento global basado en latencia.'},

{id:83,type:'dropq',cat:'Identity & Access',
q:'You have an Azure subscription with Microsoft Entra ID (Azure AD). You have an on-premises Windows computer named PC1 that is already joined to an on-premises Active Directory domain. You need to also register PC1 with Microsoft Entra ID so that users can access both on-premises and cloud resources using a single identity, without leaving the on-premises domain.<br><br>Complete the following statements by selecting the correct values:<br><br><strong>Statement 1:</strong> The resulting device join state for PC1 will be [▼ Dropdown 1].<br><strong>Statement 2:</strong> To configure this join state at scale for all domain-joined computers, you should use [▼ Dropdown 2].',
dropdowns:[
{label:'Dropdown 1 — Estado de registro del dispositivo',options:['Azure AD Joined','Hybrid Azure AD Joined','Azure AD Registered (Workplace Join)','Domain Joined only'],ans:1},
{label:'Dropdown 2 — Herramienta de configuración',options:['Microsoft Entra Connect (Azure AD Connect) Hybrid configuration','Azure AD Direct Federation','Azure AD Conditional Access policy','Azure AD SSPR policy'],ans:0}
],
exp:'<strong>Hybrid Azure AD Join: Registro de equipos on-premises en Entra ID</strong><br><br>✅ <strong>Dropdown 1 → Hybrid Azure AD Joined</strong>: Cuando un dispositivo está unido a un dominio de AD on-premises Y también registrado en Microsoft Entra ID, su estado es <em>Hybrid Azure AD Joined</em>. El dispositivo mantiene su membresía en el dominio on-premises y a la vez tiene una identidad en Entra ID. Esto permite a los usuarios acceder tanto a recursos on-premises (con Kerberos) como a recursos cloud (con tokens de Entra ID) usando las mismas credenciales.<br>✅ <strong>Dropdown 2 → Microsoft Entra Connect (AAD Connect) Hybrid configuration</strong>: La configuración de Hybrid Azure AD Join a escala se realiza mediante el asistente de configuración de <strong>Microsoft Entra Connect</strong> (antes Azure AD Connect). Entra Connect sincroniza los objetos de equipo del AD on-premises con Entra ID y habilita el proceso de registro automático de dispositivos (Auto Device Registration via GPO o Intune).<br><br>❌ <strong>Azure AD Joined</strong>: Estado para dispositivos gestionados puramente en la nube (no unidos a AD on-premises). El dispositivo abandona el dominio on-premises.<br>❌ <strong>Azure AD Registered</strong>: Estado para dispositivos BYOD (personal). El usuario inicia sesión con una cuenta Microsoft o corporativa pero el dispositivo no es "corporate-owned" ni está en el dominio.<br>❌ <strong>Direct Federation / Conditional Access</strong>: Direct Federation es para proveedores de identidad externos (SAML). Conditional Access controla el acceso condicional, no el estado de unión del dispositivo.'},

{id:84,type:'mc',cat:'Identity & Access',
q:'You have a Microsoft Entra tenant. You need to configure Self-Service Password Reset (SSPR). You must identify which administrator roles can configure SSPR and what type of group can be used to scope SSPR to a subset of users.<br><br>Which statement is correct?',
opts:['Global Administrators and User Administrators can configure SSPR, and it can be scoped to Security groups with Dynamic membership','Only Global Administrators can configure SSPR, and it can be scoped to any group type','Global Administrators and Authentication Policy Administrators can configure SSPR, and it can be scoped only to Security groups with Assigned membership','Authentication Administrators and Security Administrators can configure SSPR, and it can be scoped to Microsoft 365 groups'],
ans:[2],
exp:'<strong>SSPR: Roles de administrador y tipos de grupo compatibles</strong><br><br>✅ <strong>Global Administrator + Authentication Policy Administrator → Security group (Assigned)</strong>: Son los dos roles que pueden configurar las opciones de SSPR en el tenant (habilitar, deshabilitar, configurar métodos de autenticación). Para limitar el SSPR a un subconjunto de usuarios, solo se pueden usar <strong>grupos de Seguridad con membresía Assigned</strong> (no Dynamic, no Microsoft 365, no Mail-enabled).<br><br>❌ <strong>User Administrator</strong>: Puede gestionar usuarios y grupos, pero no tiene permisos para configurar SSPR a nivel de tenant.<br>❌ <strong>Dynamic membership groups</strong>: Azure SSPR no permite usar grupos con membresía dinámica como scope. Los grupos dinámicos cambian automáticamente y no son compatibles con el scope de SSPR.<br>❌ <strong>Authentication Administrator</strong>: Puede restablecer contraseñas de usuarios no administradores, pero no puede configurar las opciones de SSPR del tenant.<br>❌ <strong>Security Administrator</strong>: Gestiona políticas de seguridad, pero no tiene permisos específicos para configurar SSPR.<br>❌ <strong>Microsoft 365 groups</strong>: No son compatibles como scope de SSPR. Solo grupos de Seguridad con membresía Assigned.<br><br>📌 <strong>Resumen rápido SSPR</strong>: ¿Quién CONFIGURA? → Global Admin + Authentication Policy Admin. ¿Para quién se HABILITA? → All users, Selected (Security/Assigned group), o None.'},

{id:85,type:'mc',cat:'Storage',
q:'You plan to create an Azure Storage account that meets all of the following requirements:<br>• Must support <strong>Azure Data Lake Storage Gen2</strong> (hierarchical namespace)<br>• Must provide <strong>maximum redundancy</strong> to protect against a continental-scale disaster<br>• Must support <strong>lifecycle management policies</strong><br><br>Which redundancy configuration should you select when creating the storage account?',
opts:['Locally-redundant storage (LRS)','Zone-redundant storage (ZRS)','Geo-redundant storage (GRS)','Geo-zone-redundant storage (GZRS)'],
ans:[3],
exp:'<strong>GZRS: Máxima redundancia + ADLS Gen2 + Lifecycle Management</strong><br><br>✅ <strong>Geo-zone-redundant storage (GZRS)</strong>: Es la opción de máxima redundancia que combina: redundancia de zona (3 AZs en la región primaria → protege contra fallos de datacenter) + redundancia geográfica (copia asíncrona en una región secundaria a cientos de km → protege contra desastres continentales). La cuenta debe ser de tipo <strong>StorageV2 (General-purpose v2)</strong> con GZRS para soportar: ADLS Gen2 (hierarchical namespace), lifecycle management policies, y máxima disponibilidad.<br><br>❌ <strong>LRS (Locally-redundant)</strong>: 3 copias en el mismo datacenter. No protege contra fallos de zona ni desastres continentales. Mínima redundancia.<br>❌ <strong>ZRS (Zone-redundant)</strong>: 3 copias en 3 zonas de disponibilidad de la misma región. Protege contra fallos de datacenter/zona, pero NO protege contra un desastre que afecte toda la región (continental).<br>❌ <strong>GRS (Geo-redundant)</strong>: Copia en región secundaria + 3 copias LRS en la primaria. Ofrece redundancia geográfica, pero NO redundancia de zona en la región primaria. Menos redundante que GZRS ante fallos de zona.<br><br>📌 <strong>Comparativa de redundancia</strong> (de menor a mayor):<br>LRS (3 copias, 1 DC) → ZRS (3 AZ) → GRS (2 regiones, LRS) → GZRS (2 regiones, ZRS en primaria) → RA-GZRS (GZRS + acceso de lectura a secundaria)'},

{id:86,type:'mc',cat:'Identity & Access',
q:'You have a Microsoft Entra tenant named contoso.com. You have an on-premises Active Directory domain and an on-premises computer named PC1 joined to that domain. A user named User1 authenticates to PC1 using on-premises AD credentials. You need to ensure that User1 can sign in to Microsoft 365 and Azure cloud services using the <strong>same username and password</strong> they use for PC1, without creating separate cloud passwords. What should you configure?',
opts:['From Conditional Access, configure a sign-in risk policy','Configure Microsoft Entra Connect (Azure AD Connect) with Password Hash Sync or Pass-Through Authentication','Configure Microsoft Entra Domain Services (AADDS)','Enable Microsoft Entra ID P2 and configure Privileged Identity Management (PIM)'],
ans:[1],
exp:'<strong>Microsoft Entra Connect: Mismas credenciales on-premises y cloud</strong><br><br>✅ <strong>Microsoft Entra Connect con Password Hash Sync (PHS) o Pass-Through Authentication (PTA)</strong>: Entra Connect es el puente entre el AD on-premises y Microsoft Entra ID. Sincroniza las identidades de usuario del AD hacia Entra ID. Con <strong>PHS</strong>, el hash de la contraseña se sincroniza en la nube (los usuarios pueden autenticarse aunque el AD on-prem no esté disponible). Con <strong>PTA</strong>, la validación de la contraseña siempre ocurre en los DCs on-premises. En ambos casos, el usuario puede usar el mismo username@contoso.com y contraseña tanto en PC1 (on-prem) como en Office 365/Azure.<br><br>❌ <strong>Conditional Access risk policy</strong>: Controla las condiciones bajo las cuales se requiere MFA, se bloquea el acceso, etc. No sincroniza ni unifica credenciales entre on-prem y cloud.<br>❌ <strong>Microsoft Entra Domain Services (AADDS)</strong>: Proporciona servicios de dominio gestionados (LDAP, Kerberos, Group Policy) en Azure. Es para hacer que VMs de Azure se unan a un dominio. No resuelve el caso de que un usuario use las mismas credenciales on-prem y cloud — para eso se necesita sincronización via Entra Connect.<br>❌ <strong>PIM (Privileged Identity Management)</strong>: Gestiona el acceso privilegiado just-in-time para roles administrativos. No tiene relación con la unificación de credenciales para usuarios estándar.<br><br>📌 <strong>Añadir Seamless SSO</strong>: Junto con PHS/PTA, habilitar <em>Seamless Single Sign-On</em> en Entra Connect permite que los usuarios en equipos unidos al dominio no tengan que introducir la contraseña para servicios cloud (SSO automático).'},

{id:87,type:'mc',cat:'App Services',
q:'You have an Azure App Service Plan named Plan1 currently using the <strong>Standard S1</strong> pricing tier. You need to configure Plan1 so that the number of instances automatically increases when CPU usage exceeds a threshold. What should you do first to enable this capability?',
opts:['Change the pricing tier to Premium P1','Enable autoscale from the Scale out (App Service Plan) settings blade','Create a new App Service Plan with autoscale pre-configured','Add a deployment slot to Plan1'],
ans:[1],
exp:'<strong>App Service Autoscale: Habilitar el escalado automático</strong><br><br>✅ <strong>Habilitar autoscale desde el blade Scale out</strong>: El nivel Standard S1 (y superiores: S2, S3, Premium, Isolated) soporta autoscalado. Para activarlo: en el portal, ve al App Service Plan → Scale out → haz clic en <strong>"Enable autoscale"</strong>. Una vez habilitado, puedes añadir reglas basadas en métricas (CPU, memoria, peticiones HTTP) y configurar los límites mínimo/máximo de instancias. Es el primer paso y es directo desde el blade Scale out.<br><br>❌ <strong>Cambiar a Premium P1</strong>: No es necesario. El nivel Standard S1 ya soporta autoscalado. Solo sería necesario cambiar de nivel si estuvieras en Basic (B1/B2/B3) o Free/Shared, que NO soportan autoscalado. S1 ya es un nivel que permite autoscale.<br>❌ <strong>Crear nuevo App Service Plan</strong>: No necesitas crear un plan nuevo. Plan1 ya puede soportar autoscalado en S1. Solo hay que habilitarlo.<br>❌ <strong>Añadir un deployment slot</strong>: Los slots son entornos adicionales (staging, testing) para despliegues sin tiempo de inactividad. No tienen relación con la configuración de autoscalado.<br><br>📌 <strong>Niveles y autoscale</strong>:<br>• Free / Shared → ❌ sin autoscale (máx. 1 instancia)<br>• Basic → ❌ sin autoscale (máx. 3 instancias manuales)<br>• Standard / Premium / Isolated → ✅ autoscale habilitable'},

{id:88,type:'hs',cat:'Governance & Cost',
q:'You have a Microsoft Azure subscription that contains a management group named MG1. You have a user named User1. You plan to assign User1 the built-in <strong>Contributor</strong> role at the MG1 scope. For each of the following statements, select Yes or No.',
statements:['User1 will be able to create Azure resources in all subscriptions under MG1','User1 will be able to assign Azure roles to other users within MG1','Role assignments at the MG1 scope will be inherited by all child subscriptions and resource groups'],
ans:['Yes','No','Yes'],
exp:'<strong>Management Groups y herencia de roles en Azure RBAC</strong><br><br>✅ <strong>Sí — User1 puede crear recursos</strong>: El rol Contributor incluye permisos para crear y gestionar todos los tipos de recursos de Azure. Asignado a nivel de Management Group, este permiso se hereda en cascada hacia abajo: todas las suscripciones hijas, sus grupos de recursos, y sus recursos individuales.<br><br>❌ <strong>No — User1 NO puede asignar roles</strong>: El rol Contributor NO incluye <code>Microsoft.Authorization/roleAssignments/write</code>. Para asignar roles a otros usuarios se necesita el rol <strong>Owner</strong> o <strong>User Access Administrator</strong>. Esta es una distinción clave del examen AZ-104.<br><br>✅ <strong>Sí — Las asignaciones se heredan</strong>: Azure RBAC usa herencia de permisos. Una asignación de rol en un Management Group se propaga automáticamente a: todas las suscripciones bajo ese MG, todos los grupos de recursos de esas suscripciones, y todos los recursos individuales. Los permisos heredados son aditivos y no se puede eliminar la herencia (solo añadir restricciones con Deny assignments).<br><br>📌 <strong>Diferencia clave Owner vs Contributor</strong>:<br>• Owner = gestión de recursos + asignación de roles (control total)<br>• Contributor = gestión de recursos SOLO (sin asignación de roles)<br>• Reader = lectura SOLO'},

{id:89,type:'mc',cat:'Governance & Cost',
q:'You have an Azure subscription that contains 3,000 virtual machines. All the virtual machines run Windows Server and are spread across multiple resource groups and regions. You need to ensure that all the virtual machines receive operating system updates and security patches automatically, with centralized visibility of update compliance across all VMs. Which Azure service should you use?',
opts:['Azure Update Manager','Windows Server Update Services (WSUS) deployed on a VM','Azure Automation Update Management (classic)','Azure Policy with DeployIfNotExists effect'],
ans:[0],
exp:'<strong>Azure Update Manager: Gestión centralizada de actualizaciones a escala</strong><br><br>✅ <strong>Azure Update Manager</strong>: Servicio nativo de Azure para gestionar y gobernar el cumplimiento de actualizaciones de VMs Windows y Linux en Azure, on-premises y otras nubes. Características clave: evaluación de cumplimiento de parches en tiempo real para todas las VMs, programación de ventanas de mantenimiento para actualizaciones automáticas, grupos de actualización dinámica basados en etiquetas o consultas, historial de actualizaciones, soporte para VMs de Azure + Arc-enabled servers. Sin necesidad de desplegar infraestructura adicional (a diferencia de WSUS).<br><br>❌ <strong>WSUS en una VM</strong>: Windows Server Update Services requiere desplegar y mantener un servidor de actualizaciones. Para 3.000 VMs en múltiples regiones, necesitarías múltiples servidores WSUS, configuración de red compleja y mantenimiento manual. No es escalable ni cloud-native.<br>❌ <strong>Azure Automation Update Management (classic)</strong>: La versión legacy de gestión de actualizaciones usando Azure Automation + Log Analytics. Ha sido reemplazada por Azure Update Manager, que es más moderno, no requiere Log Analytics workspace obligatorio, y tiene mejor integración con el portal.<br>❌ <strong>Azure Policy con DeployIfNotExists</strong>: Puede ayudar a garantizar que las VMs tengan ciertas configuraciones, pero no gestiona directamente las actualizaciones del sistema operativo ni proporciona un panel de cumplimiento de parches.<br><br>📌 <strong>Azure Update Manager vs. Automation</strong>: Microsoft recomienda migrar de Azure Automation Update Management a Azure Update Manager. Ambos soportan VMs de Azure y servidores on-premises via Azure Arc.'},

{id:90,type:'mc',cat:'Governance & Cost',
q:'You have an Azure subscription named Subscription1. You assign an Azure Policy definition with the <strong>Modify</strong> effect to Subscription1. The policy is configured to add the tag <strong>env=production</strong> to all storage accounts. A user creates a new storage account named StorageV1 in the West US region without specifying any tags. What is the effect of the policy on StorageV1?',
opts:['The storage account creation is denied because the required tag is missing','The storage account is created but flagged as Non-Compliant; no tag is added automatically','The storage account is created and the tag env=production is automatically added by the policy','The user receives a warning but can choose to proceed without the tag'],
ans:[2],
exp:'<strong>Azure Policy — Efecto Modify: Añade/modifica atributos automáticamente</strong><br><br>✅ <strong>Modify → Añade la etiqueta automáticamente</strong>: El efecto <strong>Modify</strong> realiza operaciones en los recursos durante la creación o actualización. Cuando el recurso no tiene el tag requerido (<code>env=production</code>), el efecto Modify lo <strong>añade automáticamente</strong> como parte del proceso de creación, sin denegar ni bloquear la operación. El recurso se crea correctamente y queda con la etiqueta aplicada. También es posible aplicar Modify a recursos existentes no conformes mediante tareas de remediación.<br><br>❌ <strong>Deny</strong>: El efecto que BLOQUEA la creación del recurso si no cumple la condición. Con efecto Deny, la creación de StorageV1 sin el tag habría fallado con un error.<br>❌ <strong>Audit</strong>: El efecto que registra el incumplimiento en el panel de compliance pero NO toma ninguna acción correctiva. El recurso se crea, queda marcado como Non-Compliant, pero la etiqueta NO se añade automáticamente.<br>❌ <strong>Warning/mensaje</strong>: No existe un efecto "Warning" en Azure Policy. Los efectos disponibles son: Audit, AuditIfNotExists, Deny, DeployIfNotExists, Modify, Append, DenyAction, Disabled.<br><br>📌 <strong>Cuándo usar cada efecto</strong>:<br>• Deny → bloquear recursos no conformes<br>• Audit → visibilidad sin acción<br>• Modify → corregir atributos (tags, propiedades) automáticamente<br>• DeployIfNotExists → desplegar recursos auxiliares si faltan (ej: instalar extension en VM)'},

{id:91,type:'mc',cat:'Security & KeyVault',
q:'You have an Azure subscription with a storage account. You need to configure encryption for the storage account so that the encryption key is managed by your organization (not by Microsoft), and the key must be an <strong>RSA key stored in Azure Key Vault</strong>. Which encryption configuration should you use?',
opts:['Azure Disk Encryption (ADE) with a Key Vault RSA key','Server-Side Encryption (SSE) with customer-managed keys (CMK) using an RSA key in Azure Key Vault','Client-side encryption using the Azure Storage SDK','Server-Side Encryption (SSE) with Microsoft-managed keys (MMK)'],
ans:[1],
exp:'<strong>SSE con CMK: Cifrado de Storage con claves RSA propias en Key Vault</strong><br><br>✅ <strong>Server-Side Encryption (SSE) con Customer-Managed Keys (CMK) — RSA en Key Vault</strong>: Azure Storage Service Encryption (SSE) cifra automáticamente todos los datos en reposo con AES-256. Por defecto usa claves gestionadas por Microsoft (MMK). Para usar tus propias claves RSA almacenadas en Azure Key Vault (CMK), debes: crear un Key Vault con Soft Delete y Purge Protection activados, generar o importar una clave RSA (o RSA-HSM), y configurar la cuenta de Storage para usar esa clave vía un Disk Encryption Set o directamente. Solo se soportan claves RSA (2048, 3072 o 4096 bits); claves EC no son compatibles para CMK en Storage.<br><br>❌ <strong>Azure Disk Encryption (ADE)</strong>: ADE usa BitLocker (Windows) o dm-crypt (Linux) para cifrar los discos de <strong>Máquinas Virtuales</strong>. NO aplica a cuentas de Storage (Blob, Files, Tables, Queues). ADE y SSE son para recursos diferentes.<br>❌ <strong>Client-side encryption</strong>: El cifrado de lado del cliente cifra los datos ANTES de enviarlos a Azure Storage. Aunque permite usar claves propias, implica que la aplicación gestiona el cifrado/descifrado, lo que añade complejidad al desarrollo y no es la solución estándar para cumplir requisitos de CMK en Storage.<br>❌ <strong>SSE con MMK (Microsoft-managed keys)</strong>: Es el cifrado predeterminado de todos los Storage accounts. Las claves las gestiona Microsoft, no tu organización. No cumple el requisito de CMK con RSA propio.<br><br>📌 <strong>Requisitos del Key Vault para CMK</strong>: Soft Delete ✅, Purge Protection ✅, Key Type: RSA o RSA-HSM, Key Operations: wrap/unwrap.'},

{id:92,type:'mc',cat:'Compute & Backup',
q:'You have an Azure subscription that contains an Azure Kubernetes Service (AKS) cluster named AKS1 and an Azure Container Registry (ACR) named ACR1. You need to configure AKS1 to be able to pull container images from ACR1 <strong>without storing any credentials</strong> in the cluster configuration or Kubernetes secrets. What should you do?',
opts:['Create a Kubernetes image pull secret with the ACR admin credentials and reference it in pod specs','Attach ACR1 to AKS1 using the az aks update --attach-acr command, which grants the AKS managed identity the AcrPull role on ACR1','Enable the ACR admin account and configure it in AKS1 environment variables','Create a service principal for AKS1 and manually assign the AcrPull role to it in ACR1'],
ans:[1],
exp:'<strong>AKS + ACR: Integración con Managed Identity sin credenciales</strong><br><br>✅ <strong>az aks update --attach-acr → AcrPull via Managed Identity</strong>: El comando <code>az aks update --name AKS1 --resource-group RG1 --attach-acr ACR1</code> configura automáticamente la identidad administrada del sistema de AKS (kubelet managed identity) con el rol <strong>AcrPull</strong> sobre ACR1. Con esto, los nodos del cluster pueden autenticarse en ACR y descargar imágenes sin necesidad de credenciales explícitas, image pull secrets, ni gestión manual de tokens. Es la forma recomendada y más segura de integrar AKS con ACR.<br><br>❌ <strong>Kubernetes image pull secret con admin credentials</strong>: Aunque funciona, almacena las credenciales del ACR admin como un Secret de Kubernetes en el cluster. Esto requiere rotación manual de credenciales, aumenta la superficie de ataque, y es el anti-pattern que precisamente se quiere evitar con managed identities.<br>❌ <strong>ACR admin account en variables de entorno</strong>: La cuenta de administrador de ACR es una credencial estática (usuario/contraseña). Almacenarla en variables de entorno es un riesgo de seguridad significativo. Además, el ACR admin account debería estar deshabilitado por defecto.<br>❌ <strong>Service principal manual</strong>: Aunque se puede usar un service principal con AcrPull, requiere gestión manual del ciclo de vida del SP (rotación de secretos, renovación). Las managed identities eliminan esta complejidad ya que Azure gestiona las credenciales automáticamente.<br><br>📌 <strong>Comando de desasociación</strong>: <code>az aks update --detach-acr ACR1</code> revoca el rol AcrPull. La integración también se puede configurar durante la creación del cluster con <code>az aks create --attach-acr</code>.'},
